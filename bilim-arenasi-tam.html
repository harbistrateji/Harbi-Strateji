<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="hs-skip" content="true">
    <title>İslam ve Türk Bilginlerinin Karargahı</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@400;700;900&family=Playfair+Display:wght@700;900&subset=latin-ext&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-red: #d32f2f;
            --color-dark-red: #b71c1c;
            --color-black: #0d1117;
            --color-white: #0d1117;
            --color-light-gray: #161b22;
            --color-medium-gray: #21262d;
            --color-dark-gray: #8b949e;
            --color-text: #c9d1d9;
        }

        body {
            font-family: 'Merriweather', serif;
            background-color: #0a0f17;
            color: var(--color-text);
            line-height: 1.8;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        #bilim-arena-root {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0f17 0%, #0d1117 100%);
        }

        .ba-phone-wrapper {
            width: 100%;
            max-width: 480px;
            height: 100%;
            max-height: 900px;
            background: #0d1117;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 12px solid #1c2128;
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }

        @media (max-width: 520px) {
            .ba-phone-wrapper {
                border: none;
                border-radius: 0;
                max-height: 100%;
            }
        }

        .ba-screen {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            position: relative;
        }

        .ba-screen.ba-active {
            display: flex;
        }

        /* ===== MENU SCREEN ===== */
        .ba-menu-top {
            padding: 32px 28px 24px;
            text-align: center;
            background: linear-gradient(to bottom, #161b22, transparent);
            border-bottom: 3px solid var(--color-red);
        }

        .ba-menu-icon {
            font-size: 3.2rem;
            display: block;
            margin-bottom: 12px;
            animation: ba-float 3s ease-in-out infinite;
        }

        @keyframes ba-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .ba-menu-top h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            color: #f0f6fc;
            font-weight: 900;
            letter-spacing: 2px;
            margin-bottom: 8px;
            line-height: 1.2;
        }

        .ba-menu-top p {
            font-size: 0.95rem;
            color: var(--color-dark-gray);
            margin-bottom: 16px;
            font-style: italic;
            letter-spacing: 0.5px;
        }

        .ba-global-stats {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--color-red);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            padding: 10px;
            background: rgba(211, 47, 47, 0.08);
            border-left: 4px solid var(--color-red);
        }

        .ba-scholar-grid {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px 40px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ba-scholar-grid::-webkit-scrollbar {
            width: 6px;
        }

        .ba-scholar-grid::-webkit-scrollbar-track {
            background: #0d1117;
        }

        .ba-scholar-grid::-webkit-scrollbar-thumb {
            background: var(--color-red);
            border-radius: 3px;
        }

        .ba-scholar-card {
            background: #161b22;
            border: 2px solid #21262d;
            border-left: 5px solid var(--color-red);
            padding: 16px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .ba-scholar-card:hover {
            background: #1c2128;
            border-left-color: var(--color-dark-red);
            transform: translateX(4px);
            box-shadow: 0 4px 12px rgba(211, 47, 47, 0.25);
        }

        .ba-scholar-card:active {
            transform: scale(0.98);
        }

        .ba-scholar-emoji {
            font-size: 2.2rem;
            flex-shrink: 0;
        }

        .ba-scholar-info {
            flex: 1;
            min-width: 0;
        }

        .ba-scholar-info h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            color: #f0f6fc;
            font-weight: 700;
            margin-bottom: 4px;
            letter-spacing: 0.5px;
        }

        .ba-scholar-info p {
            font-size: 0.8rem;
            color: var(--color-dark-gray);
            margin: 0;
            line-height: 1.4;
        }

        /* ===== ARENA SCREEN ===== */
        .ba-hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 24px;
            z-index: 40;
            background: linear-gradient(to bottom, #0d1117 70%, transparent);
            border-bottom: 2px solid #21262d;
        }

        .ba-hud-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: #f0f6fc;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .ba-progress-track {
            width: 100%;
            height: 6px;
            background: var(--color-medium-gray);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 12px;
        }

        .ba-progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--color-red), var(--color-dark-red));
            transition: width 0.4s ease;
        }

        .ba-hud-stats {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            font-weight: 700;
            color: var(--color-text);
        }

        /* ===== FAIL OVERLAY ===== */
        .ba-overlay-fail {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 15, 23, 0.98);
            z-index: 100;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 28px;
            text-align: center;
        }

        .ba-overlay-fail h2 {
            color: var(--color-red);
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin: 16px 0;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .ba-overlay-fail p {
            font-size: 0.95rem;
            color: var(--color-text);
            line-height: 1.6;
            margin-bottom: 28px;
            max-width: 300px;
        }

        /* ===== CARD STAGE ===== */
        .ba-card-stage {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .ba-interactive-card {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            padding: 80px 28px 48px;
            text-align: center;
            background: #0d1117;
            overflow-y: auto;
        }

        .ba-interactive-card::-webkit-scrollbar {
            width: 4px;
        }

        .ba-interactive-card::-webkit-scrollbar-track {
            background: #0d1117;
        }

        .ba-interactive-card::-webkit-scrollbar-thumb {
            background: var(--color-red);
        }

        .ba-big-emoji {
            font-size: 3rem;
            margin-bottom: 20px;
            display: block;
        }

        .ba-card-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: #f0f6fc;
            margin-bottom: 16px;
            letter-spacing: 1px;
            line-height: 1.3;
        }

        .ba-card-desc {
            font-size: 0.95rem;
            color: var(--color-text);
            line-height: 1.8;
            max-width: 360px;
            margin-bottom: 28px;
            letter-spacing: 0.3px;
        }

        /* ===== METRIC BOX ===== */
        .ba-metric-box {
            width: 100%;
            max-width: 320px;
            background: rgba(211, 47, 47, 0.06);
            padding: 16px;
            border-radius: 8px;
            border-left: 4px solid var(--color-red);
            margin-bottom: 24px;
            text-align: left;
        }

        .ba-metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .ba-metric-row:last-child {
            margin-bottom: 0;
        }

        .ba-m-bar {
            width: 120px;
            height: 8px;
            background: var(--color-medium-gray);
            border-radius: 4px;
            overflow: hidden;
        }

        .ba-m-fill {
            height: 100%;
            transition: width 0.4s ease;
            background: linear-gradient(90deg, var(--color-red), var(--color-dark-red));
        }

        /* ===== ACTION BUTTONS ===== */
        .ba-action-stack {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 100%;
            max-width: 320px;
        }

        .ba-btn {
            width: 100%;
            padding: 14px 20px;
            border: 2px solid var(--color-black);
            border-radius: 6px;
            font-family: 'Merriweather', serif;
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            cursor: pointer;
            color: var(--color-white);
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .ba-btn-blue {
            background: var(--color-red);
            border-color: var(--color-red);
        }

        .ba-btn-blue:hover {
            background: var(--color-dark-red);
            border-color: var(--color-dark-red);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(211, 47, 47, 0.25);
        }

        .ba-btn-blue:active {
            transform: scale(0.98);
        }

        .ba-btn-purple {
            background: var(--color-black);
            border-color: var(--color-black);
        }

        .ba-btn-purple:hover {
            background: var(--color-dark-gray);
            border-color: var(--color-dark-gray);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(0, 0, 0, 0.2);
        }

        .ba-btn-purple:active {
            transform: scale(0.98);
        }

        .ba-btn-pink {
            background: var(--color-red);
            border-color: var(--color-red);
        }

        .ba-btn-pink:hover {
            background: var(--color-dark-red);
            border-color: var(--color-dark-red);
        }

        /* ===== 3D VIEWPORT ===== */
        .ba-viewport3d {
            width: 100%;
            max-width: 360px;
            height: 240px;
            background: linear-gradient(135deg, #161b22 0%, #0d1117 100%);
            border-radius: 12px;
            border: 3px solid var(--color-red);
            position: relative;
            overflow: hidden;
            perspective: 1000px;
            margin-bottom: 24px;
            box-shadow: inset 0 4px 12px rgba(0,0,0,0.3), 0 8px 20px rgba(211,47,47,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        svg.ba-simulation {
            width: 100%;
            height: 100%;
            max-width: 360px;
            max-height: 240px;
        }

        /* ===== MATRIX GRID ===== */
        .ba-matrix-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            width: 100%;
            max-width: 320px;
            margin-bottom: 24px;
        }

        .ba-matrix-cell {
            background: #161b22;
            padding: 16px;
            border-radius: 8px;
            border: 2px solid #21262d;
            text-align: center;
        }

        .ba-matrix-cell[style*="border-color: var(--ba-gold)"] {
            border-color: var(--color-red);
            background: rgba(211, 47, 47, 0.05);
        }

        .ba-cell-lbl {
            font-size: 0.75rem;
            color: var(--color-dark-gray);
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .ba-cell-val {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            font-weight: 900;
            color: var(--color-red);
            margin: 0;
            line-height: 1.2;
        }

        /* ===== SWIPE HINT ===== */
        .ba-swipe-hint {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--color-red);
            letter-spacing: 1px;
            margin-top: 20px;
            animation: ba-bounce 1.5s infinite;
        }

        @keyframes ba-bounce {
            0%, 100% { transform: translateY(0); opacity: 0.6; }
            50% { transform: translateY(-4px); opacity: 1; }
        }
    
        /* Bilim Arenası Simülasyon Efektleri */
        @keyframes ba-pulse-glow { 0%,100%{filter:drop-shadow(0 0 3px #d32f2f)} 50%{filter:drop-shadow(0 0 12px #ff6b6b)} }
        @keyframes ba-orbit { from{transform:rotate(0deg) translateX(40px) rotate(0deg)} to{transform:rotate(360deg) translateX(40px) rotate(-360deg)} }
        @keyframes ba-draw { from{stroke-dashoffset:300} to{stroke-dashoffset:0} }
        @keyframes ba-wave { 0%{transform:translateY(0)} 25%{transform:translateY(-8px)} 50%{transform:translateY(0)} 75%{transform:translateY(8px)} 100%{transform:translateY(0)} }
        @keyframes ba-spin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
        @keyframes ba-scale-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }
        @keyframes ba-flicker { 0%,100%{opacity:1} 50%{opacity:0.4} }
        @keyframes ba-slide-in { from{transform:translateX(-50px);opacity:0} to{transform:translateX(0);opacity:1} }
        @keyframes ba-bounce-y { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-15px)} }
        @keyframes ba-fade-cascade { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:translateY(0)} }
        .ba-viewport3d svg { overflow: visible !important; }
        .ba-viewport3d svg * { transform-origin: center center; }
        .ba-sim-animated { animation-fill-mode: both; }

        
/* ═══ MOBİL UYUMLU RESPONSIVE ═══ */
@media (max-width: 768px) {
  body { font-size: 14px !important; }
  .container, .main, .wrap, .content, .page-content {
    padding: 12px !important;
    max-width: 100% !important;
  }
  h1 { font-size: clamp(18px, 5vw, 28px) !important; }
  h2 { font-size: clamp(15px, 4vw, 22px) !important; }
  h3 { font-size: clamp(13px, 3.5vw, 18px) !important; }
  table { font-size: 11px !important; }
  img, video, canvas, svg { max-width: 100% !important; height: auto !important; }
  .grid, .card-grid, .cards { grid-template-columns: 1fr !important; }
}
@media (max-width: 480px) {
  body { font-size: 13px !important; }
  .container, .main, .wrap { padding: 8px !important; }
  h1 { font-size: clamp(16px, 5vw, 24px) !important; }
  .nav, .navbar, .top-bar, .header { 
    padding: 8px 12px !important;
    font-size: 12px !important;
  }
}
/* Prevent horizontal overflow */
html { overflow-x: hidden !important; }
body { overflow-x: hidden !important; max-width: 100vw !important; }
img, video, iframe, canvas, svg, table { max-width: 100% !important; }
pre, code { overflow-x: auto !important; white-space: pre-wrap !important; word-break: break-word !important; }

</style>

<div style="position:fixed;top:12px;left:12px;z-index:9999;display:flex;gap:8px;"><a href="oza-hub.html" style="background:rgba(10,15,23,0.9);color:#00E0FF;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid #00E0FF33;backdrop-filter:blur(8px);">← OZA Hub</a><a href="index.html" style="background:rgba(10,15,23,0.9);color:#c41e3a;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid rgba(196,30,58,0.3);backdrop-filter:blur(8px);">🏠 Ana Sayfa</a></div>

<div id="bilim-arena-root">
    <div class="ba-phone-wrapper">
        <div id="ha-main-menu" class="ba-screen ba-active">
            <div class="ba-menu-top">
                <span class="ba-menu-icon">🧠</span>
                <h1>İSLAM VE TÜRK BİLGİNLERİNİN KARARGAHI</h1>
                <p>Bilim Tarihinin Altın Çağı</p>
                <div class="ba-global-stats" id="ba-menu-global-xp">📊 Akademik Enerji: 0 Bilim XP</div>
            </div>
            <div class="ba-scholar-grid" id="ba-scholar-selector-grid"></div>
        </div>

        <div id="ha-arena-room" class="ba-screen">

                <div class="ba-hud-meta">

                </div>
                <div class="ba-progress-track"><div class="ba-progress-fill" id="ha-hud-bar"></div></div>
                <div class="ba-hud-stats">

                <button class="ba-btn ba-btn-pink" onclick="ScoringSystem.retry()">TEORİYİ DÜZENLE</button>

<script>
    const SoundFX = {
        ctx: null,
        play(type) {
            try {
                if (!this.ctx) this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                let osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
                osc.connect(gain); gain.connect(this.ctx.destination);
                if (type === "success") {
                    osc.frequency.setValueAtTime(523.25, this.ctx.currentTime);
                    osc.frequency.setValueAtTime(783.99, this.ctx.currentTime + 0.08);
                    gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.35);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.35);
                } else if (type === "fail") {
                    osc.type = "sawtooth"; osc.frequency.setValueAtTime(150, this.ctx.currentTime);
                    osc.frequency.linearRampToValueAtTime(70, this.ctx.currentTime + 0.4);
                    gain.gain.setValueAtTime(0.15, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.42);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.42);
                } else if (type === "click") {
                    osc.type = "triangle"; osc.frequency.setValueAtTime(450, this.ctx.currentTime);
                    gain.gain.setValueAtTime(0.04, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.0001, this.ctx.currentTime + 0.06);
                    osc.start(); osc.stop(this.ctx.currentTime + 0.06);
                }
            } catch (e) {}
        }
    };

    const ScoringSystem = {
        totalXP: 0,
        initGame() { this.totalXP = Number(localStorage.getItem("scholarsXP")) || 0; this.updateHUD(); },
        addXP(val) { this.totalXP += val; localStorage.setItem("scholarsXP", this.totalXP); this.updateHUD(); },
        updateHUD() {
            document.getElementById("ha-hud-xp").innerText = `⚡ ${this.totalXP} XP`;
            let r = "Stajyer Danışman"; if(this.totalXP>600) r="Akademik Danışman"; if(this.totalXP>1200) r="Kıdemli Mucit"; if(this.totalXP>1800) r="Bilim Ordinaryüsü";
            document.getElementById("ha-hud-rank").innerText = `🏆 ${r}`;
            if(document.getElementById("ba-menu-global-xp")) document.getElementById("ba-menu-global-xp").innerText = `📊 Akademik Enerji: ${this.totalXP} Bilim XP`;
        },
        triggerFail(reason) { document.getElementById("ha-fail-reason").innerText = reason; document.getElementById("ha-fail-overlay").style.display = "flex"; SoundFX.play("fail"); },
        retry() { document.getElementById("ha-fail-overlay").style.display = "none"; BattleLauncher.renderStage(); }
    };

    const SimulationFactory = {
        createSVG(scholarKey) {
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            svg.setAttribute("viewBox", "0 0 360 240");
            svg.setAttribute("class", "ba-simulation");
            
            const bg = document.createElementNS("http://www.w3.org/2000/svg", "rect");
            bg.setAttribute("width", "360");
            bg.setAttribute("height", "240");
            bg.setAttribute("fill", "#f5f5f5");
            svg.appendChild(bg);

            // Grid
            for (let i = 0; i < 360; i += 30) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", i);
                line.setAttribute("y1", "0");
                line.setAttribute("x2", i);
                line.setAttribute("y2", "240");
                line.setAttribute("stroke", "#e0e0e0");
                line.setAttribute("stroke-width", "0.5");
                svg.appendChild(line);
            }
            for (let i = 0; i < 240; i += 30) {
                const line = document.createElementNS("http://www.w3.org/2000/svg", "line");
                line.setAttribute("x1", "0");
                line.setAttribute("y1", i);
                line.setAttribute("x2", "360");
                line.setAttribute("y2", i);
                line.setAttribute("stroke", "#e0e0e0");
                line.setAttribute("stroke-width", "0.5");
                svg.appendChild(line);
            }

            // Alan-spesifik simülasyonlar
            const simulations = {
                "evliya": () => {
                    // Seyahat haritası - yol çizimi animasyonu (5s)
                    const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    path.setAttribute("d", "M 60 180 Q 100 80 180 120 T 300 80");

                    book.setAttribute("x","180"); book.setAttribute("y","85");
                    book.setAttribute("text-anchor","middle"); book.setAttribute("font-size","20");

                "jabir": () => {

                    flask.setAttribute("stroke","#ff6b6b"); flask.setAttribute("stroke-width","2");

                    tube.setAttribute("d","M 150 140 Q 200 100 250 130");

                "hazini": () => {

                    beam.setAttribute("x2","260"); beam.setAttribute("y2","100");

                    beam.style.transformOrigin = "180px 100px";
                    beam.style.animation = "ba-wave 4s ease infinite";
                    svg.appendChild(beam);
                    const pivot = document.createElementNS("http://www.w3.org/2000/svg", "polygon");

                    w2.setAttribute("r","10"); w2.setAttribute("fill","#4fc3f7");
                    w2.style.animation = "ba-scale-pulse 2s ease 1s infinite";
                    svg.appendChild(w2);
                },
                "kuscu": () => {
                    // Astronomi - yıldız haritası (6s)
                    for(let i=0;i<20;i++){
                        const star = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                        star.setAttribute("cx", 60+Math.random()*240);
                        star.setAttribute("cy", 40+Math.random()*160);

                        star.style.animation = `ba-flicker ${2+Math.random()*3}s ease ${Math.random()*2}s infinite`;
                        svg.appendChild(star);

                    const telescope = document.createElementNS("http://www.w3.org/2000/svg", "path");
                    telescope.setAttribute("d","M 160 200 L 200 120 L 210 125 L 170 205 Z");
                    telescope.setAttribute("fill","#795548");
                    telescope.style.opacity="0"; telescope.style.animation = "ba-fade-cascade 1s ease 1s forwards";
                    svg.appendChild(telescope);
                    const crosshair = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    crosshair.setAttribute("cx","210"); crosshair.setAttribute("cy","80");
                    crosshair.setAttribute("r","15"); crosshair.setAttribute("fill","none");
                    crosshair.setAttribute("stroke","#ff6b6b"); crosshair.setAttribute("stroke-width","1");
                    crosshair.style.animation = "ba-pulse-glow 2s ease infinite";
                    svg.appendChild(crosshair);
                },
                "takiyuddin": () => {
                    // Mekanik saat - saniye ibresi (5s)
                    const face = document.createElementNS("http://www.w3.org/2000/svg", "circle");
                    face.setAttribute("cx","180"); face.setAttribute("cy","120");
                    face.setAttribute("r","60"); face.setAttribute("fill","none");
                    face.setAttribute("stroke","#ff6b6b"); face.setAttribute("stroke-width","2");
                    svg.appendChild(face);
                    for(let i=0;i<12;i++){
                        const angle = (i*30)*Math.PI/180;
                        const tick = document.createElementNS("http://www.w3.org/2000/svg", "line");
                        tick.setAttribute("x1", 180+50*Math.cos(angle));
                        tick.setAttribute("y1", 120+50*Math.sin(angle));
                        tick.setAttribute("x2", 180+58*Math.cos(angle));
                        tick.setAttribute("y2", 120+58*Math.sin(angle));
                        tick.setAttribute("stroke","#ffcdd2"); tick.setAttribute("stroke-width","2");
                        svg.appendChild(tick);
                    }
                    const hand = document.createElementNS("http://www.w3.org/2000/svg", "line");
                    hand.setAttribute("x1","180"); hand.setAttribute("y1","120");
                    hand.setAttribute("x2","180"); hand.setAttribute("y2","70");
                    hand.setAttribute("stroke","#d32f2f"); hand.setAttribute("stroke-width","2");
                    hand.style.transformOrigin = "180px 120px";
                    hand.style.animation = "ba-spin 5s linear infinite";
                    svg.appendChild(hand);
                }
            };

            if (simulations[scholarKey]) {
                simulations[scholarKey]();
            }

            return svg;
        }
    };

    const SwipeEngine = {
        startX: 0,
        init() {
            const stage = document.getElementById("ha-card-stage"); if (!stage) return;
            stage.addEventListener("touchstart", e => { this.startX = e.touches[0].clientX; }, { passive: true });
            stage.addEventListener("touchend", e => {
                let diff = this.startX - e.changedTouches[0].clientX;
                if (diff > 60) {
                    let ch = BattleLauncher.currentBattleData.chapters[BattleLauncher.currentChapterIdx];
                    if (ch && ["story", "context", "3d_hint"].includes(ch.type)) BattleLauncher.next();
                }
            }, { passive: true });
        }
    };

    const BattleLauncher = {
        currentBattleData: null,
        currentChapterIdx: 0,
        currentScholarKey: null,
        init() { ScoringSystem.initGame(); this.renderMenu(); },
        renderMenu() {
            const grid = document.getElementById("ba-scholar-selector-grid"); grid.innerHTML = "";
            RAW_SCHOLARS.forEach(s => {
                grid.innerHTML += `
                    <div class="ba-scholar-card" onclick="BattleLauncher.start('${s.key}')">
                        <span class="ba-scholar-emoji">${s.icon}</span>
                        <div class="ba-scholar-info">
                            <h3>${s.title}</h3>
                            <p>${s.field}</p>
                        </div>
                    </div>`;
            });
        },
        start(key) {
            SoundFX.play("click");
            let s = RAW_SCHOLARS.find(x => x.key === key); if (!s) return;
            this.currentScholarKey = key;
            this.currentBattleData = {
                title: s.title,
                special: {},
                chapters: [
                    { type: "story", emoji: s.icon, title: `${s.title} Karargahı`, text: `<strong>${s.title}</strong> olarak tarihe geçecek büyük bilimsel çalışmaların merkezindesiniz.<br><br>${s.field} alanında yeni bir çağ başlatmak üzere teorinizi hazırlayın.` },
                    { type: "choice", emoji: "🔬", title: "Stratejik Karar Anı", text: s.q, choices: [ { text: s.a1, xp: s.ok === 1 ? 150 : -30, failText: s.f }, { text: s.a2, xp: s.ok === 2 ? 150 : -30, failText: s.f } ] },
                    { type: "map", emoji: "📐", title: "Alan-Spesifik Laboratuvar Projeksiyonu", text: `${s.field} alanında geliştirdiğiniz teorik modülünü görselleştirin.` }
                ]
            };
            this.currentBattleData.special[s.metric] = s.val;
            this.currentChapterIdx = 0;
            document.getElementById("ha-main-menu").classList.remove("ba-active");
            document.getElementById("ha-arena-room").classList.add("ba-active");
            document.getElementById("ha-hud-title").innerText = this.currentBattleData.title;
            this.renderStage();
            setTimeout(() => SwipeEngine.init(), 300);
        },
        renderStage() {
            const stage = document.getElementById("ha-card-stage"); stage.innerHTML = "";
            const chs = this.currentBattleData.chapters;
            if (this.currentChapterIdx >= chs.length) { this.showFinalReport(); return; }
            document.getElementById("ha-hud-step").innerText = `DENEY: ${this.currentChapterIdx + 1}/${chs.length}`;
            document.getElementById("ha-hud-bar").style.width = `${((this.currentChapterIdx + 1) / chs.length) * 100}%`;
            const data = chs[this.currentChapterIdx];
            const card = document.createElement("div"); card.className = "ba-interactive-card";
            let layout = `<span class="ba-big-emoji">${data.emoji}</span><h2 class="ba-card-title">${data.title}</h2>`;
            
            if (data.type === "story") {
                layout += `<p class="ba-card-desc">${data.text}</p>`;
                if (this.currentBattleData.special) {
                    layout += `<div class="ba-metric-box">`;
                    for (let [k, v] of Object.entries(this.currentBattleData.special)) {
                        layout += `<div class="ba-metric-row"><span>${k}:</span><div class="ba-m-bar"><div class="ba-m-fill" style="width:${v}%"></div></div></div>`;
                    }
                    layout += `</div>`;
                }
                layout += `<div class="ba-swipe-hint">➡️ İLERLEMEK İÇİN SOLA KAYDIRIN VEYA TIKLAYIN</div>`;
                card.onclick = () => { BattleLauncher.next(); };
            } else if (data.type === "choice") {
                layout += `<p class="ba-card-desc">${data.text}</p><div class="ba-action-stack">`;
                data.choices.forEach((c, idx) => { layout += `<button class="ba-btn ba-btn-purple" onclick="event.stopPropagation(); BattleLauncher.handleChoice(${idx})">${c.text}</button>`; });
                layout += `</div>`;
            } else if (data.type === "map") {
                layout += `<p class="ba-card-desc">${data.text}</p>
                    <div class="ba-viewport3d" id="simulation-container"></div>
                    <button class="ba-btn ba-btn-blue" onclick="event.stopPropagation(); Map3DSystem.engage('${this.currentScholarKey}')">DENEYİ BAŞLAT</button>`;
            }
            card.innerHTML = layout; stage.appendChild(card);
            
            if (data.type === "map") {
                const container = document.getElementById("simulation-container");
                if (container) {
                    const svg = SimulationFactory.createSVG(this.currentScholarKey);
                    container.appendChild(svg);
                }
            }
        },
        handleChoice(idx) {
            SoundFX.play("click");
            const choice = this.currentBattleData.chapters[this.currentChapterIdx].choices[idx];
            if (choice.xp > 0) { ScoringSystem.addXP(choice.xp); this.next(); } else { ScoringSystem.triggerFail(choice.failText); }
        },
        next() { SoundFX.play("click"); this.currentChapterIdx++; this.renderStage(); },
        showFinalReport() {
            document.getElementById("ha-card-stage").innerHTML = `
                <div class="ba-interactive-card">
                    <span class="ba-big-emoji">🎓</span><h2 class="ba-card-title">LABORATUVAR RAPORU</h2><p class="ba-card-desc">Bilimsel kararlarınız akademide kabul gördü ve tescillendi.</p>
                    <div class="ba-matrix-grid">
                        <div class="ba-matrix-cell"><div class="ba-cell-lbl">Teori</div><div class="ba-cell-val">%98</div></div>
                        <div class="ba-matrix-cell"><div class="ba-cell-lbl">Analiz</div><div class="ba-cell-val">%95</div></div>
                        <div class="ba-matrix-cell"><div class="ba-cell-lbl">Mantık</div><div class="ba-cell-val">%93</div></div>
                        <div class="ba-matrix-cell" style="border-color: var(--color-red); background: rgba(211, 47, 47, 0.05);"><div class="ba-cell-lbl" style="color:var(--color-red);">Unvan</div><div class="ba-cell-val" style="font-size:1rem; line-height:1.4;">KIDEMLİ MUCİT</div></div>
                    </div>
                    <button class="ba-btn ba-btn-blue" onclick="window.location.reload()">ANA MENÜ</button>
                </div>`;
        }
    };

    window.addEventListener("DOMContentLoaded", () => BattleLauncher.init());
</script>
