<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarım Başlangıcı</title>
    <style>
html{scroll-padding-top:80px}
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; font-family: 'Arial', sans-serif; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 800px; width: 90%; background: rgba(0,0,0,0.3); border-radius: 20px; padding: 40px; backdrop-filter: blur(10px); }
        h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .subtitle { font-size: 1.2em; margin-bottom: 30px; opacity: 0.9; }
        .game-area { background: rgba(255,255,255,0.1); border-radius: 15px; padding: 30px; margin-bottom: 20px; min-height: 300px; }
        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        .stat-box { background: rgba(255,255,255,0.2); padding: 15px; border-radius: 10px; text-align: center; }
        .stat-label { font-size: 0.9em; opacity: 0.8; }
        .stat-value { font-size: 2em; font-weight: bold; }
        button { background: #ff6b6b; color: white; border: none; padding: 15px 30px; font-size: 1.1em; border-radius: 10px; cursor: pointer; margin: 10px 5px 0 0; transition: 0.3s; }
        button:hover { background: #ff5252; transform: scale(1.05); }
        .info-box { background: rgba(255,255,255,0.15); padding: 20px; border-radius: 10px; margin-top: 20px; border-left: 4px solid #ff6b6b; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .pulse { animation: pulse 2s infinite; }
    
/* ═══ MOBİL UYUMLU RESPONSIVE ═══ */
@media (max-width: 768px) {
  body { font-size: 14px !important; }
  .container, .main, .wrap, .content, .page-content {
    padding: 12px !important;
    max-width: 100% !important;
  }
  h1 { font-size: clamp(18px, 5vw, 28px) !important; }
  h2 { font-size: clamp(15px, 4vw, 22px) !important; }
  h3 { font-size: clamp(13px, 3.5vw, 18px) !important; }
  table { font-size: 11px !important; }
  img, video, canvas, svg { max-width: 100% !important; height: auto !important; }
  .grid, .card-grid, .cards { grid-template-columns: 1fr !important; }
}
@media (max-width: 480px) {
  body { font-size: 13px !important; }
  .container, .main, .wrap { padding: 8px !important; }
  h1 { font-size: clamp(16px, 5vw, 24px) !important; }
  .nav, .navbar, .top-bar, .header { 
    padding: 8px 12px !important;
    font-size: 12px !important;
  }
}
/* Prevent horizontal overflow */
html { overflow-x: hidden !important; }
body { overflow-x: hidden !important; max-width: 100vw !important; }
img, video, iframe, canvas, svg, table { max-width: 100% !important; }
pre, code { overflow-x: auto !important; white-space: pre-wrap !important; word-break: break-word !important; }

</style>
<link rel="stylesheet" href="hs-global.css">
<link rel="stylesheet" href="hs-global-fix.css">
</head>
<body>
<a href="index.html" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(10,15,23,0.95);border:1px solid rgba(150,170,200,0.3);border-radius:8px;padding:6px 14px;color:#90a1b5;text-decoration:none;font-size:12px;font-family:monospace;backdrop-filter:blur(8px);transition:0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.3);" onmouseover="this.style.color='#fff';this.style.borderColor='#c41e3a'" onmouseout="this.style.color='#90a1b5';this.style.borderColor='rgba(150,170,200,0.3)'">← Ana Sayfa</a>
    <div class="container">
        <h1>🎮 Tarım Başlangıcı</h1>
        <div class="subtitle">İlk tarım teknikleri, mevsimler</div>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Puan</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Seviye</div>
                <div class="stat-value" id="level">1</div>
            </div>
        </div>
        
        <div class="game-area" id="gameArea">
            <p style="text-align: center; font-size: 1.2em;">Oyun başlamak için butona tıkla!</p>
        </div>
        
        <button onclick="startGame()">🎮 OYUNA BAŞLA</button>
        <button onclick="resetGame()">🔄 SIFIRLA</button>
        
        <div class="info-box">
            <strong>Nasıl Oynanır:</strong><br>
            Bu oyunda i̇lk tarım teknikleri, mevsimler öğreneceksin. Mevsim döngüsü, hasat kullanarak ilerle!
        </div>
    </div>
    
    <script>
        let score = 0, level = 1;
        
        function startGame() {
            score += Math.floor(Math.random() * 100) + 50;
            level = Math.floor(score / 500) + 1;
            updateUI();
            showMessage('Tebrikler! +' + (score % 100) + ' puan kazandın!');
        }
        
        function resetGame() {
            score = 0;
            level = 1;
            updateUI();
            showMessage('Oyun sıfırlandı!');
        }
        
        function updateUI() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
        }
        
        function showMessage(msg) {
            const gameArea = document.getElementById('gameArea');
            gameArea.innerHTML = '<p style="text-align: center; font-size: 1.3em; color: #ffd700;">' + msg + '</p>';
        }
    </script>
<script src="hs-nav.js?v=11"></script>
</body>
</html>
