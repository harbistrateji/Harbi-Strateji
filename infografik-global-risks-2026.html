/* Prevent horizontal overflow */
html { overflow-x: hidden !important; }
body { overflow-x: hidden !important; max-width: 100vw !important; }
img, video, iframe, canvas, svg, table { max-width: 100% !important; }
pre, code { overflow-x: auto !important; white-space: pre-wrap !important; word-break: break-word !important; }


/* === SCROLL REVEAL ANİMASYONLARI === */
.reveal{opacity:0;transform:translateY(30px);transition:opacity .8s cubic-bezier(.19,1,.22,1),transform .8s cubic-bezier(.19,1,.22,1)}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-left{opacity:0;transform:translateX(-40px);transition:opacity .8s,transform .8s}
.reveal-left.visible{opacity:1;transform:translateX(0)}
.reveal-right{opacity:0;transform:translateX(40px);transition:opacity .8s,transform .8s}
.reveal-right.visible{opacity:1;transform:translateX(0)}
.reveal-scale{opacity:0;transform:scale(.9);transition:opacity .6s,transform .6s}
.reveal-scale.visible{opacity:1;transform:scale(1)}
/* Stagger children */
.stagger-children > *{opacity:0;transform:translateY(20px);transition:opacity .5s,transform .5s}
.stagger-children.visible > *{opacity:1;transform:translateY(0)}
.stagger-children.visible > *:nth-child(1){transition-delay:.05s}
.stagger-children.visible > *:nth-child(2){transition-delay:.1s}
.stagger-children.visible > *:nth-child(3){transition-delay:.15s}
.stagger-children.visible > *:nth-child(4){transition-delay:.2s}
.stagger-children.visible > *:nth-child(5){transition-delay:.25s}
.stagger-children.visible > *:nth-child(6){transition-delay:.3s}
/* Counter animation */
[data-count]{font-variant-numeric:tabular-nums}
/* Glow pulse for important elements */
.glow-pulse{animation:glowPulse 3s ease-in-out infinite}
@keyframes glowPulse{0%,100%{box-shadow:0 0 5px rgba(0,224,255,.2)}50%{box-shadow:0 0 20px rgba(0,224,255,.4),0 0 40px rgba(0,224,255,.1)}}

<script>
// === INTERSECTION OBSERVER — SCROLL REVEAL ===
(function(){
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if(entry.isIntersecting){
        entry.target.classList.add('visible');
        // Counter animation
        const counters = entry.target.querySelectorAll('[data-count]');
        counters.forEach(c => {
          const target = parseInt(c.dataset.count);
          const duration = 1500;
          const start = performance.now();
          const prefix = c.dataset.prefix || '';
          const suffix = c.dataset.suffix || '';
          function animate(now){
            const elapsed = now - start;
            const progress = Math.min(elapsed / duration, 1);
            const eased = 1 - Math.pow(1 - progress, 3);
            c.textContent = prefix + Math.floor(target * eased).toLocaleString('tr-TR') + suffix;
            if(progress < 1) requestAnimationFrame(animate);
          }
          requestAnimationFrame(animate);
        });
      }
    });
  }, {threshold: 0.15, rootMargin: '0px 0px -5% 0px'});
  
  // Auto-detect sections and add reveal class
  document.querySelectorAll('section, .section, .interactive-section, .paradigm-card, .stat-card, [class*="card"], .grid > *, .panel, .info-box, .chart-container, .timeline-item').forEach(el => {
    if(!el.classList.contains('reveal') && !el.classList.contains('visible')){
      el.classList.add('reveal');
      observer.observe(el);
    }
  });
  
  // Also observe elements already marked with reveal
  document.querySelectorAll('.reveal, .reveal-left, .reveal-right, .reveal-scale, .stagger-children').forEach(el => {
    observer.observe(el);
  });
})();
</script>
