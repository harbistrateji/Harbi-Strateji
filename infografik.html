/* ═══ İNFOGRAFİK GALERISI — MODERN DYNAMIC DESIGN ═══ */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:var(--bg,#0a0f17);color:var(--text,#e8eaed);overflow-x:hidden}

/* Hero Section */
.ig-hero{position:relative;padding:100px 5% 60px;overflow:hidden;min-height:340px;display:flex;align-items:flex-end}
.ig-hero::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(187,25,25,.15),rgba(0,224,255,.08),rgba(201,168,76,.1));z-index:0}
.ig-hero::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 80% 20%,rgba(0,224,255,.06) 0%,transparent 60%);z-index:0}
.ig-hero-content{position:relative;z-index:1;max-width:1400px;margin:0 auto;width:100%}
.ig-hero-label{font-family:'JetBrains Mono',monospace;font-size:.9rem;font-weight:600;letter-spacing:.2em;text-transform:uppercase;color:var(--cyan,#00E0FF);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.ig-hero-label::before{content:'';width:24px;height:2px;background:var(--cyan)}
.ig-hero h1{font-family:'Oswald',sans-serif;font-size:clamp(2.2rem,5vw,3.8rem);font-weight:700;line-height:1.1;margin-bottom:16px;background:linear-gradient(135deg,#fff 0%,rgba(255,255,255,.7) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ig-hero-sub{font-size:1rem;color:var(--text-2,#94a3b8);max-width:600px;line-height:1.6}
.ig-stats{display:flex;gap:32px;margin-top:28px;flex-wrap:wrap}
.ig-stat{text-align:left}
.ig-stat-num{font-family:'Oswald',sans-serif;font-size:2rem;font-weight:700;color:var(--gold,#c9a84c);line-height:1}
.ig-stat-label{font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.15em;text-transform:uppercase;color:var(--text-3,#64748b);margin-top:4px}

/* Floating particles */
.ig-particles{position:absolute;inset:0;overflow:hidden;z-index:0;pointer-events:none}
.ig-particle{position:absolute;width:3px;height:3px;background:var(--cyan);border-radius:50%;opacity:.3;animation:igFloat 8s infinite ease-in-out}
@keyframes igFloat{0%,100%{transform:translateY(0) scale(1);opacity:.3}50%{transform:translateY(-40px) scale(1.5);opacity:.6}}

/* Filter Bar */
.ig-filter-wrap{position:sticky;top:126px;z-index:50;background:rgba(10,15,23,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border,rgba(255,255,255,.08));padding:14px 5%}
.ig-filter-inner{max-width:1400px;margin:0 auto;display:flex;align-items:center;gap:10px;overflow-x:auto;scrollbar-width:none}
.ig-filter-inner::-webkit-scrollbar{display:none}
.ig-fbtn{font-family:'JetBrains Mono',monospace;font-size:.9rem;padding:7px 16px;border-radius:20px;border:1px solid var(--border);color:var(--text-2);cursor:pointer;white-space:nowrap;transition:all .25s;background:transparent;letter-spacing:.03em}
.ig-fbtn:hover{border-color:var(--cyan);color:var(--cyan)}
.ig-fbtn.active{background:var(--crimson,#bb1919);border-color:var(--crimson);color:#fff;font-weight:600}
.ig-fbtn .count{font-size:.6rem;opacity:.6;margin-left:4px}

/* Grid */
.ig-grid-wrap{max-width:1400px;margin:0 auto;padding:32px 5% 80px}
.ig-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:20px}

/* Cards */
.ig-card{position:relative;border-radius:12px;overflow:hidden;background:var(--bg-card,#111a2b);border:1px solid var(--border);transition:all .35s cubic-bezier(.19,1,.22,1);cursor:pointer;display:block;color:inherit;text-decoration:none}
.ig-card:hover{transform:translateY(-6px) scale(1.01);border-color:rgba(0,224,255,.3);box-shadow:0 20px 60px rgba(0,0,0,.4),0 0 30px rgba(0,224,255,.05)}
.ig-card-visual{height:140px;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
.ig-card-visual::before{content:'';position:absolute;inset:0;background:linear-gradient(180deg,transparent 40%,rgba(10,15,23,.9) 100%);z-index:1}
.ig-card-visual .ig-icon{font-size:2.8rem;opacity:.4;z-index:0;filter:drop-shadow(0 0 20px currentColor)}
.ig-card-visual.cat-nato{background:linear-gradient(135deg,#0d1f3c,#1a3a6b)}
.ig-card-visual.cat-savunma{background:linear-gradient(135deg,#1a2d1a,#2d5a2d)}
.ig-card-visual.cat-türkiye{background:linear-gradient(135deg,#3d1515,#6b1a1a)}
.ig-card-visual.cat-yz{background:linear-gradient(135deg,#1a1a3d,#2d2d6b)}
.ig-card-visual.cat-siber{background:linear-gradient(135deg,#0d2a2a,#1a4a4a)}
.ig-card-visual.cat-analog{background:linear-gradient(135deg,#2a1a0d,#4a3a1a)}
.ig-card-visual.cat-enerji{background:linear-gradient(135deg,#2a2a0d,#4a4a1a)}
.ig-card-visual.cat-tarih{background:linear-gradient(135deg,#1a0d2a,#3a1a4a)}
.ig-card-visual.cat-deniz{background:linear-gradient(135deg,#0d1a2a,#1a3a5a)}
.ig-card-visual.cat-default{background:linear-gradient(135deg,#151a25,#1e2a3f)}
.ig-card-body{padding:14px;position:relative;z-index:2;margin-top:-40px}
.ig-card-tag{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:.6rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:4px 10px;border-radius:4px;margin-bottom:10px}
.ig-card-tag.t-nato{background:rgba(26,86,219,.2);color:#4a9eff}
.ig-card-tag.t-savunma{background:rgba(34,197,94,.15);color:#4ade80}
.ig-card-tag.t-türkiye{background:rgba(187,25,25,.2);color:#ff6b6b}
.ig-card-tag.t-yz{background:rgba(139,92,246,.2);color:#a78bfa}
.ig-card-tag.t-siber{background:rgba(0,224,255,.15);color:#00E0FF}
.ig-card-tag.t-analog{background:rgba(201,168,76,.2);color:#c9a84c}
.ig-card-tag.t-enerji{background:rgba(234,179,8,.15);color:#facc15}
.ig-card-tag.t-tarih{background:rgba(168,85,247,.15);color:#c084fc}
.ig-card-tag.t-deniz{background:rgba(56,189,248,.15);color:#38bdf8}
.ig-card-tag.t-default{background:rgba(255,255,255,.08);color:var(--text-2)}
.ig-card-title{font-family:'Oswald',sans-serif;font-size:0.95rem;font-weight:600;line-height:1.3;margin-bottom:6px;color:#fff}
.ig-card-meta{font-family:'JetBrains Mono',monospace;font-size:.75rem;color:var(--text-3);display:flex;align-items:center;gap:8px}
.ig-card-meta .dot{width:4px;height:4px;border-radius:50%;background:var(--text-3)}

/* Animated border on hover */
.ig-card::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--cyan),var(--gold),var(--crimson));transform:scaleX(0);transform-origin:left;transition:transform .4s cubic-bezier(.19,1,.22,1)}
.ig-card:hover::after{transform:scaleX(1)}

/* Section headers */
.ig-section-header{max-width:1400px;margin:0 auto;padding:40px 5% 0;display:flex;align-items:center;justify-content:space-between}
.ig-section-title{font-family:'Oswald',sans-serif;font-size:1.4rem;font-weight:600;display:flex;align-items:center;gap:12px}
.ig-section-title::before{content:'';width:4px;height:24px;background:var(--crimson);border-radius:2px}
.ig-section-count{font-family:'JetBrains Mono',monospace;font-size:.9rem;color:var(--text-3);letter-spacing:.1em}

/* Responsive */
@media(min-width:1200px){.ig-grid{grid-template-columns:repeat(5,1fr);gap:14px}}
@media(max-width:1199px) and (min-width:769px){.ig-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){
  .ig-grid{grid-template-columns:1fr}
  .ig-hero{padding:90px 5% 40px;min-height:280px}
  .ig-stats{gap:20px}
  .ig-stat-num{font-size:1.5rem}
  .ig-filter-wrap{top:110px}
}
@media(max-width:480px){
  .ig-hero h1{font-size:1.8rem}
  .ig-card-visual{height:140px}
}

/* Entrance animations */
.ig-card{opacity:0;transform:translateY(30px)}
.ig-card.visible{opacity:1;transform:translateY(0);transition:opacity .5s ease,transform .5s cubic-bezier(.19,1,.22,1)}

/* ═══ MOBİL UYUMLU RESPONSIVE ═══ */
@media (max-width: 768px) {
  body { font-size: 14px !important; }
  .container, .main, .wrap, .content, .page-content {
    padding: 12px !important;
    max-width: 100% !important;
  }
  h1 { font-size: clamp(18px, 5vw, 28px) !important; }
  h2 { font-size: clamp(15px, 4vw, 22px) !important; }
  h3 { font-size: clamp(13px, 3.5vw, 18px) !important; }
  table { font-size: 11px !important; }
  img, video, canvas, svg { max-width: 100% !important; height: auto !important; }
  .grid, .card-grid, .cards { grid-template-columns: 1fr !important; }
}
@media (max-width: 480px) {
  body { font-size: 13px !important; }
  .container, .main, .wrap { padding: 8px !important; }
  h1 { font-size: clamp(16px, 5vw, 24px) !important; }
  .nav, .navbar, .top-bar, .header { 
    padding: 8px 12px !important;
    font-size: 12px !important;
  }
}
/* Prevent horizontal overflow */
html { overflow-x: hidden !important; }
body { overflow-x: hidden !important; max-width: 100vw !important; }
img, video, iframe, canvas, svg, table { max-width: 100% !important; }
pre, code { overflow-x: auto !important; white-space: pre-wrap !important; word-break: break-word !important; }

// ═══ BUILD FILTERS ═══
const filterBar = document.getElementById('filterBar');
const tags = {};
INFOGRAPHICS.forEach(i => { tags[i.tag] = (tags[i.tag]||0) + 1; });
const sortedTags = Object.entries(tags).sort((a,b) => b[1]-a[1]);

let filterHTML = `<button class="ig-fbtn active" data-tag="all">Tümü <span class="count">${INFOGRAPHICS.length}</span></button>`;
sortedTags.forEach(([tag, count]) => {
  filterHTML += `<button class="ig-fbtn" data-tag="${tag}">${tag} <span class="count">${count}</span></button>`;
});
filterBar.innerHTML = filterHTML;

// ═══ BUILD CARDS ═══
const cardGrid = document.getElementById('cardGrid');

function getTagClass(tag) {
  const map = {NATO:'nato',Savunma:'savunma','Türkiye':'türkiye',YZ:'yz',Siber:'siber',Analog:'analog',Enerji:'enerji',Tarih:'tarih',Deniz:'deniz'};
  return map[tag] || 'default';
}

function renderCards(filter) {
  const filtered = filter === 'all' ? INFOGRAPHICS : INFOGRAPHICS.filter(i => i.tag === filter);
  document.getElementById('visibleCount').textContent = `${filtered.length} içerik gösteriliyor`;
  
  cardGrid.innerHTML = filtered.map((item, idx) => {
    const tc = getTagClass(item.tag);
    const typeLabel = item.type === 'interactive' ? 'İnteraktif' : 'Statik';
    if(item.type==='static') {
      return `<a href="javascript:void(0)" class="ig-card" style="transition-delay:${idx*40}ms" onclick="openLightbox('${item.href}','${item.title.replace(/'/g,"\\'")}')"> 
      <div class="ig-card-visual cat-${tc}">
        <span class="ig-icon">${item.icon}</span>
      </div>
      <div class="ig-card-body">
        <span class="ig-card-tag t-${tc}">${item.tag}</span>
        <h3 class="ig-card-title">${item.title}</h3>
        <div class="ig-card-meta"><span>${typeLabel}</span><span class="dot"></span><span>${item.tag}</span></div>
      </div>
    </a>`;
    } else {
      return `<a href="${item.href}" class="ig-card" style="transition-delay:${idx*40}ms">
      <div class="ig-card-visual cat-${tc}">
        <span class="ig-icon">${item.icon}</span>
      </div>
      <div class="ig-card-body">
        <span class="ig-card-tag t-${tc}">${item.tag}</span>
        <h3 class="ig-card-title">${item.title}</h3>
        <div class="ig-card-meta"><span>${typeLabel}</span><span class="dot"></span><span>${item.tag}</span></div>
      </div>
    </a>`;
    }
  }).join('');
  
  // Animate cards in
  requestAnimationFrame(() => {
    document.querySelectorAll('.ig-card').forEach((card, i) => {
      setTimeout(() => card.classList.add('visible'), i * 50);
    });
  });
}

renderCards('all');

// ═══ FILTER CLICK ═══
filterBar.addEventListener('click', e => {
  const btn = e.target.closest('.ig-fbtn');
  if (!btn) return;
  filterBar.querySelectorAll('.ig-fbtn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderCards(btn.dataset.tag);
});

// ═══ PARTICLES ═══
const particlesEl = document.getElementById('particles');
for (let i = 0; i < 20; i++) {
  const p = document.createElement('div');
  p.className = 'ig-particle';
  p.style.left = Math.random() * 100 + '%';
  p.style.top = Math.random() * 100 + '%';
  p.style.animationDelay = Math.random() * 8 + 's';
  p.style.animationDuration = (6 + Math.random() * 4) + 's';
  particlesEl.appendChild(p);
}

// ═══ INTERSECTION OBSERVER FOR SCROLL ANIMATIONS ═══
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    }
  });
}, { threshold: 0.1 });

// Observe cards after initial render
setTimeout(() => {
  document.querySelectorAll('.ig-card').forEach(card => observer.observe(card));
}, 100);

// ═══ LIGHTBOX FOR STATIC IMAGES ═══
function openLightbox(src, title) {
  const lb = document.getElementById('imgLightbox');
  const img = document.getElementById('lbImg');
  const cap = document.getElementById('lbCaption');
  img.src = src;
  cap.textContent = title;
  lb.classList.add('active');
  document.body.style.overflow = 'hidden';
}
function closeLightbox() {
  const lb = document.getElementById('imgLightbox');
  lb.classList.remove('active');
  document.body.style.overflow = '';
  document.getElementById('lbImg').src = '';
}
</script>
