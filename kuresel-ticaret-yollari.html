html{scroll-padding-top:80px}
.page-title{text-align:center;padding:2rem 1rem 1.5rem;border-bottom:1px solid rgba(0,224,255,.1);}

*{box-sizing:border-box;margin:0;padding:0}
@keyframes dash{to{stroke-dashoffset:-40}}
@keyframes pulse{0%,100%{r:6}50%{r:9}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes flowRight{0%{stroke-dashoffset:60}100%{stroke-dashoffset:0}}
@keyframes flowLeft{0%{stroke-dashoffset:0}100%{stroke-dashoffset:-60}}
.route-line{stroke-dasharray:10 6;animation:dash 2s linear infinite}
.route-line.slow{animation-duration:3.5s}
.route-line.fast{animation-duration:1.2s}
.route-line.reverse{animation:dash 2s linear infinite reverse}
.crisis{animation:blink 1s ease-in-out infinite}
.chokepoint{animation:pulse 2s ease-in-out infinite}
.btn-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
button{font-size:12px;padding:5px 12px;border-radius:20px;border:0.5px solid var(--border-strong);background:transparent;color:var(--text-secondary);cursor:pointer;transition:all .18s}
button.active,button:hover{background:var(--surface-1);color:var(--text-primary);border-color:var(--border-stronger)}
.panel{background:var(--surface-1);border:0.5px solid var(--border);border-radius:12px;padding:14px;margin-top:12px;display:none}
.panel.show{display:block}
.panel-title{font-size:14px;font-weight:500;color:var(--text-primary);margin-bottom:6px}
.panel-body{font-size:12px;color:var(--text-secondary);line-height:1.6}
.stat-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-top:10px}
.stat{background:var(--surface-2);border:0.5px solid var(--border);border-radius:8px;padding:8px 10px}
.stat-val{font-size:16px;font-weight:500;color:var(--text-primary)}
.stat-lbl{font-size:13px;color:var(--text-muted);margin-top:2px}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:10px;font-size:13px;color:var(--text-secondary)}
.legend-item{display:flex;align-items:center;gap:5px}
.leg-line{width:20px;height:2px;border-radius:1px}
.leg-dot{width:8px;height:8px;border-radius:50%}
svg text{font-family:inherit}

  çanakkale:{title:"Çanakkale Boğazı — Tarihin en değerli geçidi",body:"Homeros'un Troya Savaşı (MÖ ~1200) özünde bu boğazın kontrolünden kaynaklanıyordu. Karadeniz tahılına, metaline ve ticaret ağına erişim kapısıydı. 1915 Çanakkale Savaşı'nda İtilaf güçleri Rusya'ya ikmal yolu açmak için buraya saldırdı. Montrö Sözleşmesi (1936) bugün hâlâ geçerliliğini korumaktadır.",stats:[{v:"3.000+ yıl",l:"Stratejik önemi"},{v:"~50k",l:"Gemi/yıl geçiş"},{v:"Montrö 1936",l:"Hukuki rejim"},{v:"Türkiye",l:"Kontrol"}]},

function showInfo(key){
  const d=data[key];
  if(!d)return;
  document.getElementById('panel-title').textContent=d.title;
  document.getElementById('panel-body').textContent=d.body;
  const sr=document.getElementById('panel-stats');
  if(d.stats){sr.innerHTML=d.stats.map(s=>`<div class="stat"><div class="stat-val">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join('');sr.style.display='grid';}
  else{sr.innerHTML='';sr.style.display='none';}
  const p=document.getElementById('info-panel');
  p.classList.add('show');
  p.scrollIntoView({behavior:'smooth',block:'nearest'});
}

const filterMap={
  all:['routes-ancient','routes-silk','routes-modern','routes-crisis','routes-turkey'],
  ancient:['routes-ancient'],
  silk:['routes-silk'],
  modern:['routes-modern'],
  crisis:['routes-crisis'],
  turkey:['routes-turkey']
};

function setFilter(f,btn){
  document.querySelectorAll('.route-group,[id^=routes-]').forEach(g=>{
    const show=filterMap[f].includes(g.id);
    g.style.opacity=show?'1':'0.08';
    g.style.transition='opacity 0.4s';
  });
  document.querySelectorAll('#filter-row button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('info-panel').classList.remove('show');
}

document.querySelectorAll('[id^=routes-]').forEach(g=>{
  g.classList.add('route-group');
});
</script>

<script>
// Add zoom/pan to map
(function(){
  const svg = document.getElementById('mainmap');
  if(!svg) return;
  let scale = 1, panX = 0, panY = 0, isDragging = false, startX, startY;
  const vb = svg.viewBox.baseVal;
  const origW = vb.width, origH = vb.height;
  
  svg.style.cursor = 'grab';
  
  svg.addEventListener('wheel', (e) => {
    e.preventDefault();
    const delta = e.deltaY > 0 ? 1.1 : 0.9;
    scale = Math.max(0.5, Math.min(3, scale * delta));
    updateViewBox();
  });
  
  svg.addEventListener('mousedown', (e) => {
    isDragging = true;
    startX = e.clientX;
    startY = e.clientY;
    svg.style.cursor = 'grabbing';
  });
  
  document.addEventListener('mousemove', (e) => {
    if(!isDragging) return;
    const dx = (e.clientX - startX) * scale;
    const dy = (e.clientY - startY) * scale;
    panX -= dx * 0.5;
    panY -= dy * 0.5;
    startX = e.clientX;
    startY = e.clientY;
    updateViewBox();
  });
  
  document.addEventListener('mouseup', () => {
    isDragging = false;
    svg.style.cursor = 'grab';
  });
  
  function updateViewBox() {
    const w = origW * scale;
    const h = origH * scale;
    const x = Math.max(0, Math.min(origW - w, (origW - w) / 2 + panX));
    const y = Math.max(0, Math.min(origH - h, (origH - h) / 2 + panY));
    svg.setAttribute('viewBox', `${x} ${y} ${w} ${h}`);
  }
  
  // Add tooltip on node hover
  const tooltip = document.createElement('div');
  tooltip.style.cssText = 'position:fixed;background:#0d1520;border:1px solid rgba(0,224,255,0.3);border-radius:6px;padding:6px 12px;font-size:12px;color:#e2e8f0;font-family:IBM Plex Mono,monospace;pointer-events:none;z-index:9999;display:none;backdrop-filter:blur(8px)';
  document.body.appendChild(tooltip);
  
  const nodeNames = {
    çanakkale:'Çanakkale Boğazı',istanbul:'İstanbul Boğazı',suez:'Süveyş Kanalı',
    hurmuz:'Hürmüz Boğazı',malakka:'Malakka Boğazı',gibraltar:'Cebelitarık',
    panama:'Panama Kanalı',hamburg:'Hamburg Limanı',shanghai:'Şangay Limanı',
    mersin:'Mersin Limanı',gwadar:'Gwadar Limanı',faw:'Faw Limanı'
  };
  
  svg.querySelectorAll('.node').forEach(node => {
    const key = node.getAttribute('onclick')?.match(/showInfo\('(.+?)'\)/)?.[1];
    node.addEventListener('mouseenter', (e) => {
      if(nodeNames[key]) {
        tooltip.textContent = nodeNames[key];
        tooltip.style.display = 'block';
      }
    });
    node.addEventListener('mousemove', (e) => {
      tooltip.style.left = (e.clientX + 12) + 'px';
      tooltip.style.top = (e.clientY - 30) + 'px';
    });
    node.addEventListener('mouseleave', () => {
      tooltip.style.display = 'none';
    });
  });
  
  // Double-click to reset zoom
  svg.addEventListener('dblclick', () => {
    scale = 1; panX = 0; panY = 0;
    updateViewBox();
  });
})();
</script>
