<!DOCTYPE html>
<html lang="tr">
<head>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&subset=latin-ext&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="hs-skip" content="true">
<title>Bütçe Tetikçisi — OZA Mini</title>
<style>
html{scroll-padding-top:80px}
:root{--bg:#0d0d0d;--panel:#0f1722;--red:#E01515;--cyan:#c41e3a;--gold:#C9A24B;--green:#00ff88;--tx:#EAF0F7;--dim:#90a1b5;--line:rgba(150,170,200,.18)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif}
.hdr{background:rgba(10,15,23,.97);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;height:52px;gap:12px;position:sticky;top:0;z-index:10}
.hdr-back{font-size:13px;color:var(--dim);text-decoration:none;padding:6px 10px;border:1px solid var(--line);border-radius:8px}
.hdr-title{font-size:17px;font-weight:700;flex:1;text-align:center}
.hdr-pts{font-size:13px;color:var(--gold);font-weight:600}
.container{max-width:440px;margin:0 auto;padding:16px 16px 80px}
.stats{display:flex;gap:8px;margin-bottom:12px}
.sbox{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px;text-align:center;flex:1}
.sval{font-size:18px;font-weight:700}
.slbl{font-size:9px;color:var(--dim);text-transform:uppercase}
.stage-badge{text-align:center;margin-bottom:10px}
.stage-pill{display:inline-block;padding:4px 14px;border-radius:20px;font-size:12px;font-weight:700;border:1px solid}
.s1{border-color:var(--green);color:var(--green)}.s2{border-color:var(--gold);color:var(--gold)}.s3{border-color:var(--red);color:var(--red)}
.budget-display{background:var(--panel);border:2px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px;text-align:center}
.budget-total{font-size:28px;font-weight:700;color:var(--gold);margin-bottom:4px}
.budget-remaining{font-size:13px;color:var(--dim)}
.budget-bar{height:8px;background:var(--line);border-radius:4px;overflow:hidden;margin-top:8px}
.budget-fill{height:100%;background:var(--gold);transition:width .3s}
.scenario-card{background:rgba(201,162,75,.06);border:1px solid rgba(201,162,75,.2);border-radius:12px;padding:12px 14px;margin-bottom:12px}
.scenario-tag{font-size:10px;color:var(--gold);text-transform:uppercase;font-weight:700;margin-bottom:4px}
.scenario-text{font-size:13px;line-height:1.5}
.items-list{margin-bottom:14px}
.item-row{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.item-icon{font-size:24px;flex-shrink:0}
.item-info{flex:1}
.item-name{font-size:13px;font-weight:600;margin-bottom:2px}
.item-desc{font-size:11px;color:var(--dim)}
.item-cost{font-size:13px;font-weight:700;color:var(--gold);white-space:nowrap}
.item-qty{display:flex;align-items:center;gap:6px;flex-shrink:0}
.qty-btn{width:28px;height:28px;border:1px solid var(--line);border-radius:6px;background:var(--panel);color:var(--tx);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-val{font-size:15px;font-weight:700;min-width:20px;text-align:center}
.priority-badge{display:inline-block;padding:2px 8px;border-radius:8px;font-size:10px;font-weight:700;margin-left:4px}
.p-high{background:rgba(224,21,21,.2);color:var(--red)}
.p-med{background:rgba(201,162,75,.2);color:var(--gold)}
.p-low{background:rgba(0,224,255,.2);color:var(--cyan)}
.result-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--line);font-size:13px}
.btn{width:100%;padding:13px;border:none;border-radius:10px;font-size:14px;font-weight:700;cursor:pointer;background:var(--cyan);color:#000;margin-bottom:8px}
.overlay-card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:24px;text-align:center;margin-bottom:14px}
.big{font-size:48px;font-weight:700;color:var(--cyan)}

/* ═══ MOBİL UYUMLU RESPONSIVE ═══ */
@media (max-width: 768px) {
  body { font-size: 14px !important; }
  .container, .main, .wrap, .content, .page-content {
    padding: 12px !important;
    max-width: 100% !important;
  }
  h1 { font-size: clamp(18px, 5vw, 28px) !important; }
  h2 { font-size: clamp(15px, 4vw, 22px) !important; }
  h3 { font-size: clamp(13px, 3.5vw, 18px) !important; }
  table { font-size: 11px !important; }
  img, video, canvas, svg { max-width: 100% !important; height: auto !important; }
  .grid, .card-grid, .cards { grid-template-columns: 1fr !important; }
}
@media (max-width: 480px) {
  body { font-size: 13px !important; }
  .container, .main, .wrap { padding: 8px !important; }
  h1 { font-size: clamp(16px, 5vw, 24px) !important; }
  .nav, .navbar, .top-bar, .header { 
    padding: 8px 12px !important;
    font-size: 12px !important;
  }
}
/* Prevent horizontal overflow */
html { overflow-x: hidden !important; }
body { overflow-x: hidden !important; max-width: 100vw !important; }
img, video, iframe, canvas, svg, table { max-width: 100% !important; }
pre, code { overflow-x: auto !important; white-space: pre-wrap !important; word-break: break-word !important; }

</style>
<link rel="stylesheet" href="hs-global.css">
<link rel="stylesheet" href="hs-global-fix.css">
</head>
<body>
<div style="position:fixed;top:12px;left:12px;z-index:9999;display:flex;gap:8px;"><a href="oza-hub.html" style="background:rgba(10,15,23,0.9);color:#00E0FF;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid #00E0FF33;backdrop-filter:blur(8px);">← OZA Hub</a><a href="index.html" style="background:rgba(10,15,23,0.9);color:#c41e3a;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid rgba(196,30,58,0.3);backdrop-filter:blur(8px);">🏠 Ana Sayfa</a></div>
<header class="hdr">
  <a href="oza-hub.html" class="hdr-back">← OZA</a>
  <div class="hdr-title">💰 BÜTÇE TETİKÇİSİ</div>
  <div class="hdr-pts" id="hdr-pts">⭐ 0</div>
</header>
<div class="container">
<div class="stats">
  <div class="sbox"><div class="sval" id="s-pts" style="color:var(--cyan)">0</div><div class="slbl">PUAN</div></div>
  <div class="sbox"><div class="sval" id="s-stage" style="color:var(--gold)">1/3</div><div class="slbl">AŞAMA</div></div>
  <div class="sbox"><div class="sval" id="s-eff" style="color:var(--green)">0%</div><div class="slbl">VERİMLİLİK</div></div>
  <div class="sbox"><div class="sval" id="s-time" style="color:var(--red)">—</div><div class="slbl">SÜRE</div></div>
</div>
<div class="stage-badge" id="stage-badge"></div>
<div class="budget-display">
  <div class="budget-total" id="budget-total">₺ 0 Milyar</div>
  <div class="budget-remaining" id="budget-remaining">Kalan: ₺0 Milyar</div>
  <div class="budget-bar"><div class="budget-fill" id="budget-fill" style="width:100%"></div></div>
</div>
<div id="game-area"></div>
</div>
<script>
var STAGES=[
  {label:'AŞAMA 1 — BARIŞ BÜTÇESİ',cls:'s1',sublabel:'₺50 Milyar · 5 kâlem · 60sn',
   timeLimit:60,budget:50,
   scenario:{tag:'BARIŞ DÖNEMİ',text:'Yıllık savunma bütçeniz ₺50 milyar. Tehditleri dengeli karşılayacak şekilde dağıt.'},
   items:[
     {icon:'✈️',name:'Savaş Uçağı',desc:'Hava üstünlüğü',cost:8,max:4,priority:'high',weight:3},
     {icon:'🛡️',name:'Hava Savunma',desc:'Füze kalkanı',cost:6,max:5,priority:'high',weight:3},
     {icon:'🚢',name:'Fırkateyn',desc:'Deniz gücü',cost:7,max:3,priority:'med',weight:2},
     {icon:'💻',name:'Siber Merkezi',desc:'Dijital savunma',cost:4,max:4,priority:'high',weight:3},
     {icon:'🎓',name:'Personel Eğitim',desc:'İnsan kaynağı',cost:3,max:5,priority:'med',weight:2}
   ],
   optimal:{minPuan:70}},
  {label:'AŞAMA 2 — GERİLİM BÜTÇESİ',cls:'s2',sublabel:'₺80 Milyar · 7 kâlem · 45sn',
   timeLimit:45,budget:80,
   scenario:{tag:'GERİLİM DÖNEMİ',text:'Bölgesel gerilim tırmanıyor. ₺80 milyar bütçeyi öncelikli tehditlere göre dağıt.'},
   items:[
     {icon:'🚀',name:'Balistik Füze',desc:'Caydırıcılık',cost:12,max:3,priority:'high',weight:4},
     {icon:'🛸',name:'Drone Filosu',desc:'İnsansız hava',cost:5,max:6,priority:'high',weight:3},
     {icon:'🔭',name:'İstihbarat Sat.',desc:'Gözetleme',cost:9,max:2,priority:'high',weight:3},
     {icon:'⚡',name:'EW Sistemi',desc:'Elektronik harp',cost:7,max:3,priority:'med',weight:2},
     {icon:'🏥',name:'Sağlık Altyapı',desc:'Savaş tıbbı',cost:4,max:4,priority:'med',weight:2},
     {icon:'🛢️',name:'Yakıt Rezervi',desc:'Lojistik',cost:3,max:5,priority:'low',weight:1},
     {icon:'📡',name:'İletişim Ağı',desc:'Komuta kontrol',cost:6,max:3,priority:'high',weight:3}
   ],
   optimal:{minPuan:75}},
  {label:'AŞAMA 3 — SAVAŞ BÜTÇESİ',cls:'s3',sublabel:'₺120 Milyar · 9 kâlem · 30sn',
   timeLimit:30,budget:120,
   scenario:{tag:'SAVAŞ DURUMU',text:'Aktif çatışma! ₺120 milyar bütçeyi 30 saniyede en verimli şekilde dağıt.'},
   items:[
     {icon:'💣',name:'Hassas Mühimmat',desc:'Hedefli vuruş',cost:10,max:5,priority:'high',weight:4},
     {icon:'🚁',name:'Taarruz Helikopter',desc:'Yakın destek',cost:9,max:4,priority:'high',weight:4},
     {icon:'🛡️',name:'Aktif Koruma',desc:'Tank koruması',cost:7,max:4,priority:'high',weight:3},
     {icon:'🔋',name:'Enerji Sistemi',desc:'Güç altyapısı',cost:8,max:3,priority:'med',weight:2},
     {icon:'🏗️',name:'Saha Hastanesi',desc:'Tıbbi destek',cost:5,max:4,priority:'high',weight:3},
     {icon:'📻',name:'Taktik İletişim',desc:'Saha haberleşme',cost:4,max:5,priority:'high',weight:3},
     {icon:'🌐',name:'Siber Saldırı',desc:'Ofansif siber',cost:6,max:3,priority:'med',weight:2},
     {icon:'🚛',name:'Lojistik Araç',desc:'İkmal zinciri',cost:3,max:6,priority:'med',weight:2},
     {icon:'🎯',name:'Hedefleme Sistemi',desc:'Akıllı silah',cost:11,max:3,priority:'high',weight:4}
   ],
   optimal:{minPuan:80}}
];

var stage=0,pts=0,timeLeft=0,timer=null,quantities=[];

function startStage(){
  var s=STAGES[stage];
  timeLeft=s.timeLimit;
  quantities=s.items.map(function(){return 0;});
  clearInterval(timer);
  document.getElementById('stage-badge').innerHTML=
    '<div class="stage-pill '+s.cls+'">'+s.label+'</div>'+
    '<div style="font-size:11px;color:var(--dim);margin-top:4px">'+s.sublabel+'</div>';
  document.getElementById('s-stage').textContent=(stage+1)+'/3';
  document.getElementById('s-time').textContent=timeLeft+'s';
  timer=setInterval(function(){
    timeLeft--;
    document.getElementById('s-time').textContent=timeLeft+'s';
    if(timeLeft<=0){clearInterval(timer);submitBudget();}
  },1000);
  renderGame();
}

function renderGame(){
  var s=STAGES[stage];
  var spent=calcSpent();
  var remaining=s.budget-spent;
  document.getElementById('budget-total').textContent='₺'+s.budget+' Milyar';
  document.getElementById('budget-remaining').textContent='Kalan: ₺'+remaining+' Milyar';
  document.getElementById('budget-fill').style.width=(remaining/s.budget*100)+'%';
  document.getElementById('budget-fill').style.background=remaining>s.budget*0.3?'var(--gold)':remaining>0?'var(--red)':'#333';
  var eff=calcEfficiency();
  document.getElementById('s-eff').textContent=eff+'%';
  document.getElementById('s-eff').style.color=eff>70?'var(--green)':eff>40?'var(--gold)':'var(--red)';
  var html='<div class="scenario-card"><div class="scenario-tag">📋 '+s.scenario.tag+'</div><div class="scenario-text">'+s.scenario.text+'</div></div>';
  html+='<div class="items-list">';
  s.items.forEach(function(item,i){
    var pCls=item.priority==='high'?'p-high':item.priority==='med'?'p-med':'p-low';
    var pLbl=item.priority==='high'?'ÖNCELİKLİ':item.priority==='med'?'ORTA':'DÜŞÜK';
    html+='<div class="item-row">';
    html+='<div class="item-icon">'+item.icon+'</div>';
    html+='<div class="item-info"><div class="item-name">'+item.name+'<span class="priority-badge '+pCls+'">'+pLbl+'</span></div><div class="item-desc">'+item.desc+'</div></div>';
    html+='<div class="item-cost">₺'+item.cost+'M</div>';
    html+='<div class="item-qty">';
    html+='<button class="qty-btn" onclick="changeQty('+i+',-1)">−</button>';
    html+='<span class="qty-val" id="qty-'+i+'">'+quantities[i]+'</span>';
    html+='<button class="qty-btn" onclick="changeQty('+i+',+1)">+</button>';
    html+='</div></div>';
  });
  html+='</div>';
  document.getElementById('game-area').innerHTML=html;
  var btn=document.createElement('button');
  btn.className='btn';btn.textContent='✅ BÜTÇEYI ONAYLA';
  btn.onclick=function(){clearInterval(timer);submitBudget();};
  document.getElementById('game-area').appendChild(btn);
}

function changeQty(i,delta){
  var s=STAGES[stage];
  var item=s.items[i];
  var newQty=quantities[i]+delta;
  if(newQty<0||newQty>item.max)return;
  var spent=calcSpent()-item.cost*quantities[i]+item.cost*newQty;
  if(spent>s.budget)return;
  quantities[i]=newQty;
  document.getElementById('qty-'+i).textContent=newQty;
  var remaining=s.budget-calcSpent();
  document.getElementById('budget-remaining').textContent='Kalan: ₺'+remaining+' Milyar';
  document.getElementById('budget-fill').style.width=(remaining/s.budget*100)+'%';
  document.getElementById('budget-fill').style.background=remaining>s.budget*0.3?'var(--gold)':remaining>0?'var(--red)':'#333';
  var eff=calcEfficiency();
  document.getElementById('s-eff').textContent=eff+'%';
  document.getElementById('s-eff').style.color=eff>70?'var(--green)':eff>40?'var(--gold)':'var(--red)';
}

function calcSpent(){
  var s=STAGES[stage];
  return s.items.reduce(function(sum,item,i){return sum+item.cost*quantities[i];},0);
}

function calcEfficiency(){
  var s=STAGES[stage];
  var totalWeight=0,earnedWeight=0;
  s.items.forEach(function(item,i){
    totalWeight+=item.weight*item.max;
    earnedWeight+=item.weight*quantities[i];
  });
  var spentRatio=calcSpent()/s.budget;
  var allocationScore=totalWeight>0?Math.round(earnedWeight/totalWeight*100):0;
  // Bonus for high-priority items
  var highPriScore=0,highPriMax=0;
  s.items.forEach(function(item,i){
    if(item.priority==='high'){highPriMax+=item.max;highPriScore+=quantities[i];}
  });
  var highPriRatio=highPriMax>0?highPriScore/highPriMax:0;
  return Math.round(allocationScore*0.5+highPriRatio*50);
}

function submitBudget(){
  var s=STAGES[stage];
  var eff=calcEfficiency();
  var spent=calcSpent();
  var bonus=Math.round(eff*2)+timeLeft*5+(stage+1)*50;
  pts+=bonus;
  try{var sc=JSON.parse(localStorage.getItem('hs_scores')||'{}');sc['mobil-butce']=Math.max(sc['mobil-butce']||0,pts);localStorage.setItem('hs_scores',JSON.stringify(sc));}catch(e){}
  document.getElementById('hdr-pts').textContent='⭐ '+pts;
  document.getElementById('s-pts').textContent=pts;
  var html='<div class="overlay-card">';
  html+='<div style="font-size:36px">'+(eff>70?stage<2?'🎯':'🏆':eff>40?'⚠️':'❌')+'</div>';
  html+='<div class="big">'+bonus+'</div>';
  html+='<div style="font-size:13px;color:var(--dim)">Verimlilik: %'+eff+' · Harcanan: ₺'+spent+'/'+s.budget+'M</div>';
  html+='</div>';
  // Breakdown
  html+='<div style="background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;margin-bottom:12px">';
  s.items.forEach(function(item,i){
    if(quantities[i]>0){
      html+='<div class="result-row"><span>'+item.icon+' '+item.name+' ×'+quantities[i]+'</span><span style="color:var(--gold)">₺'+(item.cost*quantities[i])+'M</span></div>';
    }
  });
  html+='</div>';
  document.getElementById('game-area').innerHTML=html;
  if(stage<2){
    var btn=document.createElement('button');btn.className='btn';
    btn.textContent='▶ AŞAMA '+(stage+2);btn.onclick=function(){stage++;startStage();};
    document.getElementById('game-area').appendChild(btn);
  } else {
    var btn=document.createElement('button');btn.className='btn';
    btn.textContent='🔄 BAŞTAN OYNA';btn.onclick=function(){stage=0;pts=0;startStage();};
    document.getElementById('game-area').appendChild(btn);
  }
}

startStage();
</script>

</body>
