<!DOCTYPE html>
<html lang="tr">
<head>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&subset=latin-ext&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="hs-skip" content="true">
<title>Drone Sürüsü — OZA Mini</title>
<style>
:root{--bg:#0d0d0d;--panel:#0f1722;--red:#E01515;--cyan:#c41e3a;--gold:#C9A24B;--green:#00ff88;--tx:#EAF0F7;--dim:#90a1b5;--line:rgba(150,170,200,.18)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:rgba(10,15,23,.97);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;height:52px;gap:12px;flex-shrink:0}
.hdr-back{font-size:13px;color:var(--dim);text-decoration:none;padding:6px 10px;border:1px solid var(--line);border-radius:8px}
.hdr-title{font-size:17px;font-weight:700;flex:1;text-align:center}
.hdr-pts{font-size:13px;color:var(--gold);font-weight:600}
.hud{display:flex;gap:8px;padding:8px 16px;flex-shrink:0}
.hud-item{flex:1;text-align:center}
.hud-val{font-size:16px;font-weight:700}
.hud-lbl{font-size:9px;color:var(--dim);text-transform:uppercase}
canvas{flex:1;display:block;touch-action:none}
.overlay{position:fixed;inset:0;background:rgba(10,15,23,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:20;padding:20px}
.ov-title{font-size:26px;font-weight:700;text-align:center}
.ov-score{font-size:48px;font-weight:700;color:var(--cyan)}
.ov-sub{font-size:13px;color:var(--dim);text-align:center}
.btn{padding:14px 40px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;background:var(--cyan);color:#000}
.stage-list{display:flex;flex-direction:column;gap:6px;font-size:12px;color:var(--dim);text-align:center}

/* ═══ MOBİL UYUMLU RESPONSIVE ═══ */
@media (max-width: 768px) {
  body { font-size: 14px !important; }
  .container, .main, .wrap, .content, .page-content {
    padding: 12px !important;
    max-width: 100% !important;
  }
  h1 { font-size: clamp(18px, 5vw, 28px) !important; }
  h2 { font-size: clamp(15px, 4vw, 22px) !important; }
  h3 { font-size: clamp(13px, 3.5vw, 18px) !important; }
  table { font-size: 11px !important; }
  img, video, canvas, svg { max-width: 100% !important; height: auto !important; }
  .grid, .card-grid, .cards { grid-template-columns: 1fr !important; }
}
@media (max-width: 480px) {
  body { font-size: 13px !important; }
  .container, .main, .wrap { padding: 8px !important; }
  h1 { font-size: clamp(16px, 5vw, 24px) !important; }
  .nav, .navbar, .top-bar, .header { 
    padding: 8px 12px !important;
    font-size: 12px !important;
  }
}
/* Prevent horizontal overflow */
html { overflow-x: hidden !important; }
body { overflow-x: hidden !important; max-width: 100vw !important; }
img, video, iframe, canvas, svg, table { max-width: 100% !important; }
pre, code { overflow-x: auto !important; white-space: pre-wrap !important; word-break: break-word !important; }

</style>
<link rel="stylesheet" href="hs-global.css">
<link rel="stylesheet" href="hs-global-fix.css">
</head>
<body>
<div style="position:fixed;top:12px;left:12px;z-index:9999;display:flex;gap:8px;"><a href="oza-hub.html" style="background:rgba(10,15,23,0.9);color:#00E0FF;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid #00E0FF33;backdrop-filter:blur(8px);">← OZA Hub</a><a href="index.html" style="background:rgba(10,15,23,0.9);color:#c41e3a;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid rgba(196,30,58,0.3);backdrop-filter:blur(8px);">🏠 Ana Sayfa</a></div>
<header class="hdr">
  <a href="oza-hub.html" class="hdr-back">← OZA</a>
  <div class="hdr-title">🚁 DRONE SÜRÜSÜ</div>
  <div class="hdr-pts" id="hdr-pts">⭐ 0</div>
</header>
<div class="hud">
  <div class="hud-item"><div class="hud-val" id="h-score" style="color:var(--cyan)">0</div><div class="hud-lbl">PUAN</div></div>
  <div class="hud-item"><div class="hud-val" id="h-stage" style="color:var(--gold)">AŞAMA 1</div><div class="hud-lbl">AŞAMA</div></div>
  <div class="hud-item"><div class="hud-val" id="h-targets" style="color:var(--green)">0/5</div><div class="hud-lbl">HEDEF</div></div>
  <div class="hud-item"><div class="hud-val" id="h-time" style="color:var(--red)">30s</div><div class="hud-lbl">SÜRE</div></div>
</div>
<canvas id="canvas"></canvas>
<div class="overlay" id="overlay">
  <div class="ov-title">🚁 DRONE SÜRÜSÜ</div>
  <div class="ov-sub">Sürüyü parmağınla yönlendir, hedefleri vur!</div>
  <div class="stage-list">
    <div>🟢 <b>Aşama 1</b> — 5 drone, 5 hedef, 30sn</div>
    <div>🟡 <b>Aşama 2</b> — 8 drone, 8 hedef + engel, 25sn</div>
    <div>🔴 <b>Aşama 3</b> — 12 drone, 10 hedef + hareketli engel, 20sn</div>
  </div>
  <button class="btn" onclick="startGame()">▶ BAŞLAT</button>
</div>
<script>
var canvas=document.getElementById('canvas');
var ctx=canvas.getContext('2d');
var W,H;
var swarm=[],targets=[],obstacles=[];
var leader={x:0,y:0,tx:0,ty:0};
var score=0,stage=1,timeLeft=30,targetsHit=0,totalTargets=5;
var running=false,raf=null,timer=null,frameCount=0;
var stageConfig=[
  {drones:5,targets:5,obstacles:0,timeLimit:30,label:'AŞAMA 1'},
  {drones:8,targets:8,obstacles:3,timeLimit:25,label:'AŞAMA 2'},
  {drones:12,targets:10,obstacles:5,timeLimit:20,label:'AŞAMA 3'}
];

function resize(){
  W=canvas.offsetWidth;H=canvas.offsetHeight;
  canvas.width=W;canvas.height=H;
}
window.addEventListener('resize',resize);

function setTarget(x,y){leader.tx=x;leader.ty=y;}
canvas.addEventListener('mousemove',function(e){var r=canvas.getBoundingClientRect();setTarget(e.clientX-r.left,e.clientY-r.top);});
canvas.addEventListener('touchmove',function(e){e.preventDefault();var r=canvas.getBoundingClientRect();setTarget(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);},{passive:false});
canvas.addEventListener('touchstart',function(e){e.preventDefault();var r=canvas.getBoundingClientRect();setTarget(e.touches[0].clientX-r.left,e.touches[0].clientY-r.top);},{passive:false});

function startGame(){
  document.getElementById('overlay').style.display='none';
  score=0;stage=1;frameCount=0;
  initStage();
}

function initStage(){
  var cfg=stageConfig[stage-1];
  timeLeft=cfg.timeLimit;targetsHit=0;totalTargets=cfg.targets;
  clearInterval(timer);
  resize();
  leader.x=W/2;leader.y=H/2;leader.tx=W/2;leader.ty=H/2;
  // Init swarm
  swarm=[];
  for(var i=0;i<cfg.drones;i++){
    var a=Math.random()*Math.PI*2,d=20+Math.random()*40;
    swarm.push({x:W/2+Math.cos(a)*d,y:H/2+Math.sin(a)*d,vx:0,vy:0});
  }
  // Init targets
  targets=[];
  for(var i=0;i<cfg.targets;i++){
    targets.push({x:60+Math.random()*(W-120),y:60+Math.random()*(H-120),r:18,hit:false});
  }
  // Init obstacles
  obstacles=[];
  for(var i=0;i<cfg.obstacles;i++){
    obstacles.push({x:80+Math.random()*(W-160),y:80+Math.random()*(H-160),r:22,
      vx:(Math.random()-.5)*(stage===3?1.5:0),vy:(Math.random()-.5)*(stage===3?1.5:0)});
  }
  timer=setInterval(function(){
    timeLeft--;
    document.getElementById('h-time').textContent=timeLeft+'s';
    if(timeLeft<=0){clearInterval(timer);endStage(false);}
  },1000);
  running=true;
  if(raf)cancelAnimationFrame(raf);
  loop();
}

function loop(){
  if(!running)return;
  frameCount++;
  // Move leader
  leader.x+=(leader.tx-leader.x)*0.1;
  leader.y+=(leader.ty-leader.y)*0.1;
  // Move swarm (flocking toward leader)
  swarm.forEach(function(d,i){
    var offset={x:(i%3-1)*16,y:(Math.floor(i/3)%3-1)*16};
    var tx=leader.x+offset.x,ty=leader.y+offset.y;
    d.vx+=(tx-d.x)*0.08;d.vy+=(ty-d.y)*0.08;
    d.vx*=0.85;d.vy*=0.85;
    d.x+=d.vx;d.y+=d.vy;
    // Check target hit
    targets.forEach(function(t){
      if(!t.hit){
        var dx=d.x-t.x,dy=d.y-t.y;
        if(Math.sqrt(dx*dx+dy*dy)<d.r+t.r){
          t.hit=true;targetsHit++;score+=50*(stage);
          if(targetsHit>=totalTargets){endStage(true);}
        }
      }
    });
  });
  // Move obstacles
  obstacles.forEach(function(o){
    o.x+=o.vx;o.y+=o.vy;
    if(o.x<o.r||o.x>W-o.r)o.vx*=-1;
    if(o.y<o.r||o.y>H-o.r)o.vy*=-1;
  });
  draw();
  updateHUD();
  raf=requestAnimationFrame(loop);
}

function draw(){
  ctx.fillStyle='#0d0d0d';ctx.fillRect(0,0,W,H);
  // Grid
  ctx.strokeStyle='rgba(150,170,200,.04)';ctx.lineWidth=1;
  for(var x=0;x<W;x+=50){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(var y=0;y<H;y+=50){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
  // Targets
  targets.forEach(function(t){
    if(t.hit)return;
    ctx.fillStyle='rgba(201,162,75,.15)';ctx.strokeStyle='var(--gold)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(t.x,t.y,t.r,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='16px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🎯',t.x,t.y);
  });
  // Obstacles
  obstacles.forEach(function(o){
    ctx.fillStyle='rgba(224,21,21,.2)';ctx.strokeStyle='var(--red)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(o.x,o.y,o.r,0,Math.PI*2);ctx.fill();ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='18px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('🧱',o.x,o.y);
  });
  // Leader cursor
  ctx.strokeStyle='rgba(0,224,255,.3)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
  ctx.beginPath();ctx.arc(leader.x,leader.y,30,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([]);
  // Swarm
  swarm.forEach(function(d){
    ctx.fillStyle='#c41e3a';ctx.shadowColor='#c41e3a';ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(d.x,d.y,8,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  });
}

function updateHUD(){
  var cfg=stageConfig[stage-1];
  document.getElementById('h-score').textContent=score;
  document.getElementById('h-stage').textContent=cfg.label;
  document.getElementById('h-targets').textContent=targetsHit+'/'+totalTargets;
  document.getElementById('hdr-pts').textContent='⭐ '+score;
}

function endStage(win){
  running=false;clearInterval(timer);
  if(win&&stage<3){
    stage++;
    var ov=document.getElementById('overlay');
    ov.innerHTML='<div class="ov-title">✅ AŞAMA '+(stage-1)+' TAMAMLANDI!</div>'+
      '<div class="ov-score">'+score+'</div>'+
      '<div class="ov-sub">Sıradaki: Aşama '+stage+' — '+stageConfig[stage-1].label+'</div>'+
      '<button class="btn" onclick="initStage()">▶ AŞAMA '+stage+'</button>';
    ov.style.display='flex';
    return;
  }
  try{
    var sc=JSON.parse(localStorage.getItem('hs_scores')||'{}');
    sc['mobil-drone-suruc']=Math.max(sc['mobil-drone-suruc']||0,score);
    localStorage.setItem('hs_scores',JSON.stringify(sc));
  }catch(e){}
  var ov=document.getElementById('overlay');
  ov.innerHTML='<div class="ov-title">'+(win?'🏆 TAMAMLANDI!':'⏱️ SÜRE DOLDU')+'</div>'+
    '<div class="ov-score">'+score+'</div>'+
    '<div class="ov-sub">Aşama '+stage+' · '+targetsHit+'/'+totalTargets+' hedef</div>'+
    '<button class="btn" onclick="startGame()">🔄 YENİDEN OYNA</button>'+
    '<a href="oza-hub.html" style="color:var(--dim);font-size:13px;text-decoration:none">← OZA Hub</a>';
  ov.style.display='flex';
}

resize();
</script>

</body>
