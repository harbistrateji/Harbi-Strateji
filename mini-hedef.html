<!DOCTYPE html>
<html lang="tr">
<head>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&subset=latin-ext&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="hs-skip" content="true">
<title>Hedef Vur — OZA Mini</title>
<style>
:root{--bg:#0d0d0d;--panel:#0f1722;--red:#E01515;--cyan:#c41e3a;--gold:#C9A24B;--green:#00ff88;--tx:#EAF0F7;--dim:#90a1b5;--line:rgba(150,170,200,.18)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column;overflow:hidden}
.hdr{background:rgba(10,15,23,.97);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;height:52px;gap:12px;flex-shrink:0}
.hdr-back{font-size:13px;color:var(--dim);text-decoration:none;padding:6px 10px;border:1px solid var(--line);border-radius:8px}
.hdr-title{font-size:17px;font-weight:700;flex:1;text-align:center}
.hdr-pts{font-size:13px;color:var(--gold);font-weight:600}
.stats{display:flex;gap:12px;padding:12px 16px;flex-shrink:0}
.sbox{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:8px 14px;text-align:center;flex:1}
.sval{font-size:22px;font-weight:700}
.slbl{font-size:9px;color:var(--dim);text-transform:uppercase}
.field{flex:1;position:relative;overflow:hidden;cursor:crosshair;background:var(--panel);border-top:1px solid var(--line)}
.target{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;cursor:pointer;transition:transform .1s;user-select:none;-webkit-user-select:none;animation:pop-in .15s ease-out}
@keyframes pop-in{from{transform:scale(0)}to{transform:scale(1)}}
.target:active{transform:scale(.85)}
.overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:rgba(10,15,23,.92)}
.big-score{font-size:56px;font-weight:700;color:var(--cyan)}
.sub-txt{font-size:14px;color:var(--dim)}
.btn{padding:14px 32px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;background:var(--cyan);color:#000;min-width:200px}
.timer-bar{height:6px;background:var(--line);flex-shrink:0}
.timer-fill{height:100%;background:var(--cyan);transition:width .5s linear}

/* ═══ MOBİL UYUMLU RESPONSIVE ═══ */
@media (max-width: 768px) {
  body { font-size: 14px !important; }
  .container, .main, .wrap, .content, .page-content {
    padding: 12px !important;
    max-width: 100% !important;
  }
  h1 { font-size: clamp(18px, 5vw, 28px) !important; }
  h2 { font-size: clamp(15px, 4vw, 22px) !important; }
  h3 { font-size: clamp(13px, 3.5vw, 18px) !important; }
  table { font-size: 11px !important; }
  img, video, canvas, svg { max-width: 100% !important; height: auto !important; }
  .grid, .card-grid, .cards { grid-template-columns: 1fr !important; }
}
@media (max-width: 480px) {
  body { font-size: 13px !important; }
  .container, .main, .wrap { padding: 8px !important; }
  h1 { font-size: clamp(16px, 5vw, 24px) !important; }
  .nav, .navbar, .top-bar, .header { 
    padding: 8px 12px !important;
    font-size: 12px !important;
  }
}
/* Prevent horizontal overflow */
html { overflow-x: hidden !important; }
body { overflow-x: hidden !important; max-width: 100vw !important; }
img, video, iframe, canvas, svg, table { max-width: 100% !important; }
pre, code { overflow-x: auto !important; white-space: pre-wrap !important; word-break: break-word !important; }

</style>
<link rel="stylesheet" href="hs-global.css">
<link rel="stylesheet" href="hs-global-fix.css">
</head>
<body>
<div style="position:fixed;top:12px;left:12px;z-index:9999;display:flex;gap:8px;"><a href="oza-hub.html" style="background:rgba(10,15,23,0.9);color:#00E0FF;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid #00E0FF33;backdrop-filter:blur(8px);">← OZA Hub</a><a href="index.html" style="background:rgba(10,15,23,0.9);color:#c41e3a;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid rgba(196,30,58,0.3);backdrop-filter:blur(8px);">🏠 Ana Sayfa</a></div>
<header class="hdr">
  <a href="oza-hub.html" class="hdr-back">← OZA</a>
  <div class="hdr-title">🎯 HEDEF VUR</div>
  <div class="hdr-pts" id="hdr-pts">⭐ 0</div>
</header>
<div class="stats">
  <div class="sbox"><div class="sval" id="s-score" style="color:var(--cyan)">0</div><div class="slbl">PUAN</div></div>
  <div class="sbox"><div class="sval" id="s-time" style="color:var(--red)">30</div><div class="slbl">SÜRE</div></div>
  <div class="sbox"><div class="sval" id="s-best" style="color:var(--gold)">0</div><div class="slbl">EN İYİ</div></div>
  <div class="sbox"><div class="sval" id="s-miss" style="color:var(--dim)">0</div><div class="slbl">ISKALAMA</div></div>
</div>
<div class="timer-bar"><div class="timer-fill" id="timer-fill" style="width:100%"></div></div>
<div class="field" id="field" onclick="fieldClick()">
  <div class="overlay" id="overlay">
    <div style="font-size:48px">🎯</div>
    <div class="big-score" id="final-score" style="display:none"></div>
    <div class="sub-txt" id="overlay-msg">30 saniyede hedeflere dokun!</div>
    <button class="btn" onclick="startGame()">▶ BAŞLAT</button>
  </div>
</div>
<script>
var score=0,miss=0,running=false,timeLeft=30,timer=null,spawnTimer=null;
var best=0;
try{best=parseInt(localStorage.getItem('mini_hedef_best')||'0');}catch(e){}
document.getElementById('s-best').textContent=best;

function startGame(){
  score=0;miss=0;timeLeft=30;running=true;
  document.getElementById('overlay').style.display='none';
  document.getElementById('field').querySelectorAll('.target').forEach(function(t){t.remove();});
  updateStats();
  document.getElementById('timer-fill').style.transition='none';
  document.getElementById('timer-fill').style.width='100%';
  setTimeout(function(){
    document.getElementById('timer-fill').style.transition='width 30s linear';
    document.getElementById('timer-fill').style.width='0%';
  },50);
  timer=setInterval(tick,1000);
  spawnTarget();
}

function tick(){
  timeLeft--;
  document.getElementById('s-time').textContent=timeLeft;
  if(timeLeft<=0){endGame();}
}

function endGame(){
  running=false;
  clearInterval(timer);
  clearTimeout(spawnTimer);
  document.getElementById('field').querySelectorAll('.target').forEach(function(t){t.remove();});
  if(score>best){best=score;try{localStorage.setItem('mini_hedef_best',best);}catch(e){}}
  document.getElementById('s-best').textContent=best;
  try{
    var sc=JSON.parse(localStorage.getItem('hs_scores')||'{}');
    sc['mobil-hedef']=Math.max(sc['mobil-hedef']||0,score);
    localStorage.setItem('hs_scores',JSON.stringify(sc));
  }catch(e){}
  document.getElementById('hdr-pts').textContent='⭐ '+score;
  var ov=document.getElementById('overlay');
  document.getElementById('final-score').style.display='';
  document.getElementById('final-score').textContent=score+' PUAN';
  document.getElementById('overlay-msg').textContent='İsabet: '+score/10+' hedef · Iskalama: '+miss;
  ov.style.display='flex';
}

function spawnTarget(){
  if(!running)return;
  var field=document.getElementById('field');
  var fw=field.offsetWidth,fh=field.offsetHeight;
  var size=50+Math.random()*30;
  var x=Math.random()*(fw-size);
  var y=Math.random()*(fh-size);
  var t=document.createElement('div');
  t.className='target';
  t.style.cssText='width:'+size+'px;height:'+size+'px;left:'+x+'px;top:'+y+'px;background:radial-gradient(circle,var(--red),#8b0000);border:3px solid var(--red)';
  t.textContent='🎯';
  t.onclick=function(e){
    e.stopPropagation();
    if(!running)return;
    score+=10;
    updateStats();
    burst(e.clientX,e.clientY);
    t.remove();
    spawnTarget();
  };
  field.appendChild(t);
  var life=1400;
  setTimeout(function(){
    if(t.parentNode){
      miss++;
      updateStats();
      t.remove();
      spawnTarget();
    }
  },life);
}

function fieldClick(){if(!running)miss++;}

function updateStats(){
  document.getElementById('s-score').textContent=score;
  document.getElementById('s-miss').textContent=miss;
  document.getElementById('hdr-pts').textContent='⭐ '+score;
}

function burst(x,y){
  for(var i=0;i<6;i++){
    var p=document.createElement('div');
    var a=Math.random()*Math.PI*2,d=30+Math.random()*40;
    p.style.cssText='position:fixed;left:'+x+'px;top:'+y+'px;width:8px;height:8px;border-radius:50%;background:var(--red);pointer-events:none;z-index:999;transition:all .4s ease-out';
    document.body.appendChild(p);
    setTimeout(function(pp,angle,dist){
      pp.style.transform='translate('+(Math.cos(angle)*dist)+'px,'+(Math.sin(angle)*dist)+'px)';
      pp.style.opacity='0';
    },10,p,a,d);
    setTimeout(function(pp){pp.remove();},450,p);
  }
}
</script>
<script src="hs-nav.js?v=11"></script>
</body>
</html>
