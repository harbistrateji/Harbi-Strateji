<!DOCTYPE html>
<html lang="tr">
<head>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&subset=latin-ext&display=swap" rel="stylesheet">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="hs-skip" content="true">
<title>Tepki Testi — OZA Mini</title>
<style>
:root{--bg:#0d0d0d;--panel:#0f1722;--red:#E01515;--cyan:#c41e3a;--gold:#C9A24B;--green:#00ff88;--tx:#EAF0F7;--dim:#90a1b5;--line:rgba(150,170,200,.18)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--tx);font-family:'Segoe UI',system-ui,sans-serif;display:flex;flex-direction:column}
.hdr{background:rgba(10,15,23,.97);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;height:52px;gap:12px;flex-shrink:0}
.hdr-back{font-size:13px;color:var(--dim);text-decoration:none;padding:6px 10px;border:1px solid var(--line);border-radius:8px}
.hdr-title{font-size:17px;font-weight:700;flex:1;text-align:center;letter-spacing:.04em}
.hdr-pts{font-size:13px;color:var(--gold);font-weight:600}
.arena{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:20px}
.score-row{display:flex;gap:16px}
.sbox{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px 20px;text-align:center;min-width:90px}
.sval{font-size:26px;font-weight:700}
.slbl{font-size:10px;color:var(--dim);text-transform:uppercase;margin-top:2px}
.circle{width:200px;height:200px;border-radius:50%;background:var(--panel);border:4px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:48px;cursor:pointer;transition:all .15s;user-select:none;-webkit-user-select:none}
.circle.wait{border-color:var(--red);animation:pulse 1s ease-in-out infinite}
.circle.go{background:var(--green);border-color:var(--green);transform:scale(1.05)}
.circle.early{background:var(--red);border-color:var(--red);animation:none}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,21,21,.4)}50%{box-shadow:0 0 0 20px rgba(224,21,21,0)}}
.msg{font-size:15px;color:var(--dim);text-align:center;min-height:22px}
.result-big{font-size:42px;font-weight:700;color:var(--cyan);text-align:center}
.btn{padding:14px 32px;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;background:var(--cyan);color:#000;width:100%;max-width:280px}
.history{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;max-width:320px}
.hitem{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:4px 10px;font-size:12px;color:var(--dim)}
.hitem.best{border-color:var(--gold);color:var(--gold)}
</style>
<link rel="stylesheet" href="hs-global.css">
<link rel="stylesheet" href="hs-global-fix.css">
</head>
<body>
<div style="position:fixed;top:12px;left:12px;z-index:9999;display:flex;gap:8px;"><a href="oza-hub.html" style="background:rgba(10,15,23,0.9);color:#00E0FF;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid #00E0FF33;backdrop-filter:blur(8px);">← OZA Hub</a><a href="index.html" style="background:rgba(10,15,23,0.9);color:#c41e3a;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid rgba(196,30,58,0.3);backdrop-filter:blur(8px);">🏠 Ana Sayfa</a></div>
<header class="hdr">
  <a href="oza-hub.html" class="hdr-back">← OZA</a>
  <div class="hdr-title">⚡ TEPKİ TESTİ</div>
  <div class="hdr-pts" id="hdr-pts">⭐ 0</div>
</header>
<div class="arena">
  <div class="score-row">
    <div class="sbox"><div class="sval" id="s-best" style="color:var(--gold)">—</div><div class="slbl">EN İYİ</div></div>
    <div class="sbox"><div class="sval" id="s-avg" style="color:var(--cyan)">—</div><div class="slbl">ORTALAMA</div></div>
    <div class="sbox"><div class="sval" id="s-cnt" style="color:var(--green)">0</div><div class="slbl">DENEME</div></div>
  </div>
  <div class="circle" id="circle" onclick="tap()">🔴</div>
  <div class="msg" id="msg">Başlatmak için daireye dokun</div>
  <div class="result-big" id="result" style="display:none"></div>
  <div class="history" id="history"></div>
  <button class="btn" id="start-btn" onclick="startGame()">▶ BAŞLAT</button>
</div>
<script>
var state='idle';
var startTime=0;
var waitTimer=null;
var times=[];
var best=Infinity;
var pts=0;

try{
  var saved=JSON.parse(localStorage.getItem('mini_tepki')||'{}');
  times=saved.times||[];
  best=saved.best||Infinity;
  pts=saved.pts||0;
}catch(e){}

function updateUI(){
  document.getElementById('hdr-pts').textContent='⭐ '+pts;
  document.getElementById('s-cnt').textContent=times.length;
  if(best<Infinity){document.getElementById('s-best').textContent=best+'ms';}
  if(times.length>0){
    var avg=Math.round(times.reduce(function(a,b){return a+b;},0)/times.length);
    document.getElementById('s-avg').textContent=avg+'ms';
  }
  var hist=document.getElementById('history');
  hist.innerHTML=times.slice(-8).reverse().map(function(t){
    var cls=t===best?'hitem best':'hitem';
    return '<div class="'+cls+'">'+t+'ms</div>';
  }).join('');
}

function save(){
  try{localStorage.setItem('mini_tepki',JSON.stringify({times:times.slice(-50),best:best,pts:pts}));}catch(e){}
  try{
    var sc=JSON.parse(localStorage.getItem('hs_scores')||'{}');
    sc['mobil-tepki']=pts;
    localStorage.setItem('hs_scores',JSON.stringify(sc));
  }catch(e){}
}

function startGame(){
  document.getElementById('start-btn').style.display='none';
  document.getElementById('result').style.display='none';
  state='waiting';
  var c=document.getElementById('circle');
  c.textContent='🔴';
  c.className='circle wait';
  document.getElementById('msg').textContent='Bekle... yeşile döndüğünde dokun!';
  var delay=1500+Math.random()*3000;
  waitTimer=setTimeout(function(){
    state='go';
    c.textContent='🟢';
    c.className='circle go';
    document.getElementById('msg').textContent='ŞIMDI DOKUN!';
    startTime=Date.now();
  },delay);
}

function tap(){
  if(state==='idle'){startGame();return;}
  if(state==='waiting'){
    clearTimeout(waitTimer);
    state='idle';
    var c=document.getElementById('circle');
    c.textContent='🔴';
    c.className='circle early';
    document.getElementById('msg').textContent='Çok erken! Bekle...';
    setTimeout(function(){
      c.className='circle';
      document.getElementById('start-btn').style.display='';
    },1200);
    return;
  }
  if(state==='go'){
    var elapsed=Date.now()-startTime;
    state='idle';
    times.push(elapsed);
    if(elapsed<best){best=elapsed;}
    var bonus=elapsed<200?500:elapsed<300?300:elapsed<400?150:elapsed<500?75:20;
    pts+=bonus;
    save();
    var c=document.getElementById('circle');
    c.textContent='⚡';
    c.className='circle';
    var r=document.getElementById('result');
    r.style.display='';
    r.textContent=elapsed+'ms';
    r.style.color=elapsed<250?'var(--green)':elapsed<400?'var(--gold)':'var(--cyan)';
    document.getElementById('msg').textContent=elapsed<250?'🔥 Muhteşem!':elapsed<400?'✅ İyi!':elapsed<600?'👍 Fena değil':'⏱️ Biraz yavaş';
    updateUI();
    setTimeout(function(){document.getElementById('start-btn').style.display='';},800);
  }
}

updateUI();
</script>
<script src="hs-nav.js?v=11"></script>
</body>
</html>
