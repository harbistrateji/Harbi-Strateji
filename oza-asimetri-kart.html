<style>
:root{--bg:#0d0d0d;--panel:#0f1722;--panel2:#16202d;--red:#E01515;--red2:#ff3a4a;--cyan:#c41e3a;--gold:#C9A24B;--line:rgba(150,170,200,.13);--line2:rgba(150,170,200,.22);--tx:#EAF0F7;--dim:#90a1b5}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'IBM Plex Sans',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden;user-select:none}
.top{position:sticky;top:0;z-index:60;background:rgba(10,15,23,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:0 20px}
.top .in{max-width:600px;margin:0 auto;display:flex;align-items:center;gap:14px;min-height:52px}
.back{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);text-decoration:none}.back:hover{color:#fff}
.title{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:16px}
.hdr-score{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gold)}

.wrap{max-width:600px;margin:0 auto;padding:24px 20px 80px}

/* ── Başlık ── */
.game-header{text-align:center;margin-bottom:20px}
.game-header h1{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:clamp(24px,5vw,40px);color:#fff}
.game-header .sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);margin-top:6px;letter-spacing:.04em}

/* ── Skor bandı ── */
.score-band{display:flex;justify-content:center;gap:0;margin-bottom:24px;border:1px solid var(--line2);border-radius:10px;overflow:hidden}
.sb-item{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--line2)}
.sb-item:last-child{border-right:none}
.sb-val{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:22px;color:var(--red2)}
.sb-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}

/* ── Kart alanı ── */
.card-arena{position:relative;height:420px;display:flex;align-items:center;justify-content:center;margin-bottom:20px}

/* Swipe yön göstergeleri */
.hint-left,.hint-right{position:absolute;top:50%;transform:translateY(-50%);font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;text-transform:uppercase;padding:8px 14px;border-radius:8px;pointer-events:none;opacity:0;transition:opacity .2s;z-index:5}
.hint-left{left:0;color:var(--red2);border:1px solid rgba(224,21,21,.4);background:rgba(224,21,21,.08)}
.hint-right{right:0;color:#00ff88;border:1px solid rgba(0,255,136,.4);background:rgba(0,255,136,.08)}

/* Ana kart */
.swipe-card{position:absolute;width:100%;max-width:380px;background:var(--panel);border:2px solid var(--line2);border-radius:20px;padding:28px;cursor:grab;transition:box-shadow .2s;touch-action:none;will-change:transform}
.swipe-card:active{cursor:grabbing}
.card-tag{font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--red2);margin-bottom:10px}
.card-icon{font-size:40px;margin-bottom:12px}
.card-name{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:22px;color:#fff;margin-bottom:10px}
.card-desc{font-family:'IBM Plex Sans',sans-serif;font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:16px}
.card-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-box{background:var(--panel2);border-radius:8px;padding:10px;text-align:center}
.stat-val{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:18px}
.stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;margin-top:3px}
.card-ratio{text-align:center;margin-top:14px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gold);padding:8px;background:rgba(201,162,75,.08);border-radius:8px}

/* Swipe aksiyon göstergesi */
.swipe-action{position:absolute;top:20px;font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:18px;padding:8px 16px;border-radius:8px;opacity:0;transition:opacity .15s;pointer-events:none;z-index:10}
.swipe-action.left{left:20px;color:var(--red2);border:2px solid var(--red2);background:rgba(224,21,21,.15)}
.swipe-action.right{right:20px;color:#00ff88;border:2px solid #00ff88;background:rgba(0,255,136,.15)}

/* ── Karar butonları ── */
.decision-btns{display:flex;gap:12px;justify-content:center;margin-bottom:20px}
.dec-btn{flex:1;max-width:160px;padding:14px 10px;border-radius:12px;border:2px solid;cursor:pointer;font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:13px;transition:all .15s;background:transparent}
.dec-btn.reject{color:var(--red2);border-color:var(--red2)}.dec-btn.reject:hover{background:rgba(224,21,21,.12)}
.dec-btn.accept{color:#00ff88;border-color:#00ff88}.dec-btn.accept:hover{background:rgba(0,255,136,.12)}

/* ── Swipe talimatı ── */
.swipe-hint{text-align:center;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);margin-bottom:20px}

/* ── Sonuç overlay ── */
.result-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.85);align-items:center;justify-content:center;padding:20px}
.result-overlay.show{display:flex}
.result-box{background:var(--panel);border:2px solid var(--line2);border-radius:20px;padding:36px;max-width:400px;width:100%;text-align:center}
.res-icon{font-size:56px;margin-bottom:12px}
.res-title{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:28px;margin-bottom:8px}
.res-pts{font-family:'IBM Plex Mono',monospace;font-size:42px;font-weight:700;color:var(--red2);margin:12px 0}
.res-explain{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:20px}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:13px;padding:12px 20px;border-radius:9px;border:none;cursor:pointer}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:var(--red2)}
.btn-outline{background:transparent;color:var(--cyan);border:1px solid var(--cyan)}

function loadCard(){
  var c = CARDS[currentCard % CARDS.length];
  document.getElementById('c-tag').textContent = c.tag;
  document.getElementById('c-icon').textContent = c.icon;
  document.getElementById('c-name').textContent = c.name;
  document.getElementById('c-desc').textContent = c.desc;
  document.getElementById('c-cost').textContent = c.cost;
  document.getElementById('c-effect').textContent = c.effect;
  document.getElementById('c-risk').textContent = c.risk;
  document.getElementById('c-time').textContent = c.time;
  document.getElementById('c-ratio').textContent = 'Maliyet-Etki Oranı: ' + c.ratio;
  document.getElementById('s-round').textContent = (currentCard % CARDS.length) + 1;
  document.getElementById('s-ai').textContent = HS.getAILevel();

  // Kart animasyonu
  card.style.transition = 'transform 0.4s cubic-bezier(0.34,1.56,0.64,1)';
  card.style.transform = 'translateX(0) rotate(0deg) scale(1)';
  card.style.opacity = '1';
  setTimeout(function(){ card.style.transition = ''; }, 400);

  document.getElementById('result-overlay').classList.remove('show');
}

function decide(accept){
  var c = CARDS[currentCard % CARDS.length];
  var correct = (accept === c.shouldAccept);

  // YZ kararı
  var aiOptions = [true, false];
  var aiDecision = HS.aiDecide(aiOptions, []);
  var aiCorrect = (aiDecision === c.shouldAccept);

  var pts = 0;
  if(correct){
    streak++;
    pts = 10 + streak * 5;
    if(HS.hasPerk('zirh_1')) pts = Math.floor(pts * 1.1);
    totalScore += pts;
    HS.addScore('asimetri', pts);
    HS.beepWin();
    HS.burst(card, '#00ff88');
    HS.flashScreen('rgba(0,255,136,0.15)', 300);
    HS.aiLost();
  } else {
    streak = 0;
    HS.beepFail();
    HS.flashScreen('rgba(224,21,21,0.25)', 300);
    HS.aiWon();
  }

  // Kart animasyonu
  card.style.transition = 'transform 0.5s ease, opacity 0.5s';
  card.style.transform = accept ? 'translateX(120%) rotate(15deg)' : 'translateX(-120%) rotate(-15deg)';
  card.style.opacity = '0';

  document.getElementById('s-score').textContent = totalScore;
  document.getElementById('s-streak').textContent = streak;
  document.getElementById('hdr-score').textContent = '⭐ ' + HS.getTotalScore();

  // Sonuç
  document.getElementById('res-icon').textContent = correct ? '✅' : '❌';
  document.getElementById('res-title').textContent = correct ? 'Doğru Karar! +' + pts + ' puan' : 'Yanlış Karar';
  document.getElementById('res-pts').textContent = correct ? '+' + pts : '0';
  document.getElementById('res-pts').style.color = correct ? '#00ff88' : 'var(--red2)';
  document.getElementById('res-explain').innerHTML = c.explain +
    '<br><br><span style="color:var(--cyan);font-size:11px">YZ Kararı: ' + (aiDecision ? '✓ Kabul' : '✕ Reddet') + (aiCorrect ? ' (Doğru)' : ' (Yanlış)') + '</span>';

  setTimeout(function(){
    document.getElementById('result-overlay').classList.add('show');
  }, 500);

  if(totalScore >= 100) HS.awardBadge('asimetri');
}

function nextCard(){
  currentCard++;
  loadCard();
}

// Swipe mekanizması
function initSwipe(){
  card = document.getElementById('swipe-card');
  arena = document.getElementById('card-arena');

  function onStart(x, y){
    isDragging = true;
    startX = x; startY = y; currentX = 0;
    card.style.transition = 'none';
  }
  function onMove(x, y){
    if(!isDragging) return;
    currentX = x - startX;
    var rot = currentX * 0.08;
    card.style.transform = 'translateX('+currentX+'px) rotate('+rot+'deg)';

    var saL = document.getElementById('sa-left');
    var saR = document.getElementById('sa-right');
    var hL = document.getElementById('hint-left');
    var hR = document.getElementById('hint-right');

    if(currentX < -30){
      saL.style.opacity = Math.min(1, Math.abs(currentX)/100);
      saR.style.opacity = 0;
      hL.style.opacity = Math.min(1, Math.abs(currentX)/80);
      hR.style.opacity = 0;
    } else if(currentX > 30){
      saR.style.opacity = Math.min(1, currentX/100);
      saL.style.opacity = 0;
      hR.style.opacity = Math.min(1, currentX/80);
      hL.style.opacity = 0;
    } else {
      saL.style.opacity = 0; saR.style.opacity = 0;
      hL.style.opacity = 0; hR.style.opacity = 0;
    }
  }
  function onEnd(){
    if(!isDragging) return;
    isDragging = false;
    document.getElementById('sa-left').style.opacity = 0;
    document.getElementById('sa-right').style.opacity = 0;
    document.getElementById('hint-left').style.opacity = 0;
    document.getElementById('hint-right').style.opacity = 0;

    if(currentX < -80){
      HS.beepSwipe('left');
      decide(false);
    } else if(currentX > 80){
      HS.beepSwipe('right');
      decide(true);
    } else {
      card.style.transition = 'transform 0.3s';
      card.style.transform = 'translateX(0) rotate(0deg)';
    }
  }

  card.addEventListener('mousedown', function(e){ onStart(e.clientX, e.clientY); });
  document.addEventListener('mousemove', function(e){ onMove(e.clientX, e.clientY); });
  document.addEventListener('mouseup', onEnd);
  card.addEventListener('touchstart', function(e){ onStart(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
  document.addEventListener('touchmove', function(e){ onMove(e.touches[0].clientX, e.touches[0].clientY); }, {passive:true});
  document.addEventListener('touchend', onEnd);
}

initSwipe();
loadCard();
</script>

    explosion:function(){var c=getCtx(),b=c.createBuffer(1,c.sampleRate*0.5,c.sampleRate),d=b.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);var s=c.createBufferSource(),g=c.createGain();s.buffer=b;s.connect(g);g.connect(c.destination);g.gain.value=0.2;s.start();},

    victory:function(){var c=getCtx();[523,659,784,1047].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=0.12;o.start(c.currentTime+i*0.15);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.15+0.3);o.stop(c.currentTime+i*0.15+0.3);});}
  };
  // Auto-attach to common game events
  document.addEventListener('click',function(e){
    var t=e.target;
    if(t.tagName==='BUTTON'||t.classList.contains('ch-opt')||t.classList.contains('option')||t.classList.contains('choice'))hsSound.click();
  });
})();
</script>
