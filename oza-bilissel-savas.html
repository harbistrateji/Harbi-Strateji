<style>
:root{--bg:#0d0d0d;--panel:#0f1722;--panel2:#16202d;--red:#E01515;--red2:#ff3a4a;--cyan:#c41e3a;--gold:#C9A24B;--green:#00ff88;--purple:#9b59ff;--tx:#EAF0F7;--dim:#90a1b5;--line:rgba(150,170,200,.15)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:'IBM Plex Mono',monospace}
canvas#bg{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:.2}
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,15,23,.97);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;height:54px;gap:12px}
.hdr-back{font-size:12px;color:var(--dim);text-decoration:none;padding:5px 12px;border:1px solid var(--line);border-radius:6px}
.hdr-title{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:15px;flex:1;text-align:center;color:var(--purple)}
.hdr-pts{font-size:12px;color:var(--gold);font-weight:600}
.main{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:70px 16px 80px}
/* Stats bar */
.stats-bar{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin-bottom:16px}
.sbox{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 6px;text-align:center}
.sv{font-family:'Chakra Petch',sans-serif;font-size:20px;font-weight:700}
.sl{font-size:9px;color:var(--dim);text-transform:uppercase;margin-top:2px}
/* Stage badge */
.stage-wrap{text-align:center;margin-bottom:16px}
.stage-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 18px;border-radius:20px;font-family:'Chakra Petch',sans-serif;font-size:12px;font-weight:700;border:1px solid}
/* Metrics grid */
.metrics{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
@media(max-width:520px){.metrics{grid-template-columns:1fr}}
.metric-card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px}
.mc-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.mc-label{font-size:11px;color:var(--dim);text-transform:uppercase;font-weight:600}
.mc-val{font-family:'Chakra Petch',sans-serif;font-size:22px;font-weight:700}
.bar{height:8px;background:rgba(255,255,255,.08);border-radius:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s}
/* Threat card */
.threat-card{background:rgba(155,89,255,.06);border:2px solid rgba(155,89,255,.3);border-radius:14px;padding:18px;margin-bottom:14px;position:relative}
.tc-tag{font-size:10px;color:var(--purple);text-transform:uppercase;font-weight:700;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.tc-pulse{width:8px;height:8px;border-radius:50%;background:var(--purple);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.tc-title{font-family:'Chakra Petch',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px}
.tc-text{font-size:12px;color:var(--dim);line-height:1.7;margin-bottom:10px}
.tc-impact{display:flex;gap:8px;flex-wrap:wrap}
.impact-pill{font-size:10px;padding:3px 10px;border-radius:999px;border:1px solid}
/* Response grid */
.resp-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
@media(max-width:420px){.resp-grid{grid-template-columns:1fr}}
.resp-btn{padding:12px 10px;border:2px solid var(--line);border-radius:12px;background:var(--panel);color:var(--tx);font-size:12px;font-weight:600;cursor:pointer;transition:.15s;text-align:left;line-height:1.4}
.resp-btn:active{transform:scale(.97)}
.resp-btn.selected-good{border-color:var(--green);background:rgba(0,255,136,.08)}
.resp-btn.selected-bad{border-color:var(--red);background:rgba(224,21,21,.08)}
.resp-btn:disabled{opacity:.5;cursor:default}
/* Timer ring */
.timer-ring{text-align:center;margin-bottom:12px}
.tr-val{font-family:'Chakra Petch',sans-serif;font-size:28px;font-weight:700}
/* Feedback */
.feedback{text-align:center;font-size:13px;min-height:20px;margin-bottom:10px;font-weight:600}
/* Overlay */
.overlay{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px;text-align:center;margin-bottom:14px}
.ov-icon{font-size:56px;margin-bottom:12px}
.ov-score{font-family:'Chakra Petch',sans-serif;font-size:52px;font-weight:700;color:var(--cyan);margin-bottom:8px}
.ov-sub{font-size:13px;color:var(--dim);margin-bottom:16px}
.btn-main{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Chakra Petch',sans-serif;font-size:14px;font-weight:700;cursor:pointer;background:var(--red);color:#fff;margin-bottom:8px;transition:.15s}
.btn-main:hover{background:var(--red2)}
.btn-sec{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-family:'Chakra Petch',sans-serif;font-size:13px;font-weight:700;cursor:pointer;background:transparent;color:var(--dim);transition:.15s}
.btn-sec:hover{color:#fff}

/* ═══ TEK EKRAN — NO SCROLL ═══ */
html, body {
  height: 100vh !important;
  max-height: 100vh !important;
  overflow: hidden !important;
}
body > .wrap, body > .container, body > .main, body > .game-container, body > .game-wrap {
  max-height: calc(100vh - 54px) !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
}
@media (max-width: 480px) {
  body > .wrap, body > .container, body > .main { 
    max-height: calc(100vh - 44px) !important;
    padding: 8px !important;
  }
}


/* ═══ TEK EKRAN VIEWPORT FIT ═══ */
html, body { 
  height: 100vh !important; 
  max-height: 100vh !important; 
  overflow: hidden !important;
  margin: 0 !important;
  padding: 0 !important;
}
.game-container, .container, .main, #app, #game, .game-wrapper, .game-area {
  height: 100vh !important;
  max-height: 100vh !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  display: flex !important;
  flex-direction: column !important;
}
/* Mobil uyum */
@media (max-width: 768px) {
  body { font-size: 13px !important; }
  h1, .game-title { font-size: clamp(16px, 4vw, 24px) !important; }
  h2 { font-size: clamp(14px, 3.5vw, 20px) !important; }
  .btn, button { 
    padding: 8px 16px !important; 
    font-size: 12px !important;
    min-height: 40px !important;
    touch-action: manipulation !important;
  }
  .card, .option, .choice { 
    padding: 10px !important; 
    margin: 4px !important;
  }
}
@media (max-width: 480px) {
  body { font-size: 12px !important; }
  .nav, .navbar, .top-bar, .header { 
    padding: 4px 8px !important;
    font-size: 11px !important;
  }
}
@media (max-height: 700px) {
  .game-container, .container, .main {
    padding: 8px !important;
  }
  h1, .game-title { font-size: 18px !important; }
}


/* ═══ MOBİL UYUMLU RESPONSIVE ═══ */
@media (max-width: 768px) {
  body { font-size: 14px !important; }
  .container, .main, .wrap, .content, .page-content {
    padding: 12px !important;
    max-width: 100% !important;
  }
  h1 { font-size: clamp(18px, 5vw, 28px) !important; }
  h2 { font-size: clamp(15px, 4vw, 22px) !important; }
  h3 { font-size: clamp(13px, 3.5vw, 18px) !important; }
  table { font-size: 11px !important; }
  img, video, canvas, svg { max-width: 100% !important; height: auto !important; }
  .grid, .card-grid, .cards { grid-template-columns: 1fr !important; }
}
@media (max-width: 480px) {
  body { font-size: 13px !important; }
  .container, .main, .wrap { padding: 8px !important; }
  h1 { font-size: clamp(16px, 5vw, 24px) !important; }
}
html { overflow-x: hidden !important; }
body { overflow-x: hidden !important; max-width: 100vw !important; }
img, video, iframe, canvas, svg, table { max-width: 100% !important; }

// ── BG Canvas ──
(function(){
  var c=document.getElementById('bg'),ctx=c.getContext('2d');
  function resize(){c.width=innerWidth;c.height=innerHeight;}resize();
  window.addEventListener('resize',resize);
  var nodes=Array.from({length:30},function(){return{x:Math.random()*innerWidth,y:Math.random()*innerHeight,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3};});
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    nodes.forEach(function(n){
      n.x+=n.vx;n.y+=n.vy;
      if(n.x<0||n.x>c.width)n.vx*=-1;
      if(n.y<0||n.y>c.height)n.vy*=-1;
      ctx.beginPath();ctx.arc(n.x,n.y,2,0,Math.PI*2);
      ctx.fillStyle='rgba(155,89,255,.6)';ctx.fill();
    });
    nodes.forEach(function(a,i){nodes.forEach(function(b,j){
      if(i>=j)return;
      var d=Math.hypot(a.x-b.x,a.y-b.y);
      if(d<120){ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);
        ctx.strokeStyle='rgba(155,89,255,'+(1-d/120)*.15+')';ctx.stroke();}
    });});
    requestAnimationFrame(draw);
  }draw();
})();

var stage=0,wave=0,pts=0,combo=1,timer=null,answered=false;
var metrics={polarization:20,trust:80,media:70,education:75};

function startStage(){
  var s=STAGES[stage];
  wave=0;combo=1;answered=false;
  metrics={polarization:s.metrics.polarization,trust:s.metrics.trust,media:s.metrics.media,education:s.metrics.education};
  document.getElementById('s-stage').textContent=(stage+1)+'/3';
  renderStageBadge();renderMetrics();nextWave();
}

function renderStageBadge(){
  var s=STAGES[stage];
  document.getElementById('stage-wrap').innerHTML=
    '<div class="stage-pill" style="border-color:'+s.color+';color:'+s.color+'">'+s.label+'</div>'+
    '<div style="font-size:11px;color:var(--dim);margin-top:6px">'+s.sublabel+'</div>';
}

function renderMetrics(){
  var html='';
  var items=[
    {key:'trust',label:'Toplumsal Güven',color:'var(--green)',icon:'🤝'},
    {key:'polarization',label:'Kutuplaşma',color:'var(--red)',icon:'⚡'},
    {key:'media',label:'Medya Güveni',color:'var(--cyan)',icon:'📡'},
    {key:'education',label:'Eğitim Güveni',color:'var(--gold)',icon:'🎓'}
  ];
  items.forEach(function(item){
    var v=Math.max(0,Math.min(100,metrics[item.key]));
    var ok=item.key==='polarization'?v<50:v>40;
    html+='<div class="metric-card">';
    html+='<div class="mc-head"><span class="mc-label">'+item.icon+' '+item.label+'</span>';
    html+='<span class="mc-val" style="color:'+(ok?item.color:'var(--red)')+'">'+v+'</span></div>';
    html+='<div class="bar"><div class="bar-fill" style="width:'+v+'%;background:'+item.color+'"></div></div>';
    html+='</div>';
  });
  document.getElementById('metrics').innerHTML=html;
}

function nextWave(){
  var s=STAGES[stage];
  if(wave>=s.waves){endStage();return;}
  answered=false;
  var threat=s.threats[wave%s.threats.length];
  var tl=s.timeLimit;
  document.getElementById('s-wave').textContent=(wave+1)+'/'+s.waves;
  document.getElementById('s-combo').textContent='×'+combo;
  document.getElementById('s-time').textContent=tl+'s';
  clearInterval(timer);
  timer=setInterval(function(){
    tl--;document.getElementById('s-time').textContent=tl+'s';
    if(tl<=0){clearInterval(timer);if(!answered)timeOut();}
  },1000);
  var html='<div class="threat-card">';
  html+='<div class="tc-tag"><div class="tc-pulse"></div>'+threat.tag+'</div>';
  html+='<div class="tc-title">'+threat.title+'</div>';
  html+='<div class="tc-text">'+threat.text+'</div>';
  html+='<div class="tc-impact">';
  threat.impacts.forEach(function(imp){
    html+='<span class="impact-pill" style="color:'+imp.color+';border-color:'+imp.color+'">'+imp.label+'</span>';
  });
  html+='</div></div>';
  html+='<div class="resp-grid">';
  threat.responses.forEach(function(r,i){
    html+='<button class="resp-btn" onclick="respond('+i+',this)">'+r.label+'</button>';
  });
  html+='</div>';
  html+='<div class="feedback" id="feedback"></div>';
  document.getElementById('game-area').innerHTML=html;
}

function respond(idx,btn){
  if(answered)return;
  answered=true;clearInterval(timer);
  var s=STAGES[stage];
  var threat=s.threats[wave%s.threats.length];
  var r=threat.responses[idx];
  // Apply deltas
  Object.keys(r.delta).forEach(function(k){
    metrics[k]=(metrics[k]||0)+r.delta[k];
    metrics[k]=Math.max(0,Math.min(100,metrics[k]));
  });
  if(r.good){combo=Math.min(combo+1,5);}else{combo=1;}
  var earned=Math.round(r.pts*combo*s.comboMult);
  pts+=earned;
  btn.classList.add(r.good?'selected-good':'selected-bad');
  document.getElementById('feedback').innerHTML='<span style="color:'+(r.good?'var(--green)':'var(--red)')+'">'+
    (r.good?'✅ Doğru müdahale! +'+earned+' puan (×'+combo+' kombo)':'❌ Yanlış strateji! Kombo sıfırlandı')+'</span>';
  document.getElementById('s-pts').textContent=pts;
  document.getElementById('hdr-pts').textContent='⭐ '+pts;
  document.getElementById('s-combo').textContent='×'+combo;
  renderMetrics();
  // Check oyun bitti
  if(metrics.trust<=5||metrics.polarization>=95){clearInterval(timer);setTimeout(function(){endStage(true);},800);return;}
  wave++;setTimeout(nextWave,1200);
}

function timeOut(){
  answered=true;combo=1;
  metrics.trust=Math.max(0,metrics.trust-8);
  metrics.polarization=Math.min(100,metrics.polarization+8);
  document.getElementById('feedback').innerHTML='<span style="color:var(--red)">⏱️ Süre doldu! Müdahale edilemedi.</span>';
  document.getElementById('s-combo').textContent='×1';
  renderMetrics();
  wave++;setTimeout(nextWave,1200);
}

function endStage(crisis){
  clearInterval(timer);
  try{var sc=JSON.parse(localStorage.getItem('hs_scores')||'{}');sc['bilissel-savas']=Math.max(sc['bilissel-savas']||0,pts);localStorage.setItem('hs_scores',JSON.stringify(sc));}catch(e){}
  var success=!crisis&&metrics.trust>30&&metrics.polarization<80;
  var html='<div class="overlay">';
  html+='<div class="ov-icon">'+(crisis?'💥':stage<2?'🧠':'🏆')+'</div>';
  html+='<div class="ov-score">'+pts+'</div>';
  html+='<div class="ov-sub">'+(crisis?'Toplumsal güven çöktü — bilişsel savaşı kaybettiniz':stage<2?'Aşama '+(stage+1)+' tamamlandı!':'Tüm aşamalar tamamlandı!')+'</div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0;font-size:12px">';
  html+='<div style="background:var(--panel2);border-radius:8px;padding:8px;text-align:center"><div style="color:var(--green);font-size:18px;font-weight:700">'+metrics.trust+'</div><div style="color:var(--dim)">Güven</div></div>';
  html+='<div style="background:var(--panel2);border-radius:8px;padding:8px;text-align:center"><div style="color:var(--red);font-size:18px;font-weight:700">'+metrics.polarization+'</div><div style="color:var(--dim)">Kutuplaşma</div></div>';
  html+='</div></div>';
  document.getElementById('game-area').innerHTML=html;
  if(!crisis&&stage<2){
    var b=document.createElement('button');b.className='btn-main';b.textContent='▶ AŞAMA '+(stage+2)+' — '+STAGES[stage+1].label;
    b.onclick=function(){stage++;startStage();};
    document.getElementById('game-area').appendChild(b);
  } else {
    var b=document.createElement('button');b.className='btn-main';b.textContent='🔄 BAŞTAN OYNA';
    b.onclick=function(){stage=0;pts=0;combo=1;startStage();};
    document.getElementById('game-area').appendChild(b);
    var b2=document.createElement('button');b2.className='btn-sec';b2.textContent='← OZA Oyun Merkezine Dön';
    b2.onclick=function(){location.href='oza-hub.html';};
    document.getElementById('game-area').appendChild(b2);
  }
}

startStage();
</script>
