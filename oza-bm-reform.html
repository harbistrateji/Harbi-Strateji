<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BM Reform ya da İflas - Simülasyon | Harb-i Strateji</title>

    <style>
        :root {
            --bg-color: #0b111e;
            --panel-color: #151f32;
            --text-color: #e2e8f0;
            --accent-color: #38bdf8;
            --hover-color: #1e293b;
            --border-color: #334155;
            --success-color: #22c55e;
            --danger-color: #ef4444;
            --warning-color: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .back-link {
            align-self: flex-start;
            color: var(--accent-color);
            text-decoration: none;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            transition: opacity 0.3s;
        }
        .back-link:hover { opacity: 0.7; }

        .container {
            width: 100%;
            max-width: 900px;
            background-color: var(--panel-color);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            border: 1px solid var(--border-color);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .title {
            color: var(--accent-color);
            font-size: 18px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .question-number {
            color: #94a3b8;
            font-size: 14px;
            font-weight: 600;
        }

        .score-display {
            color: var(--warning-color);
            font-size: 14px;
            font-weight: 700;
        }

        .stats-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .stat-box {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .stat-label {
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent-color);
            margin-bottom: 6px;
        }

        .progress-bar {
            background-color: #475569;
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }

        .progress-stabilite { background: linear-gradient(90deg, #22c55e, #4ade80); }
        .progress-güç { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
        .progress-butce { background: linear-gradient(90deg, #38bdf8, #7dd3fc); }

        .overall-progress {
            margin-bottom: 20px;
        }
        .overall-progress-label {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 4px;
            display: flex;
            justify-content: space-between;
        }
        .overall-progress-bar {
            background-color: #1e293b;
            height: 6px;
            border-radius: 3px;
            overflow: hidden;
        }
        .overall-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-color), #a78bfa);
            border-radius: 3px;
            transition: width 0.5s ease;
        }

        .question-box {
            text-align: center;
            font-size: 17px;
            font-weight: 600;
            margin: 30px 0;
            line-height: 1.7;
            padding: 0 10px;
        }

        .context-box {
            background: rgba(56, 189, 248, 0.05);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            font-size: 13px;
            color: #94a3b8;
            line-height: 1.5;
            text-align: center;
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: rgba(21, 31, 50, 0.5);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 16px 20px;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            font-size: 14px;
            line-height: 1.5;
            transition: all 0.2s ease;
        }

        .option-btn:hover {
            background-color: var(--hover-color);
            border-color: var(--accent-color);
            transform: translateX(5px);
        }

        .option-btn:active {
            transform: translateX(3px);
        }

        .option-btn.selected-correct {
            border-color: var(--success-color);
            background: rgba(34, 197, 94, 0.1);
        }
        .option-btn.selected-wrong {
            border-color: var(--danger-color);
            background: rgba(239, 68, 68, 0.1);
        }

        .log-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border-left: 4px solid var(--accent-color);
            border-radius: 0 8px 8px 0;
            font-size: 13px;
            color: #cbd5e1;
            line-height: 1.6;
            display: none;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .game-over {
            text-align: center;
            padding: 40px 20px;
        }

        .game-over h2 {
            font-size: 24px;
            margin-bottom: 15px;
            color: var(--accent-color);
        }

        .game-over p {
            color: #94a3b8;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .final-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin: 20px 0;
            text-align: left;
        }

        .final-stat {
            background: rgba(0,0,0,0.2);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
        }

        .final-stat-label {
            font-size: 11px;
            color: #64748b;
            margin-bottom: 4px;
        }

        .final-stat-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--text-color);
        }

        .restart-btn {
            background: linear-gradient(135deg, var(--accent-color), #a78bfa);
            color: #000;
            border: none;
            padding: 14px 30px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
            margin-top: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .restart-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(56, 189, 248, 0.3);
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .container { padding: 15px; }
            .stats-container { grid-template-columns: 1fr; }
            .header { flex-direction: column; align-items: flex-start; }
            .question-box { font-size: 15px; margin: 20px 0; }
            .option-btn { padding: 14px; font-size: 13px; }
            .final-stats { grid-template-columns: 1fr; }
        }

    padding: 4px 8px !important;

  }
}

    padding: 8px !important;
  }

.sim-hero h1, .hero h1, .page-hero h1 {

<script>
const questions = [
    {
        question: "Güvenlik Konseyi veto hakkı kaldırılsın mı?",
        context: "P5 ülkeleri (ABD, Rusya, Çin, İngiltere, Fransa) veto haklarını korumak istiyor. Küresel Güney ise eşit temsil talep ediyor.",
        options: [
            { text: "Evet, demokratik reform yapalım — her ülkeye eşit oy.", effects: { stabilite: 15, guc: -30, butce: -10, score: 20 }, log: "Reform kabul edildi! Küçük ülkeler seviniyor ama ABD ve Rusya fonları keseceğini açıkladı. BM bütçesinde %20 daralma bekleniyor." },
            { text: "Hayır, mevcut düzen ve denge korunsun.", effects: { stabilite: -10, guc: 20, butce: 10, score: 5 }, log: "Statüko korundu. Büyük güçler memnun ancak küresel güneyde BM'ye güven sarsılıyor. Afrika Birliği alternatif platform arayışına girdi." },
            { text: "Kısmi reform: Çifte veto sistemi gelsin (2 veto gerekli).", effects: { stabilite: 5, guc: -5, butce: 5, score: 15 }, log: "Orta yol bulundu. Sistem şimdilik stabil, ancak büyük krizleri çözmekte yetersiz kalabilir." }
        ]
    },
    {
        question: "X ülkesi komşusunu işgale başladı ve nükleer tehdit savuruyor. Ne yapacaksınız?",
        context: "Güvenlik Konseyi acil toplantıda. İşgalci ülke P5 üyesi ve veto kullanabilir. Sivil kayıplar artıyor.",
        options: [
            { text: "Askeri müdahale kararı çıkartın — 'Koruma Sorumluluğu' doktrini.", effects: { stabilite: -25, guc: 10, butce: -20, score: 10 }, log: "Savaş büyüdü! Küresel istikrar ciddi darbe aldı ama BM caydırıcılığını gösterdi. Nükleer gerilim tırmanıyor." },
            { text: "Sadece ekonomik ambargo ve diplomatik izolasyon uygulayın.", effects: { stabilite: -5, guc: -10, butce: 10, score: 15 }, log: "Savaş yavaşladı ancak ambargolar küresel ticareti vurdu. İşgalci ülke BM'den çekilme tehdidinde bulundu." },
            { text: "Genel Kurul'da 'Barış için Birleşme' kararı alın.", effects: { stabilite: 5, guc: -15, butce: 5, score: 12 }, log: "Genel Kurul kararı sembolik kaldı ama uluslararası kamuoyunu harekete geçirdi. İşgalci ülke masaya oturmayı kabul etti." }
        ]
    },
    {
        question: "İklim krizi için zengin ülkelerden zorunlu karbon vergisi alınması oylanıyor.",
        context: "Küçük ada devletleri yok olma tehlikesiyle karşı karşıya. G7 ülkeleri gönüllü taahhüt istiyor. BM İklim Fonu boş.",
        options: [
            { text: "Zorunlu karbon vergisi — uymayanı sistemden atın.", effects: { stabilite: 20, guc: -25, butce: -15, score: 30 }, log: "Dünya yeşilleniyor ama endüstri devleri BM'yi tanımadığını ilan etti! ABD ve Çin paralel iklim platformu kurdu." },
            { text: "Gönüllü hibe sistemi — teşvik mekanizması kurun.", effects: { stabilite: -15, guc: 15, butce: 20, score: 5 }, log: "Büyük devletlerin cüzdanı güvende ama iklim krizine bağlı iç savaşlar ve göç dalgaları kapıda." },
            { text: "Kademeli geçiş: 5 yıl gönüllü, sonra zorunlu.", effects: { stabilite: 10, guc: 5, butce: 5, score: 18 }, log: "Uzlaşmacı yaklaşım kabul gördü. Ancak bilim insanları 5 yılın çok geç olabileceği konusunda uyarıyor." }
        ]
    },
    {
        question: "Afrika ve Güney Amerika'dan Güvenlik Konseyi'ne daimi üyelik talebi geldi.",
        context: "Hindistan, Brezilya, Nijerya ve Güney Afrika daimi üyelik istiyor. G4 grubu reform paketi sundu.",

            { text: "Konseyi 10 daimi üyeye genişletin (veto hakkı olmadan).", effects: { stabilite: 10, guc: -20, butce: -5, score: 20 }, log: "Genişleme kabul edildi! Ancak yeni üyeler veto hakkı olmadan 'ikinci sınıf' muamelesi görmekten şikayetçi." },
            { text: "Mevcut yapıyı koruyun, dönemsel üyelik süresini uzatın.", effects: { stabilite: -10, guc: 15, butce: 5, score: 5 }, log: "Reform engellendi. Afrika Birliği BM'yi 'sömürgeci yapı' olarak nitelendirdi. Meşruiyet krizi derinleşiyor." },
            { text: "Bölgesel temsil sistemi: Her kıtadan 1 dönemsel daimi üye.", effects: { stabilite: 15, guc: -5, butce: 0, score: 22 }, log: "Yaratıcı çözüm! Bölgesel rotasyon sistemi pilot olarak başlatıldı. İlk sonuçlar umut verici." }

    },
    {
        question: "Uzay militarizasyonu konusunda uluslararası antlaşma teklifi sunuldu.",
        context: "ABD, Çin ve Rusya uzay silahları geliştiriyor. Uydu savaşı riski artıyor. 1967 Uzay Antlaşması yetersiz kalıyor.",
        options: [

let score = 0;
let stats = { stabilite: 50, guc: 50, butce: 50 };

const questionNumberEl = document.getElementById('question-number');
const scoreDisplayEl = document.getElementById('score-display');
const questionTextEl = document.getElementById('question-text');
const contextTextEl = document.getElementById('context-text');
const optionsBoxEl = document.getElementById('options-box');
const logBoxEl = document.getElementById('log-box');
const overallBar = document.getElementById('overall-bar');
const progressPct = document.getElementById('progress-pct');

const stabiliteBar = document.getElementById('stabilite-bar');
const gucBar = document.getElementById('guc-bar');
const butceBar = document.getElementById('butce-bar');
const stabiliteVal = document.getElementById('stabilite-val');
const gucVal = document.getElementById('guc-val');
const butceVal = document.getElementById('butce-val');

function updateBars() {
    for (let key in stats) {
        stats[key] = Math.max(0, Math.min(100, stats[key]));
    }
    stabiliteBar.style.width = stats.stabilite + '%';
    gucBar.style.width = stats.güç + '%';
    butceBar.style.width = stats.butce + '%';
    stabiliteVal.textContent = stats.stabilite;
    gucVal.textContent = stats.guc;
    butceVal.textContent = stats.butce;

    const pct = Math.round((currentIdx / questions.length) * 100);
    overallBar.style.width = pct + '%';
    progressPct.textContent = pct + '%';

    if (stats.stabilite <= 0 || stats.güç <= 0 || stats.butce <= 0) {
        endGame(false);
    }
}

function loadQuestion() {
    if (currentIdx >= questions.length) {
        endGame(true);
        return;
    }

    logBoxEl.style.display = 'none';
    const currentQ = questions[currentIdx];
    questionNumberEl.textContent = 'Soru: ' + (currentIdx + 1) + '/' + questions.length;
    questionTextEl.textContent = currentQ.question;
    contextTextEl.textContent = currentQ.context;
    optionsBoxEl.innerHTML = '';

    currentQ.options.forEach(function(opt) {
        const btn = document.createElement('button');
        btn.className = 'option-btn';
        btn.textContent = opt.text;
        btn.onclick = function() { handleChoice(opt, btn); };
        optionsBoxEl.appendChild(btn);
    });
}

function handleChoice(option, btnEl) {
    var allBtns = optionsBoxEl.querySelectorAll('.option-btn');
    allBtns.forEach(function(b) { b.style.pointerEvents = 'none'; b.style.opacity = '0.6'; });
    btnEl.style.opacity = '1';

    if (option.effects.score >= 18) {
        btnEl.classList.add('selected-correct');
    } else if (option.effects.score <= 5) {
        btnEl.classList.add('selected-wrong');
    }

    stats.stabilite += option.effects.stabilite;
    stats.güç += option.effects.guc;
    stats.butce += option.effects.butce;
    score += option.effects.score;

    scoreDisplayEl.textContent = 'Skor: ' + score;
    updateBars();

    logBoxEl.textContent = option.log;
    logBoxEl.style.display = 'block';

    setTimeout(function() {
        if (stats.stabilite > 0 && stats.güç > 0 && stats.butce > 0) {
            currentIdx++;
            loadQuestion();
        }
    }, 3500);
}

function endGame(isWin) {
    var gameBody = document.getElementById('game-body');
    logBoxEl.style.display = 'none';

    var maxScore = questions.length * 30;
    var percentage = Math.round((score / maxScore) * 100);

    var grade = '';
    var gradeColor = '';
    if (percentage >= 80) { grade = 'Efsanevi Diplomat'; gradeColor = '#fbbf24'; }
    else if (percentage >= 60) { grade = 'Başarılı Reformcu'; gradeColor = '#22c55e'; }
    else if (percentage >= 40) { grade = 'Temkinli Bürokrat'; gradeColor = '#38bdf8'; }
    else { grade = 'Başarısız Genel Sekreter'; gradeColor = '#ef4444'; }

    var message = '';
    if (isWin) {
        message = '<h2 style="color:' + gradeColor + '">Dönemi Tamamladınız!</h2>' +
                   '<p style="font-size:18px;color:' + gradeColor + ';font-weight:700;margin:10px 0;">' + grade + '</p>' +
                   '<p>BM\'yi ' + questions.length + ' kritik karardan geçirdiniz.</p>';
    } else {
        var failReason = '';
        if (stats.stabilite <= 0) failReason = 'Küresel istikrar çöktü!';
        else if (stats.güç <= 0) failReason = 'Süper güçler BM\'yi terk etti!';
        else failReason = 'BM iflas etti!';

        message = '<h2 style="color:#ef4444">İFLAS VE KAOS!</h2>' +
                   '<p style="color:#f87171;font-weight:600;">' + failReason + '</p>' +
                   '<p>Dengeleri koruyamadınız. BM meşruiyetini yitirdi.</p>';
    }

    gameBody.innerHTML = '<div class="game-over">' + message +
        '<div class="final-stats">' +
            '<div class="final-stat"><div class="final-stat-label">Toplam Skor</div><div class="final-stat-value" style="color:var(--warning-color)">' + score + ' / ' + maxScore + '</div></div>' +
            '<div class="final-stat"><div class="final-stat-label">Başarı Oranı</div><div class="final-stat-value">' + percentage + '%</div></div>' +
            '<div class="final-stat"><div class="final-stat-label">Küresel İstikrar</div><div class="final-stat-value" style="color:#4ade80">' + stats.stabilite + '/100</div></div>' +
            '<div class="final-stat"><div class="final-stat-label">Tamamlanan Sorular</div><div class="final-stat-value">' + currentIdx + '/' + questions.length + '</div></div>' +
        '</div>' +
        '<button class="restart-btn" onclick="window.location.reload()">Yeniden Başla</button>' +
        '<br><br><a href="oza-hub.html" style="color:var(--accent-color);font-size:13px;">← OZA\'ya Dön</a>' +
    '</div>';
}

// Start
updateBars();
loadQuestion();
</script>
<script src="hs-nav.js"></script>
</body>
</html>
