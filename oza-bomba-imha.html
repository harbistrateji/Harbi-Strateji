<style>
html{scroll-padding-top:80px}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0f17;color:#eaf0f7;font-family:'Segoe UI',system-ui,sans-serif;touch-action:manipulation;user-select:none}
#app{width:100%;height:100%;display:flex;flex-direction:column}

  .container, .main, .wrap, .content, .page-content {

<body>
<div style="position:fixed;top:12px;left:12px;z-index:9999;display:flex;gap:8px;"><a href="oza-hub.html" style="background:rgba(10,15,23,0.9);color:#00E0FF;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid #00E0FF33;backdrop-filter:blur(8px);">← OZA Hub</a><a href="index.html" style="background:rgba(10,15,23,0.9);color:#c41e3a;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid rgba(196,30,58,0.3);backdrop-filter:blur(8px);">🏠 Ana Sayfa</a></div>
<div id="app">
<div id="topBar">
<a href="oza-hub.html">← OZA</a>
<span class="title">💣 Bomba İmha</span>
<div class="stats"><span id="scoreDisp">0</span> puan</div>
</div>
<div id="gameArea">
<canvas id="gc"></canvas>
<div id="hud"><div class="badge" id="hudL"></div><div class="badge" id="hudR"></div></div>
<div id="controls"><button onclick="cutWire(0)">1</button><button onclick="cutWire(1)">2</button><button onclick="cutWire(2)">3</button><button onclick="cutWire(3)">4</button>
</div>
<div id="overlay">
<h2 id="ovTitle">BAŞLA</h2>
<p id="ovDesc">Dokunarak veya tıklayarak başla</p>
<button id="ovBtn" onclick="startGame()">▶ BAŞLA</button>
</div>
</div>
</div>
<script>
// Audio context
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type||'square';o.frequency.value=freq;g.gain.value=0.08;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);o.stop(audioCtx.currentTime+dur)}
// Canvas setup
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
let W,H,gameRunning=false,score=0,level=1;
function resize(){
  const area=document.getElementById('gameArea');
  W=canvas.width=area.clientWidth;
  H=canvas.height=area.clientHeight;
}
window.addEventListener('resize',resize);
resize();
function updateScore(v){score+=v;document.getElementById('scoreDisp').textContent=score}
function showOverlay(t,d,btn){
  document.getElementById('overlay').style.display='flex';
  document.getElementById('ovTitle').textContent=t;
  document.getElementById('ovDesc').textContent=d;
  document.getElementById('ovBtn').textContent=btn||'▶ TEKRAR';
}
function hideOverlay(){document.getElementById('overlay').style.display='none'}

let wires=[],correctWire=0,timeLeft=30,timer=null,bombLevel=1,defused=0;
const COLORS=['#ff3a4a','#00e0ff','#4ade80','#fbbf24','#a78bfa','#f472b6'];
function startGame(){initAudio();hideOverlay();gameRunning=true;score=0;bombLevel=1;defused=0;nextBomb()}
function nextBomb(){
  let numWires=Math.min(3+bombLevel,6);wires=[];
  for(let i=0;i<numWires;i++)wires.push({color:COLORS[i],cut:false});
  correctWire=Math.floor(Math.random()*numWires);
  timeLeft=Math.max(10,32-bombLevel*2);
  if(timer)clearInterval(timer);
  timer=setInterval(()=>{timeLeft--;document.getElementById('hudR').textContent='⏱️ '+timeLeft+'s';
    if(timeLeft<=5)playTone(600,.05,'square');
    if(timeLeft<=0){clearInterval(timer);gameRunning=false;playTone(100,.5,'sawtooth');showOverlay('💥 PATLADI!','Seviye: '+bombLevel+' | Skor: '+score,'▶ TEKRAR')}
    draw()},1000);
  document.getElementById('hudL').textContent='Bomba #'+bombLevel;
  draw()
}
function cutWire(idx){if(!gameRunning||idx>=wires.length||wires[idx].cut)return;
  wires[idx].cut=true;
  if(idx===correctWire){playTone(523,.2,'sine');defused++;updateScore(timeLeft*10+bombLevel*50);
    clearInterval(timer);bombLevel++;
    setTimeout(()=>{if(gameRunning)nextBomb()},800)}
  else{playTone(150,.3,'sawtooth');draw()}}
function draw(){
  ctx.fillStyle='#0a0f17';ctx.fillRect(0,0,W,H);
  // Bomb body
  let bx=W/2,by=H/2-20,br=Math.min(W,H)*0.18;
  ctx.beginPath();ctx.arc(bx,by,br,0,Math.PI*2);
  ctx.fillStyle=timeLeft<=5?'#ff3a4a':'#1a1a2e';ctx.fill();
  ctx.strokeStyle='#444';ctx.lineWidth=3;ctx.stroke();
  // Timer display on bomb
  ctx.fillStyle=timeLeft<=5?'#fff':'#00e0ff';ctx.font='bold '+br*0.5+'px monospace';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText(timeLeft,bx,by);
  // Wires
  let wireY=by+br+30;let wireSpacing=Math.min(50,W/(wires.length+1));
  let startX=W/2-(wires.length-1)*wireSpacing/2;
  wires.forEach((w,i)=>{
    let wx=startX+i*wireSpacing;
    ctx.beginPath();ctx.moveTo(bx,by+br);
    ctx.quadraticCurveTo(wx,wireY-20,wx,wireY+40);
    ctx.strokeStyle=w.cut?'#333':w.color;ctx.lineWidth=w.cut?1:4;ctx.stroke();
    // Wire label
    ctx.fillStyle=w.cut?'#555':w.color;ctx.font='bold 14px sans-serif';ctx.textAlign='center';
    ctx.fillText(i===correctWire&&w.cut?'✓':(i+1),wx,wireY+60);
    // Hint clue
    if(!w.cut&&i===correctWire&&timeLeft<=Math.max(5,15-bombLevel*2)){
      ctx.save();ctx.globalAlpha=0.3+Math.sin(Date.now()/200)*0.2;
      ctx.fillStyle=w.color;ctx.beginPath();ctx.arc(wx,wireY+40,8,0,Math.PI*2);ctx.fill();
      ctx.restore()}
  });
  // Seviye info
  ctx.fillStyle='#c9a24b';ctx.font='12px sans-serif';ctx.textAlign='center';
  ctx.fillText('İpucu: Yanıp sönen teli kes!',W/2,H-40);
}
canvas.addEventListener('click',e=>{if(!gameRunning)return;
  let r=canvas.getBoundingClientRect();let cx=e.clientX-r.left;let cy=e.clientY-r.top;
  let by=H/2-20+Math.min(W,H)*0.18+30;let wireSpacing=Math.min(50,W/(wires.length+1));
  let startX=W/2-(wires.length-1)*wireSpacing/2;
  wires.forEach((w,i)=>{let wx=startX+i*wireSpacing;if(Math.abs(cx-wx)<25&&cy>by&&cy<by+80)cutWire(i)})});
canvas.addEventListener('touchstart',e=>{if(!gameRunning)return;e.preventDefault();
  let r=canvas.getBoundingClientRect();let t=e.touches[0];let cx=t.clientX-r.left;let cy=t.clientY-r.top;
  let by=H/2-20+Math.min(W,H)*0.18+30;let wireSpacing=Math.min(50,W/(wires.length+1));
  let startX=W/2-(wires.length-1)*wireSpacing/2;
  wires.forEach((w,i)=>{let wx=startX+i*wireSpacing;if(Math.abs(cx-wx)<30&&cy>by-20&&cy<by+80)cutWire(i)})});
resize();draw();

</script>
