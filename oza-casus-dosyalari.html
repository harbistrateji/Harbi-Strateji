<style>
*{margin:0;padding:0;box-sizing:border-box;}:root{--bg:#0d0d0d;--card:#1a1a1a;--card2:#222;--red:#c41e3a;--red2:#ff2d55;--white:#f0f0f0;--gray:#888;--gray2:#555;--border:rgba(255,255,255,.1);}
html,body{height:100%;overflow:hidden;font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--white);}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#111;border-bottom:2px solid var(--red);position:fixed;top:0;left:0;right:0;z-index:100;}.tb-back{color:var(--red);text-decoration:none;font-size:.75rem;font-weight:700;font-family:'Chakra Petch',monospace;}.tb-title{font-family:'Chakra Petch',monospace;font-size:1rem;font-weight:900;}.tb-stats{display:flex;gap:12px;font-size:.7rem;font-family:'IBM Plex Mono',monospace;}.tb-stats span{color:var(--gray);}.tb-stats b{color:var(--red2);}
.main{display:grid;grid-template-columns:1fr 360px;height:calc(100vh - 50px);margin-top:50px;}
.left-panel{overflow-y:auto;padding:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;}.left-panel::-webkit-scrollbar{width:4px;}.left-panel::-webkit-scrollbar-thumb{background:var(--red);}
.right-panel{overflow-y:auto;padding:20px;background:#111;display:flex;flex-direction:column;gap:14px;border-left:1px solid var(--border);}.right-panel::-webkit-scrollbar{width:4px;}.right-panel::-webkit-scrollbar-thumb{background:var(--red);}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;}.info-card h3{font-family:'Chakra Petch',monospace;font-size:.75rem;color:var(--red);margin-bottom:8px;text-transform:uppercase;}.info-card p{font-size:.7rem;color:var(--gray);line-height:1.7;}
.doc-card{width:100%;max-width:500px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:28px;}
.doc-header{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--red);letter-spacing:2px;margin-bottom:12px;}
.doc-title{font-family:'Chakra Petch',monospace;font-size:1.2rem;font-weight:900;margin-bottom:12px;}
.doc-body{font-size:.75rem;color:var(--gray);line-height:1.8;margin-bottom:16px;padding:12px;background:var(--card2);border-radius:6px;border-left:3px solid var(--red);font-family:'IBM Plex Mono',monospace;}
.doc-q{font-size:.85rem;font-weight:700;margin-bottom:12px;}
.suspect-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.suspect{padding:12px;background:var(--card2);border:1px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;text-align:center;}.suspect:hover{border-color:var(--red);}.suspect .s-name{font-size:.75rem;font-weight:700;margin-bottom:2px;}.suspect .s-role{font-size:.6rem;color:var(--gray);}.suspect.correct{border-color:#4ade80;background:rgba(74,222,128,.1);}.suspect.wrong{border-color:var(--red2);background:rgba(255,45,85,.1);}
.intro-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;}.intro-overlay.hidden{display:none;}.intro-overlay h1{font-family:'Chakra Petch',monospace;font-size:2rem;font-weight:900;}.intro-overlay .sub{font-size:.85rem;color:var(--red);margin:8px 0 20px;}.intro-overlay p{font-size:.8rem;color:var(--gray);max-width:500px;line-height:1.8;margin-bottom:24px;}.intro-overlay button{background:var(--red);color:var(--white);border:none;border-radius:6px;padding:14px 40px;font-family:'Chakra Petch',monospace;font-size:1rem;font-weight:700;cursor:pointer;}
.log-item{font-size:.6rem;color:var(--gray);padding:4px 0;border-bottom:1px solid var(--border);}.log-item b{color:var(--red2);}
@media(max-width:900px){.main{grid-template-columns:1fr;}.right-panel{border-top:2px solid var(--red);border-left:none;max-height:50vh;}}

/* ═══ TEK EKRAN — NO SCROLL ═══ */
html, body {
  height: 100vh !important;
  max-height: 100vh !important;
  overflow: hidden !important;
}
body > .wrap, body > .container, body > .main, body > .game-container, body > .game-wrap {
  max-height: calc(100vh - 54px) !important;

  }

/* ═══ TEK EKRAN VIEWPORT FIT ═══ */
html, body { 
  height: 100vh !important; 
  max-height: 100vh !important; 
  overflow: hidden !important;
  margin: 0 !important;
  padding: 0 !important;
}
.game-container, .container, .main, #app, #game, .game-wrapper, .game-area {
  height: 100vh !important;

    padding: 8px 16px !important;

    min-height: 40px !important;
    touch-action: manipulation !important;
  }

    padding: 10px !important;

  }

  }

  .game-container, .container, .main {
    padding: 8px !important;
  }
  h1, .game-title { font-size: 18px !important; }
}


/* ═══ MOBİL UYUMLU RESPONSIVE ═══ */
@media (max-width: 768px) {
  body { font-size: 14px !important; }
  .container, .main, .wrap, .content, .page-content {
    padding: 12px !important;
    max-width: 100% !important;
  }

  .container, .main, .wrap { padding: 8px !important; }

body { overflow-x: hidden !important; max-width: 100vw !important; }

<div class="intro-overlay" id="intro"><h1>Casus Dosyalari</h1><div class="sub">Among Us + Tarih | Belge Analizi</div><p>Gizli belgeler, sifrelenmis mesajlar, cift ajanlar. Tarihsel casusluk dosyalarini incele, hainleri bul.</p><button onclick="startGame()">Dosyayi Ac</button></div>
<div class="top-bar" id="topBar" style="display:none;padding-left:150px;"><a href="oza-harbi-strateji-evren.html" class="tb-back">&#8592; OZA</a><div class="tb-title">Casus Dosyalari</div><div class="tb-stats"><span>Dosya: <b id="caseV">1</b>/8</span><span>Puan: <b id="scoreV">0</b></span></div></div>
<div class="main" id="mainArea" style="display:none;"><div class="left-panel" id="leftP"></div><div class="right-panel" id="rightP"><div class="info-card"><h3>Ipuclari</h3><p id="hintTxt">Belgeyi dikkatlice oku.</p></div><div class="info-card"><h3>Gecmis</h3><div id="logList"></div></div></div></div>
<script>
var CASES=[
{title:'Cicero Dosyası',header:'GİZLİ // 1943 // ANKARA',body:'İngiliz Büyükelçisinin uşağından alınan belgeler. Kod adı: Cicero. 35 film rulosu.',q:'Casus kim?',suspects:[{name:'Elyesa Bazna',role:'Uşak',correct:true},{name:'Kim Philby',role:'MI6'},{name:'Allen Dulles',role:'OSS'},{name:'Canaris',role:'Abwehr'}],fact:'Elyesa Bazna İngiliz Büyükelçisinin kasasından belgeleri fotoğrafladı. Sahte parayla ödendi.'},
{title:'Cambridge Besli',header:'GIZLI // 1951 // LONDRA',body:'MI6 icinde Sovyet molesi. 30 yildir bilgi sizdiriyor.',q:'Besli\'nin lideri?',suspects:[{name:'Kim Philby',role:'MI6',correct:true},{name:'Guy Burgess',role:'Diplomat'},{name:'Anthony Blunt',role:'Sanat'},{name:'Maclean',role:'Disisleri'}],fact:'Kim Philby 30 yil MI6\'da calisirken Sovyetlere bilgi sizdirdi.'},
{title:'Enigma Kirici',header:'GIZLI // 1941 // BLETCHLEY',body:'Alman Enigma makinesi kirildi. Almanlar bilmemeli.',q:'Projenin lideri?',suspects:[{name:'Alan Turing',role:'Matematikci',correct:true},{name:'Ian Fleming',role:'Deniz'},{name:'Menzies',role:'MI6'},{name:'Churchill',role:'Basbakan'}],fact:'Alan Turing Enigma\'yi kirdi. Ultra istihbarati savasi 2 yil kisaltti.'},
{title:'U-2 Krizi',header:'GIZLI // 1960 // MOSKOVA',body:'Amerikan U-2 casus ucagi dusuruld. Pilot Gary Powers hayatta.',q:'Ucagin gorevi?',suspects:[{name:'Nukleer tesis fotografi',role:'Kesfif',correct:true},{name:'Suikast',role:'Operasyon'},{name:'Ajan birakma',role:'Infiltrasyon'},{name:'Sinyal dinleme',role:'SIGINT'}],fact:'U-2 ucaklari 21km yukseklikten Sovyet nukleer tesislerini fotografliyordu.'},
{title:'Mossad Eichmann',header:'GIZLI // 1960 // BUENOS AIRES',body:'Nazi savas suclusi Arjantin\'de saklanyor. Mossad operasyonu.',q:'Operasyonun adi?',suspects:[{name:'Garibaldi Op.',role:'Kacirma',correct:true},{name:'Entebbe',role:'Kurtarma'},{name:'Wrath of God',role:'Suikast'},{name:'Bayonet',role:'Infiltrasyon'}],fact:'Mossad Eichmann\'i Buenos Aires\'te yakaladi ve Israil\'e kacirdi.'},
{title:'Venona Projesi',header:'GIZLI // 1943 // NSA',body:'Sovyet sifreleri kirildi. Atom casuslarinin kimligi ortaya cikiyor.',q:'Atom sirrini kim sizdirdi?',suspects:[{name:'Julius Rosenberg',role:'Muhendis',correct:true},{name:'Oppenheimer',role:'Fizikci'},{name:'Fuchs',role:'Bilim'},{name:'Hiss',role:'Diplomat'}],fact:'Rosenberg cifti atom bombasi sirlarini Sovyetlere sizdirdi.'},
{title:'Stuxnet',header:'GIZLI // 2010 // NATANZ',body:'İran nukleer tesisine siber saldiri. 1000 santrifuj imha edildi.',q:'Kim gelistirdi?',suspects:[{name:'ABD + Israel',role:'NSA+8200',correct:true},{name:'Rusya',role:'FSB'},{name:'Cin',role:'PLA'},{name:'Anonymous',role:'Hacker'}],fact:'Olympic Games: NSA ve Israel Unit 8200 birlikte gelistirdi. İlk siber silah.'},
{title:'Salisbury',header:'GIZLI // 2018 // İNGİLTERE',body:'Eski Rus ajani Skripal Novichok ile zehirlendi.',q:'Saldirganlar hangi birim?',suspects:[{name:'GRU Unit 29155',role:'Askerî Ist.',correct:true},{name:'FSB',role:'Ic Güvenlik'},{name:'SVR',role:'Dis Ist.'},{name:'Wagner',role:'Paralel'}],fact:'GRU Unit 29155 sahte pasaportla girdi. Novichok kapi koluna suruldu.'}
];
var G={cur:0,puan:0,logs:[]};
function startGame(){document.getElementById('intro').classList.add('hidden');document.getElementById('topBar').style.display='flex';document.getElementById('mainArea').style.display='grid';showCase();}
function showCase(){if(G.cur>=CASES.length){endGame();return;}var c=CASES[G.cur];document.getElementById('leftP').innerHTML='<div class="doc-card"><div class="doc-header">'+c.header+'</div><div class="doc-title">'+c.title+'</div><div class="doc-body">'+c.body+'</div><div class="doc-q">'+c.q+'</div><div class="suspect-grid">'+c.suspects.map(function(s,i){return '<div class="suspect" onclick="guess('+i+')"><div class="s-name">'+s.name+'</div><div class="s-role">'+s.role+'</div></div>';}).join('')+'</div></div>';document.getElementById('caseV').textContent=(G.cur+1)+'/'+CASES.length;}
function guess(i){var c=CASES[G.cur];var ok=c.suspects[i].correct;document.querySelectorAll('.suspect').forEach(function(el,j){el.style.pointerEvents='none';if(c.suspects[j].correct)el.classList.add('correct');else if(j===i)el.classList.add('wrong');});if(ok)G.score+=10;G.logs.unshift({t:c.title,ok:ok});document.getElementById('hintTxt').textContent=c.fact;document.getElementById('scoreV').textContent=G.score;document.getElementById('logList').innerHTML=G.logs.map(function(l){return '<div class="log-item"><b>'+(l.ok?'+10':'X')+'</b> '+l.t+'</div>';}).join('');G.cur++;setTimeout(showCase,2500);}
function endGame(){document.getElementById('leftP').innerHTML='<div style="text-align:center;"><h2 style="font-family:Chakra Petch,monospace;color:var(--red);font-size:1.5rem;">DOSYALAR KAPANDI</h2><div style="font-size:2rem;font-weight:900;margin:12px 0;">'+G.score+'/'+CASES.length*10+'</div><button onclick="location.reload()" style="background:var(--red);color:var(--white);border:none;border-radius:6px;padding:12px 30px;font-weight:700;cursor:pointer;">Tekrar</button></div>';}
</script>
<script>
// HS Sound Effects Engine
(function(){
  var ctx;
  function getCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;}
  window.hsSound={
    click:function(){var c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=800;g.gain.value=0.1;o.start();g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);o.stop(c.currentTime+0.1);},
    success:function(){var c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=523;g.gain.value=0.15;o.start();o.frequency.exponentialRampToValueAtTime(1047,c.currentTime+0.15);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.stop(c.currentTime+0.3);},
    error:function(){var c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.value=200;g.gain.value=0.12;o.start();o.frequency.exponentialRampToValueAtTime(100,c.currentTime+0.2);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.stop(c.currentTime+0.3);},
    explosion:function(){var c=getCtx(),b=c.createBuffer(1,c.sampleRate*0.5,c.sampleRate),d=b.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);var s=c.createBufferSource(),g=c.createGain();s.buffer=b;s.connect(g);g.connect(c.destination);g.gain.value=0.2;s.start();},
    alarm:function(){var c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.value=440;g.gain.value=0.08;o.start();var t=c.currentTime;for(var i=0;i<6;i++){o.frequency.setValueAtTime(440,t+i*0.1);o.frequency.setValueAtTime(880,t+i*0.1+0.05);}g.gain.exponentialRampToValueAtTime(0.001,t+0.6);o.stop(t+0.6);},
    victory:function(){var c=getCtx();[523,659,784,1047].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=0.12;o.start(c.currentTime+i*0.15);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.15+0.3);o.stop(c.currentTime+i*0.15+0.3);});}
  };
  // Auto-attach to common game events
  document.addEventListener('click',function(e){
    var t=e.target;
    if(t.tagName==='BUTTON'||t.classList.contains('ch-opt')||t.classList.contains('option')||t.classList.contains('choice'))hsSound.click();
  });
})();
</script>
