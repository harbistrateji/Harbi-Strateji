<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#0d0d0d;--card:#1a1a1a;--card2:#222;--red:#c41e3a;--red2:#ff2d55;--white:#f0f0f0;--gray:#888;--gray2:#555;--border:rgba(255,255,255,.1);}
html,body{height:100%;overflow:hidden;font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--white);}
.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#111;border-bottom:2px solid var(--red);position:fixed;top:0;left:0;right:0;z-index:100;}
.tb-back{color:var(--red);text-decoration:none;font-size:.75rem;font-weight:700;font-family:'Chakra Petch',monospace;}
.tb-title{font-family:'Chakra Petch',monospace;font-size:1rem;font-weight:900;color:var(--white);text-transform:uppercase;}
.tb-stats{display:flex;gap:12px;font-size:.7rem;font-family:'IBM Plex Mono',monospace;}.tb-stats span{color:var(--gray);}.tb-stats b{color:var(--red2);}
.main{display:grid;grid-template-columns:1fr 360px;height:calc(100vh - 50px);margin-top:50px;}
.left-panel{overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}
.left-panel::-webkit-scrollbar{width:4px;}.left-panel::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px;}
.right-panel{overflow-y:auto;padding:20px;background:#111;display:flex;flex-direction:column;gap:14px;border-left:1px solid var(--border);}
.right-panel::-webkit-scrollbar{width:4px;}.right-panel::-webkit-scrollbar-thumb{background:var(--red);border-radius:2px;}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;}
.info-card h3{font-family:'Chakra Petch',monospace;font-size:.75rem;font-weight:700;color:var(--red);margin-bottom:8px;text-transform:uppercase;}
.leader-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;transition:background .2s;border-radius:4px;}
.leader-row:hover{background:rgba(196,30,58,.05);}
.leader-row:last-child{border:none;}
.leader-flag{font-size:1.2rem;}
.leader-info{flex:1;}.leader-name{font-size:.7rem;font-weight:700;color:var(--white);}.leader-rel{font-size:.6rem;color:var(--gray);}
.rel-bar{width:60px;height:6px;background:var(--card2);border-radius:3px;overflow:hidden;}.rel-fill{height:100%;border-radius:3px;}
.action-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px;}
.act-btn{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center;cursor:pointer;transition:all .2s;font-size:.7rem;color:var(--white);}
.act-btn:hover{border-color:var(--red);background:rgba(196,30,58,.08);}
.act-btn .lbl{font-size:.6rem;color:var(--gray);margin-top:2px;}
.stat-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid var(--border);font-size:.65rem;}.stat-row:last-child{border:none;}.stat-row .k{color:var(--gray);}.stat-row .v{color:var(--white);font-weight:700;font-family:'IBM Plex Mono',monospace;}
.log-item{font-size:.6rem;color:var(--gray);padding:4px 0;border-bottom:1px solid var(--border);}.log-item:last-child{border:none;}.log-item b{color:var(--red2);}
.intro-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;}
.intro-overlay.hidden{display:none;}
.intro-overlay h1{font-family:'Chakra Petch',monospace;font-size:2rem;font-weight:900;color:var(--white);text-transform:uppercase;}
.intro-overlay .sub{font-size:.85rem;color:var(--red);font-family:'IBM Plex Mono',monospace;margin:8px 0 20px;}
.intro-overlay p{font-size:.8rem;color:var(--gray);max-width:500px;line-height:1.8;margin-bottom:24px;}
.intro-overlay button{background:var(--red);color:var(--white);border:none;border-radius:6px;padding:14px 40px;font-family:'Chakra Petch',monospace;font-size:1rem;font-weight:700;cursor:pointer;text-transform:uppercase;}
@media(max-width:900px){.main{grid-template-columns:1fr;}.left-panel{min-height:60vh;}.right-panel{border-top:2px solid var(--red);border-left:none;max-height:50vh;}}

<div class="intro-overlay" id="intro">
<h1>Diplomasi Masasi</h1>
<div class="sub">8 Devlet | Ticaret | İttifak | Casusluk | Savas</div>
<p>Osmanlı diplomasisini yonet. 8 devletle iliski kur, ticaret yap, ittifak olustur veya savas ilan et.</p>
<button onclick="startGame()">Masaya Otur</button>
</div>
<div class="top-bar" id="topBar" style="display:none;padding-left:150px;">
<a href="oza-harbi-strateji-evren.html" class="tb-back">&#8592; OZA</a>
<div class="tb-title">Diplomasi Masasi</div>
<div class="tb-stats"><span>Tur: <b id="turnV">1</b></span><span>Hazine: <b id="goldV">1000</b></span><span>Prestij: <b id="prestV">50</b></span></div>
</div>
<div class="main" id="mainArea" style="display:none;">
<div class="left-panel" id="leftP"></div>
<div class="right-panel" id="rightP">
<div class="info-card"><h3>Istatistikler</h3><div id="myStats"></div></div>
<div class="info-card"><h3>Iliskiler</h3><div id="relList"></div></div>
<div class="info-card"><h3>Gunluk</h3><div id="logList"></div></div>
</div>
</div>
<script>
var N=[{flag:'FR',name:'Fransa',rel:40,p:'Agresif'},{flag:'GB',name:'İngiltere',rel:35,p:'Ticari'},{flag:'RU',name:'Rusya',rel:20,p:'Yayilmaci'},{flag:'AT',name:'Avusturya',rel:30,p:'Savunmaci'},{flag:'IR',name:'İran',rel:25,p:'Rekabetci'},{flag:'EG',name:'Mısır',rel:45,p:'Ticari'},{flag:'VE',name:'Venedik',rel:50,p:'Ticari'},{flag:'ES',name:'İspanya',rel:30,p:'Agresif'}];
var EV=[{t:'Ticaret Krizi',d:'Korsanlar Akdeniz yollarini tehdit ediyor.',e:'g-200'},{t:'Veba Salgini',d:'Avrupa\'da veba. Ticaret duruyor.',e:'r-10'},{t:'Altin Akisi',d:'Yeni Dunya\'dan altin geliyor.',e:'g+300'},{t:'Mezhep Catismasi',d:'Avrupa\'da din savasi.',e:'p+10'},{t:'Elci Suikasti',d:'Gerilim artiyor.',e:'x-20'},{t:'Deniz Zaferi',d:'Donanma korsan filosunu yok etti.',e:'p+15'}];
var G={turn:1,gold:1000,prestij:50,army:70,navy:60,logs:[],sel:null};
function startGame(){document.getElementById('intro').classList.add('hidden');document.getElementById('topBar').style.display='flex';document.getElementById('mainArea').style.display='grid';render();}
function render(){
var h='<div class="info-card"><h3>Devletler - Tur '+G.turn+'</h3>';
N.forEach(function(n,i){var c=n.rel>60?'#4ade80':n.rel>30?'#fbbf24':'var(--red2)';h+='<div class="leader-row" onclick="sel('+i+')" style="'+(G.sel===i?'background:rgba(196,30,58,.1);':'')+'"><div class="leader-flag">'+n.flag+'</div><div class="leader-info"><div class="leader-name">'+n.name+'</div><div class="leader-rel">'+n.p+' | '+n.rel+'%</div></div><div class="rel-bar"><div class="rel-fill" style="width:'+n.rel+'%;background:'+c+';"></div></div></div>';});
h+='</div>';
if(G.sel!==null){h+='<div class="info-card"><h3>'+N[G.sel].name+' - Eylemler</h3><div class="action-grid"><div class="act-btn" onclick="act(\'trade\')">Ticaret<div class="lbl">+Gold +Iliski</div></div><div class="act-btn" onclick="act(\'ally\')">İttifak<div class="lbl">+Prestij</div></div><div class="act-btn" onclick="act(\'spy\')">Casusluk<div class="lbl">Bilgi / Risk</div></div><div class="act-btn" onclick="act(\'war\')">Savas<div class="lbl">Yuksek Risk</div></div><div class="act-btn" onclick="act(\'embargo\')">Ambargo<div class="lbl">-Iliski</div></div><div class="act-btn" onclick="act(\'gift\')">Hediye<div class="lbl">-Gold +Iliski</div></div></div></div>';}
document.getElementById('leftP').innerHTML=h;upRight();
}
function sel(i){G.sel=i;render();}
function act(t){
if(G.sel===null)return;var n=N[G.sel];var m='';
if(t==='trade'){n.rel=Math.min(100,n.rel+8);G.gold+=150;m=n.name+' ile ticaret. +150 altin.';}
else if(t==='ally'){if(n.rel<40){m='Iliski yetersiz (min 40).';}else{n.rel=Math.min(100,n.rel+15);G.prestij+=10;m=n.name+' ile ittifak. +10 prestij.';}}
else if(t==='spy'){if(Math.random()>0.4){m=n.name+' istihbarat toplandi.';}else{n.rel=Math.max(0,n.rel-15);m='Casus yakalandi! -15 iliski.';}}
else if(t==='war'){n.rel=Math.max(0,n.rel-30);if(G.army>Math.random()*100){G.gold+=300;G.prestij+=20;m='Savas kazanildi! +300 altin.';}else{G.gold-=200;G.prestij-=10;m='Savas kaybedildi. -200 altin.';}}
else if(t==='embargo'){n.rel=Math.max(0,n.rel-12);m=n.name+'ya ambargo. -12 iliski.';}
else if(t==='gift'){G.gold-=100;n.rel=Math.min(100,n.rel+12);m=n.name+'ya hediye. +12 iliski.';}
G.logs.unshift({turn:G.turn,text:m});G.turn++;
if(G.turn%3===0){var e=EV[Math.floor(Math.random()*EV.length)];G.logs.unshift({turn:G.turn,text:'OLAY: '+e.t});if(e.e[0]==='g')G.gold+=parseInt(e.e.slice(1));if(e.e[0]==='p')G.prestij+=parseInt(e.e.slice(1));if(e.e[0]==='r')N.forEach(function(x){x.rel=Math.max(0,x.rel+parseInt(e.e.slice(1)));});}
upTop();render();
}
function upRight(){
document.getElementById('myStats').innerHTML='<div class="stat-row"><span class="k">Hazine</span><span class="v">'+G.gold+'</span></div><div class="stat-row"><span class="k">Prestij</span><span class="v">'+G.prestij+'</span></div><div class="stat-row"><span class="k">Ordu</span><span class="v">'+G.army+'</span></div><div class="stat-row"><span class="k">Donanma</span><span class="v">'+G.navy+'</span></div>';
document.getElementById('relList').innerHTML=N.map(function(n){var c=n.rel>60?'#4ade80':n.rel>30?'#fbbf24':'var(--red2)';return '<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:.65rem;border-bottom:1px solid var(--border);"><span>'+n.name+'</span><span style="color:'+c+';font-weight:700;">'+n.rel+'%</span></div>';}).join('');
document.getElementById('logList').innerHTML=G.logs.slice(0,10).map(function(l){return '<div class="log-item"><b>T'+l.turn+':</b> '+l.text+'</div>';}).join('');
}
function upTop(){document.getElementById('turnV').textContent=G.turn;document.getElementById('goldV').textContent=G.gold;document.getElementById('prestV').textContent=G.prestij;}
</script>

<script>
// HS Sound Effects Engine
(function(){
  var ctx;
  function getCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;}
  window.hsSound={
    click:function(){var c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=800;g.gain.value=0.1;o.start();g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);o.stop(c.currentTime+0.1);},
    success:function(){var c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=523;g.gain.value=0.15;o.start();o.frequency.exponentialRampToValueAtTime(1047,c.currentTime+0.15);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.stop(c.currentTime+0.3);},
    error:function(){var c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.value=200;g.gain.value=0.12;o.start();o.frequency.exponentialRampToValueAtTime(100,c.currentTime+0.2);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.stop(c.currentTime+0.3);},
    explosion:function(){var c=getCtx(),b=c.createBuffer(1,c.sampleRate*0.5,c.sampleRate),d=b.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);var s=c.createBufferSource(),g=c.createGain();s.buffer=b;s.connect(g);g.connect(c.destination);g.gain.value=0.2;s.start();},
    alarm:function(){var c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.value=440;g.gain.value=0.08;o.start();var t=c.currentTime;for(var i=0;i<6;i++){o.frequency.setValueAtTime(440,t+i*0.1);o.frequency.setValueAtTime(880,t+i*0.1+0.05);}g.gain.exponentialRampToValueAtTime(0.001,t+0.6);o.stop(t+0.6);},
    victory:function(){var c=getCtx();[523,659,784,1047].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=0.12;o.start(c.currentTime+i*0.15);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.15+0.3);o.stop(c.currentTime+i*0.15+0.3);});}
  };
  // Auto-attach to common game events
  document.addEventListener('click',function(e){
    var t=e.target;
    if(t.tagName==='BUTTON'||t.classList.contains('ch-opt')||t.classList.contains('option')||t.classList.contains('choice'))hsSound.click();
  });
})();
</script>
