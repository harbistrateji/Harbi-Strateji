<!DOCTYPE html>
<html lang="tr" data-theme="hud">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">

<title>Harbi Quiz — OZA · Harb-i Strateji</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&subset=latin-ext&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0d;--panel:#0f1722;--panel2:#16202d;--red:#E01515;--red2:#ff3a4a;--cyan:#c41e3a;--gold:#C9A24B;--line:rgba(150,170,200,.13);--line2:rgba(150,170,200,.22);--tx:#EAF0F7;--dim:#90a1b5}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'IBM Plex Sans',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
.top{position:sticky;top:0;z-index:60;background:rgba(10,15,23,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:0 20px}
.top .in{max-width:700px;margin:0 auto;display:flex;align-items:center;gap:14px;min-height:52px}
.back{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);text-decoration:none}.back:hover{color:#fff}
.title{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:16px}
.hdr-score{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gold)}
.wrap{max-width:700px;margin:0 auto;padding:24px 20px 80px}

/* ── Başlık ── */
.game-header{text-align:center;margin-bottom:24px}
.game-header h1{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:clamp(28px,6vw,52px);color:#fff;line-height:1}
.game-header .sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);margin-top:8px;letter-spacing:.04em}

/* ── Kategori seçici ── */
.cat-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:24px}
.cat-btn{background:var(--panel);border:2px solid var(--line2);border-radius:12px;padding:16px 12px;cursor:pointer;text-align:center;transition:.15s;font-family:'IBM Plex Sans',sans-serif;color:var(--tx)}
.cat-btn:hover{border-color:var(--red2);transform:translateY(-2px)}
.cat-btn.selected{border-color:var(--red2);background:rgba(224,21,21,.1)}
.cat-icon{font-size:28px;margin-bottom:8px}
.cat-name{font-family:'Chakra Petch',sans-serif;font-size:13px;font-weight:600;color:#fff}
.cat-count{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);margin-top:3px}

/* ── Quiz alanı ── */
.quiz-area{display:none}
.quiz-area.show{display:block}

/* İlerleme ── */
.progress-wrap{margin-bottom:20px}
.progress-info{display:flex;justify-content:space-between;font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);margin-bottom:6px}
.progress-bar{height:6px;background:var(--line2);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--cyan));border-radius:3px;transition:width .4s}

/* Geri sayım ── */
.timer-row{display:flex;align-items:center;gap:12px;margin-bottom:16px}
.timer-bar{flex:1;height:8px;background:var(--line2);border-radius:4px;overflow:hidden}
.timer-fill{height:100%;background:var(--red2);border-radius:4px;transition:width .9s linear}
.timer-num{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:20px;color:var(--red2);min-width:28px;text-align:right}

/* Soru ── */
.question-card{background:var(--panel);border:1px solid var(--line2);border-radius:16px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.question-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--cyan))}
.q-cat{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--red2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.q-diff{display:inline-block;font-family:'IBM Plex Mono',monospace;font-size:9px;padding:2px 8px;border-radius:999px;border:1px solid;margin-left:8px}
.q-diff.easy{color:#00ff88;border-color:rgba(0,255,136,.4)}
.q-diff.medium{color:var(--gold);border-color:rgba(201,162,75,.4)}
.q-diff.hard{color:var(--red2);border-color:rgba(224,21,21,.4)}
.q-text{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:18px;color:#fff;line-height:1.4}

/* Seçenekler ── */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
@media(max-width:480px){.choices{grid-template-columns:1fr}}
.choice{background:var(--panel);border:2px solid var(--line2);border-radius:12px;padding:14px;cursor:pointer;text-align:left;transition:.15s;font-family:'IBM Plex Sans',sans-serif;color:var(--tx)}
.choice:hover:not(.locked){border-color:var(--red);transform:translateY(-1px)}
.choice.correct{border-color:#00ff88;background:rgba(0,255,136,.1)}
.choice.wrong{border-color:var(--red2);background:rgba(224,21,21,.1)}
.choice.locked{cursor:default}
.choice-letter{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:14px;color:var(--red2);margin-bottom:4px}
.choice-text{font-size:13px;line-height:1.5}

/* Açıklama ── */
.explain-panel{background:var(--panel);border:1px solid var(--line2);border-radius:12px;padding:16px;margin-bottom:20px;display:none}
.explain-panel.show{display:block}
.ep-result{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:18px;margin-bottom:8px}
.ep-pts{font-family:'IBM Plex Mono',monospace;font-size:28px;font-weight:700;margin-bottom:10px}
.ep-text{font-size:13px;color:var(--dim);line-height:1.6;margin-bottom:14px}
.ep-source{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--gold)}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:13px;padding:12px 20px;border-radius:9px;border:none;cursor:pointer}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:var(--red2)}
.btn-outline{background:transparent;color:var(--cyan);border:1px solid var(--cyan)}
.btn-gold{background:transparent;color:var(--gold);border:1px solid var(--gold)}

/* ── Sonuç ekranı ── */
.result-screen{display:none;text-align:center;padding:30px 20px}
.result-screen.show{display:block}
.rs-icon{font-size:64px;margin-bottom:16px}
.rs-title{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:32px;margin-bottom:10px}
.rs-score{font-family:'IBM Plex Mono',monospace;font-size:52px;font-weight:700;color:var(--red2);margin:12px 0}
.rs-stats{display:flex;gap:0;justify-content:center;border:1px solid var(--line2);border-radius:10px;overflow:hidden;margin:16px 0}
.rs-stat{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--line2)}
.rs-stat:last-child{border-right:none}
.rs-stat-val{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:22px;color:var(--cyan)}
.rs-stat-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);text-transform:uppercase;margin-top:3px}

/* ── Paylaşım kartı ── */
.share-card-wrap{background:linear-gradient(135deg,#0f1722,#16202d);border:2px solid var(--gold);border-radius:16px;padding:24px;margin:16px 0;position:relative;overflow:hidden}
.share-card-wrap::before{content:'HARB-İ STRATEJİ';position:absolute;top:10px;right:14px;font-family:'IBM Plex Mono',monospace;font-size:8px;color:rgba(201,162,75,.5);letter-spacing:.1em}
.sc-game{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--red2);text-transform:uppercase;letter-spacing:.1em;margin-bottom:6px}
.sc-score-big{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:52px;color:#fff;line-height:1}
.sc-sub{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);margin-top:6px}
.sc-badges{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.sc-badge{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:4px 10px;border-radius:999px;border:1px solid rgba(201,162,75,.4);color:var(--gold)}

/* ═══ TEK EKRAN — NO SCROLL ═══ */
html, body {
  height: 100vh !important;
  max-height: 100vh !important;
  overflow: hidden !important;
}
body > .wrap, body > .container, body > .main, body > .game-container, body > .game-wrap {
  max-height: calc(100vh - 54px) !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
}
@media (max-width: 480px) {
  body > .wrap, body > .container, body > .main { 
    max-height: calc(100vh - 44px) !important;
    padding: 8px !important;
  }
}


/* ═══ TEK EKRAN VIEWPORT FIT ═══ */
html, body { 
  height: 100vh !important; 
  max-height: 100vh !important; 
  overflow: hidden !important;
  margin: 0 !important;
  padding: 0 !important;
}
.game-container, .container, .main, #app, #game, .game-wrapper, .game-area {
  height: 100vh !important;
  max-height: 100vh !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  display: flex !important;
  flex-direction: column !important;
}
/* Mobil uyum */
@media (max-width: 768px) {
  body { font-size: 13px !important; }
  h1, .game-title { font-size: clamp(16px, 4vw, 24px) !important; }
  h2 { font-size: clamp(14px, 3.5vw, 20px) !important; }
  .btn, button { 
    padding: 8px 16px !important; 
    font-size: 12px !important;
    min-height: 40px !important;
    touch-action: manipulation !important;
  }
  .card, .option, .choice { 
    padding: 10px !important; 
    margin: 4px !important;
  }
}
@media (max-width: 480px) {
  body { font-size: 12px !important; }
  .nav, .navbar, .top-bar, .header { 
    padding: 4px 8px !important;
    font-size: 11px !important;
  }
}
@media (max-height: 700px) {
  .game-container, .container, .main {
    padding: 8px !important;
  }
  h1, .game-title { font-size: 18px !important; }
}


/* ═══ MOBİL UYUMLU RESPONSIVE ═══ */
@media (max-width: 768px) {
  body { font-size: 14px !important; }
  .container, .main, .wrap, .content, .page-content {
    padding: 12px !important;
    max-width: 100% !important;
  }
  h1 { font-size: clamp(18px, 5vw, 28px) !important; }
  h2 { font-size: clamp(15px, 4vw, 22px) !important; }
  h3 { font-size: clamp(13px, 3.5vw, 18px) !important; }
  table { font-size: 11px !important; }
  img, video, canvas, svg { max-width: 100% !important; height: auto !important; }
  .grid, .card-grid, .cards { grid-template-columns: 1fr !important; }
}
@media (max-width: 480px) {
  body { font-size: 13px !important; }
  .container, .main, .wrap { padding: 8px !important; }
  h1 { font-size: clamp(16px, 5vw, 24px) !important; }
}
html { overflow-x: hidden !important; }
body { overflow-x: hidden !important; max-width: 100vw !important; }
img, video, iframe, canvas, svg, table { max-width: 100% !important; }


/* === BAŞLIK GÖRÜNÜRLÜk DÜZELTMESİ === */
h1, .sim-title, .game-title, .page-title {
  overflow: visible !important;
  text-overflow: unset !important;
  white-space: normal !important;
  line-height: 1.2 !important;
}
.sim-hero h1, .hero h1, .page-hero h1 {
  font-size: clamp(1.5rem, 4vw, 2.5rem) !important;
  overflow: visible !important;
  text-overflow: unset !important;
  white-space: normal !important;
  word-wrap: break-word !important;
}

<script>
var CATEGORIES = [
  {id:'strateji', name:'Strateji', icon:'⚔️', color:'var(--red2)'},
  {id:'teknoloji', name:'Teknoloji', icon:'🤖', color:'var(--cyan)'},
  {id:'ekonomi', name:'Ekonomi', icon:'💰', color:'var(--gold)'},
  {id:'tarih', name:'Tarih', icon:'📜', color:'#9c88ff'},
  {id:'siber', name:'Siber', icon:'💻', color:'#00ff88'},
  {id:'jeopolitik', name:'Jeopolitik', icon:'🌍', color:'#ff9800'}
];

var QUESTIONS = [
  // Strateji (8 soru)
  {cat:'strateji',diff:'medium',q:'OODA döngüsünü geliştiren askeri teorisyen kimdir?',choices:['John Boyd','Sun Tzu','Carl von Clausewitz','Antoine-Henri Jomini'],correct:0,explain:'John Boyd, F-86 pilotu ve askeri stratejist olarak OODA (Gözlemle-Yönel-Karar Ver-Harekete Geç) döngüsünü geliştirdi.',source:'Kaynak: Harb-i Strateji'},
  {cat:'strateji',diff:'easy',q:'"Savaş, siyasetin başka araçlarla sürdürülmesidir" sözü kime aittir?',choices:['Sun Tzu','Carl von Clausewitz','Machiavelli','Thucydides'],correct:1,explain:'Carl von Clausewitz\'in "Savaş Üzerine" eserindeki bu ünlü söz, savaşın siyasi bir araç olduğunu vurgular.',source:'Kaynak: Harb-i Strateji'},
  {cat:'strateji',diff:'hard',q:'Hibrit savaşın temel özelliği nedir?',choices:['Sadece konvansiyonel kuvvetler','Düzenli ve düzensiz yöntemlerin kombinasyonu','Yalnızca siber operasyonlar','Nükleer caydırıcılık'],correct:1,explain:'Hibrit savaş; konvansiyonel, düzensiz, siber ve bilgi operasyonlarını eş zamanlı kullanan çok boyutlu bir stratejidir.',source:'Kaynak: Harb-i Strateji'},
  {cat:'strateji',diff:'medium',q:'Sun Tzu\'nun "Savaş Sanatı" eserinde en çok vurgulanan ilke hangisidir?',choices:['Kaba kuvvet','Savaşmadan kazanmak','Sayısal üstünlük','Teknolojik avantaj'],correct:1,explain:'Sun Tzu, en büyük zaferin savaşmadan kazanmak olduğunu vurgular: "Yüz savaşta yüz zafer en iyisi değildir."',source:'Kaynak: Harb-i Strateji'},
  {cat:'strateji',diff:'hard',q:'"Schwerpunkt" kavramı hangi askeri doktrinin temel unsurudur?',choices:['Deniz hakimiyeti','Blitzkrieg (Yıldırım Savaşı)','Gerilla savaşı','Nükleer caydırıcılık'],correct:1,explain:'Schwerpunkt (ağırlık merkezi), Alman Blitzkrieg doktrininde kuvvetlerin tek bir noktaya yoğunlaştırılması ilkesidir.',source:'Kaynak: Harb-i Strateji'},
  {cat:'strateji',diff:'easy',q:'NATO\'nun kuruluş yılı hangisidir?',choices:['1945','1949','1955','1961'],correct:1,explain:'NATO (Kuzey Atlantik Antlaşması Örgütü) 4 Nisan 1949\'da Washington\'da kurulmuştur.',source:'Kaynak: Harb-i Strateji'},
  {cat:'strateji',diff:'medium',q:'"A2/AD" (Anti-Access/Area Denial) stratejisi hangi ülkenin doktriniyle özdeşleşmiştir?',choices:['Rusya','ABD','Çin','İran'],correct:2,explain:'A2/AD stratejisi özellikle Çin\'in Güney Çin Denizi\'ndeki askeri doktriniyle özdeşleşmiştir.',source:'Kaynak: Harb-i Strateji'},
  {cat:'strateji',diff:'hard',q:'Türk askeri tarihinde "Turan Taktiği" (Kurt Kapanı) neyi ifade eder?',choices:['Cephe saldırısı','Sahte ricat ile çevirme','Deniz ablukası','Hava bombardımanı'],correct:1,explain:'Turan Taktiği, düşmanı sahte geri çekilmeyle tuzağa düşürüp çevirme hareketiyle imha etme stratejisidir. Malazgirt\'te uygulanmıştır.',source:'Kaynak: Harb-i Strateji'},
  // Teknoloji (8 soru)

var selectedCats = [], quizQuestions = [], currentQ = 0, quizScore = 0;
var correctCount = 0, wrongCount = 0, maxStreak = 0, currentStreak = 0;
var totalTime = 0, qStartTime = 0;
var qTimer = null, timeLeft = 15;

function initCatGrid(){
  var grid = document.getElementById('cat-grid');
  grid.innerHTML = CATEGORIES.map(function(c){
    return '<div class="cat-btn" id="cat-'+c.id+'" onclick="toggleCat(\''+c.id+'\')">' +
      '<div class="cat-icon">'+c.icon+'</div>' +
      '<div class="cat-name">'+c.name+'</div>' +
      '<div class="cat-count">'+QUESTIONS.filter(function(q){return q.cat===c.id;}).length+' soru</div>' +
    '</div>';
  }).join('');
  // Hepsini seç varsayılan
  CATEGORIES.forEach(function(c){ selectedCats.push(c.id); document.getElementById('cat-'+c.id).classList.add('selected'); });
}

function toggleCat(id){
  var idx = selectedCats.indexOf(id);
  if(idx>=0){ selectedCats.splice(idx,1); document.getElementById('cat-'+id).classList.remove('selected'); }
  else { selectedCats.push(id); document.getElementById('cat-'+id).classList.add('selected'); }
}

function startQuiz(){
  if(selectedCats.length===0){ alert('En az bir kategori seç!'); return; }
  var pool = QUESTIONS.filter(function(q){return selectedCats.includes(q.cat);});
  quizQuestions = pool.sort(function(){return Math.random()-.5;}).slice(0,15);
  currentQ=0; quizScore=0; correctCount=0; wrongCount=0; maxStreak=0; currentStreak=0; totalTime=0;

  document.getElementById('cat-screen').style.display='none';
  document.getElementById('quiz-area').classList.add('show');
  document.getElementById('result-screen').classList.remove('show');
  loadQuestion();
}

function loadQuestion(){
  if(currentQ >= quizQuestions.length){ endQuiz(); return; }
  var q = quizQuestions[currentQ];
  document.getElementById('q-num').textContent = 'Soru '+(currentQ+1)+'/'+quizQuestions.length;
  document.getElementById('q-score').textContent = 'Puan: '+quizScore;
  document.getElementById('q-progress').style.width = (currentQ/quizQuestions.length*100)+'%';

  var cat = CATEGORIES.find(function(c){return c.id===q.cat;});
  document.getElementById('q-cat').textContent = cat ? cat.icon+' '+cat.name.toUpperCase() : q.cat.toUpperCase();
  var diffEl = document.getElementById('q-diff');
  diffEl.textContent = {easy:'Kolay',medium:'Orta',hard:'Zor'}[q.diff]||q.diff;
  diffEl.className = 'q-diff '+q.diff;
  document.getElementById('q-text').textContent = q.q;

  var letters = ['A','B','C','D'];
  document.getElementById('choices').innerHTML = q.choices.map(function(c,i){
    return '<div class="choice" id="ch-'+i+'" onclick="selectChoice('+i+')">' +
      '<div class="choice-letter">'+letters[i]+'</div>' +
      '<div class="choice-text">'+c+'</div>' +
    '</div>';
  }).join('');

  document.getElementById('explain-panel').classList.remove('show');
  startQTimer();
  qStartTime = Date.now();
}

function startQTimer(){
  if(qTimer) clearInterval(qTimer);
  timeLeft = 15;
  document.getElementById('timer-fill').style.transition='none';
  document.getElementById('timer-fill').style.width='100%';
  document.getElementById('timer-num').textContent='15';

  setTimeout(function(){
    document.getElementById('timer-fill').style.transition='width 1s linear';
  },50);

  qTimer = setInterval(function(){
    timeLeft--;
    document.getElementById('timer-num').textContent = timeLeft;
    document.getElementById('timer-fill').style.width = (timeLeft/15*100)+'%';
    if(timeLeft<=3) document.getElementById('timer-fill').style.background='var(--red2)';
    if(timeLeft<=0){ clearInterval(qTimer); timeoutQ(); }
  },1000);
}

function selectChoice(idx){
  clearInterval(qTimer);
  var q = quizQuestions[currentQ];
  var elapsed = Math.round((Date.now()-qStartTime)/1000);
  totalTime += elapsed;

  var correct = idx === q.correct;
  var pts = 0;

  document.querySelectorAll('.choice').forEach(function(el){ el.classList.add('locked'); });
  document.getElementById('ch-'+q.correct).classList.add('correct');

  if(correct){
    currentStreak++;
    if(currentStreak>maxStreak) maxStreak=currentStreak;
    pts = 10 + Math.max(0, (15-elapsed)*2) + (currentStreak>2?10:0);
    correctCount++;
    HS.beepWin(); HS.burst(document.getElementById('ch-'+idx),'#00ff88');
    HS.flashScreen('rgba(0,255,136,0.15)',300);
    HS.aiLost();
  } else {
    currentStreak=0; wrongCount++;
    document.getElementById('ch-'+idx).classList.add('wrong');
    HS.beepFail(); HS.flashScreen('rgba(224,21,21,0.2)',300);
    HS.aiWon();
  }

  quizScore += pts;
  HS.addScore('harbi-quiz', pts);
  document.getElementById('hdr-score').textContent='⭐ '+HS.getTotalScore();

  document.getElementById('ep-result').textContent = correct ? '✅ Doğru! +'+pts+' puan' : '❌ Yanlış';
  document.getElementById('ep-result').style.color = correct ? '#00ff88' : 'var(--red2)';
  document.getElementById('ep-pts').textContent = '+'+pts;
  document.getElementById('ep-pts').style.color = correct ? '#00ff88' : 'var(--red2)';
  document.getElementById('ep-text').textContent = q.explain;
  document.getElementById('ep-source').textContent = q.source;
  document.getElementById('explain-panel').classList.add('show');
}

function timeoutQ(){
  var q = quizQuestions[currentQ];
  currentStreak=0; wrongCount++;
  document.querySelectorAll('.choice').forEach(function(el){ el.classList.add('locked'); });
  document.getElementById('ch-'+q.correct).classList.add('correct');
  document.getElementById('ep-result').textContent = '⏰ Süre Doldu!';
  document.getElementById('ep-result').style.color = 'var(--gold)';
  document.getElementById('ep-pts').textContent = '+0';
  document.getElementById('ep-pts').style.color = 'var(--gold)';
  document.getElementById('ep-text').textContent = q.explain;
  document.getElementById('ep-source').textContent = q.source;
  document.getElementById('explain-panel').classList.add('show');
  HS.beepFail();
}

function nextQuestion(){
  currentQ++;
  loadQuestion();
}

function endQuiz(){
  document.getElementById('quiz-area').classList.remove('show');
  var rs = document.getElementById('result-screen');
  rs.classList.add('show');

  var pct = Math.round(correctCount/quizQuestions.length*100);
  document.getElementById('rs-icon').textContent = pct>=80?'🏆':pct>=60?'🎓':'📚';
  document.getElementById('rs-title').textContent = pct>=80?'Strateji Ustası!':pct>=60?'İyi İş!':'Çalışmaya Devam';
  document.getElementById('rs-score').textContent = quizScore+' puan';
  document.getElementById('rs-correct').textContent = correctCount;
  document.getElementById('rs-wrong').textContent = wrongCount;
  document.getElementById('rs-streak').textContent = maxStreak;
  document.getElementById('rs-time').textContent = Math.round(totalTime/quizQuestions.length)+'s';

  // Paylaşım kartı
  document.getElementById('sc-score-big').textContent = quizScore;
  document.getElementById('sc-sub').textContent = pct+'% doğru · '+quizQuestions.length+' soru';

  var badges = HS.getBadges();
  document.getElementById('sc-badges').innerHTML = Object.keys(badges).slice(0,4).map(function(b){
    return '<span class="sc-badge">'+badges[b].label+'</span>';
  }).join('');

  if(pct>=80) HS.awardBadge('quiz_ustasi');
  if(pct===100) HS.awardBadge('mukemmel');
  HS.beepWin();
}

function copyShareCard(){
  var text = '🎓 HARBİ QUİZ\n'+quizScore+' puan\n'+document.getElementById('sc-sub').textContent+'\nHarb-i Strateji · OZA Oyun Merkezi';
  if(navigator.clipboard){ navigator.clipboard.writeText(text).then(function(){ HS.beepOK(); }); }
  HS.showShareCard({title:'Harbi Quiz',puan:quizScore,game:'harbi-quiz',color:'#E01515'});
}

function yenidenBaşlatQuiz(){
  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('cat-screen').style.display='';
}

initCatGrid();
</script>
