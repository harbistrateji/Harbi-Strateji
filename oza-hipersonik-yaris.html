<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0f17;color:#eaf0f7;font-family:'Segoe UI',system-ui,sans-serif;touch-action:manipulation;user-select:none}
#app{width:100%;height:100%;display:flex;flex-direction:column}
#topBar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(10,15,23,.95);border-bottom:1px solid rgba(0,224,255,.15);flex-shrink:0;z-index:10}
#topBar a{color:#00e0ff;text-decoration:none;font-size:.8rem}
#topBar .title{font-size:.85rem;font-weight:700;color:#fff}
#topBar .stats{display:flex;gap:12px;font-size:.75rem}
#topBar .stats span{color:#c9a24b}
#gameArea{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
canvas{display:block;background:#0a0f17}
#hud{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;pointer-events:none;font-size:.75rem}
#hud .badge{background:rgba(0,0,0,.6);border:1px solid rgba(0,224,255,.3);border-radius:6px;padding:3px 8px}
#controls{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:12px}
#controls button{width:52px;height:52px;border-radius:50%;border:2px solid rgba(0,224,255,.4);background:rgba(0,0,0,.5);color:#fff;font-size:1.2rem;cursor:pointer;-webkit-tap-highlight-color:transparent}
#controls button:active{background:rgba(0,224,255,.2);transform:scale(.9)}
#overlay{position:absolute;inset:0;background:rgba(10,15,23,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;text-align:center;padding:20px}
#overlay h2{color:#00e0ff;font-size:1.4rem;margin-bottom:8px}
#overlay p{color:#aaa;font-size:.85rem;margin-bottom:16px;max-width:320px}
#overlay button{padding:12px 32px;border:2px solid #00e0ff;background:transparent;color:#00e0ff;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:700}
#overlay button:hover{background:rgba(0,224,255,.1)}
@media(min-width:769px){#controls{display:none}}

/* ═══ TEK EKRAN — NO SCROLL ═══ */
html, body {
  height: 100vh !important;
  max-height: 100vh !important;
  overflow: hidden !important;
}
body > .wrap, body > .container, body > .main, body > .game-container, body > .game-wrap {
  max-height: calc(100vh - 54px) !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
}
@media (max-width: 480px) {
  body > .wrap, body > .container, body > .main { 
    max-height: calc(100vh - 44px) !important;
    padding: 8px !important;
  }
}


/* ═══ TEK EKRAN VIEWPORT FIT ═══ */
html, body { 
  height: 100vh !important; 
  max-height: 100vh !important; 
  overflow: hidden !important;
  margin: 0 !important;
  padding: 0 !important;
}
.game-container, .container, .main, #app, #game, .game-wrapper, .game-area {
  height: 100vh !important;
  max-height: 100vh !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  display: flex !important;
  flex-direction: column !important;
}
/* Mobil uyum */
@media (max-width: 768px) {
  body { font-size: 13px !important; }
  h1, .game-title { font-size: clamp(16px, 4vw, 24px) !important; }
  h2 { font-size: clamp(14px, 3.5vw, 20px) !important; }
  .btn, button { 
    padding: 8px 16px !important; 
    font-size: 12px !important;
    min-height: 40px !important;
    touch-action: manipulation !important;
  }
  .card, .option, .choice { 
    padding: 10px !important; 
    margin: 4px !important;
  }
}
@media (max-width: 480px) {
  body { font-size: 12px !important; }
  .nav, .navbar, .top-bar, .header { 
    padding: 4px 8px !important;
    font-size: 11px !important;
  }
}
@media (max-height: 700px) {
  .game-container, .container, .main {
    padding: 8px !important;
  }
  h1, .game-title { font-size: 18px !important; }
}


/* ═══ MOBİL UYUMLU RESPONSIVE ═══ */
@media (max-width: 768px) {
  body { font-size: 14px !important; }
  .container, .main, .wrap, .content, .page-content {
    padding: 12px !important;
    max-width: 100% !important;
  }
  h1 { font-size: clamp(18px, 5vw, 28px) !important; }
  h2 { font-size: clamp(15px, 4vw, 22px) !important; }
  h3 { font-size: clamp(13px, 3.5vw, 18px) !important; }
  table { font-size: 11px !important; }
  img, video, canvas, svg { max-width: 100% !important; height: auto !important; }
  .grid, .card-grid, .cards { grid-template-columns: 1fr !important; }
}
@media (max-width: 480px) {
  body { font-size: 13px !important; }
  .container, .main, .wrap { padding: 8px !important; }
  h1 { font-size: clamp(16px, 5vw, 24px) !important; }
}
html { overflow-x: hidden !important; }
body { overflow-x: hidden !important; max-width: 100vw !important; }
img, video, iframe, canvas, svg, table { max-width: 100% !important; }


/* === BAŞLIK GÖRÜNÜRLÜk DÜZELTMESİ === */
h1, .sim-title, .game-title, .page-title {
  overflow: visible !important;
  text-overflow: unset !important;
  white-space: normal !important;
  line-height: 1.2 !important;
}
.sim-hero h1, .hero h1, .page-hero h1 {
  font-size: clamp(1.5rem, 4vw, 2.5rem) !important;
  overflow: visible !important;
  text-overflow: unset !important;
  white-space: normal !important;
  word-wrap: break-word !important;
}

<body>
<div style="position:fixed;top:12px;left:12px;z-index:9999;display:flex;gap:8px;"><a href="oza-hub.html" style="background:rgba(10,15,23,0.9);color:#00E0FF;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid #00E0FF33;backdrop-filter:blur(8px);">← OZA Hub</a><a href="index.html" style="background:rgba(10,15,23,0.9);color:#c41e3a;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid rgba(196,30,58,0.3);backdrop-filter:blur(8px);">🏠 Ana Sayfa</a></div>
<div id="app">
<div id="topBar">
<a href="oza-hub.html">← OZA</a>
<span class="title">🚀 Hipersonik Yarış</span>
<div class="stats"><span id="scoreDisp">0</span> puan</div>
</div>
<div id="gameArea">
<canvas id="gc"></canvas>
<div id="hud"><div class="badge" id="hudL"></div><div class="badge" id="hudR"></div></div>
<div id="controls"><button ontouchstart="hLane=-1" ontouchend="hLane=0">←</button><button ontouchstart="hLane=1" ontouchend="hLane=0">→</button>
</div>
<div id="overlay">
<h2 id="ovTitle">BAŞLA</h2>
<p id="ovDesc">Dokunarak veya tıklayarak başla</p>
<button id="ovBtn" onclick="startGame()">▶ BAŞLA</button>
</div>
</div>
</div>
<script>
// Audio context
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type||'square';o.frequency.value=freq;g.gain.value=0.08;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);o.stop(audioCtx.currentTime+dur)}
// Canvas setup
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
let W,H,gameRunning=false,score=0,level=1;
function resize(){
  const area=document.getElementById('gameArea');
  W=canvas.width=area.clientWidth;
  H=canvas.height=area.clientHeight;
}
window.addEventListener('resize',resize);
resize();
function updateScore(v){score+=v;document.getElementById('scoreDisp').textContent=score}
function showOverlay(t,d,btn){
  document.getElementById('overlay').style.display='flex';
  document.getElementById('ovTitle').textContent=t;
  document.getElementById('ovDesc').textContent=d;
  document.getElementById('ovBtn').textContent=btn||'▶ TEKRAR';
}
function hideOverlay(){document.getElementById('overlay').style.display='none'}

let hShip={x:0,lane:1},hObs=[],hSpeed=5,hDist=0,hLane=0,lanes=3;
function startGame(){initAudio();hideOverlay();gameRunning=true;score=0;hSpeed=5;hDist=0;hShip.lane=1;hObs=[];loop5()}
function loop5(){if(!gameRunning)return;requestAnimationFrame(loop5);update5();draw5()}
function update5(){
  if(keys.ArrowLeft||hLane<0)hShip.lane=Math.max(0,hShip.lane-0.05);
  if(keys.ArrowRight||hLane>0)hShip.lane=Math.min(lanes-1,hShip.lane+0.05);
  hDist++;hSpeed+=0.002;
  if(hDist%Math.max(15,40-hSpeed)===0){hObs.push({lane:Math.floor(Math.random()*lanes),y:-30,type:Math.random()>.7?'boost':'block'})}
  let laneW=W/lanes;
  for(let i=hObs.length-1;i>=0;i--){let o=hObs[i];o.y+=hSpeed;
    if(o.y>H+30){hObs.splice(i,1);if(o.type==='block')updateScore(5);continue}
    let shipX=(hShip.lane+0.5)*laneW;let obsX=(o.lane+0.5)*laneW;
    if(Math.abs(shipX-obsX)<laneW*0.35&&o.y>H-80&&o.y<H-30){
      if(o.type==='boost'){hSpeed+=1;updateScore(25);playTone(800,.1,'sine');hObs.splice(i,1)}
      else{gameRunning=false;playTone(100,.4,'sawtooth');showOverlay('ÇARPIŞ!','Mach: '+(hSpeed*1.2).toFixed(1)+' | Skor: '+score,'▶ TEKRAR')}}}
  document.getElementById('hudL').textContent='Mach '+(hSpeed*1.2).toFixed(1);
  document.getElementById('hudR').textContent=Math.round(hDist/10)+'km';
}
function draw5(){
  ctx.fillStyle='#050a12';ctx.fillRect(0,0,W,H);
  let laneW=W/lanes;
  // Lane lines
  for(let i=1;i<lanes;i++){ctx.strokeStyle='rgba(0,224,255,.15)';ctx.setLineDash([20,20]);
    ctx.beginPath();ctx.moveTo(i*laneW,(hDist*2)%40-40);ctx.lineTo(i*laneW,H);ctx.stroke();ctx.setLineDash([])}
  // Speed lines
  for(let i=0;i<10;i++){ctx.strokeStyle='rgba(255,255,255,.1)';
    ctx.beginPath();let sx=Math.random()*W;ctx.moveTo(sx,(i*80+hDist*3)%H);ctx.lineTo(sx,(i*80+hDist*3)%H+20+hSpeed*3);ctx.stroke()}
  // Obstacles
  hObs.forEach(o=>{let ox=(o.lane+0.5)*laneW;
    if(o.type==='boost'){ctx.fillStyle='#4ade80';ctx.font='20px sans-serif';ctx.textAlign='center';ctx.fillText('⚡',ox,o.y)}
    else{ctx.fillStyle='#ff3a4a';ctx.fillRect(ox-15,o.y-10,30,20);ctx.fillStyle='#fff';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText('SAM',ox,o.y+4)}});
  // Ship
  let shipX=(hShip.lane+0.5)*laneW;let shipY=H-60;
  ctx.save();ctx.translate(shipX,shipY);
  ctx.fillStyle='#00e0ff';ctx.beginPath();ctx.moveTo(0,-20);ctx.lineTo(-12,15);ctx.lineTo(0,10);ctx.lineTo(12,15);ctx.closePath();ctx.fill();
  // Flame
  ctx.fillStyle='#fbbf24';ctx.globalAlpha=0.5+Math.random()*0.5;
  ctx.beginPath();ctx.moveTo(-5,15);ctx.lineTo(0,15+hSpeed*2);ctx.lineTo(5,15);ctx.closePath();ctx.fill();
  ctx.restore();ctx.globalAlpha=1;
}
document.addEventListener('keydown',e=>{keys[e.key]=true});
document.addEventListener('keyup',e=>{keys[e.key]=false});
// Swipe
let touchStartX=0;
canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX});
canvas.addEventListener('touchmove',e=>{e.preventDefault();let dx=e.touches[0].clientX-touchStartX;
  if(dx<-30)hShip.lane=Math.max(0,Math.round(hShip.lane)-1);
  if(dx>30)hShip.lane=Math.min(lanes-1,Math.round(hShip.lane)+1);touchStartX=e.touches[0].clientX});
resize();

</script>

</body>
