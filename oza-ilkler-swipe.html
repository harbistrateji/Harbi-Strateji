<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">

<title>Tarihte İlkler — Swipe Challenge | OZA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0f17;--card:#141c2b;--border:rgba(0,224,255,.15);--cyan:#00E0FF;--gold:#C9A24B;--red:#E01515;--green:#10b981;--purple:#a78bfa;--text:#EAF0F7;--dim:#6b7b8f}
@import url('https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&subset=latin-ext&display=swap');
html,body{height:100%;overflow:hidden;font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text)}
.app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;position:relative}
/* Header */
.hdr{padding:12px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border);z-index:100}
.hdr-back{color:var(--dim);text-decoration:none;font-size:20px}
.hdr-title{font-family:'Chakra Petch',sans-serif;font-size:14px;font-weight:700;color:var(--cyan)}
.hdr-score{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--gold)}
.hdr-streak{font-size:11px;color:var(--red);margin-left:8px}
/* Progress */
.progress{height:3px;background:rgba(255,255,255,.05)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--gold));transition:width .3s}
/* Card Stack */
.stack{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:16px}
.card{position:absolute;width:calc(100% - 32px);max-width:420px;background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px 24px;touch-action:none;cursor:grab;transition:transform .1s,opacity .2s;will-change:transform}
.card.exit-left{transform:translateX(-120%) rotate(-15deg)!important;opacity:0;transition:.4s cubic-bezier(.19,1,.22,1)}
.card.exit-right{transform:translateX(120%) rotate(15deg)!important;opacity:0;transition:.4s cubic-bezier(.19,1,.22,1)}
.card-era{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--cyan);letter-spacing:2px;text-transform:uppercase;margin-bottom:8px}
.card-cat{display:inline-block;padding:3px 10px;border-radius:12px;font-size:10px;font-weight:600;background:rgba(167,139,250,.15);color:var(--purple);margin-bottom:14px}
.card-question{font-family:'Chakra Petch',sans-serif;font-size:20px;font-weight:700;line-height:1.3;margin-bottom:20px}
.card-options{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.option{padding:14px 12px;border:1px solid var(--border);border-radius:12px;text-align:center;font-size:13px;font-weight:500;cursor:pointer;transition:.2s;-webkit-tap-highlight-color:transparent}
.option:hover{border-color:var(--cyan);background:rgba(0,224,255,.05)}
.option.correct{border-color:var(--green);background:rgba(16,185,129,.15);color:var(--green);animation:pulse .3s}
.option.wrong{border-color:var(--red);background:rgba(224,21,21,.1);color:var(--red);animation:shake .3s}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
/* Reveal */
.card-reveal{display:none;margin-top:16px;padding:14px;background:rgba(0,224,255,.04);border-left:3px solid var(--cyan);border-radius:0 8px 8px 0;font-size:12px;line-height:1.6;color:var(--dim)}
.card-reveal.show{display:block;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
/* Swipe Indicators */
.swipe-hint{position:absolute;top:50%;transform:translateY(-50%);font-size:24px;opacity:0;transition:.2s;pointer-events:none}
.swipe-hint.left{left:20px;color:var(--red)}
.swipe-hint.right{right:20px;color:var(--green)}
/* Bottom */
.bottom{padding:12px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.btn-skip{padding:8px 16px;border:1px solid var(--border);border-radius:8px;background:none;color:var(--dim);font-size:12px;cursor:pointer}
.btn-next{padding:8px 20px;border:none;border-radius:8px;background:linear-gradient(135deg,var(--cyan),var(--purple));color:#000;font-size:12px;font-weight:600;cursor:pointer;opacity:0;transition:.3s}
.btn-next.show{opacity:1}
.combo{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold)}
/* Intro */
.intro{position:fixed;inset:0;z-index:1000;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px}
.intro h1{font-family:'Chakra Petch',sans-serif;font-size:28px;color:var(--cyan);margin-bottom:12px}
.intro p{color:var(--dim);font-size:14px;max-width:300px;line-height:1.6;margin-bottom:24px}
.intro .start-btn{padding:14px 40px;border:none;border-radius:12px;background:linear-gradient(135deg,var(--cyan),var(--purple));color:#000;font-size:15px;font-weight:700;cursor:pointer;font-family:'Chakra Petch',sans-serif}
.intro .cat-select{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px}
.intro .cat-btn{padding:6px 14px;border:1px solid var(--border);border-radius:20px;background:none;color:var(--dim);font-size:11px;cursor:pointer;transition:.2s}
.intro .cat-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,224,255,.1)}
/* Result */
.result{display:none;position:fixed;inset:0;z-index:1000;background:var(--bg);flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:32px}
.result.show{display:flex}
.result h2{font-family:'Chakra Petch',sans-serif;font-size:24px;color:var(--gold);margin-bottom:8px}
.result .score-big{font-size:48px;font-weight:700;color:var(--cyan);font-family:'Chakra Petch',sans-serif}
.result .stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin:20px 0}
.result .stat{padding:12px;border:1px solid var(--border);border-radius:10px}
.result .stat-val{font-size:18px;font-weight:700;color:var(--text)}
.result .stat-lbl{font-size:10px;color:var(--dim)}
.result .retry-btn{padding:12px 32px;border:none;border-radius:10px;background:var(--cyan);color:#000;font-size:14px;font-weight:600;cursor:pointer;margin-top:16px}
.hidden{display:none!important}
/* Sound toggle */
.sound-btn{position:fixed;bottom:70px;right:16px;z-index:200;width:36px;height:36px;border-radius:50%;background:var(--card);border:1px solid var(--border);color:var(--dim);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px}
</style>

// Game State
let currentCategory = 'all';
let questions = [];
let currentIdx = 0;
let score = 0;
let streak = 0;
let maxStreak = 0;
let correct = 0;
let wrong = 0;
let answered = false;
let audioCtx = null;
let soundEnabled = true;

// Init categories
const cats = ['all','turk','osmanli','inkilap'];
const catLabels = {all:'TÜMÜ',turk:'TÜRK TARİHİ',osmanli:'OSMANLI',inkilap:'İNKILAP'};
document.getElementById('catSelect').innerHTML = cats.map(c=>
  `<button class="cat-btn${c==='all'?' active':''}" data-cat="${c}" onclick="selectCat('${c}')">${catLabels[c]}</button>`
).join('');

function selectCat(c){
  currentCategory = c;
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.toggle('active',b.dataset.cat===c));
}

function shuffleArray(arr){
  for(let i=arr.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[arr[i],arr[j]]=[arr[j],arr[i]];}
  return arr;
}

function startGame(){
  document.getElementById('intro').classList.add('hidden');
  if(currentCategory==='all'){
    questions=[...ALL_DATA.turk,...ALL_DATA.osmanli,...ALL_DATA.inkilap];
  } else {
    questions=[...ALL_DATA[currentCategory]];
  }
  questions = shuffleArray(questions).slice(0,20);
  renderCard();
}

function renderCard(){
  if(currentIdx >= questions.length){endGame();return;}
  const q = questions[currentIdx];
  const opts = shuffleArray([...q.opts]);
  const stack = document.getElementById('stack');
  stack.innerHTML = `
    <div class="card" id="currentCard">
      <div class="card-era">${q.era}</div>
      <div class="card-cat">${q.cat}</div>
      <div class="card-question">${q.q}</div>
      <div class="card-options">
        ${opts.map(o=>`<div class="option" onclick="answer(this,'${o.replace(/'/g,"\\'")}','${q.a.replace(/'/g,"\\'")}')">${o}</div>`).join('')}
      </div>
      <div class="card-reveal" id="reveal">${q.desc||''}</div>
    </div>
  `;
  answered = false;
  document.getElementById('btnNext').classList.remove('show');
  document.getElementById('progressFill').style.width = ((currentIdx/questions.length)*100)+'%';
}

function answer(el, selected, correctAns){
  if(answered) return;
  answered = true;
  const options = document.querySelectorAll('.option');
  if(selected === correctAns){
    el.classList.add('correct');
    score += 10 + streak*2;
    streak++;
    correct++;
    if(streak > maxStreak) maxStreak = streak;
    playSound('correct');
  } else {
    el.classList.add('wrong');
    options.forEach(o=>{if(o.textContent===correctAns)o.classList.add('correct');});
    streak = 0;
    wrong++;
    playSound('wrong');
  }
  document.getElementById('score').textContent = score + ' XP';
  document.getElementById('streak').textContent = streak > 1 ? '🔥'+streak : '';
  document.getElementById('combo').textContent = streak >= 3 ? 'COMBO x'+streak+'!' : '';
  document.getElementById('reveal').classList.add('show');
  document.getElementById('btnNext').classList.add('show');
}

function nextCard(){
  currentIdx++;
  renderCard();
}

function skipCard(){
  if(!answered){wrong++;streak=0;}
  currentIdx++;
  renderCard();
}

function endGame(){
  document.getElementById('gameApp').classList.add('hidden');
  const r = document.getElementById('result');
  r.classList.add('show');
  document.getElementById('finalScore').textContent = score + ' XP';
  document.getElementById('statCorrect').textContent = correct;
  document.getElementById('statWrong').textContent = wrong;
  document.getElementById('statStreak').textContent = maxStreak;
  // Save to localStorage
  const prev = parseInt(localStorage.getItem('hs_ilkler_best')||'0');
  if(score > prev) localStorage.setItem('hs_ilkler_best', score);
}

// Sound
function initAudio(){
  if(!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
}
function playSound(type){
  if(!soundEnabled) return;
  initAudio();
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);gain.connect(audioCtx.destination);
  if(type==='correct'){osc.frequency.value=880;gain.gain.value=0.15;osc.type='sine';}
  else{osc.frequency.value=220;gain.gain.value=0.1;osc.type='sawtooth';}
  osc.start();gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);
  osc.stop(audioCtx.currentTime+0.2);
}
function toggleSound(){
  soundEnabled=!soundEnabled;
  document.getElementById('soundBtn').textContent=soundEnabled?'🔊':'🔇';
}

// Touch swipe support
let touchStartX = 0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{
  const diff = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(diff)>80 && answered){
    const card = document.getElementById('currentCard');
    if(card){card.classList.add(diff>0?'exit-right':'exit-left');setTimeout(nextCard,300);}
  }
});
</script>
