<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OZA — İnsansı Robot Komutanı</title>
<style>
html{scroll-padding-top:80px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0e1a;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.back-nav{position:fixed;top:12px;left:12px;z-index:999;background:rgba(0,0,0,.7);padding:8px 16px;border-radius:20px;font-size:13px}
.back-nav a{color:#4fc3f7;text-decoration:none}
.game-container{max-width:600px;width:90%;padding:30px;text-align:center}
h1{font-size:2em;color:#4fc3f7;margin-bottom:10px}
.subtitle{color:#90a4ae;margin-bottom:30px}
.scenario{background:rgba(255,255,255,.05);border-radius:16px;padding:25px;margin-bottom:20px;border:1px solid rgba(79,195,247,.2)}
.scenario .q-num{font-size:.8em;color:#78909c;margin-bottom:8px}
.scenario .q-text{font-size:1.1em;color:#fff;line-height:1.5;margin-bottom:15px}
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{padding:15px 20px;background:rgba(79,195,247,.1);border:1px solid rgba(79,195,247,.3);border-radius:12px;color:#e0e0e0;cursor:pointer;text-align:left;font-size:.95em;transition:all .3s}
.choice-btn:hover{background:rgba(79,195,247,.2);border-color:#4fc3f7;transform:translateX(5px)}
.choice-btn.correct{background:rgba(129,199,132,.2);border-color:#81c784;color:#81c784}
.choice-btn.wrong{background:rgba(239,83,80,.2);border-color:#ef5350;color:#ef5350}
.score-bar{display:flex;justify-content:space-between;margin-bottom:20px;padding:10px 20px;background:rgba(0,0,0,.3);border-radius:10px}
.score-bar span{font-size:.9em;color:#90a4ae}
.score-bar .val{color:#4fc3f7;font-weight:700}
.result{text-align:center;padding:30px}
.result h2{font-size:1.8em;margin-bottom:15px}
.result .final-score{font-size:3em;color:#4fc3f7;font-weight:700}
.restart-btn{margin-top:20px;padding:12px 30px;background:#4fc3f7;color:#0a0e1a;border:none;border-radius:10px;font-size:1em;cursor:pointer;font-weight:600}

/* ═══ TEK EKRAN — NO SCROLL ═══ */
html, body {
  height: 100vh !important;
  max-height: 100vh !important;
  overflow: hidden !important;
}
body > .wrap, body > .container, body > .main, body > .game-container, body > .game-wrap {
  max-height: calc(100vh - 54px) !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
}
@media (max-width: 480px) {
  body > .wrap, body > .container, body > .main { 
    max-height: calc(100vh - 44px) !important;
    padding: 8px !important;
  }
}


/* ═══ TEK EKRAN VIEWPORT FIT ═══ */
html, body { 
  height: 100vh !important; 
  max-height: 100vh !important; 
  overflow: hidden !important;
  margin: 0 !important;
  padding: 0 !important;
}
.game-container, .container, .main, #app, #game, .game-wrapper, .game-area {
  height: 100vh !important;
  max-height: 100vh !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  display: flex !important;
  flex-direction: column !important;
}
/* Mobil uyum */
@media (max-width: 768px) {
  body { font-size: 13px !important; }
  h1, .game-title { font-size: clamp(16px, 4vw, 24px) !important; }
  h2 { font-size: clamp(14px, 3.5vw, 20px) !important; }
  .btn, button { 
    padding: 8px 16px !important; 
    font-size: 12px !important;
    min-height: 40px !important;
    touch-action: manipulation !important;
  }
  .card, .option, .choice { 
    padding: 10px !important; 
    margin: 4px !important;
  }
}
@media (max-width: 480px) {
  body { font-size: 12px !important; }
  .nav, .navbar, .top-bar, .header { 
    padding: 4px 8px !important;
    font-size: 11px !important;
  }
}
@media (max-height: 700px) {
  .game-container, .container, .main {
    padding: 8px !important;
  }
  h1, .game-title { font-size: 18px !important; }
}


/* ═══ MOBİL UYUMLU RESPONSIVE ═══ */
@media (max-width: 768px) {
  body { font-size: 14px !important; }
  .container, .main, .wrap, .content, .page-content {
    padding: 12px !important;
    max-width: 100% !important;
  }
  h1 { font-size: clamp(18px, 5vw, 28px) !important; }
  h2 { font-size: clamp(15px, 4vw, 22px) !important; }
  h3 { font-size: clamp(13px, 3.5vw, 18px) !important; }
  table { font-size: 11px !important; }
  img, video, canvas, svg { max-width: 100% !important; height: auto !important; }
  .grid, .card-grid, .cards { grid-template-columns: 1fr !important; }
}
@media (max-width: 480px) {
  body { font-size: 13px !important; }
  .container, .main, .wrap { padding: 8px !important; }
  h1 { font-size: clamp(16px, 5vw, 24px) !important; }
}
html { overflow-x: hidden !important; }
body { overflow-x: hidden !important; max-width: 100vw !important; }
img, video, iframe, canvas, svg, table { max-width: 100% !important; }


/* === BAŞLIK GÖRÜNÜRLÜk DÜZELTMESİ === */
h1, .sim-title, .game-title, .page-title {
  overflow: visible !important;
  text-overflow: unset !important;
  white-space: normal !important;
  line-height: 1.2 !important;
}
.sim-hero h1, .hero h1, .page-hero h1 {
  font-size: clamp(1.5rem, 4vw, 2.5rem) !important;
  overflow: visible !important;
  text-overflow: unset !important;
  white-space: normal !important;
  word-wrap: break-word !important;
}

</style>

</head>
<body>
<div style="position:fixed;top:12px;left:12px;z-index:9999;display:flex;gap:8px;"><a href="oza-hub.html" style="background:rgba(10,15,23,0.9);color:#00E0FF;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid #00E0FF33;backdrop-filter:blur(8px);">← OZA Hub</a><a href="index.html" style="background:rgba(10,15,23,0.9);color:#c41e3a;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid rgba(196,30,58,0.3);backdrop-filter:blur(8px);">🏠 Ana Sayfa</a></div>
<div class="back-nav"><a href="oza-hub.html">← OZA Merkez</a></div>
<div class="game-container">
<h1>🤖 İnsansı Robot Komutanı</h1>
<p class="subtitle">YZ robotik savaş senaryolarında doğru kararı ver!</p>
<div class="score-bar"><span>Soru: <span class="val" id="qNum">1/10</span></span><span>Puan: <span class="val" id="score">0</span></span><span>Süre: <span class="val" id="timer">15</span>s</span></div>
<div id="gameArea"></div>
</div>
<script>
const questions=[
{q:"Elektromanyetik karartma altında iletişim kesildi. İnsansı robotlarınız ne yapmalı?",choices:["Durağan bekle, iletişim gelene kadar","Jetson Thor gömülü YZ ile otonom görev devam","Geri çekil, üsse dön","Rastgele hareket et"],correct:1,explain:"Jetson Thor edge computing ile bulut bağımsız karar verebilir."},
{q:"Düşman FPV drone sürüsü tespit edildi. Savunma önceliğiniz?",choices:["Tüm robotları geri çek","HPM mikrodalga ile sürü nötralize","Tek tek ateşle vur","Kamuflaj ve gizlen"],correct:1,explain:"HPM (Yüksek Güçlü Mikrodalga) sürü dronelara karşı en etkili savunma."},
{q:"Şehir içi muharebede sivil-asker ayrımı gerekiyor. YZ sisteminiz ne kullanmalı?",choices:["Termal kamera yeterli","Çoklu sensör füzyonu + YZ sınıflandırma","İnsan operatör onayı bekle","Tüm hareketlileri tehdit say"],correct:1,explain:"Çoklu sensör füzyonu (termal+optik+radar+akustik) ile YZ sınıflandırma en güvenilir."},
{q:"Robot birliğiniz için simülasyon eğitimi yapacaksınız. Hangi platform?",choices:["Gerçek sahada deneme-yanılma","NVIDIA Isaac Sim dijital ikiz","Video oyunu motoru","Masa üstü tatbikat"],correct:1,explain:"Isaac Sim/Omniverse fiziksel gerçeklik düzeyinde simülasyon ve Sim-to-Real transfer sağlar."},
{q:"Düşman siber saldırı ile robot kontrol ağınızı hedef aldı. Öncelik?",choices:["Tüm robotları kapat","Merkezi kontrolden edge computing moduna geç","Karşı siber saldırı başlat","İnsan kontrolüne geç"],correct:1,explain:"Edge computing (Jetson Thor) ile robotlar merkezi ağ olmadan otonom çalışabilir."},
{q:"Lojistik hat kesildi. Robotların enerji yönetimi için?",choices:["Tüm robotları uyku moduna al","Görev öncelikli enerji dağıtımı + düşük güç modu","Yarısını feda et, yarısını tam güçte tut","Acil tahliye emri ver"],correct:1,explain:"Jetson Thor düşük güç tüketimi ile görev öncelikli enerji yönetimi yapabilir."},
{q:"Müttefik kuvvetlerle müşterek harekât. Robot sürüsü koordinasyonu?",choices:["Her robot bağımsız hareket etsin","Merkezi komuta tek noktadan yönetsin","Dağıtık sürü zekası + paylaşımlı durum farkındalığı","Sadece insan komutanlar koordine etsin"],correct:2,explain:"Dağıtık sürü zekası ile her robot hem otonom hem koordineli çalışır."},
{q:"Düşman yapay zeka sistemi, robotlarınızın davranış kalıplarını öğrendi. Ne yaparsınız?",choices:["Aynı taktikle devam et","Rastgele davranış üret (adversarial noise)","Tüm robotları geri çek","Manuel kontrole geç"],correct:1,explain:"Adversarial noise ile davranış kalıpları öngörülemez hale getirilir."},
{q:"Bir insansı robotunuz sivil bir yapıda düşman komutanı tespit etti. Karar?",choices:["Hemen vur","İnsan komutan onayı al (human-in-the-loop)","Görmezden gel","Robota karar bırak"],correct:1,explain:"Ölümcül kararlar için human-in-the-loop zorunludur (uluslararası hukuk)."},
{q:"2032 askeri robot pazarı tahmini büyüme oranı (CAGR)?",choices:["%12.5","%20.1","%30.73","%45.2"],correct:2,explain:"Küresel askeri robot pazarı 2025-2032 arası %30.73 CAGR ile büyümesi bekleniyor."}
];
let current=0,score=0,timerInterval;
function renderQ(){
if(current>=questions.length){showResult();return}
const q=questions[current];
document.getElementById('qNum').textContent=(current+1)+'/'+questions.length;
document.getElementById('gameArea').innerHTML=`<div class="scenario"><div class="q-num">Senaryo ${current+1}</div><div class="q-text">${q.q}</div></div><div class="choices">${q.choices.map((c,i)=>`<div class="choice-btn" onclick="answer(${i})">${c}</div>`).join('')}</div>`;
startTimer();
}
function startTimer(){let t=15;document.getElementById('timer').textContent=t;clearInterval(timerInterval);timerInterval=setInterval(()=>{t--;document.getElementById('timer').textContent=t;if(t<=0){clearInterval(timerInterval);answer(-1)}},1000)}
function answer(idx){clearInterval(timerInterval);const q=questions[current];const btns=document.querySelectorAll('.choice-btn');btns.forEach((b,i)=>{if(i===q.correct)b.classList.add('correct');else if(i===idx)b.classList.add('wrong');b.style.pointerEvents='none'});if(idx===q.correct)score+=10;document.getElementById('score').textContent=score;setTimeout(()=>{current++;renderQ()},1500)}
function showResult(){document.getElementById('gameArea').innerHTML=`<div class="result"><h2>${score>=70?'Mükemmel Komutan!':score>=40?'İyi Deneme!':'Daha Çalışmalısın!'}</h2><div class="final-score">${score}/100</div><p style="color:#90a4ae;margin-top:10px">${score>=70?'YZ robotik savaşın geleceğini anlıyorsun!':'Tekrar dene, her seferinde daha iyi olacaksın!'}</p><button class="restart-btn" onclick="restart()">Tekrar Oyna</button></div>`}
function restart(){current=0;score=0;document.getElementById('score').textContent=0;renderQ()}
renderQ();
</script>
<script src="hs-nav.js"></script>
</body>
</html>
