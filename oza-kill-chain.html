<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">

<title>Vuruş Zinciri Yarışı — OZA · Harb-i Strateji</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=IBM+Plex+Mono:wght@400;500&subset=latin-ext&display=swap" rel="stylesheet">
<style>
:root{--bg:#0d0d0d;--panel:#0f1722;--red:#E01515;--cyan:#c41e3a;--gold:#C9A24B;--green:#00ff88;--tx:#EAF0F7;--dim:#90a1b5;--line:rgba(150,170,200,.15)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--tx);font-family:'IBM Plex Mono',monospace;overflow-x:hidden}
.hdr{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,15,23,.97);border-bottom:1px solid var(--line);display:flex;align-items:center;padding:0 16px;height:54px;gap:12px}
.hdr-back{font-size:12px;color:var(--dim);text-decoration:none;padding:5px 12px;border:1px solid var(--line);border-radius:6px}
.hdr-title{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:13px;flex:1;text-align:center;color:var(--red)}
.hdr-pts{font-size:12px;color:var(--gold);font-weight:600}
.main{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:70px 16px 80px}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:14px}
.sbox{background:var(--panel);border:1px solid var(--line);border-radius:10px;padding:10px 6px;text-align:center}
.sv{font-family:'Chakra Petch',sans-serif;font-size:18px;font-weight:700}
.sl{font-size:9px;color:var(--dim);text-transform:uppercase;margin-top:2px}
.stage-badge{text-align:center;margin-bottom:14px}
.stage-pill{display:inline-flex;align-items:center;gap:8px;padding:6px 18px;border-radius:20px;font-family:'Chakra Petch',sans-serif;font-size:12px;font-weight:700;border:1px solid}
/* Game area */
.game-canvas-wrap{position:relative;margin-bottom:14px;border-radius:12px;overflow:hidden;border:1px solid var(--line)}
canvas#game{display:block;width:100%;background:#060d14}
.chain-steps{display:flex;gap:6px;margin-bottom:14px;justify-content:center;flex-wrap:wrap}
.step{padding:8px 14px;border-radius:8px;border:2px solid var(--line);font-size:11px;font-weight:700;font-family:'Chakra Petch',sans-serif;color:var(--dim);transition:.2s;cursor:default}
.step.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,224,255,.08);animation:pulse .6s infinite alternate}
.step.done{border-color:var(--green);color:var(--green);background:rgba(0,255,136,.06)}
.step.fail{border-color:var(--red);color:var(--red);background:rgba(224,21,21,.08)}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(0,224,255,.3)}100%{box-shadow:0 0 0 8px rgba(0,224,255,0)}}
.action-area{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:16px;margin-bottom:14px}
.action-title{font-family:'Chakra Petch',sans-serif;font-size:13px;color:var(--gold);margin-bottom:8px}
.action-desc{font-size:12px;color:var(--dim);margin-bottom:12px;line-height:1.7}
.action-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px}
@media(max-width:400px){.action-btns{grid-template-columns:1fr}}
.action-btn{padding:12px 8px;border:2px solid var(--line);border-radius:10px;background:var(--bg);color:var(--tx);font-size:11px;font-weight:600;cursor:pointer;transition:.15s;text-align:left;font-family:'IBM Plex Mono',monospace}
.action-btn:active{transform:scale(.97)}
.action-btn.correct{border-color:var(--green)!important;background:rgba(0,255,136,.1)!important}
.action-btn.wrong{border-color:var(--red)!important;background:rgba(224,21,21,.1)!important}
.action-btn:disabled{opacity:.5;cursor:not-allowed}
.feedback{text-align:center;font-size:13px;min-height:22px;margin-bottom:10px;font-weight:600}
.timer-bar{height:5px;background:rgba(255,255,255,.07);border-radius:3px;overflow:hidden;margin-bottom:12px}
.timer-fill{height:100%;background:var(--cyan);border-radius:3px;transition:width .1s linear}
.overlay{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:28px;text-align:center}
.ov-score{font-family:'Chakra Petch',sans-serif;font-size:48px;font-weight:700;color:var(--cyan);margin-bottom:8px}
.btn-main{width:100%;padding:14px;border:none;border-radius:10px;font-family:'Chakra Petch',sans-serif;font-size:14px;font-weight:700;cursor:pointer;background:var(--red);color:#fff;margin-bottom:8px}
.btn-sec{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-family:'Chakra Petch',sans-serif;font-size:13px;cursor:pointer;background:transparent;color:var(--dim);margin-bottom:8px}

/* ═══ TEK EKRAN — NO SCROLL ═══ */
html, body {
  height: 100vh !important;
  max-height: 100vh !important;
  overflow: hidden !important;
}
body > .wrap, body > .container, body > .main, body > .game-container, body > .game-wrap {
  max-height: calc(100vh - 54px) !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
}
@media (max-width: 480px) {
  body > .wrap, body > .container, body > .main { 
    max-height: calc(100vh - 44px) !important;
    padding: 8px !important;
  }
}


/* ═══ TEK EKRAN VIEWPORT FIT ═══ */
html, body { 
  height: 100vh !important; 
  max-height: 100vh !important; 
  overflow: hidden !important;
  margin: 0 !important;
  padding: 0 !important;
}
.game-container, .container, .main, #app, #game, .game-wrapper, .game-area {
  height: 100vh !important;
  max-height: 100vh !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  display: flex !important;
  flex-direction: column !important;
}
/* Mobil uyum */
@media (max-width: 768px) {
  body { font-size: 13px !important; }
  h1, .game-title { font-size: clamp(16px, 4vw, 24px) !important; }
  h2 { font-size: clamp(14px, 3.5vw, 20px) !important; }
  .btn, button { 
    padding: 8px 16px !important; 
    font-size: 12px !important;
    min-height: 40px !important;
    touch-action: manipulation !important;
  }
  .card, .option, .choice { 
    padding: 10px !important; 
    margin: 4px !important;
  }
}
@media (max-width: 480px) {
  body { font-size: 12px !important; }
  .nav, .navbar, .top-bar, .header { 
    padding: 4px 8px !important;
    font-size: 11px !important;
  }
}
@media (max-height: 700px) {
  .game-container, .container, .main {
    padding: 8px !important;
  }
  h1, .game-title { font-size: 18px !important; }
}


/* ═══ MOBİL UYUMLU RESPONSIVE ═══ */
@media (max-width: 768px) {
  body { font-size: 14px !important; }
  .container, .main, .wrap, .content, .page-content {
    padding: 12px !important;
    max-width: 100% !important;
  }
  h1 { font-size: clamp(18px, 5vw, 28px) !important; }
  h2 { font-size: clamp(15px, 4vw, 22px) !important; }
  h3 { font-size: clamp(13px, 3.5vw, 18px) !important; }
  table { font-size: 11px !important; }
  img, video, canvas, svg { max-width: 100% !important; height: auto !important; }
  .grid, .card-grid, .cards { grid-template-columns: 1fr !important; }
}
@media (max-width: 480px) {
  body { font-size: 13px !important; }
  .container, .main, .wrap { padding: 8px !important; }
  h1 { font-size: clamp(16px, 5vw, 24px) !important; }
}
html { overflow-x: hidden !important; }
body { overflow-x: hidden !important; max-width: 100vw !important; }
img, video, iframe, canvas, svg, table { max-width: 100% !important; }


/* === BAŞLIK GÖRÜNÜRLÜk DÜZELTMESİ === */
h1, .sim-title, .game-title, .page-title {
  overflow: visible !important;
  text-overflow: unset !important;
  white-space: normal !important;
  line-height: 1.2 !important;
}
.sim-hero h1, .hero h1, .page-hero h1 {
  font-size: clamp(1.5rem, 4vw, 2.5rem) !important;
  overflow: visible !important;
  text-overflow: unset !important;
  white-space: normal !important;
  word-wrap: break-word !important;
}

</style>

<script>
var STAGES = [
  {
    label:'AŞAMA 1 — KLASİK VURUŞ ZİNCİRİ',color:'var(--green)',
    timeLimit:15,rounds:8,
    steps:['KEŞFET','TANIMLA','İZLE','HEDEFLE','VURMA KARAR','DEĞERLENDİR'],
    scenarios:[
      {title:'Zırhlı Araç Tespiti',desc:'Keşif dronu zırhlı araç konvoyunu tespit etti. Kill-chain\'in doğru sırasını uygula.',
       q:'Keşiften sonra hangi adım gelir?',
       options:['A) Hemen vur','B) Tanımla ve doğrula','C) Geri çekil','D) Komutana sor'],
       correct:1,pts:100,note:'Doğru! Tanımlama olmadan vurma hatalı hedef riski yaratır.'},
      {title:'Komuta Merkezi Hedefi',desc:'Radar sistemi düşman komuta merkezini tespit etti. 8 dakikalık hedefleme penceresi var.',
       q:'Zaman baskısı altında en kritik adım hangisi?',
       options:['A) Hemen ateş','B) Sivil kayıp değerlendirmesi','C) Yakıt kontrolü','D) Hava durumu'],
       correct:1,pts:120,note:'Doğru! IHL gereği sivil kayıp değerlendirmesi zorunlu.'},
      {title:'Hareketli Hedef',desc:'Düşman komutanı konvoyda hareket halinde. Uydu görüntüsü 3 dakikada bir güncelleniyor.',

       correct:1,pts:130,note:'Doğru! Hareketli hedefte sürekli doğrulama gerekir, eski veri tehlikelidir.'},
      {title:'Sivil Bölge Yakınlığı',desc:'Hedef, sivil yerleşim alanının 200m yakınında. Orantılılık ilkesi devrede.',
       q:'Orantılılık ilkesi neyi gerektirir?',
       options:['A) Hedefi tamamen iptal et','B) Askeri avantaj vs sivil zarar analizi','C) Daha büyük bomba kullan','D) Gece bekle'],
       correct:1,pts:140,note:'Doğru! Beklenen askeri avantaj, olası sivil zarardan büyük olmalı.'},
      {title:'Çift Kullanımlı Tesis',desc:'İstihbarat, bir fabrikanın hem sivil hem askeri üretim yaptığını gösteriyor.',
       q:'Çift kullanımlı tesise yaklaşım ne olmalı?',
       options:['A) Tamamen yok et','B) Sadece askeri bölümü hedefle','C) Görmezden gel','D) Fabrikayı ele geçir'],
       correct:1,pts:150,note:'Doğru! Ayrım ilkesi gereği sadece askeri hedef vurulabilir.'},
      {title:'Elektronik Aldatma',desc:'Düşman sahte radar sinyalleri yayıyor. 3 farklı hedef adayı var, sadece 1\'i gerçek.',
       q:'Aldatmayı aşmak için hangi yöntem en etkili?',
       options:['A) Hepsini vur','B) Çoklu sensör füzyonu','C) Rastgele seç','D) Bekle ve izle'],
       correct:1,pts:160,note:'Doğru! Farklı sensörlerin (radar+optik+SIGINT) birleşimi aldatmayı kırar.'},
      {title:'Zaman Kritik Hedef',desc:'Balistik füze rampa üzerinde, 12 dakika içinde fırlatılacak. Onay zinciri uzun.',
       q:'Zaman kritik hedefte komuta yapısı nasıl olmalı?',
       options:['A) Tüm onayları atla','B) Önceden yetkilendirilmiş kurallar','C) Üst komutayı bekle','D) Hedefi bırak'],
       correct:1,pts:170,note:'Doğru! Pre-delegated authority (önceden yetkilendirme) zaman kritik hedeflerde standart.'},
      {title:'Mühimmat Seçimi',desc:'Hedef: açık alandaki radar istasyonu. Çevrede 500m içinde sivil yok.',
       q:'Bu senaryoda en uygun mühimmat hangisi?',
       options:['A) Termobarik bomba','B) Hassas güdümlü küçük çaplı','C) Küme bombası','D) Nükleer'],

    ]
  },
  {
    label:'AŞAMA 2 — DRONE VURUŞ ZİNCİRİ (SANİYELER)',color:'var(--gold)',
    timeLimit:10,rounds:9,
    steps:['SENSÖR','FÜZYON','YZ ANALİZ','ONAY','VURMA','DEĞERLENDİR'],
    scenarios:[
      {title:'FPV Drone Saldırısı',desc:'FPV drone hedefi kilitliyor. Kill-chain saniyelerden dakikalara uzuyor. YZ destekli sistem devrede.',
       q:'YZ hedef önerdi. İnsan operatörün rolü ne olmalı?',
       options:['A) YZ\'ye tam yetki ver','B) İnsan onayı zorunlu','C) Rastgele seç','D) İptal et'],
       correct:1,pts:150,note:'Doğru! İnsan kontrolü IHL ve etik açıdan zorunlu.'},
      {title:'Sürü Koordinasyonu',desc:'20 drone\'luk sürü koordineli saldırı yapıyor. Her drone saniyeler içinde karar veriyor.',

       options:['A) Merkezi komuta','B) Dağıtık ağ (mesh)','C) Tek drone komutanı','D) Radyo sessizliği'],
       correct:1,pts:160,note:'Doğru! Mesh ağı tek nokta arızasına karşı dayanıklı.'},
      {title:'Kamikaze Drone Kararı',desc:'Tek kullanımlık kamikaze drone hedefe 30 saniye uzaklıkta. Son iptal penceresi 5 saniye.',

      {title:'Anti-Drone Savunma',desc:'Düşman anti-drone sistemi aktif. Mikrodalga ve lazer silahları drone sürüsünü tehdit ediyor.',

       correct:1,pts:170,note:'Doğru! Savunma kapasitesini aşan sayıda drone ile doyurma saldırısı en etkili.'},
      {title:'GPS Bozulması',desc:'Düşman GPS jamming yapıyor. Drone\'lar konum kaybetti.',

      {title:'Otonom Hedef Takibi',desc:'YZ sistemi hedefi 45 dakikadır otonom takip ediyor. Operatör uyudu.',

      {title:'Çoklu Hedef Önceliklendirme',desc:'Aynı anda 5 hedef tespit edildi. Sadece 2 drone mevcut.',

      {title:'Elektronik Harp Ortamı',desc:'Yoğun EW ortamında iletişim kesik. Drone otonom modda.',
       q:'İletişim kesildiğinde drone ne yapmalı?',

       correct:1,pts:190,note:'Doğru! Fail-safe davranış (güvenli bölgeye dön/bekle) önceden programlanmalı.'}
    ]
  },
  {
    label:'AŞAMA 3 — OTONOMİ SINIRI (ms)',color:'var(--red)',
    timeLimit:7,rounds:8,
    steps:['ALGI','SINIFLA','KARAR','ANGAJE','DEĞERLENDİR','RAPORLA'],
    scenarios:[
      {title:'Otonom Karar Anı',desc:'Sistem 300ms içinde karar vermek zorunda. İnsan döngüde kalamıyor. Etik sınır nerede?',
       q:'Otonom silah sistemi için en kritik kısıtlama hangisi?',
       options:['A) Hız sınırı','B) Anlamlı insan kontrolü','C) Batarya ömrü','D) Gürültü seviyesi'],

      {title:'Fiber-Optik Drone',desc:'Jammer-proof fiber-optik kablolu drone. Elektronik harp etkisiz. Operatör 5km uzakta.',
       q:'Fiber-optik drone\'un temel avantajı nedir?',
       options:['A) Daha hızlı','B) Jamming\'e karşı bağışık','C) Daha ucuz','D) Daha sessiz'],
       correct:1,pts:180,note:'Doğru! Elektromanyetik bozucu etkisiz kalıyor.'},
      {title:'Yapay Zekâ Yanılgısı',desc:'YZ sistemi %98 güvenle "düşman tank" dedi. Ama görüntü kalitesi düşük ve gece.',
       q:'%98 YZ güveni yeterli mi?',
       options:['A) Evet, %98 çok yüksek','B) Hayır, bağlam ve sonuç ağırlığı da önemli','C) %99 olmalı','D) YZ her zaman haklı'],
       correct:1,pts:200,note:'Doğru! Yüksek güven bile bağlamsız yeterli değil. Sivil kayıp riski varsa eşik yükselmeli.'},
      {title:'Loitering Munition',desc:'Barınma mühimmatı (loitering) 2 saattir hedef arıyor. Yakıt %15. Bir araç tespit edildi.',
       q:'Düşük yakıtta acele karar verme baskısı var. Doğru yaklaşım?',
       options:['A) Hemen vur, yakıt bitiyor','B) Standart doğrulama prosedürünü uygula','C) Geri dön','D) Yere çakıl'],
       correct:1,pts:210,note:'Doğru! Kaynak baskısı hedef doğrulama standardını düşürmemeli.'},
      {title:'Siber Saldırı Riski',desc:'Düşman drone kontrol sistemine siber saldırı yapabilir. Otonom mod vs uzaktan kontrol.',
       q:'Siber saldırı riski altında en güvenli mod hangisi?',
       options:['A) Tam otonom','B) Kriptolu uzaktan kontrol + otonom yedek','C) Manuel kontrol','D) Sistemi kapat'],
       correct:1,pts:220,note:'Doğru! Katmanlı güvenlik: şifreli iletişim + siber saldırı durumunda güvenli otonom mod.'},
      {title:'Uluslararası Hukuk Sınırı',desc:'Otonom sistem, tarafsız ülke hava sahasına yaklaşıyor. 10 saniye içinde sınırı geçecek.',
       q:'Otonom sistemde coğrafi kısıtlama (geofencing) neden kritik?',
       options:['A) Yakıt tasarrufu','B) Egemenlik ihlali ve savaş suçu riski','C) Radar kaçınma','D) Önemsiz'],
       correct:1,pts:200,note:'Doğru! Tarafsız ülke ihlali uluslararası hukuk suçu, geofencing zorunlu.'},
      {title:'İnsan-Makine Takımı',desc:'Operatör 50 drone\'u aynı anda yönetiyor. Bilişsel yük çok yüksek.',
       q:'İnsan-makine takımında optimal oran için temel faktör?',
       options:['A) Mümkün olduğunca çok drone','B) Operatörün bilişsel kapasitesi','C) Drone sayısı sabit','D) Sadece YZ yönetsin'],
       correct:1,pts:190,note:'Doğru! İnsan bilişsel kapasitesi aşılırsa hata oranı katlanarak artar.'},
      {title:'Savaş Sonrası Hesap Verebilirlik',desc:'Otonom sistem sivil kayba yol açtı. Kim sorumlu?',
       q:'Otonom silah kaynaklı sivil kayıpta hukuki sorumluluk kime ait?',
       options:['A) YZ\'nin kendisi','B) Komuta zinciri (komutan + geliştirici)','C) Kimse','D) Drone operatörü'],
       correct:1,pts:250,note:'Doğru! Komutan (kullanım kararı) ve geliştirici (tasarım kusuru) birlikte sorumlu. YZ\'nin hukuki kişiliği yok.'}
    ]
  }
];

var stage=0, round=0, pts=0, chainCount=0, timer=null, timeLeft=0, answered=false;

function startStage() {
  round=0; answered=false;
  document.getElementById('s-stage').textContent=(stage+1)+'/3';
  renderStageBadge(); renderChainSteps(); nextRound();
}

function renderStageBadge() {
  var s=STAGES[stage];
  document.getElementById('stage-badge').innerHTML=
    '<div class="stage-pill" style="border-color:'+s.color+';color:'+s.color+'">'+s.label+'</div>';
}

function renderChainSteps(activeIdx) {
  var s=STAGES[stage];
  var html='';
  s.steps.forEach(function(step,i){
    var cls='step';
    if(i===activeIdx)cls+=' active';
    else if(activeIdx!==undefined&&i<activeIdx)cls+=' done';
    html+='<div class="'+cls+'">'+step+'</div>';
  });
  document.getElementById('chain-steps').innerHTML=html;
}

// Canvas animation
var gCanvas=document.getElementById('game');
var gCtx=gCanvas.getContext('2d');
var gW,gH;
function resizeGame(){gW=gCanvas.offsetWidth;gH=200;gCanvas.width=gW;gCanvas.height=gH;}
resizeGame();window.addEventListener('resize',resizeGame);

var drone={x:30,y:gH/2,vx:2,vy:0,trail:[]};
var target={x:gW-60,y:gH/2,hit:false,hitSüre:0};
var missile={active:false,x:0,y:0,vx:0,vy:0};
var gFrame=0;

function drawGame(){
  gCtx.clearRect(0,0,gW,gH);
  // BG
  gCtx.fillStyle='#060d14';gCtx.fillRect(0,0,gW,gH);
  // Grid
  gCtx.strokeStyle='rgba(0,224,255,0.04)';gCtx.lineWidth=1;
  for(var x=0;x<gW;x+=30){gCtx.beginPath();gCtx.moveTo(x,0);gCtx.lineTo(x,gH);gCtx.stroke();}
  for(var y=0;y<gH;y+=30){gCtx.beginPath();gCtx.moveTo(0,y);gCtx.lineTo(gW,y);gCtx.stroke();}

  // Drone trail
  drone.trail.push({x:drone.x,y:drone.y});
  if(drone.trail.length>20)drone.trail.shift();
  drone.trail.forEach(function(p,i){
    var a=i/drone.trail.length*0.4;
    gCtx.beginPath();gCtx.arc(p.x,p.y,2,0,Math.PI*2);
    gCtx.fillStyle='rgba(0,224,255,'+a+')';gCtx.fill();
  });

  // Drone
  drone.y=gH/2+Math.sin(gFrame*0.05)*30;
  gCtx.beginPath();gCtx.arc(drone.x,drone.y,7,0,Math.PI*2);
  gCtx.fillStyle='#c41e3a';gCtx.fill();
  gCtx.beginPath();gCtx.arc(drone.x,drone.y,12,0,Math.PI*2);
  gCtx.strokeStyle='rgba(0,224,255,0.3)';gCtx.lineWidth=1;gCtx.stroke();

  // Target
  if(!target.hit){
    gCtx.beginPath();gCtx.arc(target.x,target.y,10,0,Math.PI*2);
    gCtx.fillStyle='#C9A24B';gCtx.fill();
    // Crosshair
    gCtx.strokeStyle='rgba(201,162,75,0.5)';gCtx.lineWidth=1;
    gCtx.beginPath();gCtx.moveTo(target.x-20,target.y);gCtx.lineTo(target.x+20,target.y);gCtx.stroke();
    gCtx.beginPath();gCtx.moveTo(target.x,target.y-20);gCtx.lineTo(target.x,target.y+20);gCtx.stroke();
    gCtx.beginPath();gCtx.arc(target.x,target.y,18,0,Math.PI*2);
    gCtx.strokeStyle='rgba(201,162,75,0.2)';gCtx.stroke();
  } else {
    target.hitTimer++;
    var r=target.hitTimer*2;
    gCtx.beginPath();gCtx.arc(target.x,target.y,r,0,Math.PI*2);
    gCtx.strokeStyle='rgba(224,21,21,'+(1-target.hitTimer/30)+')';gCtx.lineWidth=2;gCtx.stroke();
    if(target.hitTimer>30){target.hit=false;target.hitTimer=0;target.x=gW*0.5+Math.random()*gW*0.3;target.y=30+Math.random()*(gH-60);}
  }

  // Missile
  if(missile.active){
    missile.x+=missile.vx;missile.y+=missile.vy;
    gCtx.beginPath();gCtx.arc(missile.x,missile.y,4,0,Math.PI*2);
    gCtx.fillStyle='#E01515';gCtx.fill();
    var dx=target.x-missile.x,dy=target.y-missile.y;
    if(Math.sqrt(dx*dx+dy*dy)<15){missile.active=false;target.hit=true;}
    if(missile.x>gW||missile.y<0||missile.y>gH)missile.active=false;
  }

  // Kill-chain line
  if(!missile.active&&!target.hit){
    gCtx.beginPath();gCtx.moveTo(drone.x,drone.y);gCtx.lineTo(target.x,target.y);
    gCtx.strokeStyle='rgba(224,21,21,0.1)';gCtx.lineWidth=1;gCtx.setLineDash([4,4]);gCtx.stroke();gCtx.setLineDash([]);
  }

  // Timer text
  gCtx.fillStyle='rgba(0,224,255,0.5)';gCtx.font='10px IBM Plex Mono';
  gCtx.fillText('VURUŞ ZİNCİRİ AKTIF',10,16);

  gFrame++;
  requestAnimationFrame(drawGame);
}
drawGame();

// Fire missile on click/tap
gCanvas.addEventListener('click',function(){
  if(!missile.active&&!target.hit){
    missile.active=true;missile.x=drone.x;missile.y=drone.y;
    var dx=target.x-drone.x,dy=target.y-drone.y,d=Math.sqrt(dx*dx+dy*dy);
    missile.vx=dx/d*8;missile.vy=dy/d*8;
  }
});

function nextRound(){
  var s=STAGES[stage];
  if(round>=s.rounds){endStage();return;}
  answered=false;
  var sc=s.scenarios[round%s.scenarios.length];
  timeLeft=s.timeLimit;
  document.getElementById('s-time').textContent=timeLeft+'s';
  document.getElementById('timer-fill').style.width='100%';
  clearInterval(timer);
  timer=setInterval(function(){
    timeLeft--;
    document.getElementById('s-time').textContent=timeLeft+'s';
    document.getElementById('timer-fill').style.width=(timeLeft/s.timeLimit*100)+'%';
    if(timeLeft<=3)document.getElementById('timer-fill').style.background='var(--red)';
    else document.getElementById('timer-fill').style.background='var(--cyan)';
    if(timeLeft<=0){clearInterval(timer);if(!answered)timeOut();}
  },1000);

  var chainStep=Math.floor(round/s.rounds*s.steps.length);
  renderChainSteps(chainStep);

  var html='<div class="action-title">🎯 '+sc.title+'</div>';
  html+='<div class="action-desc">'+sc.desc+'<br><br><strong>'+sc.q+'</strong></div>';
  html+='<div class="action-btns">';
  sc.options.forEach(function(opt,i){
    html+='<button class="action-btn" onclick="answer('+i+',this)">'+opt+'</button>';
  });
  html+='</div>';
  document.getElementById('action-area').innerHTML=html;
  document.getElementById('feedback').innerHTML='';
}

function answer(idx,btn){
  if(answered)return;
  answered=true;clearInterval(timer);
  var s=STAGES[stage];
  var sc=s.scenarios[round%s.scenarios.length];
  var correct=idx===sc.correct;
  btn.classList.add(correct?'correct':'wrong');
  document.querySelectorAll('.action-btn').forEach(function(b){b.disabled=true;});
  if(correct){
    pts+=sc.pts;chainCount++;
    document.getElementById('feedback').innerHTML='<span style="color:var(--green)">✅ '+sc.note+' | +'+sc.pts+'</span>';
    // Fire missile on correct answer
    if(!missile.active){
      missile.active=true;missile.x=drone.x;missile.y=drone.y;
      var dx=target.x-drone.x,dy=target.y-drone.y,d=Math.sqrt(dx*dx+dy*dy);
      missile.vx=dx/d*8;missile.vy=dy/d*8;
    }
  } else {
    document.getElementById('feedback').innerHTML='<span style="color:var(--red)">❌ Yanlış! Zaman kaybedildi.</span>';
  }
  document.getElementById('s-pts').textContent=pts;
  document.getElementById('hdr-pts').textContent='⭐ '+pts;
  document.getElementById('s-chain').textContent=chainCount;
  round++;setTimeout(nextRound,1400);
}

function timeOut(){
  answered=true;
  document.getElementById('feedback').innerHTML='<span style="color:var(--red)">⏱️ Süre doldu! Kill-chain koptu.</span>';
  round++;setTimeout(nextRound,1200);
}

function endStage(){
  clearInterval(timer);
  try{var sc=JSON.parse(localStorage.getItem('hs_scores')||'{}');sc['kill-chain']=Math.max(sc['kill-chain']||0,pts);localStorage.setItem('hs_scores',JSON.stringify(sc));}catch(e){}
  var html='<div class="overlay">';
  html+='<div style="font-size:48px">'+(stage<2?'⚡':'🏆')+'</div>';
  html+='<div class="ov-score">'+pts+'</div>';
  html+='<div style="font-size:13px;color:var(--dim);margin-bottom:12px">'+(stage<2?'Aşama '+(stage+1)+' tamamlandı!':'Vuruş Zinciri Ustası!')+'</div>';
  html+='<div style="font-size:12px;color:var(--dim);margin-bottom:16px">Toplam Zincir: <span style="color:var(--green)">'+chainCount+'</span></div>';
  document.getElementById('action-area').innerHTML=html;
  if(stage<2){
    var b=document.createElement('button');b.className='btn-main';b.textContent='▶ AŞAMA '+(stage+2)+' — '+STAGES[stage+1].label;
    b.onclick=function(){stage++;startStage();};document.getElementById('action-area').appendChild(b);
  } else {
    var b=document.createElement('button');b.className='btn-main';b.textContent='🔄 BAŞTAN OYNA';
    b.onclick=function(){stage=0;pts=0;chainCount=0;startStage();};document.getElementById('action-area').appendChild(b);
    var b2=document.createElement('button');b2.className='btn-sec';b2.textContent='← Oyun Merkezine Dön';
    b2.onclick=function(){location.href='oza-hub.html';};document.getElementById('action-area').appendChild(b2);
  }
  document.getElementById('feedback').innerHTML='';
}

startStage();

// ===== SOUND EFFECTS =====
var _audioCtx;
function _getAudio(){if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();return _audioCtx;}
function sfxBomb(){var a=_getAudio();var o=a.createOscillator();var g=a.createGain();o.type='sawtooth';o.connect(g);g.connect(a.destination);o.frequency.setValueAtTime(150,a.currentTime);o.frequency.exponentialRampToValueAtTime(30,a.currentTime+0.5);g.gain.setValueAtTime(0.4,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.6);o.start();o.stop(a.currentTime+0.6);}
function sfxAlarm(){var a=_getAudio();var o=a.createOscillator();var g=a.createGain();o.type='square';o.connect(g);g.connect(a.destination);o.frequency.setValueAtTime(800,a.currentTime);o.frequency.setValueAtTime(600,a.currentTime+0.15);o.frequency.setValueAtTime(800,a.currentTime+0.3);g.gain.setValueAtTime(0.2,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.5);o.start();o.stop(a.currentTime+0.5);}
function sfxSuccess(){var a=_getAudio();var o=a.createOscillator();var g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.setValueAtTime(523,a.currentTime);o.frequency.setValueAtTime(659,a.currentTime+0.1);o.frequency.setValueAtTime(784,a.currentTime+0.2);g.gain.setValueAtTime(0.2,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.4);o.start();o.stop(a.currentTime+0.4);}
function sfxClick(){var a=_getAudio();var o=a.createOscillator();var g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=600;o.type='sine';g.gain.setValueAtTime(0.1,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.05);o.start();o.stop(a.currentTime+0.05);}
</script>
