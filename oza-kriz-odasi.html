<style>
:root{--bg:#0d0d0d;--panel:#0f1722;--panel2:#16202d;--red:#E01515;--red2:#ff3a4a;--cyan:#c41e3a;--gold:#C9A24B;--line:rgba(150,170,200,.13);--line2:rgba(150,170,200,.22);--tx:#EAF0F7;--dim:#90a1b5}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'IBM Plex Sans',sans-serif;line-height:1.6;-webkit-font-smoothing:antialiased;min-height:100vh}
a{color:inherit;text-decoration:none}
.top{position:sticky;top:0;z-index:60;background:rgba(10,15,23,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:0 20px}
.top .in{max-width:900px;margin:0 auto;display:flex;align-items:center;gap:14px;min-height:52px}
.back{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim)}
.back:hover{color:#fff}
.title{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:16px;color:#fff}
.hdr-score{margin-left:auto;font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gold)}

.wrap{max-width:900px;margin:0 auto;padding:30px 20px 80px}

/* ── Kriz başlık ── */
.kriz-header{text-align:center;margin-bottom:30px}
.kriz-header h1{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:clamp(28px,6vw,52px);color:#fff;line-height:1}
.kriz-header .sub{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);margin-top:8px;letter-spacing:.04em}

/* ── Geri sayım ── */
.timer-ring{position:relative;width:120px;height:120px;margin:0 auto 24px}
.timer-ring svg{transform:rotate(-90deg)}
.timer-ring .bg{fill:none;stroke:var(--panel2);stroke-width:8}
.timer-ring .fg{fill:none;stroke:var(--red2);stroke-width:8;stroke-linecap:round;transition:stroke-dashoffset .9s linear,stroke .3s}
.timer-ring .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:36px;color:var(--red2)}

/* ── Senaryo kartı ── */
.scenario-card{background:var(--panel);border:1px solid var(--line2);border-radius:16px;padding:28px;margin-bottom:24px;position:relative;overflow:hidden}
.scenario-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--red),var(--cyan))}
.sc-label{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--red2);margin-bottom:10px}
.sc-title{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:22px;color:#fff;margin-bottom:12px;line-height:1.2}
.sc-body{font-family:'IBM Plex Sans',sans-serif;font-size:14px;color:var(--dim);line-height:1.7}
.sc-formula{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--gold);margin-top:14px;padding:10px 14px;background:rgba(201,162,75,.08);border-radius:8px;border-left:3px solid var(--gold)}

/* ── Kaydıraç paneli ── */
.sliders{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px}
@media(max-width:560px){.sliders{grid-template-columns:1fr}}
.slider-item{background:var(--panel2);border:1px solid var(--line2);border-radius:12px;padding:16px}
.sl-label{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.sl-val{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:24px;color:var(--cyan);margin-bottom:8px}
input[type=range]{width:100%;-webkit-appearance:none;height:6px;border-radius:3px;background:var(--line2);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;border-radius:50%;background:var(--red2);cursor:pointer;box-shadow:0 0 8px rgba(224,21,21,.5)}
input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--red2);cursor:pointer;border:none}

/* ── G değeri göstergesi ── */
.g-display{text-align:center;margin-bottom:24px;background:var(--panel);border:1px solid var(--line2);border-radius:14px;padding:20px}
.g-label{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em}
.g-value{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:48px;margin:8px 0;transition:color .3s}
.g-bar{height:8px;border-radius:4px;background:var(--line2);overflow:hidden;margin-top:8px}
.g-fill{height:100%;border-radius:4px;transition:width .3s,background .3s}

/* ── Karar butonları ── */
.choices{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px}
@media(max-width:480px){.choices{grid-template-columns:1fr}}
.choice-btn{background:var(--panel);border:2px solid var(--line2);border-radius:12px;padding:16px 14px;cursor:pointer;text-align:left;transition:all .15s;font-family:'IBM Plex Sans',sans-serif;color:var(--tx)}
.choice-btn:hover{border-color:var(--red);transform:translateY(-2px);box-shadow:0 6px 24px rgba(224,21,21,.2)}
.choice-btn .cb-title{font-family:'Chakra Petch',sans-serif;font-size:14px;font-weight:600;color:#fff;margin-bottom:6px}
.choice-btn .cb-desc{font-size:12px;color:var(--dim);line-height:1.5}
.choice-btn .cb-cost{font-family:'IBM Plex Mono',monospace;font-size:10px;color:var(--gold);margin-top:8px}
.choice-btn.selected{border-color:var(--cyan);background:rgba(0,224,255,.06)}
.choice-btn.correct{border-color:#00ff88;background:rgba(0,255,136,.08)}
.choice-btn.wrong{border-color:var(--red);background:rgba(224,21,21,.08)}

/* ── Sonuç ekranı ── */
.result-screen{display:none;text-align:center;padding:40px 20px}
.result-screen.show{display:block}
.result-icon{font-size:64px;margin-bottom:16px}
.result-title{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:32px;margin-bottom:12px}
.result-score{font-family:'IBM Plex Mono',monospace;font-size:48px;font-weight:700;color:var(--red2);margin:16px 0}
.result-explain{font-size:14px;color:var(--dim);max-width:500px;margin:0 auto 24px;line-height:1.7}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.btn{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:14px;padding:14px 24px;border-radius:10px;border:none;cursor:pointer;transition:.15s}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{background:var(--red2)}
.btn-outline{background:transparent;color:var(--cyan);border:1px solid var(--cyan)}.btn-outline:hover{background:rgba(0,224,255,.08)}
.btn-gold{background:transparent;color:var(--gold);border:1px solid var(--gold)}.btn-gold:hover{background:rgba(201,162,75,.08)}

/* ── İlerleme ── */
.progress-bar{height:4px;background:var(--line2);border-radius:2px;margin-bottom:24px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--red),var(--cyan));border-radius:2px;transition:width .4s}

/* ── Acil uyarı efekti ── */
@keyframes urgent-pulse{0%,100%{box-shadow:0 0 0 0 rgba(224,21,21,0)}50%{box-shadow:0 0 0 8px rgba(224,21,21,.3)}}
.urgent{animation:urgent-pulse 0.8s ease-in-out infinite}

/* ═══ TEK EKRAN — NO SCROLL ═══ */
html, body {
  height: 100vh !important;
  max-height: 100vh !important;
  overflow: hidden !important;
}
body > .wrap, body > .container, body > .main, body > .game-container, body > .game-wrap {
  max-height: calc(100vh - 54px) !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
}
@media (max-width: 480px) {
  body > .wrap, body > .container, body > .main { 
    max-height: calc(100vh - 44px) !important;
    padding: 8px !important;
  }
}


/* ═══ TEK EKRAN VIEWPORT FIT ═══ */
html, body { 
  height: 100vh !important; 
  max-height: 100vh !important; 
  overflow: hidden !important;
  margin: 0 !important;
  padding: 0 !important;
}
.game-container, .container, .main, #app, #game, .game-wrapper, .game-area {
  height: 100vh !important;
  max-height: 100vh !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  display: flex !important;
  flex-direction: column !important;
}
/* Mobil uyum */
@media (max-width: 768px) {
  body { font-size: 13px !important; }
  h1, .game-title { font-size: clamp(16px, 4vw, 24px) !important; }
  h2 { font-size: clamp(14px, 3.5vw, 20px) !important; }
  .btn, button { 
    padding: 8px 16px !important; 
    font-size: 12px !important;
    min-height: 40px !important;
    touch-action: manipulation !important;
  }
  .card, .option, .choice { 
    padding: 10px !important; 
    margin: 4px !important;
  }
}
@media (max-width: 480px) {
  body { font-size: 12px !important; }
  .nav, .navbar, .top-bar, .header { 
    padding: 4px 8px !important;
    font-size: 11px !important;
  }
}
@media (max-height: 700px) {
  .game-container, .container, .main {
    padding: 8px !important;
  }
  h1, .game-title { font-size: 18px !important; }
}


/* ═══ MOBİL UYUMLU RESPONSIVE ═══ */
@media (max-width: 768px) {
  body { font-size: 14px !important; }
  .container, .main, .wrap, .content, .page-content {
    padding: 12px !important;
    max-width: 100% !important;
  }
  h1 { font-size: clamp(18px, 5vw, 28px) !important; }
  h2 { font-size: clamp(15px, 4vw, 22px) !important; }
  h3 { font-size: clamp(13px, 3.5vw, 18px) !important; }
  table { font-size: 11px !important; }
  img, video, canvas, svg { max-width: 100% !important; height: auto !important; }
  .grid, .card-grid, .cards { grid-template-columns: 1fr !important; }
}
@media (max-width: 480px) {
  body { font-size: 13px !important; }
  .container, .main, .wrap { padding: 8px !important; }
  h1 { font-size: clamp(16px, 5vw, 24px) !important; }
}
html { overflow-x: hidden !important; }
body { overflow-x: hidden !important; max-width: 100vw !important; }
img, video, iframe, canvas, svg, table { max-width: 100% !important; }

// ===== SOUND EFFECTS =====
var _audioCtx;
function _getAudio(){if(!_audioCtx)_audioCtx=new(window.AudioContext||window.webkitAudioContext)();return _audioCtx;}
function sfxBomb(){var a=_getAudio();var o=a.createOscillator();var g=a.createGain();o.type='sawtooth';o.connect(g);g.connect(a.destination);o.frequency.setValueAtTime(150,a.currentTime);o.frequency.exponentialRampToValueAtTime(30,a.currentTime+0.5);g.gain.setValueAtTime(0.4,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.6);o.start();o.stop(a.currentTime+0.6);}
function sfxAlarm(){var a=_getAudio();var o=a.createOscillator();var g=a.createGain();o.type='square';o.connect(g);g.connect(a.destination);o.frequency.setValueAtTime(800,a.currentTime);o.frequency.setValueAtTime(600,a.currentTime+0.15);o.frequency.setValueAtTime(800,a.currentTime+0.3);g.gain.setValueAtTime(0.2,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.5);o.start();o.stop(a.currentTime+0.5);}
function sfxSuccess(){var a=_getAudio();var o=a.createOscillator();var g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.setValueAtTime(523,a.currentTime);o.frequency.setValueAtTime(659,a.currentTime+0.1);o.frequency.setValueAtTime(784,a.currentTime+0.2);g.gain.setValueAtTime(0.2,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.4);o.start();o.stop(a.currentTime+0.4);}
function sfxClick(){var a=_getAudio();var o=a.createOscillator();var g=a.createGain();o.connect(g);g.connect(a.destination);o.frequency.value=600;o.type='sine';g.gain.setValueAtTime(0.1,a.currentTime);g.gain.exponentialRampToValueAtTime(0.001,a.currentTime+0.05);o.start();o.stop(a.currentTime+0.05);}
</script>

      {title:'Alternatif Tedarik Zinciri',desc:'Acil olarak alternatif tedarikçilerle anlaşma yapılsın, stok artırılsın.',cost:'Yüksek maliyet · Orta süre',puan:82},
      {title:'Karşı Ambargo',desc:'Rakip ülkenin ihtiyaç duyduğu teknoloji ihracatı durdurulsun.',cost:'Yüksek risk · Eskalasyon',puan:55},
      {title:'Geri Dönüşüm Programı',desc:'Yerli geri dönüşüm kapasitesi acilen artırılsın.',cost:'Orta maliyet · Uzun vadeli',puan:70},
      {title:'Diplomatik Çözüm',desc:'Ambargonun kaldırılması için müzakere başlatılsın.',cost:'Düşük maliyet · Belirsiz sonuç',puan:60}
    ],
    bestChoice:0,
    explain:'Kritik mineral krizlerinde çok kanallı yaklaşım şarttır: hem alternatif tedarik hem de uzun vadeli yerli kapasite.'
  },
  {
    id:'s5', label:'BİLİŞSEL SAVAŞ · ALGI',

    body:'Sosyal medyada koordineli dezenformasyon kampanyası tespit edildi. Kamuoyu algısı hızla değişiyor, müttefik ilişkileri zarar görüyor. Yanıt için 30 saniyeniz var.',
    formula:'G = T×S×E×L → Optimal: 550-750',
    optimalMin:550, optimalMax:750,
    choices:[
      {title:'Gerçek Zamanlı Çürütme',desc:'Resmi kanallardan hızlı ve belgeli yanıt verilsin, doğru bilgi yayılsın.',cost:'Orta maliyet · Hızlı etki',puan:86},
      {title:'Platform Baskısı',desc:'Sosyal medya platformlarına içerik kaldırma talebi iletilsin.',cost:'Orta maliyet · Yavaş',puan:60},
      {title:'Sessiz Kalma',desc:'Yanıt verilmesin, kampanya kendiliğinden sönümlensin.',cost:'Düşük maliyet · Yüksek risk',puan:25},

    bestChoice:0,

  }

var currentIdx = 0, sessionScore = 0, roundScore = 0;
var timer = null, timeLeft = 30, answered = false;
var T=5,S=5,E=5,L=5;

function updateSlider(key, val){
  val = parseInt(val);
  if(key==='T') T=val; if(key==='S') S=val;
  if(key==='E') E=val; if(key==='L') L=val;
  document.getElementById('val-'+key).textContent = val;
  updateG();
  HS.beep(300+val*30, 0.04, 0.06);
}

function updateG(){
  var g = T*S*E*L;
  var gEl = document.getElementById('g-value');
  var gFill = document.getElementById('g-fill');
  gEl.textContent = g;
  var pct = Math.min(100, g/10000*100);
  gFill.style.width = pct+'%';
  var sc = SCENARIOS[currentIdx];
  if(g >= sc.optimalMin && g <= sc.optimalMax){
    gEl.style.color = '#00ff88';
    gFill.style.background = '#00ff88';
  } else if(g < sc.optimalMin){
    gEl.style.color = 'var(--cyan)';
    gFill.style.background = 'var(--cyan)';
  } else {
    gEl.style.color = 'var(--red2)';
    gFill.style.background = 'var(--red2)';
  }
}

function loadScenario(){
  answered = false;
  timeLeft = 30 + (HS.hasPerk('taktik_1') ? 3 : 0);
  var sc = SCENARIOS[currentIdx % SCENARIOS.length];

  document.getElementById('sc-label').textContent = sc.label;
  document.getElementById('sc-title').textContent = sc.title;
  document.getElementById('sc-body').textContent = sc.body;
  document.getElementById('sc-formula').textContent = sc.formula;

  // Seçenekler
  var cp = document.getElementById('choices-panel');
  cp.innerHTML = sc.choices.map(function(c,i){
    return '<button class="choice-btn" onclick="makeChoice('+i+')" id="cb-'+i+'">' +
      '<div class="cb-title">'+c.title+'</div>' +
      '<div class="cb-desc">'+c.desc+'</div>' +
      '<div class="cb-cost">'+c.cost+'</div>' +
    '</button>';
  }).join('');

  document.getElementById('result-screen').classList.remove('show');
  document.getElementById('sliders-panel').style.display = '';
  document.getElementById('choices-panel').style.display = '';
  document.getElementById('g-display') && (document.getElementById('g-display').style.display = '');

  // İlerleme
  var total = SCENARIOS.length;
  document.getElementById('progress').style.width = ((currentIdx % total) / total * 100) + '%';

  startTimer();
}

function startTimer(){
  if(timer) timer.stop();
  var arc = document.getElementById('timer-arc');
  var numEl = document.getElementById('timer-num');
  var ring = document.getElementById('timer-ring');
  var total = timeLeft;
  var circ = 326.7;

  timer = HS.countdown(total, function(rem){
    numEl.textContent = rem;
    arc.style.strokeDashoffset = circ * (1 - rem/total);
    if(rem <= 3){
      arc.style.stroke = '#ff3a4a';
      ring.classList.add('urgent');
      HS.beepTick();
    } else {
      arc.style.stroke = 'var(--red2)';
      ring.classList.remove('urgent');
    }
  }, function(){
    if(!answered) timeoutChoice();
  });
}

function makeChoice(idx){
  if(answered) return;
  answered = true;
  if(timer) timer.stop();

  var sc = SCENARIOS[currentIdx % SCENARIOS.length];
  var g = T*S*E*L;
  var gBonus = (g >= sc.optimalMin && g <= sc.optimalMax) ? 20 : 0;
  var baseScore = sc.choices[idx].score;
  var timeBonus = Math.floor(timeLeft * 3);
  roundScore = baseScore + gBonus + timeBonus;

  // Görsel geri bildirim
  var btn = document.getElementById('cb-'+idx);
  var bestBtn = document.getElementById('cb-'+sc.bestChoice);
  if(idx === sc.bestChoice){
    btn.classList.add('correct');
    HS.beepWin();
    HS.burst(btn, '#00ff88');
    HS.flashScreen('rgba(0,255,136,0.15)', 400);
  } else {
    btn.classList.add('wrong');
    if(bestBtn) bestBtn.classList.add('correct');
    HS.beepFail();
    HS.flashScreen('rgba(224,21,21,0.25)', 400);
  }

  sessionScore += roundScore;
  HS.addScore('kriz-odasi', roundScore);
  document.getElementById('hdr-score').textContent = '⭐ ' + HS.getTotalScore();

  setTimeout(showResult, 800);
}

function timeoutChoice(){
  answered = true;
  HS.beepFail();
  HS.flashScreen('rgba(224,21,21,0.4)', 600);
  roundScore = 0;
  setTimeout(showResult, 400);
}

function showResult(){
  var sc = SCENARIOS[currentIdx % SCENARIOS.length];
  document.getElementById('sliders-panel').style.display = 'none';
  document.getElementById('choices-panel').style.display = 'none';

  var rs = document.getElementById('result-screen');
  document.getElementById('result-icon').textContent = roundScore >= 80 ? '🎯' : roundScore >= 50 ? '⚠️' : '❌';
  document.getElementById('result-title').textContent = roundScore >= 80 ? 'Mükemmel Karar!' : roundScore >= 50 ? 'Kabul Edilebilir' : timeLeft <= 0 ? 'Süre Doldu!' : 'Yanlış Karar';
  document.getElementById('result-score').textContent = '+' + roundScore;
  document.getElementById('result-explain').textContent = sc.explain;
  rs.classList.add('show');

  if(sessionScore >= 300) HS.awardBadge('kriz_ustasi');
}

function nextScenario(){
  currentIdx++;
  loadScenario();
}

// Başlat
loadScenario();
</script>
