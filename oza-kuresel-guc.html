<style>*{margin:0;padding:0;box-sizing:border-box;}:root{--bg:#0d0d0d;--card:#1a1a1a;--card2:#222;--red:#c41e3a;--red2:#ff2d55;--white:#f0f0f0;--gray:#888;--border:rgba(255,255,255,.1);}html,body{height:100%;overflow:hidden;font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--white);}.top-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;background:#111;border-bottom:2px solid var(--red);position:fixed;top:0;left:0;right:0;z-index:100;}.tb-back{color:var(--red);text-decoration:none;font-size:.75rem;font-weight:700;font-family:'Chakra Petch',monospace;}.tb-title{font-family:'Chakra Petch',monospace;font-size:1rem;font-weight:900;}.tb-stats{display:flex;gap:12px;font-size:.7rem;font-family:'IBM Plex Mono',monospace;}.tb-stats span{color:var(--gray);}.tb-stats b{color:var(--red2);}.main{display:grid;grid-template-columns:1fr 360px;height:calc(100vh - 50px);margin-top:50px;}.left-panel{overflow-y:auto;padding:24px;display:flex;flex-direction:column;gap:16px;}.left-panel::-webkit-scrollbar{width:4px;}.left-panel::-webkit-scrollbar-thumb{background:var(--red);}.right-panel{overflow-y:auto;padding:20px;background:#111;display:flex;flex-direction:column;gap:14px;border-left:1px solid var(--border);}.right-panel::-webkit-scrollbar{width:4px;}.right-panel::-webkit-scrollbar-thumb{background:var(--red);}.info-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;}.info-card h3{font-family:'Chakra Petch',monospace;font-size:.75rem;color:var(--red);margin-bottom:8px;text-transform:uppercase;}.info-card p{font-size:.7rem;color:var(--gray);line-height:1.7;}.nation-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;cursor:pointer;transition:all .2s;}.nation-card:hover{border-color:var(--red);}.nation-card.active{border-color:var(--red);background:rgba(196,30,58,.05);}.nc-name{font-family:'Chakra Petch',monospace;font-size:.85rem;font-weight:700;margin-bottom:6px;}.nc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;}.nc-stat{font-size:.6rem;color:var(--gray);text-align:center;}.nc-stat b{display:block;font-size:.75rem;color:var(--white);}.act-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:12px;}.act-btn{background:var(--card2);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center;cursor:pointer;font-size:.7rem;transition:all .2s;}.act-btn:hover{border-color:var(--red);}.stat-row{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:.65rem;}.stat-row .k{color:var(--gray);}.stat-row .v{color:var(--white);font-weight:700;}.log-item{font-size:.6rem;color:var(--gray);padding:4px 0;border-bottom:1px solid var(--border);}.log-item b{color:var(--red2);}.intro-overlay{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px;text-align:center;}.intro-overlay.hidden{display:none;}.intro-overlay h1{font-family:'Chakra Petch',monospace;font-size:2rem;font-weight:900;}.intro-overlay .sub{font-size:.85rem;color:var(--red);margin:8px 0 20px;}.intro-overlay p{font-size:.8rem;color:var(--gray);max-width:500px;line-height:1.8;margin-bottom:24px;}.intro-overlay button{background:var(--red);color:var(--white);border:none;border-radius:6px;padding:14px 40px;font-family:'Chakra Petch',monospace;font-size:1rem;font-weight:700;cursor:pointer;}@media(max-width:900px){.main{grid-template-columns:1fr;}.right-panel{border-top:2px solid var(--red);border-left:none;max-height:50vh;}}

<div class="intro-overlay" id="intro"><h1>Küresel Güç Dengesi</h1><div class="sub">6 Süper Güç | Kaynak Savaşı | İttifak</div><p>Türkiye'yi yonet. 6 süper güçle rekabet et, ittifak kur, kaynakları kontrol et.</p><button onclick="startGame()">Oyuna Başla</button></div>
<div class="top-bar" id="topBar" style="display:none;padding-left:150px;"><a href="oza-harbi-strateji-evren.html" class="tb-back">&#8592; OZA</a><div class="tb-title">Küresel Güç</div><div class="tb-stats"><span>Tur: <b id="turnV">1</b></span><span>Güç: <b id="powV">50</b></span></div></div>
<div class="main" id="mainArea" style="display:none;"><div class="left-panel" id="leftP"></div><div class="right-panel"><div class="info-card"><h3>Türkiye Istatistikleri</h3><div id="myStats"></div></div><div class="info-card"><h3>Güç Siralaması</h3><div id="rankList"></div></div><div class="info-card"><h3>Gunluk</h3><div id="logList"></div></div></div></div>
<script>
var P=[{name:'Türkiye',mil:60,eco:55,tech:50,dip:65,flag:'TR'},{name:'ABD',mil:95,eco:90,tech:95,dip:70,flag:'US'},{name:'Cin',mil:80,eco:92,tech:85,dip:50,flag:'CN'},{name:'Rusya',mil:85,eco:45,tech:60,dip:40,flag:'RU'},{name:'AB',mil:55,eco:85,tech:80,dip:80,flag:'EU'},{name:'Hindistan',mil:65,eco:60,tech:55,dip:55,flag:'IN'}];
var G={turn:1,sel:null,logs:[]};
function startGame(){document.getElementById('intro').classList.add('hidden');document.getElementById('topBar').style.display='flex';document.getElementById('mainArea').style.display='grid';render();}
function render(){
var h='<div class="info-card"><h3>Küresel Güçler - Tur '+G.turn+'</h3></div>';
P.forEach(function(p,i){if(i===0)return;h+='<div class="nation-card'+(G.sel===i?' active':'')+'" onclick="sel('+i+')"><div class="nc-name">'+p.name+'</div><div class="nc-stats"><div class="nc-stat"><b>'+p.mil+'</b>Askerî</div><div class="nc-stat"><b>'+p.eco+'</b>Ekonomi</div><div class="nc-stat"><b>'+p.tech+'</b>Teknoloji</div></div></div>';});
if(G.sel){h+='<div class="info-card"><h3>'+P[G.sel].name+' - Eylemler</h3><div class="act-grid"><div class="act-btn" onclick="act(\'trade\')">Ticaret</div><div class="act-btn" onclick="act(\'ally\')">İttifak</div><div class="act-btn" onclick="act(\'arms\')">Silahlanma</div><div class="act-btn" onclick="act(\'sanction\')">Yaptirim</div><div class="act-btn" onclick="act(\'tech\')">Teknoloji</div><div class="act-btn" onclick="act(\'spy\')">Casusluk</div></div></div>';}
document.getElementById('leftP').innerHTML=h;upRight();
}
function sel(i){G.sel=i;render();}
function act(t){
var me=P[0],them=P[G.sel],msg='';
if(t==='trade'){me.eco+=5;them.eco+=3;msg=them.name+' ile ticaret. +5 ekonomi.';}
else if(t==='ally'){me.dip+=8;them.dip+=5;msg=them.name+' ile ittifak. +8 diplomasi.';}
else if(t==='arms'){me.mil+=6;msg='Silahlanma. +6 askeri guc.';}
else if(t==='sanction'){them.eco-=8;me.dip-=5;msg=them.name+'ya yaptirim. Onlarin ekonomisi -8.';}
else if(t==='tech'){me.tech+=7;me.eco-=3;msg='Teknoloji yatirimi. +7 tech, -3 eco.';}
else if(t==='spy'){if(Math.random()>0.5){msg=them.name+' istihbarat: Askerî='+them.mil;}else{me.dip-=10;msg='Casus yakalandi! -10 diplomasi.';}}
G.logs.unshift({turn:G.turn,text:msg});G.turn++;
P.forEach(function(p,i){if(i>0){p.mil+=Math.floor(Math.random()*3);p.eco+=Math.floor(Math.random()*3);p.tech+=Math.floor(Math.random()*2);}});
upTop();render();
}
function upRight(){
var me=P[0];document.getElementById('myStats').innerHTML='<div class="stat-row"><span class="k">Askerî</span><span class="v">'+me.mil+'</span></div><div class="stat-row"><span class="k">Ekonomi</span><span class="v">'+me.eco+'</span></div><div class="stat-row"><span class="k">Teknoloji</span><span class="v">'+me.tech+'</span></div><div class="stat-row"><span class="k">Diplomasi</span><span class="v">'+me.dip+'</span></div>';
var sorted=P.slice().sort(function(a,b){return (b.mil+b.eco+b.tech+b.dip)-(a.mil+a.eco+a.tech+a.dip);});
document.getElementById('rankList').innerHTML=sorted.map(function(p,i){var total=p.mil+p.eco+p.tech+p.dip;return '<div class="stat-row"><span class="k">'+(i+1)+'. '+p.name+'</span><span class="v" style="color:'+(p.name==='Türkiye'?'var(--red2)':'var(--white)')+';">'+total+'</span></div>';}).join('');
document.getElementById('logList').innerHTML=G.logs.slice(0,8).map(function(l){return '<div class="log-item"><b>T'+l.turn+':</b> '+l.text+'</div>';}).join('');
}
function upTop(){document.getElementById('turnV').textContent=G.turn;document.getElementById('powV').textContent=P[0].mil+P[0].eco+P[0].tech+P[0].dip;}
</script>
<script>
// HS Sound Effects Engine
(function(){
  var ctx;
  function getCtx(){if(!ctx)ctx=new(window.AudioContext||window.webkitAudioContext)();return ctx;}
  window.hsSound={
    click:function(){var c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=800;g.gain.value=0.1;o.start();g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.1);o.stop(c.currentTime+0.1);},
    success:function(){var c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=523;g.gain.value=0.15;o.start();o.frequency.exponentialRampToValueAtTime(1047,c.currentTime+0.15);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.stop(c.currentTime+0.3);},
    error:function(){var c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.value=200;g.gain.value=0.12;o.start();o.frequency.exponentialRampToValueAtTime(100,c.currentTime+0.2);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+0.3);o.stop(c.currentTime+0.3);},
    explosion:function(){var c=getCtx(),b=c.createBuffer(1,c.sampleRate*0.5,c.sampleRate),d=b.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2);var s=c.createBufferSource(),g=c.createGain();s.buffer=b;s.connect(g);g.connect(c.destination);g.gain.value=0.2;s.start();},
    alarm:function(){var c=getCtx(),o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.value=440;g.gain.value=0.08;o.start();var t=c.currentTime;for(var i=0;i<6;i++){o.frequency.setValueAtTime(440,t+i*0.1);o.frequency.setValueAtTime(880,t+i*0.1+0.05);}g.gain.exponentialRampToValueAtTime(0.001,t+0.6);o.stop(t+0.6);},
    victory:function(){var c=getCtx();[523,659,784,1047].forEach(function(f,i){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=f;g.gain.value=0.12;o.start(c.currentTime+i*0.15);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+i*0.15+0.3);o.stop(c.currentTime+i*0.15+0.3);});}
  };
  // Auto-attach to common game events
  document.addEventListener('click',function(e){
    var t=e.target;
    if(t.tagName==='BUTTON'||t.classList.contains('ch-opt')||t.classList.contains('option')||t.classList.contains('choice'))hsSound.click();
  });
})();
</script>
