   ]},

    {title:"Gözlemci Statü",desc:"Bağımsızlığı koru ama bilgi akışından yararlan.",cost:0,power:10,risk:-5,benefit:"+10 Güç, -5 Risk"},

let state = {round:0, budget:100, power:0, risk:20, selectedChoice:null, timer:null};

function startGame(){
  state = {round:0, budget:100, power:0, risk:20, selectedChoice:null, timer:null};
  document.getElementById('game-over').style.display='none';
  document.getElementById('game-area').style.display='block';
  nextRound();
}

function nextRound(){
  if(state.round >= 10){endGame();return;}
  state.selectedChoice = null;
  document.getElementById('confirm-btn').disabled = true;
  document.getElementById('result-panel').classList.remove('show');
  
  const scenario = SCENARIOS[state.round];
  document.getElementById('round').textContent = (state.round+1)+'/10';
  document.getElementById('budget').textContent = state.budget+'M';
  document.getElementById('power').textContent = state.power;
  document.getElementById('risk').textContent = Math.max(0,Math.min(100,state.risk))+'%';
  
  document.getElementById('scenario-title').textContent = scenario.title;
  document.getElementById('scenario-desc').textContent = scenario.desc;
  
  const choicesDiv = document.getElementById('choices');
  choicesDiv.innerHTML = '';
  scenario.choices.forEach((c,i) => {
    const btn = document.createElement('div');
    btn.className = 'choice-btn';
    btn.innerHTML = '<div class="choice-title">'+c.title+'</div><div class="choice-desc">'+c.desc+'</div><div class="choice-cost">Maliyet: '+(c.cost>=0?'+':'')+c.cost+'M</div><div class="choice-benefit">'+c.benefit+'</div>';
    btn.onclick = () => selectChoice(i);
    choicesDiv.appendChild(btn);
  });
  
  // Zamanlayıcı
  let timeLeft = 10;
  document.getElementById('timer').textContent = timeLeft;
  if(state.timer) clearInterval(state.timer);
  state.timer = setInterval(() => {
    timeLeft--;
    document.getElementById('timer').textContent = timeLeft;
    if(timeLeft <= 0){
      clearInterval(state.timer);
      if(state.selectedChoice === null){
        state.selectedChoice = 3; // Varsayılan: son seçenek
        applyChoice();
      }
    }
  }, 1000);
}

function selectChoice(i){
  state.selectedChoice = i;
  document.querySelectorAll('.choice-btn').forEach((b,idx) => {
    b.classList.toggle('selected', idx===i);
  });
  document.getElementById('confirm-btn').disabled = false;
}

function confirmChoice(){
  if(state.selectedChoice === null) return;
  clearInterval(state.timer);
  applyChoice();
}

function applyChoice(){
  const scenario = SCENARIOS[state.round];
  const choice = scenario.choices[state.selectedChoice];
  
  state.budget += choice.cost;
  state.power += choice.power;
  state.risk += choice.risk;
  
  // Sonuç göster
  const panel = document.getElementById('result-panel');
  const title = document.getElementById('result-title');
  const desc = document.getElementById('result-desc');
  
  if(choice.power > 10){
    title.textContent = '✓ Stratejik Hamle!';
    title.className = 'result-title win';
    desc.textContent = choice.title + ' kararı güç dengesini lehine çevirdi. Bütçe: '+state.budget+'M | Güç: '+state.power+' | Risk: '+state.risk+'%';
  } else if(choice.risk > 10){
    title.textContent = '⚠ Riskli Karar!';
    title.className = 'result-title lose';
    desc.textContent = choice.title + ' kararı kısa vadede işe yarayabilir ama risk arttı. Bütçe: '+state.budget+'M | Güç: '+state.power+' | Risk: '+state.risk+'%';
  } else {
    title.textContent = '→ Dengeli Hamle';
    title.className = 'result-title';
    desc.textContent = choice.title + ' kararı uygulandı. Bütçe: '+state.budget+'M | Güç: '+state.power+' | Risk: '+state.risk+'%';
  }
  panel.classList.add('show');
  
  // HUD güncelle
  document.getElementById('budget').textContent = state.budget+'M';
  document.getElementById('power').textContent = state.power;
  document.getElementById('risk').textContent = Math.max(0,Math.min(100,state.risk))+'%';
  
  state.round++;
  setTimeout(nextRound, 2500);
}

function endGame(){
  document.getElementById('game-area').style.display='none';
  document.getElementById('game-over').style.display='block';
  
  // Skor hesapla
  const score = Math.max(0, state.power * 10 + state.budget - state.risk * 2);
  document.getElementById('final-score').textContent = score;
  
  let rank = '';
  if(score >= 400) rank = '⭐ Stratejik Deha — Mineral Hakimiyeti!';
  else if(score >= 300) rank = '🎖️ Uzman Stratejist';
  else if(score >= 200) rank = '📊 Yetkin Yönetici';
  else if(score >= 100) rank = '📋 Çırak Analist';
  else rank = '⚠️ Tedarik Zinciri Çöktü!';
  document.getElementById('rank').textContent = rank;
  
  // localStorage kaydet
  const prev = parseInt(localStorage.getItem('hs_mineral_best')||'0');
  if(score > prev) localStorage.setItem('hs_mineral_best', score);
}

// Oyunu başlat
startGame();
</script>
</body>
</html>
