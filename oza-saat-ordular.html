<style>
:root{--bg:#0d0d0d;--panel:#0f1722;--panel2:#16202d;--red:#E01515;--red2:#ff3a4a;--cyan:#c41e3a;--gold:#C9A24B;--green:#00ff88;--line:rgba(150,170,200,.13);--line2:rgba(150,170,200,.22);--tx:#EAF0F7;--dim:#90a1b5}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--tx);font-family:'IBM Plex Sans',sans-serif;-webkit-font-smoothing:antialiased;min-height:100vh;overflow-x:hidden}
.top{position:sticky;top:0;z-index:60;background:rgba(10,15,23,.96);backdrop-filter:blur(10px);border-bottom:1px solid var(--line);padding:0 20px}
.top .in{max-width:700px;margin:0 auto;display:flex;align-items:center;gap:14px;min-height:52px}
.back{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);text-decoration:none}.back:hover{color:#fff}
.title{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:15px;flex:1;text-align:center}
.hdr-score{font-size:12px;color:var(--gold);font-family:'IBM Plex Mono',monospace}
.wrap{max-width:700px;margin:0 auto;padding:24px 20px 80px}
.game-header{text-align:center;margin-bottom:24px}
.game-header h1{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:clamp(22px,5vw,36px);color:#fff}
.game-header .sub{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);margin-top:6px}
.score-band{display:flex;justify-content:center;gap:0;margin-bottom:24px;border:1px solid var(--line2);border-radius:10px;overflow:hidden}
.sb-item{flex:1;padding:12px 8px;text-align:center;border-right:1px solid var(--line2)}
.sb-item:last-child{border-right:none}
.sb-val{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:20px;color:var(--red2)}
.sb-lbl{font-family:'IBM Plex Mono',monospace;font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.era-card{background:var(--panel);border:1px solid var(--line2);border-radius:16px;padding:24px;margin-bottom:20px;position:relative;overflow:hidden}
.era-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--gold),var(--cyan))}
.era-tag{font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:8px}
.era-title{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:20px;color:#fff;margin-bottom:10px}
.era-body{font-size:13px;color:var(--dim);line-height:1.7;margin-bottom:14px}
.era-fact{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--gold);padding:10px;background:rgba(201,162,75,.08);border-radius:8px;border-left:3px solid var(--gold)}
.choices{display:grid;grid-template-columns:1fr;gap:10px;margin:20px 0}
.choice-btn{background:var(--panel2);border:2px solid var(--line2);border-radius:12px;padding:14px 18px;cursor:pointer;transition:all .2s;text-align:left}
.choice-btn:hover{border-color:var(--gold);background:rgba(201,162,75,.05)}
.choice-btn.correct{border-color:var(--green);background:rgba(0,255,136,.08)}
.choice-btn.wrong{border-color:var(--red2);background:rgba(224,21,21,.08)}
.choice-btn h4{font-family:'Chakra Petch',sans-serif;font-size:14px;font-weight:600;color:#fff;margin-bottom:4px}
.choice-btn p{font-size:11px;color:var(--dim)}
.result-panel{display:none;background:var(--panel);border:1px solid var(--line2);border-radius:12px;padding:20px;margin:16px 0;text-align:center}
.result-panel.show{display:block}
.res-icon{font-size:40px;margin-bottom:8px}
.res-text{font-size:13px;color:var(--dim);line-height:1.7}
.next-btn{display:none;margin:16px auto;padding:14px 28px;background:var(--gold);color:#000;border:none;border-radius:10px;font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:14px;cursor:pointer}
.next-btn.show{display:block}
.final-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(0,0,0,.9);align-items:center;justify-content:center;padding:20px}
.final-overlay.show{display:flex}
.final-box{background:var(--panel);border:2px solid var(--gold);border-radius:20px;padding:36px;max-width:400px;width:100%;text-align:center}
.final-box h2{font-family:'Chakra Petch',sans-serif;font-size:28px;color:var(--gold);margin-bottom:12px}
.final-box .score{font-size:48px;font-weight:700;color:var(--green);margin:12px 0}
.final-box p{font-size:13px;color:var(--dim);margin-bottom:16px}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.btn{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:13px;padding:12px 20px;border-radius:9px;border:none;cursor:pointer}
.btn-gold{background:var(--gold);color:#000}
.btn-outline{background:transparent;color:var(--dim);border:1px solid var(--line2)}

var currentRound=0, score=0, streak=0, answered=false;

function loadRound(){
  answered=false;
  var e=ERAS[currentRound];
  document.getElementById('era-card').innerHTML='<div class="era-tag">'+e.tag+'</div><div class="era-title">'+e.title+'</div><div class="era-body">'+e.body+'</div><div class="era-fact">'+e.fact+'</div>';
  var html='';
  e.choices.forEach(function(c,i){
    html+='<div class="choice-btn" id="ch-'+i+'" onclick="answer('+i+')"><h4>'+String.fromCharCode(65+i)+'. '+c+'</h4></div>';
  });
  document.getElementById('choices').innerHTML=html;
  document.getElementById('result-panel').classList.remove('show');
  document.getElementById('result-panel').innerHTML='';
  document.getElementById('next-btn').classList.remove('show');
  document.getElementById('s-round').textContent=(currentRound+1)+'/12';
}

function answer(idx){
  if(answered) return;
  answered=true;
  var e=ERAS[currentRound];
  var correct=(idx===e.correct);
  document.getElementById('ch-'+e.correct).classList.add('correct');
  if(!correct) document.getElementById('ch-'+idx).classList.add('wrong');
  if(correct){
    streak++;
    var pts=10+streak*5;
    score+=pts;
    document.getElementById('result-panel').innerHTML='<div class="res-icon">✅</div><div class="res-text"><strong>Doğru! +'+pts+' puan</strong><br>'+e.explain+'</div>';
    if(typeof HS!=='undefined'){HS.addScore('saat-ordular',pts);HS.beepWin();}
  } else {
    streak=0;
    document.getElementById('result-panel').innerHTML='<div class="res-icon">❌</div><div class="res-text"><strong>Yanlış!</strong><br>'+e.explain+'</div>';
    if(typeof HS!=='undefined') HS.beepFail();
  }
  document.getElementById('result-panel').classList.add('show');
  document.getElementById('s-score').textContent=score;
  document.getElementById('s-streak').textContent=streak;
  document.getElementById('next-btn').classList.add('show');
  if(currentRound>=ERAS.length-1) document.getElementById('next-btn').textContent='Sonuçları Gör';
}

function nextRound(){
  currentRound++;
  if(currentRound>=ERAS.length){
    document.getElementById('final-score').textContent=score;
    var pct=Math.round(score/(ERAS.length*15)*100);
    document.getElementById('final-text').textContent=pct>=80?'Mekanik Rejim uzmanı! Mükemmel!':pct>=50?'İyi bir performans. Tekrar deneyin!':'Daha fazla çalışma gerekiyor.';
    document.getElementById('final-overlay').classList.add('show');
    if(typeof HS!=='undefined'&&score>=100) HS.awardBadge('saat-ordular');
  } else {
    loadRound();
  }
}

loadRound();
</script>
