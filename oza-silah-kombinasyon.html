<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="hs-skip" content="true">
<title>Silah Kombinasyonu — OZA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0f17;color:#eaf0f7;font-family:'Segoe UI',system-ui,sans-serif;touch-action:manipulation;user-select:none}
#app{width:100%;height:100%;display:flex;flex-direction:column}
#topBar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(10,15,23,.95);border-bottom:1px solid rgba(0,224,255,.15);flex-shrink:0;z-index:10}
#topBar a{color:#00e0ff;text-decoration:none;font-size:.8rem}
#topBar .title{font-size:.85rem;font-weight:700;color:#fff}
#topBar .stats{display:flex;gap:12px;font-size:.75rem}
#topBar .stats span{color:#c9a24b}
#gameArea{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
canvas{display:block;background:#0a0f17}
#hud{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;pointer-events:none;font-size:.75rem}
#hud .badge{background:rgba(0,0,0,.6);border:1px solid rgba(0,224,255,.3);border-radius:6px;padding:3px 8px}
#controls{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:12px}
#controls button{width:52px;height:52px;border-radius:50%;border:2px solid rgba(0,224,255,.4);background:rgba(0,0,0,.5);color:#fff;font-size:1.2rem;cursor:pointer;-webkit-tap-highlight-color:transparent}
#controls button:active{background:rgba(0,224,255,.2);transform:scale(.9)}
#overlay{position:absolute;inset:0;background:rgba(10,15,23,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;text-align:center;padding:20px}
#overlay h2{color:#00e0ff;font-size:1.4rem;margin-bottom:8px}
#overlay p{color:#aaa;font-size:.85rem;margin-bottom:16px;max-width:320px}
#overlay button{padding:12px 32px;border:2px solid #00e0ff;background:transparent;color:#00e0ff;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:700}
#overlay button:hover{background:rgba(0,224,255,.1)}
@media(min-width:769px){#controls{display:none}}
</style>
<link rel="stylesheet" href="hs-global-fix.css">
</head>
<body>
<div style="position:fixed;top:12px;left:12px;z-index:9999;display:flex;gap:8px;"><a href="oza-hub.html" style="background:rgba(10,15,23,0.9);color:#00E0FF;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid #00E0FF33;backdrop-filter:blur(8px);">← OZA Hub</a><a href="index.html" style="background:rgba(10,15,23,0.9);color:#c41e3a;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid rgba(196,30,58,0.3);backdrop-filter:blur(8px);">🏠 Ana Sayfa</a></div>
<div id="app">
<div id="topBar">
<a href="oza-hub.html">← OZA</a>
<span class="title">🔫 Silah Kombinasyonu</span>
<div class="stats"><span id="scoreDisp">0</span> puan</div>
</div>
<div id="gameArea">
<canvas id="gc"></canvas>
<div id="hud"><div class="badge" id="hudL"></div><div class="badge" id="hudR"></div></div>
<div id="controls">
</div>
<div id="overlay">
<h2 id="ovTitle">BAŞLA</h2>
<p id="ovDesc">Dokunarak veya tıklayarak başla</p>
<button id="ovBtn" onclick="startGame()">▶ BAŞLA</button>
</div>
</div>
</div>
<script>
// Audio context
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type||'square';o.frequency.value=freq;g.gain.value=0.08;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);o.stop(audioCtx.currentTime+dur)}
// Canvas setup
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
let W,H,gameRunning=false,score=0,level=1;
function resize(){
  const area=document.getElementById('gameArea');
  W=canvas.width=area.clientWidth;
  H=canvas.height=area.clientHeight;
}
window.addEventListener('resize',resize);
resize();
function updateScore(v){score+=v;document.getElementById('scoreDisp').textContent=score}
function showOverlay(t,d,btn){
  document.getElementById('overlay').style.display='flex';
  document.getElementById('ovTitle').textContent=t;
  document.getElementById('ovDesc').textContent=d;
  document.getElementById('ovBtn').textContent=btn||'▶ TEKRAR';
}
function hideOverlay(){document.getElementById('overlay').style.display='none'}

let boardW=7,boardH=7,board=[],cellSz,selected=null,animating=false,moves=20;
const WEAPONS=['🚀','💣','🎯','🛡️','⚡','🔫'];
function startGame(){initAudio();hideOverlay();gameRunning=true;score=0;moves=20;initBoard();draw4()}
function initBoard(){board=[];for(let y=0;y<boardH;y++){board[y]=[];for(let x=0;x<boardW;x++)board[y][x]=Math.floor(Math.random()*WEAPONS.length)}
  while(findMatches().length>0){for(let y=0;y<boardH;y++)for(let x=0;x<boardW;x++)board[y][x]=Math.floor(Math.random()*WEAPONS.length)}}
function findMatches(){let matches=[];
  for(let y=0;y<boardH;y++)for(let x=0;x<boardW-2;x++){if(board[y][x]===board[y][x+1]&&board[y][x]===board[y][x+2]){matches.push([y,x],[y,x+1],[y,x+2])}}
  for(let x=0;x<boardW;x++)for(let y=0;y<boardH-2;y++){if(board[y][x]===board[y+1][x]&&board[y][x]===board[y+2][x]){matches.push([y,x],[y+1,x],[y+2,x])}}
  return matches}
function swap(r1,c1,r2,c2){let t=board[r1][c1];board[r1][c1]=board[r2][c2];board[r2][c2]=t}
function processMatches(){let m=findMatches();if(m.length===0)return false;
  let unique=new Set(m.map(p=>p[0]*boardW+p[1]));
  updateScore(unique.size*15);playTone(600+unique.size*50,.15,'sine');
  unique.forEach(k=>{let r=Math.floor(k/boardW),c=k%boardW;board[r][c]=-1});
  // Gravity
  for(let x=0;x<boardW;x++){let empty=[];for(let y=boardH-1;y>=0;y--){if(board[y][x]===-1)empty.push(y);
    else if(empty.length>0){board[empty[0]][x]=board[y][x];board[y][x]=-1;empty.push(y);empty.shift()}}}
  // Fill
  for(let y=0;y<boardH;y++)for(let x=0;x<boardW;x++){if(board[y][x]===-1)board[y][x]=Math.floor(Math.random()*WEAPONS.length)}
  return true}
function handleClick(gx,gy){if(!gameRunning||animating)return;
  if(!selected){selected={x:gx,y:gy};draw4();return}
  let dx=Math.abs(gx-selected.x),dy=Math.abs(gy-selected.y);
  if((dx===1&&dy===0)||(dx===0&&dy===1)){
    swap(selected.y,selected.x,gy,gx);
    if(findMatches().length>0){moves--;animating=true;
      let chain=()=>{if(processMatches()){draw4();setTimeout(chain,200)}else{animating=false;draw4();
        if(moves<=0){gameRunning=false;showOverlay('BİTTİ','Skor: '+score,'▶ TEKRAR')}}};
      setTimeout(chain,100)}
    else{swap(selected.y,selected.x,gy,gx)}
    selected=null}else{selected={x:gx,y:gy}}
  draw4()}
function draw4(){
  ctx.fillStyle='#0a0f17';ctx.fillRect(0,0,W,H);
  cellSz=Math.min((W-20)/boardW,(H-40)/boardH);
  let ox=(W-boardW*cellSz)/2,oy=(H-boardH*cellSz)/2;
  for(let y=0;y<boardH;y++)for(let x=0;x<boardW;x++){
    let px=ox+x*cellSz,py=oy+y*cellSz;
    ctx.fillStyle=(selected&&selected.x===x&&selected.y===y)?'rgba(0,224,255,.2)':'rgba(255,255,255,.03)';
    ctx.fillRect(px+1,py+1,cellSz-2,cellSz-2);
    ctx.font=(cellSz*0.5)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(WEAPONS[board[y][x]],px+cellSz/2,py+cellSz/2)}
  ctx.fillStyle='#c9a24b';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText('Hamle: '+moves,W/2,oy-8);
  document.getElementById('hudL').textContent='Hamle: '+moves;
  document.getElementById('hudR').textContent='Skor: '+score;
}
canvas.addEventListener('click',e=>{let r=canvas.getBoundingClientRect();let cx=e.clientX-r.left,cy=e.clientY-r.top;
  cellSz=Math.min((W-20)/boardW,(H-40)/boardH);let ox=(W-boardW*cellSz)/2,oy=(H-boardH*cellSz)/2;
  let gx=Math.floor((cx-ox)/cellSz),gy=Math.floor((cy-oy)/cellSz);
  if(gx>=0&&gx<boardW&&gy>=0&&gy<boardH)handleClick(gx,gy)});
canvas.addEventListener('touchstart',e=>{e.preventDefault();let r=canvas.getBoundingClientRect();let t=e.touches[0];
  let cx=t.clientX-r.left,cy=t.clientY-r.top;
  cellSz=Math.min((W-20)/boardW,(H-40)/boardH);let ox=(W-boardW*cellSz)/2,oy=(H-boardH*cellSz)/2;
  let gx=Math.floor((cx-ox)/cellSz),gy=Math.floor((cy-oy)/cellSz);
  if(gx>=0&&gx<boardW&&gy>=0&&gy<boardH)handleClick(gx,gy)});
resize();

</script>
</body>
</html>
