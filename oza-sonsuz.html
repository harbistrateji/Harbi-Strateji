<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{--bg:#060a10;--surface:#0d1117;--card:#161b22;--border:#21262d;--text:#e6edf3;--muted:#8b949e;--accent:#00ff88;--accent2:#00bfff;--red:#ff4757;--gold:#ffd700;--purple:#a855f7;}
body{font-family:'IBM Plex Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;}
a{color:var(--accent);text-decoration:none;}
/* === TOP NAV === */
.top-nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(6,10,16,.95);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:16px;}
.top-nav .logo{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:1.1rem;color:var(--text);}
.top-nav .logo span{color:var(--accent);}
.top-nav .nav-links{display:flex;gap:16px;margin-left:auto;}
.top-nav .nav-links a{color:var(--muted);font-size:.85rem;transition:color .2s;}
.top-nav .nav-links a:hover{color:var(--text);}
.live-badge{background:var(--red);color:#fff;font-size:.65rem;padding:2px 8px;border-radius:4px;font-weight:700;animation:livePulse 2s infinite;}
@keyframes livePulse{0%,100%{opacity:1;}50%{opacity:.5;}}
/* === MAIN LAYOUT === */
.main-container{margin-top:56px;display:grid;grid-template-columns:1fr 360px;min-height:calc(100vh - 56px);}
@media(max-width:1024px){.main-container{grid-template-columns:1fr;}}
/* === TV SCREEN === */
.tv-screen{position:relative;background:#000;aspect-ratio:16/9;max-height:65vh;overflow:hidden;}
.tv-content{position:absolute;inset:0;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:40px;transition:opacity .6s ease;}
.tv-content.fade-out{opacity:0;}
.tv-content.fade-in{opacity:1;}
.scene-category{font-size:.75rem;text-transform:uppercase;letter-spacing:2px;color:var(--accent);margin-bottom:12px;font-weight:600;}
.scene-title{font-family:'Chakra Petch',sans-serif;font-size:clamp(1.8rem,4vw,3rem);font-weight:700;text-align:center;margin-bottom:16px;text-shadow:0 2px 20px rgba(0,255,136,.3);}
.scene-desc{font-size:1rem;color:var(--muted);text-align:center;max-width:700px;line-height:1.6;margin-bottom:24px;}
.scene-facts{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;max-width:800px;width:100%;}
.fact-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:14px;text-align:center;transition:transform .3s,border-color .3s;}
.fact-card:hover{transform:translateY(-2px);border-color:var(--accent);}
.fact-icon{font-size:1.5rem;margin-bottom:6px;}
.fact-value{font-family:'Chakra Petch',sans-serif;font-size:1.1rem;font-weight:700;color:var(--accent);}
.fact-label{font-size:.72rem;color:var(--muted);margin-top:4px;}
/* Floating icons */
.scene-visual{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.floating-icon{position:absolute;font-size:2rem;opacity:.12;animation:floatAround 20s linear infinite;}
@keyframes floatAround{0%{transform:translate(0,0) rotate(0deg);}25%{transform:translate(100px,-50px) rotate(90deg);}50%{transform:translate(50px,100px) rotate(180deg);}75%{transform:translate(-80px,50px) rotate(270deg);}100%{transform:translate(0,0) rotate(360deg);}}

/* ===== TIMELINE PROGRESS BAR ===== */
.timeline-container{background:var(--surface);border-bottom:1px solid var(--border);padding:0;}
.timeline-bar{position:relative;height:40px;display:flex;cursor:pointer;overflow:hidden;}
.timeline-segment{position:relative;height:100%;display:flex;align-items:center;justify-content:center;border-right:1px solid rgba(255,255,255,.05);transition:all .3s;overflow:hidden;}
.timeline-segment:hover{background:rgba(255,255,255,.08);}
.timeline-segment.active{background:rgba(0,255,136,.1);}
.timeline-segment.played{background:rgba(0,255,136,.03);}
.timeline-segment-fill{position:absolute;left:0;top:0;bottom:0;background:linear-gradient(90deg,rgba(0,255,136,.3),rgba(0,191,255,.3));pointer-events:none;transition:width .1s linear;}
.timeline-segment-label{font-size:.6rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding:0 4px;z-index:1;pointer-events:none;max-width:100%;}
.timeline-segment.active .timeline-segment-label{color:var(--accent);font-weight:600;}
.timeline-segment-tooltip{position:absolute;bottom:100%;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.95);color:#fff;padding:6px 12px;border-radius:6px;font-size:.72rem;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;z-index:100;border:1px solid var(--border);}
.timeline-segment:hover .timeline-segment-tooltip{opacity:1;}
/* Timeline controls row */
.timeline-controls{display:flex;align-items:center;gap:12px;padding:8px 20px;background:var(--surface);border-bottom:1px solid var(--border);}
.tl-btn{background:none;border:none;color:var(--text);font-size:1.1rem;cursor:pointer;padding:6px 8px;border-radius:6px;transition:all .2s;}
.tl-btn:hover{background:rgba(255,255,255,.08);color:var(--accent);}
.tl-btn.active{color:var(--accent);}
.tl-time{font-family:'IBM Plex Mono',monospace;font-size:.78rem;color:var(--muted);}
.tl-info{font-size:.78rem;color:var(--text);margin-left:auto;display:flex;align-items:center;gap:8px;}
.tl-info .ep-name{font-weight:600;color:var(--accent);max-width:300px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.tl-speed{display:flex;gap:2px;}
.tl-speed button{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:2px 8px;font-size:.65rem;border-radius:4px;cursor:pointer;transition:all .2s;}
.tl-speed button:hover,.tl-speed button.active{background:var(--accent);color:#000;border-color:var(--accent);}
.tl-volume{display:flex;align-items:center;gap:4px;}
.vol-slider{width:60px;height:4px;-webkit-appearance:none;appearance:none;background:rgba(255,255,255,.2);border-radius:2px;outline:none;cursor:pointer;}
.vol-slider::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent);border-radius:50%;cursor:pointer;}

/* === SIDEBAR PLAYLIST === */
.sidebar{background:var(--surface);border-left:1px solid var(--border);overflow-y:auto;max-height:calc(100vh - 56px);position:sticky;top:56px;}
@media(max-width:1024px){.sidebar{max-height:50vh;border-left:none;border-top:1px solid var(--border);}}
.sidebar-header{padding:16px 20px;border-bottom:1px solid var(--border);position:sticky;top:0;background:var(--surface);z-index:10;}
.sidebar-title{font-family:'Chakra Petch',sans-serif;font-size:.9rem;font-weight:600;margin-bottom:8px;}
.sidebar-stats{font-size:.75rem;color:var(--muted);}
.cat-filters{display:flex;flex-wrap:wrap;gap:6px;padding:12px 20px;border-bottom:1px solid var(--border);}
.cat-btn{background:var(--card);border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:12px;font-size:.7rem;cursor:pointer;transition:all .2s;}
.cat-btn:hover,.cat-btn.active{background:var(--accent);color:#000;border-color:var(--accent);}
/* Playlist items */
.playlist{padding:8px 0;}
.pl-item{display:grid;grid-template-columns:40px 1fr 40px;align-items:center;padding:10px 20px;cursor:pointer;transition:background .2s;border-left:3px solid transparent;}
.pl-item:hover{background:rgba(255,255,255,.03);}
.pl-item.active{background:rgba(0,255,136,.05);border-left-color:var(--accent);}
.pl-item.watched{opacity:.6;}
.pl-num{font-family:'IBM Plex Mono',monospace;font-size:.75rem;color:var(--muted);text-align:center;}
.pl-info{padding:0 10px;}
.pl-title{font-size:.82rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.pl-cat{font-size:.65rem;color:var(--muted);margin-top:2px;}
.pl-dur{font-size:.7rem;color:var(--muted);text-align:right;}
/* === BELOW TV: EPISODE DETAILS === */
.episode-details{padding:30px 40px;max-width:1200px;}
@media(max-width:1024px){.episode-details{padding:20px;}}
.ep-header{display:flex;align-items:flex-start;gap:20px;margin-bottom:24px;}
.ep-icon{font-size:2.5rem;}
.ep-title{font-family:'Chakra Petch',sans-serif;font-size:1.5rem;font-weight:700;}
.ep-category{font-size:.75rem;color:var(--accent);text-transform:uppercase;letter-spacing:1px;margin-top:4px;}
.ep-body{line-height:1.8;color:rgba(255,255,255,.8);margin-bottom:24px;}
.ep-body p{margin-bottom:12px;}
.ep-bullets{list-style:none;margin-bottom:24px;}
.ep-bullets li{padding:8px 0 8px 24px;position:relative;color:rgba(255,255,255,.75);border-bottom:1px solid rgba(255,255,255,.05);}
.ep-bullets li::before{content:'▸';position:absolute;left:0;color:var(--accent);}
/* Info cards grid */
.info-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:16px;margin-bottom:24px;}
.info-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;transition:transform .3s,border-color .3s;}
.info-card:hover{transform:translateY(-3px);border-color:var(--accent);}
.info-card-icon{font-size:1.8rem;margin-bottom:8px;}
.info-card-title{font-weight:600;font-size:.9rem;margin-bottom:6px;}
.info-card-text{font-size:.8rem;color:var(--muted);line-height:1.5;}
/* Related links */
.ep-related{margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
.ep-related h4{font-size:.85rem;color:var(--muted);margin-bottom:12px;}
.ep-related-links{display:flex;flex-wrap:wrap;gap:8px;}
.ep-related-links a{background:var(--card);border:1px solid var(--border);padding:6px 14px;border-radius:6px;font-size:.8rem;transition:all .2s;}
.ep-related-links a:hover{border-color:var(--accent);background:rgba(0,255,136,.05);}
/* Music toggle */
.music-btn{position:fixed;bottom:20px;right:20px;background:var(--card);border:1px solid var(--border);color:var(--text);width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1.2rem;z-index:999;transition:all .3s;}
.music-btn:hover{border-color:var(--accent);transform:scale(1.1);}
.music-btn.playing{border-color:var(--accent);box-shadow:0 0 20px rgba(0,255,136,.3);}
/* Total progress indicator */
.total-progress{height:3px;background:rgba(255,255,255,.05);position:relative;}
.total-progress-fill{height:100%;background:var(--accent);transition:width .5s;}
</style>

// ===== CATEGORY COLORS =====
const catColors = {"Doktrin":"#ff6b6b","Teknoloji":"#4ecdc4","Jeopolitik":"#45b7d1","Siber":"#96f","Dron Çağı":"#f7b731","Ekonomi":"#26de81","Türkiye":"#fc5c65","Tarih":"#a55eea","Uzay":"#778ca3","Bilişsel":"#fd9644","EMS":"#2bcbba","Deniz":"#4b7bec","Strateji":"#e056fd"};
// ===== STATE =====
let currentIdx = 0;
let isPlaying = false;
let timer = null;
let elapsed = 0;
let activeFilter = "Tümü";
let filteredEps = [...episodes];
let musicCtx = null;
let musicPlaying = false;
let playbackSpeed = 1;
let watchedSet = new Set();

// ===== INIT =====
function init(){
  buildFilters();
  buildPlaylist();
  buildTimeline();
  renderScene(0);
  renderDetails(0);
  updateTimelineInfo();
  // Controls
  document.getElementById('btnPlay').onclick = togglePlay;
  document.getElementById('btnPrev').onclick = ()=>{goTo(currentIdx-1);};
  document.getElementById('btnNext').onclick = ()=>{goTo(currentIdx+1);};
  document.getElementById('musicBtn').onclick = toggleMusic;
  // Speed buttons
  document.querySelectorAll('#speedBtns button').forEach(btn=>{
    btn.onclick = ()=>{
      playbackSpeed = parseFloat(btn.dataset.speed);
      document.querySelectorAll('#speedBtns button').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      if(isPlaying){clearInterval(timer);startTimer();}
    };
  });
  // Fullscreen
  document.getElementById('btnFullscreen').onclick = ()=>{
    const el = document.getElementById('tvScreen');
    if(!document.fullscreenElement){el.requestFullscreen().catch(()=>{});}
    else{document.exitFullscreen();}
  };
  // Volume
  document.getElementById('volSlider').oninput = (e)=>{
    const v = e.target.value / 100;
    if(musicCtx && musicCtx.gainNode){musicCtx.gainNode.gain.value = v * 0.05;}
  };
}

// ===== TIMELINE BAR =====
function buildTimeline(){
  const bar = document.getElementById('timelineBar');
  const totalDur = filteredEps.reduce((s,e)=>s+e.dur,0);
  bar.innerHTML = filteredEps.map((ep,i)=>{
    const widthPct = (ep.dur / totalDur) * 100;
    const color = catColors[ep.cat] || '#00ff88';
    return `<div class="timeline-segment${i===currentIdx?' active':''}" data-idx="${i}" style="width:${widthPct}%;border-bottom:3px solid ${color};" onclick="goTo(${i})">
      <div class="timeline-segment-fill" id="tsFill${i}"></div>
      <span class="timeline-segment-label">${widthPct > 4 ? ep.icon+' '+ep.title : ep.icon}</span>
      <div class="timeline-segment-tooltip">${ep.icon} ${ep.title}<br><small>${ep.cat} · ${ep.dur}s</small></div>
    </div>`;
  }).join('');
}

function updateTimeline(){
  const ep = filteredEps[currentIdx];
  if(!ep) return;
  // Update segment fills
  filteredEps.forEach((e,i)=>{
    const fill = document.getElementById('tsFill'+i);
    if(!fill) return;
    const seg = fill.parentElement;
    seg.classList.remove('active','played');
    if(i < currentIdx){
      fill.style.width = '100%';
      seg.classList.add('played');
    } else if(i === currentIdx){
      fill.style.width = (elapsed/ep.dur*100)+'%';
      seg.classList.add('active');
    } else {
      fill.style.width = '0%';
    }
  });
  // Total progress
  const totalDur = filteredEps.reduce((s,e)=>s+e.dur,0);
  const playedDur = filteredEps.slice(0,currentIdx).reduce((s,e)=>s+e.dur,0) + elapsed;
  document.getElementById('totalProgressFill').style.width = (playedDur/totalDur*100)+'%';
  // Time display
  const mm = String(Math.floor(elapsed/60)).padStart(2,'0');
  const ss = String(elapsed%60).padStart(2,'0');
  const tmm = String(Math.floor(ep.dur/60)).padStart(2,'0');
  const tss = String(ep.dur%60).padStart(2,'0');
  // Total elapsed
  const totalElapsed = filteredEps.slice(0,currentIdx).reduce((s,e)=>s+e.dur,0) + elapsed;
  const teMM = String(Math.floor(totalElapsed/60)).padStart(2,'0');
  const teSS = String(totalElapsed%60).padStart(2,'0');
  const tdMM = String(Math.floor(totalDur/60)).padStart(2,'0');
  const tdSS = String(totalDur%60).padStart(2,'0');
  document.getElementById('tlTime').textContent = `${mm}:${ss}/${tmm}:${tss} — Toplam: ${teMM}:${teSS}/${tdMM}:${tdSS}`;
}

function updateTimelineInfo(){
  const ep = filteredEps[currentIdx];
  if(!ep) return;
  document.getElementById('tlEpName').textContent = `${ep.icon} ${ep.title}`;
  document.getElementById('tlEpName').style.color = catColors[ep.cat] || '#00ff88';
}

// ===== FILTERS & PLAYLIST =====
function buildFilters(){
  const cats = ["Tümü",...new Set(episodes.map(e=>e.cat))];
  const el = document.getElementById('catFilters');
  el.innerHTML = cats.map(c=>`<button class="cat-btn${c==='Tümü'?' active':''}" data-cat="${c}">${c} (${c==='Tümü'?episodes.length:episodes.filter(e=>e.cat===c).length})</button>`).join('');
  el.querySelectorAll('.cat-btn').forEach(btn=>{
    btn.onclick = ()=>{
      activeFilter = btn.dataset.cat;
      el.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      filteredEps = activeFilter==='Tümü'?[...episodes]:episodes.filter(e=>e.cat===activeFilter);
      buildPlaylist();
      buildTimeline();
      goTo(0);
    };
  });
}
function buildPlaylist(){
  const el = document.getElementById('playlist');
  el.innerHTML = filteredEps.map((ep,i)=>`
    <div class="pl-item${i===currentIdx?' active':''}${watchedSet.has(ep.id)?' watched':''}" data-idx="${i}" onclick="goTo(${i})">
      <div class="pl-num">${i+1}</div>
      <div class="pl-info">
        <div class="pl-title">${ep.icon} ${ep.title}</div>
        <div class="pl-cat">${ep.cat} · ${ep.dur}s</div>
      </div>
      <div class="pl-dur">${Math.floor(ep.dur/60)}:${String(ep.dur%60).padStart(2,'0')}</div>
    </div>
  `).join('');
  const totalDur = filteredEps.reduce((s,e)=>s+e.dur,0);
  document.getElementById('sidebarStats').textContent = `${filteredEps.length} bölüm · ${new Set(filteredEps.map(e=>e.cat)).size} kategori · ~${Math.round(totalDur/60)}dk`;
}

// ===== RENDER SCENE =====
function renderScene(idx){
  const ep = filteredEps[idx];
  if(!ep) return;
  const tv = document.getElementById('tvContent');
  tv.classList.add('fade-out');
  setTimeout(()=>{
    tv.innerHTML = `
      <div class="scene-category" style="color:${catColors[ep.cat]||'#00ff88'}">${ep.cat}</div>
      <div class="scene-title">${ep.icon} ${ep.title}</div>
      <div class="scene-desc">${ep.desc}</div>
      <div class="scene-facts">
        ${ep.cards.map(c=>`<div class="fact-card"><div class="fact-icon">${c.icon}</div><div class="fact-value">${c.title}</div><div class="fact-label">${c.text}</div></div>`).join('')}
      </div>
    `;
    tv.classList.remove('fade-out');
    tv.classList.add('fade-in');
    // Floating icons
    const vis = document.getElementById('sceneVisual');
    vis.innerHTML = '';
    const icons = ep.cards.map(c=>c.icon);
    for(let i=0;i<6;i++){
      const span = document.createElement('span');
      span.className='floating-icon';
      span.textContent = icons[i%icons.length];
      span.style.left = Math.random()*90+'%';
      span.style.top = Math.random()*80+'%';
      span.style.animationDelay = (Math.random()*8)+'s';
      span.style.animationDuration = (15+Math.random()*10)+'s';
      vis.appendChild(span);
    }
  },300);
}

function renderDetails(idx){
  const ep = filteredEps[idx];
  if(!ep) return;
  const el = document.getElementById('episodeDetails');
  el.innerHTML = `
    <div class="ep-header">
      <div class="ep-icon">${ep.icon}</div>
      <div>
        <div class="ep-title">${ep.title}</div>
        <div class="ep-category" style="color:${catColors[ep.cat]||'#00ff88'}">${ep.cat} · Bölüm ${idx+1}/${filteredEps.length} · ${ep.dur} saniye</div>
      </div>
    </div>
    <div class="ep-body"><p>${ep.desc}</p></div>
    <ul class="ep-bullets">${ep.bullets.map(b=>`<li>${b}</li>`).join('')}</ul>
    <div class="info-cards">
      ${ep.cards.map(c=>`<div class="info-card"><div class="info-card-icon">${c.icon}</div><div class="info-card-title">${c.title}</div><div class="info-card-text">${c.text}</div></div>`).join('')}
    </div>
    ${ep.related?`<div class="ep-related"><h4>🔗 İlgili İçerikler — Tıklayarak Keşfet</h4><div class="ep-related-links">${ep.related.map(r=>`<a href="${r.href}">${r.text} →</a>`).join('')}</div></div>`:''}
  `;
}

// ===== NAVIGATION =====
function goTo(idx){
  if(idx<0) idx = filteredEps.length-1;
  if(idx>=filteredEps.length) idx = 0;
  watchedSet.add(filteredEps[currentIdx]?.id);
  currentIdx = idx;
  elapsed = 0;
  renderScene(idx);
  renderDetails(idx);
  buildPlaylist();
  updateTimeline();
  updateTimelineInfo();
  // Scroll playlist to active
  const activeItem = document.querySelector('.pl-item.active');
  if(activeItem) activeItem.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ===== PLAYBACK =====
function togglePlay(){
  isPlaying = !isPlaying;
  document.getElementById('btnPlay').textContent = isPlaying?'⏸':'▶';
  if(isPlaying) startTimer();
  else clearInterval(timer);
}
function startTimer(){
  clearInterval(timer);
  const interval = Math.round(1000 / playbackSpeed);
  timer = setInterval(()=>{
    elapsed++;
    const ep = filteredEps[currentIdx];
    if(!ep) return;
    updateTimeline();
    if(elapsed >= ep.dur){
      elapsed = 0;
      goTo(currentIdx+1);
    }
  }, interval);
}

// ===== MUSIC =====
function toggleMusic(){
  if(!musicCtx){
    musicCtx = new (window.AudioContext||window.webkitAudioContext)();
    musicCtx.gainNode = musicCtx.createGain();
    musicCtx.gainNode.gain.value = 0.03;
    musicCtx.gainNode.connect(musicCtx.destination);
  }
  musicPlaying = !musicPlaying;
  document.getElementById('musicBtn').classList.toggle('playing',musicPlaying);
  if(musicPlaying) playAmbient();
}
function playAmbient(){
  if(!musicCtx||!musicPlaying) return;
  const osc = musicCtx.createOscillator();
  const gain = musicCtx.createGain();
  osc.type = 'sine';
  osc.frequency.value = 60 + Math.random()*80;
  gain.gain.value = 0.02;
  gain.gain.exponentialRampToValueAtTime(0.001,musicCtx.currentTime+5);
  osc.connect(gain).connect(musicCtx.gainNode);
  osc.start();
  osc.stop(musicCtx.currentTime+5);
  setTimeout(()=>{if(musicPlaying)playAmbient();},3000+Math.random()*3000);
}

// ===== START =====
init();
</script>
<script src="hs-nav.js"></script>
</body>
