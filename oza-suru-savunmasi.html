<h1>Sürü Savunması</h1>
<p class="sub">Otonom drone sürüsünü koordine ederek düşman hedeflerini etkisiz hale getirin</p>
<div class="game-area" id="arena"></div>
<div class="hud"><span>Sürü:</span> 8 Drone | <span>Hedef:</span> <span id="targets">5</span> | <span>Skor:</span> <span id="score">0</span></div>
<button class="btn" onclick="startGame()">BAŞLAT</button>
<script>
const arena=document.getElementById('arena');
let drones=[],enemies=[],score=0,gameActive=false;
function startGame(){
  arena.innerHTML='';drones=[];enemies=[];score=0;gameActive=true;
  document.getElementById('score').textContent='0';
  document.getElementById('targets').textContent='5';
  for(let i=0;i<8;i++){
    const d=document.createElement('div');d.className='drone';
    d.style.left=Math.random()*90+'%';d.style.top=Math.random()*90+'%';
    arena.appendChild(d);drones.push(d);
  }
  for(let i=0;i<5;i++) spawnEnemy();
  arena.onclick=e=>{
    if(!gameActive)return;
    const rect=arena.getBoundingClientRect();
    const x=(e.clientX-rect.left)/rect.width*100;
    const y=(e.clientY-rect.top)/rect.height*100;
    drones.forEach(d=>{d.style.left=x+Math.random()*10-5+'%';d.style.top=y+Math.random()*10-5+'%';});
    checkHits(x,y);
  };
}
function spawnEnemy(){
  const e=document.createElement('div');e.className='enemy';
  e.style.left=Math.random()*90+'%';e.style.top=Math.random()*90+'%';
  arena.appendChild(e);enemies.push(e);
}
function checkHits(x,y){
  enemies.forEach((e,i)=>{
    const ex=parseFloat(e.style.left);const ey=parseFloat(e.style.top);
    if(Math.abs(ex-x)<8&&Math.abs(ey-y)<8){
      e.style.background='#00FF88';score++;
      document.getElementById('score').textContent=score;
      setTimeout(()=>{e.remove();enemies.splice(i,1);
        document.getElementById('targets').textContent=enemies.length;
        if(enemies.length===0){alert('Tebrikler! Tüm hedefler etkisiz hale getirildi. Skor: '+score);gameActive=false;}
      },300);
    }
  });
}
</script></body></html>
