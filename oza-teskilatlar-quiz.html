<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OZA — Teşkilatlar Quiz</title>
<style>
html{scroll-padding-top:80px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0a0e1a;color:#e0e0e0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.back-nav{position:fixed;top:12px;left:12px;z-index:999;background:rgba(0,0,0,.7);padding:8px 16px;border-radius:20px;font-size:13px}
.back-nav a{color:#4fc3f7;text-decoration:none}
.game-container{max-width:600px;width:90%;padding:30px;text-align:center}
h1{font-size:1.8em;color:#81c784;margin-bottom:10px}
.subtitle{color:#90a4ae;margin-bottom:30px}
.score-bar{display:flex;justify-content:space-between;margin-bottom:20px;padding:10px 20px;background:rgba(0,0,0,.3);border-radius:10px}
.score-bar span{font-size:.9em;color:#90a4ae}
.score-bar .val{color:#81c784;font-weight:700}
.scenario{background:rgba(255,255,255,.05);border-radius:16px;padding:25px;margin-bottom:20px;border:1px solid rgba(129,199,132,.2)}
.scenario .q-num{font-size:.8em;color:#78909c;margin-bottom:8px}
.scenario .q-text{font-size:1.1em;color:#fff;line-height:1.5;margin-bottom:15px}
.choices{display:flex;flex-direction:column;gap:10px}
.choice-btn{padding:15px 20px;background:rgba(129,199,132,.1);border:1px solid rgba(129,199,132,.3);border-radius:12px;color:#e0e0e0;cursor:pointer;text-align:left;font-size:.95em;transition:all .3s}
.choice-btn:hover{background:rgba(129,199,132,.2);border-color:#81c784;transform:translateX(5px)}
.choice-btn.correct{background:rgba(129,199,132,.3);border-color:#81c784;color:#81c784}
.choice-btn.wrong{background:rgba(239,83,80,.2);border-color:#ef5350;color:#ef5350}
.result{text-align:center;padding:30px}
.result h2{font-size:1.8em;margin-bottom:15px}
.result .final-score{font-size:3em;color:#81c784;font-weight:700}
.restart-btn{margin-top:20px;padding:12px 30px;background:#81c784;color:#0a0e1a;border:none;border-radius:10px;font-size:1em;cursor:pointer;font-weight:600}

/* ═══ TEK EKRAN — NO SCROLL ═══ */
html, body {
  height: 100vh !important;
  max-height: 100vh !important;
  overflow: hidden !important;
}
body > .wrap, body > .container, body > .main, body > .game-container, body > .game-wrap {
  max-height: calc(100vh - 54px) !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
}
@media (max-width: 480px) {
  body > .wrap, body > .container, body > .main { 
    max-height: calc(100vh - 44px) !important;
    padding: 8px !important;
  }
}


/* ═══ TEK EKRAN VIEWPORT FIT ═══ */
html, body { 
  height: 100vh !important; 
  max-height: 100vh !important; 
  overflow: hidden !important;
  margin: 0 !important;
  padding: 0 !important;
}
.game-container, .container, .main, #app, #game, .game-wrapper, .game-area {
  height: 100vh !important;
  max-height: 100vh !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  display: flex !important;
  flex-direction: column !important;
}
/* Mobil uyum */
@media (max-width: 768px) {
  body { font-size: 13px !important; }
  h1, .game-title { font-size: clamp(16px, 4vw, 24px) !important; }
  h2 { font-size: clamp(14px, 3.5vw, 20px) !important; }
  .btn, button { 
    padding: 8px 16px !important; 
    font-size: 12px !important;
    min-height: 40px !important;
    touch-action: manipulation !important;
  }
  .card, .option, .choice { 
    padding: 10px !important; 
    margin: 4px !important;
  }
}
@media (max-width: 480px) {
  body { font-size: 12px !important; }
  .nav, .navbar, .top-bar, .header { 
    padding: 4px 8px !important;
    font-size: 11px !important;
  }
}
@media (max-height: 700px) {
  .game-container, .container, .main {
    padding: 8px !important;
  }
  h1, .game-title { font-size: 18px !important; }
}


/* ═══ MOBİL UYUMLU RESPONSIVE ═══ */
@media (max-width: 768px) {
  body { font-size: 14px !important; }
  .container, .main, .wrap, .content, .page-content {
    padding: 12px !important;
    max-width: 100% !important;
  }
  h1 { font-size: clamp(18px, 5vw, 28px) !important; }
  h2 { font-size: clamp(15px, 4vw, 22px) !important; }
  h3 { font-size: clamp(13px, 3.5vw, 18px) !important; }
  table { font-size: 11px !important; }
  img, video, canvas, svg { max-width: 100% !important; height: auto !important; }
  .grid, .card-grid, .cards { grid-template-columns: 1fr !important; }
}
@media (max-width: 480px) {
  body { font-size: 13px !important; }
  .container, .main, .wrap { padding: 8px !important; }
  h1 { font-size: clamp(16px, 5vw, 24px) !important; }
}
html { overflow-x: hidden !important; }
body { overflow-x: hidden !important; max-width: 100vw !important; }
img, video, iframe, canvas, svg, table { max-width: 100% !important; }


/* === BAŞLIK GÖRÜNÜRLÜk DÜZELTMESİ === */
h1, .sim-title, .game-title, .page-title {
  overflow: visible !important;
  text-overflow: unset !important;
  white-space: normal !important;
  line-height: 1.2 !important;
}
.sim-hero h1, .hero h1, .page-hero h1 {
  font-size: clamp(1.5rem, 4vw, 2.5rem) !important;
  overflow: visible !important;
  text-overflow: unset !important;
  white-space: normal !important;
  word-wrap: break-word !important;
}

</style>
<link rel="stylesheet" href="hs-global-fix.css">
<link rel="stylesheet" href="hs-global.css">
</head>
<body>
<div style="position:fixed;top:12px;left:12px;z-index:9999;display:flex;gap:8px;"><a href="oza-hub.html" style="background:rgba(10,15,23,0.9);color:#00E0FF;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid #00E0FF33;backdrop-filter:blur(8px);">← OZA Hub</a><a href="index.html" style="background:rgba(10,15,23,0.9);color:#c41e3a;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid rgba(196,30,58,0.3);backdrop-filter:blur(8px);">🏠 Ana Sayfa</a></div>
<div class="back-nav"><a href="oza-hub.html">← OZA Merkez</a></div>
<div class="game-container">
<h1>🌍 Teşkilatlar Quiz</h1>
<p class="subtitle">Dünya teşkilatlarını ne kadar tanıyorsun?</p>
<div class="score-bar"><span>Soru: <span class="val" id="qNum">1/12</span></span><span>Puan: <span class="val" id="score">0</span></span></div>
<div id="gameArea"></div>
</div>
<script>
const questions=[
{q:"NATO'nun merkezi nerededir?",choices:["Washington","Londra","Brüksel","Paris"],correct:2},
{q:"Türkiye kaç uluslararası teşkilata üyedir?",choices:["15","22","32","45"],correct:2},
{q:"Şanghay İşbirliği Örgütü'nün (ŞİÖ) lideri hangi ülkelerdir?",choices:["ABD-AB","Çin-Rusya","Hindistan-Japonya","Türkiye-İran"],correct:1},
{q:"G-20 ülkeleri dünya GSYH'nın yüzde kaçını temsil eder?",choices:["%60","%72","%85","%95"],correct:2},
{q:"Türk Konseyi'nin (Türk Devletleri Teşkilatı) merkezi nerededir?",choices:["Ankara","Bakü","İstanbul","Astana"],correct:2},
{q:"BM Güvenlik Konseyi'nde kaç daimi üye vardır?",choices:["3","5","7","10"],correct:1},
{q:"OECD'nin merkezi hangi şehirdedir?",choices:["Cenevre","New York","Paris","Viyana"],correct:2},
{q:"Karadeniz Ekonomik İşbirliği Örgütü (KEİ) kaç üyeye sahiptir?",choices:["8","13","20","27"],correct:1},
{q:"NATO'nun Madde 5'i ne anlama gelir?",choices:["Ekonomik yaptırım","Kolektif savunma","Silahsızlanma","Barış gücü"],correct:1},
{q:"D-8 teşkilatının kurucu öncüsü hangi ülkedir?",choices:["Mısır","İran","Türkiye","Malezya"],correct:2},
{q:"AGİT'in (OSCE) merkezi nerededir?",choices:["Brüksel","Strazburg","Viyana","Helsinki"],correct:2},
{q:"Avrupa Birliği'ne Türkiye'nin statüsü nedir?",choices:["Tam üye","Gözlemci","Aday ülke","Ortak üye"],correct:2}
];
let current=0,score=0;
function renderQ(){
if(current>=questions.length){showResult();return}
const q=questions[current];
document.getElementById('qNum').textContent=(current+1)+'/'+questions.length;
document.getElementById('gameArea').innerHTML=`<div class="scenario"><div class="q-num">Soru ${current+1}</div><div class="q-text">${q.q}</div></div><div class="choices">${q.choices.map((c,i)=>`<div class="choice-btn" onclick="answer(${i})">${c}</div>`).join('')}</div>`;
}
function answer(idx){const q=questions[current];const btns=document.querySelectorAll('.choice-btn');btns.forEach((b,i)=>{if(i===q.correct)b.classList.add('correct');else if(i===idx)b.classList.add('wrong');b.style.pointerEvents='none'});if(idx===q.correct)score+=10;document.getElementById('score').textContent=score;setTimeout(()=>{current++;renderQ()},1200)}
function showResult(){document.getElementById('gameArea').innerHTML=`<div class="result"><h2>${score>=80?'Diplomat Seviyesi!':score>=50?'İyi Bilgi!':'Daha Çalış!'}</h2><div class="final-score">${score}/120</div><button class="restart-btn" onclick="restart()">Tekrar Oyna</button></div>`}
function restart(){current=0;score=0;document.getElementById('score').textContent=0;renderQ()}
renderQ();
</script>
<script src="hs-nav.js"></script>
</body>
</html>
