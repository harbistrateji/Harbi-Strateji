<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<meta name="hs-skip" content="true">
<title>Türk Savaş Tarihi — Swipe Deneyimi</title>
<style>
html{scroll-padding-top:80px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0a0a14;color:#fff;overflow:hidden;height:100vh;touch-action:pan-y}
.container{height:100vh;position:relative;overflow:hidden}
.slide{position:absolute;top:0;left:0;right:0;bottom:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:30px 20px;text-align:center;transition:transform .5s cubic-bezier(.19,1,.22,1),opacity .5s;opacity:0;transform:translateY(100%)}
.slide.active{opacity:1;transform:translateY(0)}
.slide.prev{opacity:0;transform:translateY(-100%)}
.slide-bg{position:absolute;top:0;left:0;right:0;bottom:0;opacity:0.15}
.slide-content{position:relative;z-index:2;max-width:500px}
.battle-icon{font-size:3rem;margin-bottom:15px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.battle-year{font-size:1.2rem;color:#f4a261;font-weight:700;margin-bottom:8px;letter-spacing:2px}
.battle-name{font-size:clamp(1.5rem,6vw,2.5rem);font-weight:900;margin-bottom:15px;line-height:1.2}
.battle-desc{font-size:0.95rem;color:#ccc;line-height:1.6;margin-bottom:20px}
.battle-stats{display:flex;gap:15px;justify-content:center;flex-wrap:wrap}
.battle-stat{padding:8px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.15);border-radius:20px;font-size:0.8rem}
.battle-stat strong{color:#f4a261}
.progress{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:5px;z-index:99}
.progress .dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.2);transition:all .3s}
.progress .dot.active{background:#f4a261;transform:scale(1.5)}
.swipe-hint{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,0.4);font-size:0.8rem;animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
.counter{position:fixed;top:20px;right:20px;color:rgba(255,255,255,0.5);font-size:0.9rem;z-index:99}
.music-btn{position:fixed;top:20px;left:20px;width:40px;height:40px;border-radius:50%;background:rgba(244,162,97,0.15);border:1.5px solid #f4a261;color:#f4a261;font-size:1.2rem;cursor:pointer;z-index:99;display:flex;align-items:center;justify-content:center}
.particles{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;z-index:1}
.particle{position:absolute;width:3px;height:3px;background:#f4a261;border-radius:50%;opacity:0;animation:float 4s infinite}
@keyframes float{0%{opacity:0;transform:translateY(100vh)}50%{opacity:0.6}100%{opacity:0;transform:translateY(-20px)}}

/* ═══ TEK EKRAN — NO SCROLL ═══ */
html, body {
  height: 100vh !important;
  max-height: 100vh !important;
  overflow: hidden !important;
}
body > .wrap, body > .container, body > .main, body > .game-container, body > .game-wrap {
  max-height: calc(100vh - 54px) !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
}
@media (max-width: 480px) {
  body > .wrap, body > .container, body > .main { 
    max-height: calc(100vh - 44px) !important;
    padding: 8px !important;
  }
}


/* ═══ TEK EKRAN VIEWPORT FIT ═══ */
html, body { 
  height: 100vh !important; 
  max-height: 100vh !important; 
  overflow: hidden !important;
  margin: 0 !important;
  padding: 0 !important;
}
.game-container, .container, .main, #app, #game, .game-wrapper, .game-area {
  height: 100vh !important;
  max-height: 100vh !important;
  overflow-y: auto !important;
  overflow-x: hidden !important;
  display: flex !important;
  flex-direction: column !important;
}
/* Mobil uyum */
@media (max-width: 768px) {
  body { font-size: 13px !important; }
  h1, .game-title { font-size: clamp(16px, 4vw, 24px) !important; }
  h2 { font-size: clamp(14px, 3.5vw, 20px) !important; }
  .btn, button { 
    padding: 8px 16px !important; 
    font-size: 12px !important;
    min-height: 40px !important;
    touch-action: manipulation !important;
  }
  .card, .option, .choice { 
    padding: 10px !important; 
    margin: 4px !important;
  }
}
@media (max-width: 480px) {
  body { font-size: 12px !important; }
  .nav, .navbar, .top-bar, .header { 
    padding: 4px 8px !important;
    font-size: 11px !important;
  }
}
@media (max-height: 700px) {
  .game-container, .container, .main {
    padding: 8px !important;
  }
  h1, .game-title { font-size: 18px !important; }
}


/* ═══ MOBİL UYUMLU RESPONSIVE ═══ */
@media (max-width: 768px) {
  body { font-size: 14px !important; }
  .container, .main, .wrap, .content, .page-content {
    padding: 12px !important;
    max-width: 100% !important;
  }
  h1 { font-size: clamp(18px, 5vw, 28px) !important; }
  h2 { font-size: clamp(15px, 4vw, 22px) !important; }
  h3 { font-size: clamp(13px, 3.5vw, 18px) !important; }
  table { font-size: 11px !important; }
  img, video, canvas, svg { max-width: 100% !important; height: auto !important; }
  .grid, .card-grid, .cards { grid-template-columns: 1fr !important; }
}
@media (max-width: 480px) {
  body { font-size: 13px !important; }
  .container, .main, .wrap { padding: 8px !important; }
  h1 { font-size: clamp(16px, 5vw, 24px) !important; }
}
html { overflow-x: hidden !important; }
body { overflow-x: hidden !important; max-width: 100vw !important; }
img, video, iframe, canvas, svg, table { max-width: 100% !important; }


/* === BAŞLIK GÖRÜNÜRLÜk DÜZELTMESİ === */
h1, .sim-title, .game-title, .page-title {
  overflow: visible !important;
  text-overflow: unset !important;
  white-space: normal !important;
  line-height: 1.2 !important;
}
.sim-hero h1, .hero h1, .page-hero h1 {
  font-size: clamp(1.5rem, 4vw, 2.5rem) !important;
  overflow: visible !important;
  text-overflow: unset !important;
  white-space: normal !important;
  word-wrap: break-word !important;
}

</style>

</head>
<body>
<div style="position:fixed;top:12px;left:12px;z-index:9999;display:flex;gap:8px;"><a href="oza-hub.html" style="background:rgba(10,15,23,0.9);color:#00E0FF;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid #00E0FF33;backdrop-filter:blur(8px);">← OZA Hub</a><a href="index.html" style="background:rgba(10,15,23,0.9);color:#c41e3a;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid rgba(196,30,58,0.3);backdrop-filter:blur(8px);">🏠 Ana Sayfa</a></div>
<a href="oza-hub.html" style="position:fixed;top:12px;left:12px;z-index:9999;background:rgba(10,15,23,0.95);border:1px solid rgba(150,170,200,0.3);border-radius:8px;padding:6px 14px;color:#90a1b5;text-decoration:none;font-size:12px;font-family:monospace;backdrop-filter:blur(8px);transition:0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.3);" onmouseover="this.style.color='#fff';this.style.borderColor='#c41e3a'" onmouseout="this.style.color='#90a1b5';this.style.borderColor='rgba(150,170,200,0.3)'">← OZA</a>
<div class="container" id="container">
<div class="particles" id="particles"></div>
</div>
<div class="progress" id="progress"></div>
<div class="swipe-hint">↑ Yukarı kaydır</div>
<div class="counter" id="counter">1/15</div>
<button class="music-btn" id="musicBtn" onclick="toggleMusic()">♪</button>

<script>
const battles=[
{icon:'⚔️',year:'751',name:'Talas Savaşı',desc:'Abbasi-Çin çarpışmasında Karluk Türklerinin Müslümanlar safına geçmesi savaşın kaderini değiştirdi. İslam dünyasına kağıt üretimi aktarıldı. Türklerin İslamlaşma süreci başladı.',stats:['Abbasi-Karluk ittifakı','Çin Tang Hanedanı','Orta Asya hakimiyeti'],color:'#e63946'},
{icon:'🏹',year:'1040',name:'Dandanakan Muharebesi',desc:'Büyük Selçuklular, Gaznelileri yenerek bağımsızlığını ilan etti. Tuğrul Bey sultan oldu. Türk-İslam devlet geleneğinin temeli atıldı.',stats:['Selçuklu zaferi','Gazneli çöküşü','Sultan unvanı'],color:'#f4a261'},
{icon:'🗡️',year:'26 Ağustos 1071',name:'Malazgirt Meydan Muharebesi',desc:'Sultan Alparslan, 50.000 kişilik ordusuyla 200.000 kişilik Bizans ordusunu hilal taktiğiyle yendi. Anadolu kapıları Türklere açıldı.',stats:['Hilal taktiği','Bizans İmparatoru esir','Anadolu\'nun fethi'],color:'#e76f51'},
{icon:'🛡️',year:'1176',name:'Miryokefalon Muharebesi',desc:'Anadolu Selçuklu Sultanı II. Kılıç Arslan, Bizans İmparatoru Manuel\'i ağır yenilgiye uğrattı. Anadolu\'nun kesin Türk yurdu olduğu tescillendi.',stats:['Selçuklu zaferi','Bizans son taarruzu','Anadolu kesinleşti'],color:'#2a9d8f'},
{icon:'⚔️',year:'1389',name:'I. Kosova Muharebesi',desc:'Sultan I. Murad, Balkan koalisyonunu yendi. Murad Han şehit düştü ama zafer Osmanlı\'nın Balkan hakimiyetini pekiştirdi.',stats:['Osmanlı zaferi','Sultan şehadeti','Balkan hakimiyeti'],color:'#264653'},
{icon:'🏰',year:'1396',name:'Niğbolu Muharebesi',desc:'Yıldırım Bayezid, Haçlı ordusunu imha etti. Avrupa şövalyeliğinin son büyük seferi başarısızlıkla sonuçlandı.',stats:['Haçlı imhası','Bayezid şimşeği','Avrupa şoku'],color:'#6a0572'},
{icon:'🏴',year:'29 Mayıs 1453',name:'İstanbul\'un Fethi',desc:'Fatih Sultan Mehmet, 53 günlük kuşatmayla Konstantinopolis\'i fethetti. Çağ kapandı, çağ açıldı. Şahi topları ve karadan gemi çekme taktiği.',stats:['Çağ değişimi','Şahi topları','Karadan gemi'],color:'#d4af37'},
{icon:'⚔️',year:'1514',name:'Çaldıran Muharebesi',desc:'Yavuz Sultan Selim, Safevi Şah İsmail\'i yendi. Doğu Anadolu güvence altına alındı, İslam dünyasının liderliği Osmanlı\'ya geçti.',stats:['Ateşli silah üstünlüğü','Safevi yenilgisi','Doğu güvenliği'],color:'#c1121f'},
{icon:'🎯',year:'1526',name:'Mohaç Meydan Muharebesi',desc:'Kanuni Sultan Süleyman, Macar ordusunu 2 saatte imha etti. Macar Krallığı sona erdi. Osmanlı Orta Avrupa\'ya hakim oldu.',stats:['2 saat','Macar Krallığı sonu','Orta Avrupa'],color:'#780000'},
{icon:'⚓',year:'28 Eylül 1538',name:'Preveze Deniz Zaferi',desc:'Barbaros Hayreddin Paşa, 122 gemiyle 600 gemilik Haçlı donanmasını bozguna uğrattı. Akdeniz 33 yıl Türk gölü oldu.',stats:['122 vs 600 gemi','Barbaros dehası','33 yıl hakimiyet'],color:'#1d3557'},
{icon:'🚢',year:'18 Mart 1915',name:'Çanakkale Deniz Zaferi',desc:'Nusret\'in 26 mayını "Yenilmez Armada"yı durdurdu. 3 zırhlı battı, 3\'ü ağır hasar aldı. "Çanakkale geçilmez!" dünyaya ilan edildi.',stats:['3 zırhlı batık','Nusret destanı','Geçilmez!'],color:'#e63946'},
{icon:'🔥',year:'1916',name:'Kut\'ül-Amare Zaferi',desc:'Halil Paşa komutasında Osmanlı kuvvetleri, 13.000 İngiliz askerini esir aldı. I. Dünya Savaşı\'nın en büyük İngiliz teslimiyeti.',stats:['13.000 esir','İngiliz teslimiyeti','Irak cephesi'],color:'#bc6c25'},
{icon:'🏔️',year:'1921',name:'Sakarya Meydan Muharebesi',desc:'22 gün 22 gece süren muharebe. "Hattı müdafaa yoktur, sathı müdafaa vardır." Yunan ilerleyişi kesin olarak durduruldu.',stats:['22 gün 22 gece','Sathı müdafaa','Dönüm noktası'],color:'#606c38'},
{icon:'',year:'26 Ağustos 1922',name:'Büyük Taarruz & Başkomutanlık',desc:'"Ordular! İlk hedefiniz Akdeniz\'dir. İleri!" Mustafa Kemal\'in bizzat yönettiği taarruz. 9 Eylül\'de düşman denize döküldü.',stats:['Başkomutan Meydan Muharebesi','9 Eylül İzmir','Zafer'],color:'#d62828'},
{icon:'🪖',year:'1950',name:'Kore Savaşı — Kunuri',desc:'Türk Tugayı, Çin ordusunun kuşatmasını yararak BM kuvvetlerinin çekilmesini sağladı. "Türkler olmasaydı hepimiz esir düşerdik."',stats:['BM kuvvetleri kurtarıldı','Türk cesareti','NATO yolu'],color:'#457b9d'}
];

let current=0,startY=0,musicPlaying=false,audioCtx,musicInterval;
const container=document.getElementById('container');
const progress=document.getElementById('progress');
const counter=document.getElementById('counter');

// Create particles
const particlesEl=document.getElementById('particles');
for(let i=0;i<20;i++){
const p=document.createElement('div');p.className='particle';
p.style.left=Math.random()*100+'%';
p.style.animationDelay=Math.random()*4+'s';
p.style.animationDuration=(3+Math.random()*3)+'s';
particlesEl.appendChild(p);
}

function createSlides(){
battles.forEach((b,i)=>{
const slide=document.createElement('div');
slide.className='slide'+(i===0?' active':'');
slide.innerHTML=`
<div class="slide-bg" style="background:radial-gradient(circle at 50% 50%,${b.color}33 0%,transparent 70%)"></div>
<div class="slide-content">
<div class="battle-icon">${b.icon}</div>
<div class="battle-year">${b.year}</div>
<div class="battle-name">${b.name}</div>
<div class="battle-desc">${b.desc}</div>
<div class="battle-stats">${b.stats.map(s=>`<span class="battle-stat"><strong>${s}</strong></span>`).join('')}</div>
</div>`;
container.appendChild(slide);
const dot=document.createElement('div');
dot.className='dot'+(i===0?' active':'');
progress.appendChild(dot);
});
}

function goTo(n){
if(n<0||n>=battles.length)return;
const slides=document.querySelectorAll('.slide');
slides[current].className='slide prev';
slides[n].className='slide active';
current=n;
counter.textContent=`${current+1}/${battles.length}`;
document.querySelectorAll('.progress .dot').forEach((d,i)=>d.classList.toggle('active',i===current));
}

// Touch/swipe
container.addEventListener('touchstart',e=>{startY=e.touches[0].clientY;});
container.addEventListener('touchend',e=>{
const diff=startY-e.changedTouches[0].clientY;
if(Math.abs(diff)>50){diff>0?goTo(current+1):goTo(current-1);}
});
// Mouse wheel
document.addEventListener('wheel',e=>{
if(e.deltaY>30)goTo(current+1);
else if(e.deltaY<-30)goTo(current-1);
},{passive:true});
// Keyboard
document.addEventListener('keydown',e=>{
if(e.key==='ArrowDown'||e.key===' ')goTo(current+1);
if(e.key==='ArrowUp')goTo(current-1);
});

function toggleMusic(){
if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();
if(musicPlaying){clearInterval(musicInterval);musicPlaying=false;document.getElementById('musicBtn').style.opacity='0.5';}
else{playWarMusic();musicPlaying=true;document.getElementById('musicBtn').style.opacity='1';}
}
function playWarMusic(){
const notes=[110,130.81,146.83,164.81,196,220,246.94,293.66];
let step=0;
function play(){
if(!musicPlaying)return;
const osc=audioCtx.createOscillator(),gain=audioCtx.createGain();
osc.connect(gain);gain.connect(audioCtx.destination);
osc.type=step%4===0?'sawtooth':'triangle';
osc.frequency.value=notes[step%notes.length];
gain.gain.setValueAtTime(0.06,audioCtx.currentTime);
gain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.6);
osc.start();osc.stop(audioCtx.currentTime+0.6);
step++;
}
musicInterval=setInterval(play,450);play();
}

createSlides();
</script>
