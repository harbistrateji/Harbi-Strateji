<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="hs-skip" content="true">
<title>Üs İnşa Et — OZA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0f17;color:#eaf0f7;font-family:'Segoe UI',system-ui,sans-serif;touch-action:manipulation;user-select:none}
#app{width:100%;height:100%;display:flex;flex-direction:column}
#topBar{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(10,15,23,.95);border-bottom:1px solid rgba(0,224,255,.15);flex-shrink:0;z-index:10}
#topBar a{color:#00e0ff;text-decoration:none;font-size:.8rem}
#topBar .title{font-size:.85rem;font-weight:700;color:#fff}
#topBar .stats{display:flex;gap:12px;font-size:.75rem}
#topBar .stats span{color:#c9a24b}
#gameArea{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center}
canvas{display:block;background:#0a0f17}
#hud{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;pointer-events:none;font-size:.75rem}
#hud .badge{background:rgba(0,0,0,.6);border:1px solid rgba(0,224,255,.3);border-radius:6px;padding:3px 8px}
#controls{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:12px}
#controls button{width:52px;height:52px;border-radius:50%;border:2px solid rgba(0,224,255,.4);background:rgba(0,0,0,.5);color:#fff;font-size:1.2rem;cursor:pointer;-webkit-tap-highlight-color:transparent}
#controls button:active{background:rgba(0,224,255,.2);transform:scale(.9)}
#overlay{position:absolute;inset:0;background:rgba(10,15,23,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;text-align:center;padding:20px}
#overlay h2{color:#00e0ff;font-size:1.4rem;margin-bottom:8px}
#overlay p{color:#aaa;font-size:.85rem;margin-bottom:16px;max-width:320px}
#overlay button{padding:12px 32px;border:2px solid #00e0ff;background:transparent;color:#00e0ff;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:700}
#overlay button:hover{background:rgba(0,224,255,.1)}
@media(min-width:769px){#controls{display:none}}
</style>
<link rel="stylesheet" href="hs-global-fix.css">
</head>
<body>
<div style="position:fixed;top:12px;left:12px;z-index:9999;display:flex;gap:8px;"><a href="oza-hub.html" style="background:rgba(10,15,23,0.9);color:#00E0FF;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid #00E0FF33;backdrop-filter:blur(8px);">← OZA Hub</a><a href="index.html" style="background:rgba(10,15,23,0.9);color:#c41e3a;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid rgba(196,30,58,0.3);backdrop-filter:blur(8px);">🏠 Ana Sayfa</a></div>
<div id="app">
<div id="topBar">
<a href="oza-hub.html">← OZA</a>
<span class="title">🏗️ Üs İnşa Et</span>
<div class="stats"><span id="scoreDisp">0</span> puan</div>
</div>
<div id="gameArea">
<canvas id="gc"></canvas>
<div id="hud"><div class="badge" id="hudL"></div><div class="badge" id="hudR"></div></div>
<div id="controls"><button onclick="selectBuilding(0)">🏠</button><button onclick="selectBuilding(1)">🛡️</button><button onclick="selectBuilding(2)">📡</button><button onclick="selectBuilding(3)">⚡</button>
</div>
<div id="overlay">
<h2 id="ovTitle">BAŞLA</h2>
<p id="ovDesc">Dokunarak veya tıklayarak başla</p>
<button id="ovBtn" onclick="startGame()">▶ BAŞLA</button>
</div>
</div>
</div>
<script>
// Audio context
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(freq,dur,type){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=type||'square';o.frequency.value=freq;g.gain.value=0.08;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+dur);o.stop(audioCtx.currentTime+dur)}
// Canvas setup
const canvas=document.getElementById('gc');
const ctx=canvas.getContext('2d');
let W,H,gameRunning=false,score=0,level=1;
function resize(){
  const area=document.getElementById('gameArea');
  W=canvas.width=area.clientWidth;
  H=canvas.height=area.clientHeight;
}
window.addEventListener('resize',resize);
resize();
function updateScore(v){score+=v;document.getElementById('scoreDisp').textContent=score}
function showOverlay(t,d,btn){
  document.getElementById('overlay').style.display='flex';
  document.getElementById('ovTitle').textContent=t;
  document.getElementById('ovDesc').textContent=d;
  document.getElementById('ovBtn').textContent=btn||'▶ TEKRAR';
}
function hideOverlay(){document.getElementById('overlay').style.display='none'}

let grid=[],gridW=12,gridH=8,cellSize,selectedBuilding=0,resources=500,wave=0,enemies2=[],buildings=[];
const BUILDING_TYPES=[
  {name:'Kışla',cost:50,hp:100,color:'#4ade80',icon:'🏠'},
  {name:'Savunma Kulesi',cost:100,hp:80,color:'#ff3a4a',icon:'🛡️',attack:true,range:3,dmg:10},
  {name:'Radar',cost:75,hp:60,color:'#00e0ff',icon:'📡',range:5},
  {name:'Jeneratör',cost:60,hp:70,color:'#fbbf24',icon:'⚡',income:10}
];
function startGame(){initAudio();hideOverlay();gameRunning=true;score=0;resources=500;wave=0;buildings=[];enemies2=[];
  grid=[];for(let y=0;y<gridH;y++){grid[y]=[];for(let x=0;x<gridW;x++)grid[y][x]=null}
  calcCellSize();startWaveTimer();loop2()}
function calcCellSize(){cellSize=Math.min(W/gridW,H/gridH)*0.9}
function selectBuilding(idx){selectedBuilding=idx}
function placeBuilding(gx,gy){
  if(gx<0||gx>=gridW||gy<0||gy>=gridH||grid[gy][gx])return;
  let bt=BUILDING_TYPES[selectedBuilding];
  if(resources<bt.cost)return;
  resources-=bt.cost;
  let b={x:gx,y:gy,type:selectedBuilding,hp:bt.hp,maxHp:bt.hp};
  grid[gy][gx]=b;buildings.push(b);
  playTone(523,.1,'sine');updateScore(5)}
let waveTimer;
function startWaveTimer(){waveTimer=setInterval(()=>{wave++;spawnEnemyWave()},12000)}
function spawnEnemyWave(){for(let i=0;i<wave*2+3;i++){
  enemies2.push({x:-20-Math.random()*100,y:Math.random()*H,hp:20+wave*5,maxHp:20+wave*5,speed:0.5+wave*0.1})}}
function loop2(){if(!gameRunning)return;requestAnimationFrame(loop2);update2();draw2()}
function update2(){
  // Income from generators
  buildings.forEach(b=>{if(BUILDING_TYPES[b.type].income&&Math.random()<0.01)resources+=BUILDING_TYPES[b.type].income});
  // Tower attacks
  buildings.forEach(b=>{let bt=BUILDING_TYPES[b.type];if(!bt.attack)return;
    let bpx=(b.x+0.5)*cellSize+(W-gridW*cellSize)/2;let bpy=(b.y+0.5)*cellSize+(H-gridH*cellSize)/2;
    enemies2.forEach(e=>{if(Math.hypot(e.x-bpx,e.y-bpy)<bt.range*cellSize&&Math.random()<0.03){e.hp-=bt.dmg;playTone(300,.05,'square')}})});
  // Enemy movement
  for(let i=enemies2.length-1;i>=0;i--){let e=enemies2[i];e.x+=e.speed;
    if(e.hp<=0){enemies2.splice(i,1);updateScore(10);resources+=5;continue}
    if(e.x>W+20){enemies2.splice(i,1);
      // Damage random building
      if(buildings.length>0){let rb=buildings[Math.floor(Math.random()*buildings.length)];rb.hp-=15;
        if(rb.hp<=0){grid[rb.y][rb.x]=null;buildings=buildings.filter(bb=>bb!==rb)}}}}
  document.getElementById('hudL').textContent='💰 '+resources;
  document.getElementById('hudR').textContent='Dalga '+wave;
}
function draw2(){
  ctx.fillStyle='#0a0f17';ctx.fillRect(0,0,W,H);
  let ox=(W-gridW*cellSize)/2,oy=(H-gridH*cellSize)/2;
  // Grid
  for(let y=0;y<gridH;y++)for(let x=0;x<gridW;x++){
    let px=ox+x*cellSize,py=oy+y*cellSize;
    ctx.strokeStyle='rgba(0,224,255,.1)';ctx.strokeRect(px,py,cellSize,cellSize);
    let b=grid[y][x];if(b){let bt=BUILDING_TYPES[b.type];
      ctx.fillStyle=bt.color;ctx.globalAlpha=b.hp/b.maxHp;ctx.fillRect(px+2,py+2,cellSize-4,cellSize-4);ctx.globalAlpha=1;
      ctx.fillStyle='#fff';ctx.font=(cellSize*0.4)+'px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText(bt.icon,px+cellSize/2,py+cellSize/2)}}
  // Enemies
  enemies2.forEach(e=>{ctx.fillStyle='#ff3a4a';ctx.beginPath();ctx.arc(e.x,e.y,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.fillRect(e.x-8,e.y-12,16*(e.hp/e.maxHp),3)});
  // Selected building indicator
  ctx.fillStyle='#c9a24b';ctx.font='11px sans-serif';ctx.textAlign='center';
  ctx.fillText('Seçili: '+BUILDING_TYPES[selectedBuilding].icon+' '+BUILDING_TYPES[selectedBuilding].name+' ('+BUILDING_TYPES[selectedBuilding].cost+'💰)',W/2,H-10);
}
canvas.addEventListener('click',e=>{if(!gameRunning)return;let r=canvas.getBoundingClientRect();
  let cx=e.clientX-r.left,cy=e.clientY-r.top;
  let ox=(W-gridW*cellSize)/2,oy=(H-gridH*cellSize)/2;
  let gx=Math.floor((cx-ox)/cellSize),gy=Math.floor((cy-oy)/cellSize);
  placeBuilding(gx,gy)});
canvas.addEventListener('touchstart',e=>{if(!gameRunning)return;e.preventDefault();let r=canvas.getBoundingClientRect();
  let t=e.touches[0];let cx=t.clientX-r.left,cy=t.clientY-r.top;
  let ox=(W-gridW*cellSize)/2,oy=(H-gridH*cellSize)/2;
  let gx=Math.floor((cx-ox)/cellSize),gy=Math.floor((cy-oy)/cellSize);
  placeBuilding(gx,gy)});
resize();

</script>
</body>
</html>
