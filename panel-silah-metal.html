<style>
:root{--bg:#020d1a;--panel:#041525;--border:#0a3a6a;--blue:#00aaff;--gold:#C9A24B;--red:#E01515;--green:#00ff88;--txt:#b0d8ff;--dim:#2a6aaa;}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:var(--bg);color:var(--txt);font-family:'IBM Plex Sans',sans-serif;min-height:100vh;}
/* HEADER */
header{background:linear-gradient(135deg,#020d1a,#041525);border-bottom:1px solid var(--border);padding:16px 20px;position:sticky;top:0;z-index:100;}
.header-top{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
h1{font-family:'Chakra Petch',monospace;font-size:clamp(1rem,3vw,1.5rem);font-weight:900;color:var(--blue);text-transform:uppercase;letter-spacing:2px;}
.subtitle{font-size:.85rem;color:var(--dim);}
/* STATS BAR */
.stats-bar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.stat-chip{background:rgba(0,170,255,.08);border:1px solid var(--border);border-radius:20px;padding:4px 12px;font-size:.85rem;color:var(--txt);}
.stat-chip span{color:var(--blue);font-weight:700;}
/* SEARCH & FILTER */
.controls{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
#searchInput{background:rgba(0,170,255,.06);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:.9rem;color:var(--txt);width:220px;outline:none;font-family:inherit;}
#searchInput:focus{border-color:var(--blue);}
#searchInput::placeholder{color:var(--dim);}
.filter-group{display:flex;gap:5px;flex-wrap:wrap;}
.filter-btn{background:rgba(0,170,255,.06);border:1px solid var(--border);border-radius:6px;padding:5px 10px;font-size:.9rem;color:var(--dim);cursor:pointer;transition:all .15s;white-space:nowrap;}
.filter-btn.active{border-color:var(--blue);color:var(--blue);background:rgba(0,170,255,.12);}
/* GRID */
main{padding:16px 20px;max-width:1400px;margin:0 auto;}
#resultsInfo{font-size:.85rem;color:var(--dim);margin-bottom:12px;}
.cards-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
/* CARD */
.weapon-card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden;}
.weapon-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--card-color,var(--blue));}
.weapon-card:hover{transform:translateY(-3px);border-color:var(--card-color,var(--blue));box-shadow:0 8px 30px rgba(0,170,255,.15);}
.card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}
.card-icon{font-size:1.8rem;}
.card-country{font-size:.9rem;color:var(--dim);text-align:right;}
.card-flag{font-size:1.1rem;display:block;}
.card-name{font-family:'Chakra Petch',monospace;font-size:.9rem;font-weight:700;color:var(--txt);margin-bottom:3px;}
.card-fullname{font-size:.68rem;color:var(--dim);margin-bottom:8px;font-style:italic;}
.card-desc{font-size:.85rem;color:#6a9aaa;line-height:1.6;margin-bottom:10px;}
.card-desc .highlight{color:var(--blue);font-weight:600;}
/* METALS */
.metals-section{margin-bottom:10px;}
.metals-title{font-size:.8rem;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.metals-list{display:flex;flex-wrap:wrap;gap:4px;}
.metal-tag{padding:3px 8px;border-radius:12px;font-size:.8rem;font-weight:700;border:1px solid;cursor:help;}
/* SPECS */
.specs-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px;margin-bottom:10px;}
.spec-item{background:rgba(0,170,255,.04);border-radius:6px;padding:4px 8px;}
.spec-label{font-size:.55rem;color:var(--dim);text-transform:uppercase;}
.spec-value{font-size:.85rem;color:var(--txt);font-weight:600;}
/* CATEGORY BADGE */
.cat-badge{display:inline-block;padding:3px 8px;border-radius:12px;font-size:.8rem;font-weight:700;border:1px solid;}
/* DETAIL MODAL */
#modal{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:none;align-items:center;justify-content:center;padding:20px;}
#modal.open{display:flex;}
.modal-box{background:var(--panel);border:1px solid var(--border);border-radius:16px;max-width:600px;width:100%;max-height:85vh;overflow-y:auto;padding:24px;position:relative;}
.modal-close{position:absolute;top:12px;right:12px;background:rgba(0,170,255,.1);border:1px solid var(--border);border-radius:8px;padding:5px 10px;cursor:pointer;font-size:.95rem;color:var(--txt);}
.modal-title{font-family:'Chakra Petch',monospace;font-size:1.2rem;font-weight:900;color:var(--blue);margin-bottom:4px;}
.modal-sub{font-size:.9rem;color:var(--dim);margin-bottom:16px;}
.modal-section{margin-bottom:14px;}
.modal-section h3{font-size:.95rem;color:var(--gold);text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;border-bottom:1px solid var(--border);padding-bottom:4px;}
.modal-section p{font-size:.78rem;color:#6a9aaa;line-height:1.7;}
.modal-section .fact{color:var(--blue);font-weight:700;}
/* BACK BTN */
.back-btn{background:rgba(0,170,255,.08);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:.85rem;color:var(--txt);cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;}
.back-btn:hover{border-color:var(--blue);color:var(--blue);}
/* MOBILE */
@media(max-width:600px){.cards-grid{grid-template-columns:1fr;}.controls{flex-direction:column;align-items:stretch;}#searchInput{width:100%;}}
</style>

// FİLTRE DURUMU
let filters={country:'all',cat:'all'};
let searchTerm='';

function setFilter(type,val,btn){
  filters[type]=val;
  document.querySelectorAll(`[data-filter="${type}"]`).forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  filterCards();
}

function filterCards(){
  searchTerm=document.getElementById('searchInput').value.toLowerCase();
  const filtered=WEAPONS.filter(w=>{
    const matchCountry=filters.country==='all'||w.country===filters.country;
    const matchCat=filters.cat==='all'||w.cat===filters.cat;
    const matchSearch=!searchTerm||
      w.name.toLowerCase().includes(searchTerm)||
      w.fullname.toLowerCase().includes(searchTerm)||
      w.country.toLowerCase().includes(searchTerm)||
      w.desc.toLowerCase().includes(searchTerm)||
      w.metals.some(m=>m.toLowerCase().includes(searchTerm));
    return matchCountry&&matchCat&&matchSearch;
  });
  renderCards(filtered);
}

function renderCards(weapons){
  const grid=document.getElementById('cardsGrid');
  document.getElementById('shownCount').textContent=weapons.length;
  grid.innerHTML='';
  weapons.forEach(w=>{
    const catColor=CAT_COLORS[w.cat]||'#888';
    const flag=COUNTRY_FLAGS[w.country]||'🌍';
    const card=document.createElement('div');
    card.className='weapon-card';
    card.style.setProperty('--card-color',w.color||catColor);
    const metalsHtml=w.metals.map(m=>{
      const mc=METAL_COLORS[m]||{bg:'rgba(100,100,100,.15)',border:'#888',text:'#888'};
      return `<span class="metal-tag" style="background:${mc.bg};border-color:${mc.border};color:${mc.text}" title="${m}">${m}</span>`;
    }).join('');
    card.innerHTML=`
      <div class="card-header">
        <span class="card-icon">${w.icon}</span>
        <div class="card-country">
          <span class="card-flag">${flag}</span>
          <div style="font-size:.8rem;color:var(--dim);">${w.country}</div>
        </div>
      </div>
      <div class="card-name">${w.name}</div>
      <div class="card-fullname">${w.fullname}</div>
      <div class="card-desc">${w.desc.substring(0,120)}${w.desc.length>120?'...':''}</div>
      <div class="metals-section">
        <div class="metals-title">⚗️ Nadir Metal Bileşenleri</div>
        <div class="metals-list">${metalsHtml}</div>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px;">
        <span class="cat-badge" style="background:${catColor}22;border-color:${catColor};color:${catColor};">${w.cat}</span>
        <span style="font-size:.8rem;color:var(--dim);cursor:pointer;color:var(--blue);" onclick="openModal('${w.id}')">📖 Detay →</span>
      </div>
    `;
    card.onclick=(e)=>{if(!e.target.closest('[onclick]'))openModal(w.id);};
    grid.appendChild(card);
  });
}

function openModal(id){
  const w=WEAPONS.find(x=>x.id===id);
  if(!w)return;
  const flag=COUNTRY_FLAGS[w.country]||'🌍';
  const catColor=CAT_COLORS[w.cat]||'#888';
  const metalsHtml=w.metals.map(m=>{
    const mc=METAL_COLORS[m]||{bg:'rgba(100,100,100,.15)',border:'#888',text:'#888'};
    return `<span class="metal-tag" style="background:${mc.bg};border-color:${mc.border};color:${mc.text};padding:4px 10px;font-size:.68rem;">${m}</span>`;
  }).join('');
  const specsHtml=Object.entries(w.specs||{}).map(([k,v])=>`
    <div class="spec-item">
      <div class="spec-label">${k}</div>
      <div class="spec-value">${v}</div>
    </div>
  `).join('');
  document.getElementById('modalContent').innerHTML=`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;">
      <span style="font-size:2.5rem;">${w.icon}</span>
      <div>
        <div class="modal-title">${w.name}</div>
        <div class="modal-sub">${flag} ${w.country} · <span style="color:${catColor}">${w.cat}</span></div>
        <div style="font-size:.85rem;color:var(--dim);font-style:italic;">${w.fullname}</div>
      </div>
    </div>
    <div class="modal-section">
      <h3>📋 Açıklama</h3>
      <p>${w.desc}</p>
    </div>
    <div class="modal-section">
      <h3>⚗️ Nadir Metal Bileşenleri</h3>
      <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;">${metalsHtml}</div>
      <p>${w.why||'Bu sistem kritik nadir metaller içermektedir.'}</p>
    </div>
    ${w.specs?`<div class="modal-section"><h3>📊 Teknik Özellikler</h3><div class="specs-grid">${specsHtml}</div></div>`:''}
    <div class="modal-section">
      <h3>🌍 Stratejik Önemi</h3>
      <p>Bu sistem <span class="fact">${w.metals.length} farklı nadir metal</span> kullanmaktadır. 
      ${w.country==='Çin'?'<span class="fact">Çin bu metallerin büyük çoğunluğunu kontrol ediyor — stratejik avantaj!</span>':
        w.country==='Türkiye'?'<span class="fact">Türkiye yerli üretimle nadir metal bağımlılığını azaltmayı hedefliyor.</span>':
        'Tedarik zinciri güvenliği kritik stratejik öneme sahiptir.'}</p>
    </div>
  `;
  document.getElementById('modal').classList.add('open');
}

function closeModal(){
  document.getElementById('modal').classList.remove('open');
}

document.getElementById('modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('modal'))closeModal();
});

// BAŞLAT
document.getElementById('totalCount').textContent=WEAPONS.length;
filterCards();
