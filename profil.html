<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Profil — Harb-i Strateji</title>
<link rel="icon" href="logo-icon-64.png">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&subset=latin-ext&display=swap" rel="stylesheet">
<link rel="stylesheet" href="hs-global.css">
<style>
.profile-page{padding:2rem 0;min-height:80vh;}
.profile-hero{background:var(--navy);border-radius:12px;padding:2rem;margin-bottom:2rem;display:flex;align-items:center;gap:1.5rem;flex-wrap:wrap;}
.profile-avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--crimson),var(--gold));display:flex;align-items:center;justify-content:center;font-size:2rem;color:#fff;font-weight:700;}
.profile-info h1{font-family:var(--font-display);font-size:1.3rem;font-weight:700;color:#fff;}
.profile-info p{font-size:.75rem;color:rgba(255,255,255,.5);margin-top:.2rem;}
.profile-xp{margin-top:.5rem;}
.profile-xp-bar{width:200px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden;}
.profile-xp-fill{height:100%;background:linear-gradient(90deg,var(--crimson),var(--gold));border-radius:3px;}
.profile-xp-text{font-family:var(--font-mono);font-size:.6rem;color:rgba(255,255,255,.4);margin-top:.3rem;}
.profile-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:1rem;margin-bottom:2rem;}
.p-stat{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:1rem;text-align:center;}
.p-stat-val{font-family:var(--font-display);font-size:1.3rem;font-weight:700;color:var(--crimson);}
.p-stat-lbl{font-size:.6rem;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-top:.2rem;}
.profile-section{margin-bottom:2rem;}
.profile-section h2{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--text);margin-bottom:1rem;padding-bottom:.5rem;border-bottom:1px solid var(--border);}
.badge-grid{display:flex;flex-wrap:wrap;gap:.8rem;}
.badge{display:flex;align-items:center;gap:.5rem;padding:.5rem .8rem;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;}
.badge-icon{font-size:1.2rem;}
.badge-name{font-family:var(--font-display);font-size:.72rem;font-weight:600;color:var(--text);}
.badge-desc{font-size:.6rem;color:var(--text-3);}
.history-item{display:flex;align-items:center;gap:1rem;padding:.7rem;border-bottom:1px solid var(--border);}
.history-item:last-child{border-bottom:none;}
.history-icon{font-size:1rem;opacity:.5;}
.history-title{font-family:var(--font-display);font-size:.78rem;font-weight:600;color:var(--text);}
.history-meta{font-family:var(--font-mono);font-size:.6rem;color:var(--text-3);}
.not-logged{text-align:center;padding:4rem 2rem;}
.not-logged h2{font-family:var(--font-display);font-size:1.2rem;color:var(--text);margin-bottom:.5rem;}
.not-logged p{color:var(--text-3);margin-bottom:1.5rem;}
.not-logged a{display:inline-block;padding:.7rem 1.5rem;background:var(--crimson);color:#fff;border-radius:6px;font-family:var(--font-display);font-weight:700;font-size:.8rem;text-decoration:none;}
.logout-btn{margin-left:auto;padding:.4rem .8rem;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#ef4444;border-radius:6px;font-size:.7rem;cursor:pointer;transition:all .2s;}
.logout-btn:hover{background:rgba(239,68,68,.2);}
</style>
<link rel="stylesheet" href="hs-global-fix.css">
</head>
<body>
<div class="profile-page container" id="profile-root"></div>
<script src="hs-nav.js?v=11"></script>
<script>
const user = JSON.parse(localStorage.getItem('hs-current-user') || 'null');
const root = document.getElementById('profile-root');

if(!user){
  root.innerHTML = `<div class="not-logged">
    <h2>Giriş Yapmanız Gerekiyor</h2>
    <p>Profilinizi görüntülemek için giriş yapın veya kayıt olun.</p>
    <a href="uyelik.html">Giriş Yap / Kayıt Ol</a>
  </div>`;
} else {
  const xp = user.xp || 0;
  const level = Math.floor(xp / 100) + 1;
  const xpPct = (xp % 100);
  
  const badges = [
    {icon:'🎖️', name:'İlk Adım', desc:'İlk simülasyonu tamamladın'},
    {icon:'🏆', name:'Stratejist', desc:'5 simülasyon tamamlandı'},
    {icon:'⚔️', name:'Savaş Zekâsı', desc:'Türk Savaş Zekâsı oyununu bitirdin'},
    {icon:'🌍', name:'Jeopolitik Uzman', desc:'10 analiz okundu'},
    {icon:'🎯', name:'OODA Master', desc:'OODA-X\'te 250ms altı skor'}
  ];
  
  root.innerHTML = `
    <div class="profile-hero">
      <div class="profile-avatar">${user.name.charAt(0).toUpperCase()}</div>
      <div class="profile-info">
        <h1>${user.name}</h1>
        <p>${user.email} · Katılım: ${new Date(user.joined).toLocaleDateString('tr-TR')}</p>
        <div class="profile-xp">
          <div class="profile-xp-bar"><div class="profile-xp-fill" style="width:${xpPct}%"></div></div>
          <div class="profile-xp-text">Seviye ${level} · ${xp} XP · Sonraki: ${100 - xpPct} XP</div>
        </div>
      </div>
      <button class="logout-btn" onclick="logout()">Çıkış Yap</button>
    </div>
    
    <div class="profile-stats">
      <div class="p-stat"><div class="p-stat-val">0</div><div class="p-stat-lbl">Tamamlanan Simülasyon</div></div>
      <div class="p-stat"><div class="p-stat-val">0</div><div class="p-stat-lbl">OZA Oyun Skoru</div></div>
      <div class="p-stat"><div class="p-stat-val">${badges.length}</div><div class="p-stat-lbl">Rozet</div></div>
      <div class="p-stat"><div class="p-stat-val">${level}</div><div class="p-stat-lbl">Seviye</div></div>
      <div class="p-stat"><div class="p-stat-val">0</div><div class="p-stat-lbl">Okunan Analiz</div></div>
    </div>
    
    <div class="profile-section">
      <h2>Rozetler</h2>
      <div class="badge-grid">
        ${badges.map(b=>`<div class="badge"><span class="badge-icon">${b.icon}</span><div><div class="badge-name">${b.name}</div><div class="badge-desc">${b.desc}</div></div></div>`).join('')}
      </div>
    </div>
    
    <div class="profile-section">
      <h2>Son Aktiviteler</h2>
      <div class="history-item"><span class="history-icon">🎮</span><div><div class="history-title">Kriz Odası — Tamamlandı</div><div class="history-meta">Bugün · +25 XP</div></div></div>
      <div class="history-item"><span class="history-icon">📖</span><div><div class="history-title">İran Savaşı Anatomisi — Okundu</div><div class="history-meta">Dün · +10 XP</div></div></div>
      <div class="history-item"><span class="history-icon">🎯</span><div><div class="history-title">OODA-X Düellosu — 312ms</div><div class="history-meta">2 gün önce · +15 XP</div></div></div>
    </div>
    
    <div class="profile-section">
      <h2>Hızlı Erişim</h2>
      <div style="display:flex;flex-wrap:wrap;gap:.6rem;">
        <a href="oza-hub.html" style="padding:.5rem 1rem;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;font-size:.75rem;color:var(--text);transition:all .2s;">OZA Oyunları</a>
        <a href="simulasyonlar.html" style="padding:.5rem 1rem;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;font-size:.75rem;color:var(--text);transition:all .2s;">Simülasyonlar</a>
        <a href="editor.html" style="padding:.5rem 1rem;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;font-size:.75rem;color:var(--text);transition:all .2s;">Editör Paneli</a>
        <a href="medeniyet-dinamikleri.html" style="padding:.5rem 1rem;background:var(--bg-card);border:1px solid var(--border);border-radius:6px;font-size:.75rem;color:var(--text);transition:all .2s;">Medeniyet</a>
      </div>
    </div>
  `;
}

function logout(){
  localStorage.removeItem('hs-current-user');
  window.location.href = 'uyelik.html';
}
</script>
</body>
</html>
