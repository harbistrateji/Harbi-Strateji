const grid = document.getElementById('ptgrid');
const cells = {};

for(let r=1; r<=7; r++) {
  for(let c=1; c<=18; c++) {
    const el = elements.find(e => e.col===c && Math.round(e.row)===r);
    const div = document.createElement('div');
    if(el) {
      const s = strategic[el.z];
      div.className = 'el';
      div.style.background = s ? s.color+'22' : 'var(--surface-1)';
      if(s) div.style.borderColor = s.color+'66';
      div.innerHTML = `<span class="num">${el.z}</span><span class="sym">${el.sym}</span><span class="name">${el.name}</span>`;
      if(s) { div.title = el.name; div.onclick = ()=>showInfo(el.z, el, s, div); }
    } else {
      div.className = 'el-empty';
    }
    grid.appendChild(div);
    if(el) cells[el.z] = div;
  }
}

// Lantanidler satırı — boşluklu satır ekle
const sep = document.createElement('div');
sep.style.cssText = 'grid-column:1/19; height:6px;';
grid.appendChild(sep);

for(let c=3; c<=17; c++) {
  const el = elements.find(e => e.col===c && e.row===8.5);
  const div = document.createElement('div');
  if(el) {
    const s = strategic[el.z];
    div.className = 'el';
    div.style.gridColumn = c;
    div.style.background = s ? s.color+'22' : 'var(--surface-1)';
    if(s) div.style.borderColor = s.color+'66';
    div.innerHTML = `<span class="num">${el.z}</span><span class="sym">${el.sym}</span><span class="name">${el.name}</span>`;
    if(s) { div.onclick = ()=>showInfo(el.z, el, s, div); }
  } else {
    div.className = 'el-empty';
  }
  grid.appendChild(div);
  if(el) cells[el.z] = div;
}

function showInfo(z, el, s, clickedDiv) {
  Object.values(cells).forEach(c => c.classList.remove('active'));
  clickedDiv.classList.add('active');

  const panel = document.getElementById('infopanel');
  panel.classList.add('show');

  const riskColor = s.risk > 90 ? '#E24B4A' : s.risk > 75 ? '#EF9F27' : '#639922';
  const riskLabel = s.risk > 90 ? 'Kritik' : s.risk > 75 ? 'Yüksek' : s.risk > 50 ? 'Orta' : 'Düşük';

  const badges = s.uses.map(u => `<span class="badge" style="background:${s.color}22;color:${s.color};border:0.5px solid ${s.color}44">${u}</span>`).join('');

  panel.innerHTML = `
    <div class="ip-header">
      <div class="ip-sym" style="background:${s.color}22;color:${s.color}">${el.sym}</div>
      <div>
        <div style="font-size:18px;font-weight:500;color:var(--text-primary)">${el.name} <span style="font-size:13px;color:var(--text-muted)">— ${el.z}</span></div>
        <div style="font-size:12px;color:var(--text-muted);margin-top:2px">${s.cat}</div>
        <div style="display:flex;align-items:center;gap:8px;margin-top:6px">
          <div class="risk-bar" style="width:120px"><div class="risk-fill" style="width:${s.risk}%;background:${riskColor}"></div></div>
          <span style="font-size:11px;color:${riskColor};font-weight:500">${riskLabel} risk (${s.risk}/100)</span>
        </div>
      </div>
    </div>
    <p style="font-size:13px;color:var(--text-secondary);line-height:1.6;margin:0 0 10px">${s.desc}</p>
    ${badges}
    <div class="ip-row">
      <div class="ip-card">
        <div class="ip-label">Başlıca üretici ülkeler</div>
        <div class="ip-val">${s.producers}</div>
      </div>
      <div class="ip-card">
        <div class="ip-label">İkame edilebilirlik</div>
        <div class="ip-val" style="font-size:12px">${s.alt}</div>
      </div>
    </div>
  `;
}
