<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0f17;color:#eaf0f7;font-family:'Segoe UI',system-ui,sans-serif;touch-action:manipulation;user-select:none}
#app{width:100%;height:100%;display:flex;flex-direction:column}
.top{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;background:rgba(10,15,23,.95);border-bottom:1px solid rgba(0,224,255,.15);flex-shrink:0}
.top a{color:#00e0ff;text-decoration:none;font-size:.8rem}
.top .t{font-size:.85rem;font-weight:700;color:#fff}
.top .s{font-size:.75rem;color:#c9a24b}
#gameArea{flex:1;position:relative;overflow:hidden}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}
#overlay{position:absolute;inset:0;background:rgba(10,15,23,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;text-align:center;padding:20px}
#overlay h2{color:#00e0ff;font-size:1.4rem;margin-bottom:8px}
#overlay p{color:#aaa;font-size:.85rem;margin-bottom:16px;max-width:340px}
#overlay button{padding:12px 32px;border:2px solid #00e0ff;background:transparent;color:#00e0ff;border-radius:8px;font-size:1rem;cursor:pointer;font-weight:700}
#overlay button:hover{background:rgba(0,224,255,.1)}
.hud{position:absolute;top:8px;left:8px;right:8px;display:flex;justify-content:space-between;font-size:.75rem;pointer-events:none}
.hud span{background:rgba(0,0,0,.6);border:1px solid rgba(0,224,255,.3);border-radius:6px;padding:3px 8px}

/* ═══ MOBİL UYUMLU RESPONSIVE ═══ */
@media (max-width: 768px) {
  body { font-size: 14px !important; }
  .container, .main, .wrap, .content, .page-content {
    padding: 12px !important;
    max-width: 100% !important;
  }
  h1 { font-size: clamp(18px, 5vw, 28px) !important; }
  h2 { font-size: clamp(15px, 4vw, 22px) !important; }
  h3 { font-size: clamp(13px, 3.5vw, 18px) !important; }
  table { font-size: 11px !important; }
  img, video, canvas, svg { max-width: 100% !important; height: auto !important; }
  .grid, .card-grid, .cards { grid-template-columns: 1fr !important; }
}
@media (max-width: 480px) {
  body { font-size: 13px !important; }
  .container, .main, .wrap { padding: 8px !important; }
  h1 { font-size: clamp(16px, 5vw, 24px) !important; }
  .nav, .navbar, .top-bar, .header { 
    padding: 8px 12px !important;
    font-size: 12px !important;
  }
}
/* Prevent horizontal overflow */
html { overflow-x: hidden !important; }
body { overflow-x: hidden !important; max-width: 100vw !important; }
img, video, iframe, canvas, svg, table { max-width: 100% !important; }
pre, code { overflow-x: auto !important; white-space: pre-wrap !important; word-break: break-word !important; }

</style>

</head>
<body>
<div style="position:fixed;top:12px;left:12px;z-index:9999;display:flex;gap:8px;"><a href="oza-hub.html" style="background:rgba(10,15,23,0.9);color:#00E0FF;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid #00E0FF33;backdrop-filter:blur(8px);">← OZA Hub</a><a href="index.html" style="background:rgba(10,15,23,0.9);color:#c41e3a;padding:6px 14px;border-radius:20px;text-decoration:none;font-family:Chakra Petch,sans-serif;font-size:13px;border:1px solid rgba(196,30,58,0.3);backdrop-filter:blur(8px);">🏠 Ana Sayfa</a></div>
<div id="app">
<div class="top">
<a href="oza-hub.html">← OZA</a>
<span class="t">💧 Su Savaşları: Kaynak Savunması</span>
<span class="s" id="sc">0 puan</span>
</div>
<div id="gameArea">
<canvas id="gc"></canvas>
<div class="hud"><span id="h1"></span><span id="h2"></span></div>
<div id="overlay">
<h2 id="ovT">BAŞLA</h2>
<p id="ovD"></p>
<button onclick="startGame()">▶ BAŞLA</button>
</div>
</div>
</div>
<script>
let audioCtx;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playTone(f,d,t){if(!audioCtx)return;const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type=t||'square';o.frequency.value=f;g.gain.value=0.06;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.stop(audioCtx.currentTime+d)}
const canvas=document.getElementById('gc'),ctx=canvas.getContext('2d');
let W,H,running=false,score=0;
function resize(){const a=document.getElementById('gameArea');W=canvas.width=a.clientWidth;H=canvas.height=a.clientHeight}
window.addEventListener('resize',resize);resize();
function updScore(v){score+=v;document.getElementById('sc').textContent=score+' puan'}
function showOv(t,d){document.getElementById('overlay').style.display='flex';document.getElementById('ovT').textContent=t;document.getElementById('ovD').textContent=d}
function hideOv(){document.getElementById('overlay').style.display='none'}

let bases=[],enemies4=[],bullets2=[],waterLevel=100,round2=1,placing=false,selectedTower2=0;
const TOWERS=[
  {name:'Su Pompası',cost:30,color:'#00e0ff',range:80,rate:60,dmg:5,icon:'💧'},
  {name:'Filtre Kulesi',cost:50,color:'#4ade80',range:100,rate:90,dmg:8,icon:'🧪'},
  {name:'Baraj',cost:80,color:'#fbbf24',range:120,rate:120,dmg:12,icon:'🏗️'}
];
let gold2=200,towerList=[];
function startGame(){initAudio();hideOv();running=true;score=0;gold2=200;waterLevel=100;round2=1;towerList=[];enemies4=[];bullets2=[];
  setTimeout(spawnWave2,2000);loop8()}
function spawnWave2(){for(let i=0;i<round2*3+2;i++){
  let side=Math.random()>.5?0:W;
  enemies4.push({x:side,y:Math.random()*H*0.7+H*0.15,hp:15+round2*5,maxHp:15+round2*5,speed:0.5+round2*0.15,type:Math.floor(Math.random()*3)})}}
function placeTower(x,y){let t=TOWERS[selectedTower2];if(gold2<t.cost)return;
  gold2-=t.cost;towerList.push({x,y,type:selectedTower2,cooldown:0});playTone(523,.1,'sine')}
function loop8(){if(!running)return;requestAnimationFrame(loop8);update8();draw8()}
function update8(){
  // Tower shooting
  towerList.forEach(tw=>{tw.cooldown--;if(tw.cooldown>0)return;
    let t=TOWERS[tw.type];let nearest=null,minD=Infinity;
    enemies4.forEach(e=>{let d=Math.hypot(e.x-tw.x,e.y-tw.y);if(d<t.range&&d<minD){minD=d;nearest=e}});
    if(nearest){tw.cooldown=t.rate;bullets2.push({x:tw.x,y:tw.y,tx:nearest.x,ty:nearest.y,dmg:t.dmg,life:15})}});
  // Bullets
  for(let i=bullets2.length-1;i>=0;i--){let b=bullets2[i];
    let dx=b.tx-b.x,dy=b.ty-b.y,d=Math.hypot(dx,dy);
    if(d<5||b.life<=0){
      enemies4.forEach(e=>{if(Math.hypot(e.x-b.x,e.y-b.y)<20)e.hp-=b.dmg});
      bullets2.splice(i,1)}
    else{b.x+=dx/d*5;b.y+=dy/d*5;b.life--}}
  // Enemies
  let cx=W/2;
  for(let i=enemies4.length-1;i>=0;i--){let e=enemies4[i];
    let a=Math.atan2(H/2-e.y,cx-e.x);e.x+=Math.cos(a)*e.speed;e.y+=Math.sin(a)*e.speed;
    if(e.hp<=0){enemies4.splice(i,1);updScore(10);gold2+=5;playTone(600,.1,'sine');continue}
    if(Math.hypot(e.x-cx,e.y-H/2)<30){enemies4.splice(i,1);waterLevel-=10;playTone(150,.2,'sawtooth');
      if(waterLevel<=0){running=false;showOv('SU KRİZİ!','Skor: '+score+' | Dalga: '+round2)}}}
  if(enemies4.length===0&&running){round2++;setTimeout(spawnWave2,1500);playTone(800,.2,'sine')}
  document.getElementById('h1').textContent='💧'+waterLevel+'% 💰'+gold2;
  document.getElementById('h2').textContent='Dalga '+round2;
}
function draw8(){
  ctx.fillStyle='#0a1520';ctx.fillRect(0,0,W,H);
  // Water reservoir (center)
  ctx.beginPath();ctx.arc(W/2,H/2,25,0,Math.PI*2);
  ctx.fillStyle='rgba(0,150,255,'+(waterLevel/100)*0.6+')';ctx.fill();
  ctx.strokeStyle='#00e0ff';ctx.lineWidth=2;ctx.stroke();
  ctx.fillStyle='#fff';ctx.font='10px sans-serif';ctx.textAlign='center';ctx.fillText(waterLevel+'%',W/2,H/2+4);
  // Towers
  towerList.forEach(tw=>{let t=TOWERS[tw.type];
    ctx.fillStyle=t.color;ctx.globalAlpha=0.3;ctx.beginPath();ctx.arc(tw.x,tw.y,t.range,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;ctx.font='16px sans-serif';ctx.textAlign='center';ctx.fillText(t.icon,tw.x,tw.y+5)});
  // Bullets
  ctx.fillStyle='#fbbf24';bullets2.forEach(b=>{ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill()});
  // Enemies
  enemies4.forEach(e=>{ctx.fillStyle='#ff3a4a';ctx.beginPath();ctx.arc(e.x,e.y,8,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.fillRect(e.x-8,e.y-12,16*(e.hp/e.maxHp),3)});
  // Tower selector
  let selY=H-35;
  TOWERS.forEach((t,i)=>{let sx=20+i*80;
    ctx.fillStyle=i===selectedTower2?'rgba(0,224,255,.2)':'rgba(30,58,95,.4)';ctx.fillRect(sx,selY,70,28);
    ctx.strokeStyle=i===selectedTower2?'#00e0ff':'#333';ctx.strokeRect(sx,selY,70,28);
    ctx.fillStyle='#fff';ctx.font='9px sans-serif';ctx.textAlign='center';
    ctx.fillText(t.icon+' '+t.cost+'💰',sx+35,selY+17)});
}
canvas.addEventListener('click',e=>{if(!running)return;let r=canvas.getBoundingClientRect();
  let cx2=e.clientX-r.left,cy2=e.clientY-r.top;
  // Check tower selector
  let selY=H-35;
  TOWERS.forEach((t,i)=>{let sx=20+i*80;if(cx2>=sx&&cx2<=sx+70&&cy2>=selY&&cy2<=selY+28){selectedTower2=i;return}});
  if(cy2<selY-5)placeTower(cx2,cy2)});
canvas.addEventListener('touchstart',e=>{e.preventDefault();if(!running)return;let r=canvas.getBoundingClientRect();
  let t2=e.touches[0];let cx2=t2.clientX-r.left,cy2=t2.clientY-r.top;
  let selY=H-35;
  let selected=false;TOWERS.forEach((t,i)=>{let sx=20+i*80;if(cx2>=sx&&cx2<=sx+70&&cy2>=selY&&cy2<=selY+28){selectedTower2=i;selected=true}});
  if(!selected&&cy2<selY-5)placeTower(cx2,cy2)});
document.getElementById('ovD').textContent='Su kaynaklarını koru! Kule yerleştir, düşman dalgalarını durdur!';
resize();

</script>
